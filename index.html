<script>
    async function loadComponent(elementId, path) {
        try {
            const response = await fetch(path);
            if (!response.ok) return;
            const html = await response.text();
            const container = document.getElementById(elementId);
            
            if (container) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                const scripts = tempDiv.querySelectorAll('script');
                scripts.forEach(script => script.remove());
                
                container.innerHTML = tempDiv.innerHTML;
                
                setTimeout(() => {
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        if (oldScript.src) newScript.src = oldScript.src;
                        else newScript.textContent = oldScript.textContent;
                        container.appendChild(newScript);
                    });
                }, 50);
            } 
        } catch (error) {
            console.error(error);
        }
    }

    function smoothScroll(targetId) {
        const element = document.getElementById(targetId);
        if (element) {
            const offsetPosition = element.getBoundingClientRect().top + window.pageYOffset - 80;
            window.scrollTo({ top: offsetPosition, behavior: "smooth" });
        }
    }

    function initMobileBookingBar() {
        const bookingBar = document.getElementById('mobile-booking-bar');
        const contactSlot = document.getElementById('contact-slot');
        if (!bookingBar || !contactSlot || !window.matchMedia) return;

        const mobileQuery = window.matchMedia('(max-width: 768px)');
        let lastScrollY = window.pageYOffset || 0;
        let upwardDistance = 0, downwardDistance = 0;

        const update = () => {
            const currentY = window.pageYOffset || 0;
            const delta = currentY - lastScrollY;
            if (Math.abs(delta) > 2) {
                if (delta < 0) { upwardDistance += Math.abs(delta); downwardDistance = 0; } 
                else { downwardDistance += delta; upwardDistance = 0; }
            }

            const shouldForceHide = !mobileQuery.matches || currentY < 320 || (contactSlot.getBoundingClientRect().top <= window.innerHeight * 0.85);

            if (shouldForceHide) { bookingBar.classList.remove('visible'); } 
            else if (upwardDistance >= 28) { bookingBar.classList.add('visible'); } 
            else if (downwardDistance >= 14) { bookingBar.classList.remove('visible'); }

            lastScrollY = currentY;
        };

        window.addEventListener('scroll', () => window.requestAnimationFrame(update), { passive: true });
        update();
    }

    function setChatWidgetState(isOpen) {
        const widget = document.getElementById('chat-widget-iframe');
        const toggleButton = document.getElementById('chat-toggle-button');
        if (!widget) return;
        widget.classList.toggle('active', isOpen);
        if (toggleButton) toggleButton.classList.toggle('active', isOpen);
    }

    window.toggleChatWidget = function(forceState) {
        const widget = document.getElementById('chat-widget-iframe');
        if (!widget) return;
        setChatWidgetState(typeof forceState === 'boolean' ? forceState : !widget.classList.contains('active'));
    };

    document.addEventListener("DOMContentLoaded", async () => {
        await loadComponent('header-slot', 'banner.html');
        await Promise.all([
            loadComponent('hero-slot', 'hero/hero.html'),
            loadComponent('specialist-slot', 'specialist/specialist.html'),
            loadComponent('promotion-slot', 'promotion/promotion.html'), 
            loadComponent('news-slot', 'news/news.html'),
            loadComponent('contact-slot', 'contact/contact.html')
        ]);
        initMobileBookingBar();
    });
</script>
