pan\x3e\x26nbsp;Một số loại thuốc có chứa thuốc chống đông máu. Do đó, ở những bệnh nhân mắc bệnh bẩm sinh, bác sĩ chuyên khoa tai mũi họng có thể cân nhắc điều chỉnh các loại thuốc hiện có hoặc sử dụng thuốc mới để giúp kiểm soát huyết áp hoặc kê đơn thuốc chống đông máu, chẳng hạn như Tranexamic, để hỗ trợ đông máu.\x3c\/li\x3e\x3cli\x3e\x3cspan style=\\\x22color: var\(--tw-prose-bold\);\\\x22\x3ePhẫu thuật sửa mũi gãy hoặc chỉnh vách ngăn mũi lệch:\x3c\/span\x3e\x26nbsp;Ở những bệnh nhân bị gãy mũi hoặc vách ngăn mũi lệch, bác sĩ có thể cân nhắc phẫu thuật để cầm máu mũi, sửa mũi gãy hoặc định vị lại vách ngăn mũi lệch. Bác sĩ gây mê sẽ gây mê trước khi phẫu thuật.\x3c\/li\x3e\x3cli\x3e\x3cspan style=\\\x22color: var\(--tw-prose-bold\);\\\x22\x3eLoại bỏ dị vật:\x3c\/span\x3e\x26nbsp;Nhiều trường hợp chảy máu cam là do trẻ em vô tình nhét đồ chơi hoặc vật lạ vào mũi, dẫn đến chảy máu cam. Bác sĩ sẽ kiểm tra mũi để xem có dị vật không và việc loại bỏ dị vật sẽ giúp cầm máu vĩnh viễn.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/mp-cms.medparkhospital.com\/assets\/9576d255-9752-4c51-8391-711565e37184\\\x22 alt=\\\x22Phòng ngừa chảy máu cam\\\x22 height=\\\x22550\\\x22 width=\\\x221200\\\x22\x3e\x3c\/p\x3e\x3ch2\x3e\x3cspan style=\\\x22color: inherit;\\\x22\x3eLàm thế nào để ngăn ngừa chảy máu cam và chảy máu mũi?\x3c\/span\x3e\x3c\/h2\x3e\x3cul\x3e\x3cli\x3eKhông được ngoáy hoặc xì mũi quá mạnh.\x3c\/li\x3e\x3cli\x3eĐội mũ bảo hiểm và thắt dây an toàn khi lái xe để ngăn ngừa tai nạn hoặc thương tích ở mũi, đầu hoặc mặt.\x3c\/li\x3e\x3cli\x3eKhông hút thuốc, hít phải khói thuốc lá và tránh hít phải hóa chất, bụi và các chất ô nhiễm PM2.5.\x3c\/li\x3e\x3cli\x3eKhông nên ở quá lâu trong môi trường khô, nóng hoặc lạnh.\x3c\/li\x3e\x3cli\x3eBôi Vaseline vào mũi hoặc sử dụng nước muối sinh lý nhỏ mũi để ngăn ngừa vách ngăn mũi bị khô.\x3c\/li\x3e\x3cli\x3eĂn trái cây và rau quả giàu vitamin C để nuôi dưỡng và tăng cường các mao mạch trong mũi.\x3c\/li\x3e\x3cli\x3eUống đủ nước và nghỉ ngơi đầy đủ.\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3e\x3cspan style=\\\x22color: inherit;\\\x22\x3eChẩn đoán chảy máu cam\/chảy máu mũi\x26nbsp;bởi bác sĩ chuyên khoa tai, mũi, họng\x26nbsp;tại bệnh viện\x3c\/span\x3e\x3c\/h2\x3e\x3cp\x3eChảy máu cam hoặc chảy máu mũi có thể xảy ra với bất kỳ ai, bất kể giới tính hay tuổi tác. Chảy máu cam thường xảy ra mà không có lý do rõ ràng nhưng cần được kiểm tra một cách có hệ thống. Mặc dù hầu hết các trường hợp chảy máu cam không nguy hiểm và có thể xử lý bằng cách sơ cứu tại nhà, những người bị chảy máu cam nhiều không nên coi thường tình trạng này và nên đến bệnh viện để được xử lý đúng cách. Chảy máu nặng dai dẳng có thể đe dọa tính mạng, đặc biệt là ở trẻ nhỏ, người cao tuổi, bệnh nhân bị thiếu máu hoặc mất nước hoặc những người đang dùng thuốc chống đông máu. Cuối cùng, những người bị chảy máu mũi do bệnh ác tính sẽ được hưởng lợi từ chẩn đoán chính xác, cầm máu nhanh chóng và chăm sóc phù hợp giúp ngăn chặn hiệu quả sự tiến triển của bệnh.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-19T17:45:44.930Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241219230409\x22,\x22department\x22:\x22ENT\x22,\x22title\x22:\x22Chảy máu mũi \(Máu cam\): Nguyên nhân, Triệu chứng và Cách điều trị\x22,\x22imageUrl\x22:\x22https:\/\/github.com\/fmcclinic\/Medical_News\/blob\/main\/news\/image\/Nosebleed-1.jpg?raw=true\x22,\x22content\x22:\x22\x3ch1\x3eChảy máu mũi \(Máu cam\): Nguyên nhân, điều trị và phòng ngừa\x3c\/h1\x3e\x3ch2\x3eGiới thiệu\x3c\/h2\x3e\x3cp\x3eChảy máu mũi, hay còn gọi là máu cam, là một tình trạng y tế phổ biến xảy ra khi các mạch máu trong mũi bị vỡ hoặc bị tổn thương. Mặc dù thường không nguy hiểm, nhưng có thể gây lo lắng và khó chịu cho người bệnh. Hiểu rõ về nguyên nhân và cách xử trí sẽ giúp kiểm soát tình trạng này hiệu quả hơn.\x3c\/p\x3e\x3ch2\x3eHiểu về cấu trúc mũi và nguyên nhân chảy máu\x3c\/h2\x3e\x3cp\x3eMũi có một mạng lưới phức tạp các mạch máu nhỏ nằm ngay dưới niêm mạc mũi, đặc biệt là vùng vách ngăn mũi trước \(vùng Kiesselbach\). Đây là nơi xảy ra khoảng 90% các trường hợp chảy máu mũi.\x3c\/p\x3e\x3ch3\x3eNguyên nhân phổ biến\x3c\/h3\x3e\x3cp\x3eChảy máu mũi có thể do nhiều nguyên nhân khác nhau:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNguyên nhân bên ngoài:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3eKhông khí khô và lạnh\x3c\/li\x3e\x3cli\x3eChấn thương do va đập\x3c\/li\x3e\x3cli\x3eNgoáy mũi hoặc chà xát mũi mạnh\x3c\/li\x3e\x3cli\x3eHít các chất kích thích\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cstrong\x3eNguyên nhân bên trong:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3eViêm xoang hoặc nhiễm trùng\x3c\/li\x3e\x3cli\x3eDị ứng mãn tính\x3c\/li\x3e\x3cli\x3eHuyết áp cao\x3c\/li\x3e\x3cli\x3eRối loạn đông máu\x3c\/li\x3e\x3cli\x3eTác dụng phụ của thuốc\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eCác loại chảy máu mũi\x3c\/h2\x3e\x3ch3\x3eChảy máu mũi trước\x3c\/h3\x3e\x3cp\x3eChiếm 90% các trường hợp, máu chảy từ phía trước vách ngăn mũi và thường dễ kiểm soát. Phổ biến ở trẻ em và người trẻ tuổi.\x3c\/p\x3e\x3ch3\x3eChảy máu mũi sau\x3c\/h3\x3e\x3cp\x3eMáu chảy từ phía sau mũi xuống họng, ít gặp hơn nhưng thường nghiêm trọng và khó điều trị. Người cao tuổi có nguy cơ cao hơn.\x3c\/p\x3e\x3ch2\x3eXử trí và điều trị\x3c\/h2\x3e\x3ch3\x3eSơ cứu tại nhà\x3c\/h3\x3e\x3cp\x3eKhi bị chảy máu mũi, thực hiện các bước sau:\x3c\/p\x3e\x3col\x3e\x3cli\x3eNgồi thẳng lưng, hơi nghiêng đầu về phía trước\x3c\/li\x3e\x3cli\x3eBóp chặt phần mềm của mũi trong 10-15 phút\x3c\/li\x3e\x3cli\x3eThở bằng miệng\x3c\/li\x3e\x3cli\x3eTránh nằm ngửa\x3c\/li\x3e\x3cli\x3eĐặt đá lạnh lên mũi và mặt\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3eĐiều trị y tế\x3c\/h3\x3e\x3cp\x3eVới các trường hợp nghiêm trọng:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eĐốt điện:\x3c\/strong\x3e Bác sĩ đốt điện để cầm máu tại vị trí mạch máu bị chảy.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNhét bấc mũi:\x3c\/strong\x3e Đặt vật liệu đặc biệt vào mũi để tạo áp lực cầm máu.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3ePhẫu thuật:\x3c\/strong\x3e Áp dụng cho các trường hợp tái phát nhiều lần.\x3c\/p\x3e\x3ch2\x3ePhòng ngừa\x3c\/h2\x3e\x3ch3\x3eBiện pháp môi trường\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eDuy trì độ ẩm không khí phù hợp\x3c\/li\x3e\x3cli\x3eSử dụng kem dưỡng ẩm mũi\x3c\/li\x3e\x3cli\x3eTránh không khí quá khô hoặc lạnh\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eThay đổi thói quen\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eKhông ngoáy mũi mạnh\x3c\/li\x3e\x3cli\x3eHạn chế thuốc xịt mũi tùy tiện\x3c\/li\x3e\x3cli\x3eĐeo thiết bị bảo hộ khi chơi thể thao\x3c\/li\x3e\x3cli\x3eGiữ móng tay ngắn sạch\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eChăm sóc sức khỏe\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eKiểm soát huyết áp\x3c\/li\x3e\x3cli\x3eĐiều trị bệnh nền\x3c\/li\x3e\x3cli\x3eThông báo bác sĩ về thuốc đang dùng\x3c\/li\x3e\x3cli\x3eĂn uống đủ vitamin K và C\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eKhi nào cần gặp bác sĩ\x3c\/h2\x3e\x3cp\x3eTìm kiếm hỗ trợ y tế khi:\x3c\/p\x3e\x3cul\x3e\x3cli\x3eChảy máu liên tục trên 30 phút\x3c\/li\x3e\x3cli\x3eKhó thở hoặc nuốt\x3c\/li\x3e\x3cli\x3eChảy máu sau chấn thương đầu\x3c\/li\x3e\x3cli\x3eChảy máu thường xuyên\x3c\/li\x3e\x3cli\x3eCó triệu chứng đi kèm như chóng mặt\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eTác động đến cuộc sống\x3c\/h2\x3e\x3ch3\x3eẢnh hưởng tâm lý\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eGây lo lắng và stress\x3c\/li\x3e\x3cli\x3eGiảm tự tin\x3c\/li\x3e\x3cli\x3eẢnh hưởng giấc ngủ\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eTác động sinh hoạt\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eGián đoạn công việc\x3c\/li\x3e\x3cli\x3eHạn chế hoạt động thể thao\x3c\/li\x3e\x3cli\x3eKhó khăn trong di chuyển\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eCác nhóm đối tượng đặc biệt\x3c\/h2\x3e\x3ch3\x3eTrẻ em \(2-10 tuổi\)\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eCần hướng dẫn cách xử trí\x3c\/li\x3e\x3cli\x3eTránh gây lo sợ\x3c\/li\x3e\x3cli\x3eTheo dõi yếu tố nguy cơ\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eNgười cao tuổi\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eNguy cơ cao do dùng thuốc chống đông\x3c\/li\x3e\x3cli\x3eThường gặp chảy máu mũi sau\x3c\/li\x3e\x3cli\x3eCần kế hoạch phòng ngừa cụ thể\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eKết luận\x3c\/h2\x3e\x3cp\x3eChảy máu mũi là tình trạng phổ biến nhưng có thể kiểm soát được. Hiểu rõ nguyên nhân và cách xử trí giúp giảm lo lắng và xử lý hiệu quả. Hầu hết trường hợp có thể tự điều trị tại nhà, nhưng cần đến bác sĩ khi có dấu hiệu bất thường.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-19T16:04:10.686Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241219190958\x22,\x22department\x22:\x22ENT\x22,\x22title\x22:\x22Ung thư vòm họng\x22,\x22imageUrl\x22:\x22https:\/\/nyulangone.org\/files\/nasopharyngeal-cancer-surgery.jpg\x22,\x22content\x22:\x22\x3cp\x3eUng thư vòm họng là một loại ung thư vùng đầu và cổ, bắt đầu từ các mô của vòm họng - phần trên của họng nằm sau mũi. Họng là một ống rỗng dài khoảng 5 inch\x3c\/p\x3e\x3cp\x3eYẾU TỐ NGUY CƠ\x3c\/p\x3e\x3cp\x3eCác yếu tố làm tăng nguy cơ mắc ung thư vòm họng bao gồm:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Nhiễm virus Epstein-Barr \(EBV\)\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Sống hoặc có tổ tiên ở một số vùng Châu Á, Bắc Phi và Bắc Cực\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Tiền sử gia đình có người mắc bệnh\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Hút thuốc lá hoặc hít phải khói thuốc thụ động\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Uống rượu thường xuyên\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Chế độ ăn nhiều cá và thịt ướp muối\x3c\/p\x3e\x3cp\x3eDẤU HIỆU VÀ TRIỆU CHỨNG\x3c\/p\x3e\x3cp\x3eGiai đoạn sớm:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Cục u ở cổ\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Đau tai, ù tai\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Vấn đề về thính giác\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Đau họng\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Nghẹt mũi\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Chảy máu mũi\x3c\/p\x3e\x3cp\x3eGiai đoạn tiến triển:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Lác mắt\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Nhìn đôi\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Đau đầu\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Tê mặt\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Yếu cơ mặt\x3c\/p\x3e\x3cp\x3eCHẨN ĐOÁN VÀ XÉT NGHIỆM\x3c\/p\x3e\x3cp\x3eCác xét nghiệm chính bao gồm:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Nội soi mũi họng kèm sinh thiết\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Chụp MRI\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Chụp PET-CT\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xét nghiệm virus EBV và HPV\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Khám thần kinh\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Kiểm tra thính lực\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xét nghiệm máu\x3c\/p\x3e\x3cp\x3ePHÂN GIAI ĐOẠN\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Giai đoạn 0: Tế bào bất thường trong niêm mạc vòm họng\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Giai đoạn I: Ung thư chỉ ở vòm họng hoặc lan đến hầu họng\/khoang mũi\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Giai đoạn II: Ung thư lan đến hạch bạch huyết cổ một bên\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Giai đoạn III: Ung thư lan đến hạch bạch huyết cả hai bên cổ\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Giai đoạn IV: Chia thành IVA \(lan đến não, dây thần kinh sọ\) và IVB \(di căn xa\)\x3c\/p\x3e\x3cp\x3eĐIỀU TRỊ\x3c\/p\x3e\x3cp\x3eCác phương pháp điều trị chính:\x3c\/p\x3e\x3cp\x3e1.\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xạ trị:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xạ trị ngoài \(IMRT, xạ trị định vị\)\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xạ trị trong \(áp sát\)\x3c\/p\x3e\x3cp\x3e2.\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Hóa trị với các thuốc:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Carboplatin\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Cisplatin\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Docetaxel\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Fluorouracil\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Gemcitabin\x3c\/p\x3e\x3cp\x3e3.\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Phẫu thuật:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Cắt bỏ khối u kháng xạ\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Cắt hạch bạch huyết di căn\x3c\/p\x3e\x3cp\x3ePhác đồ điều trị theo giai đoạn:\x3c\/p\x3e\x3cp\x3eGiai đoạn I:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xạ trị vào khối u và hạch bạch huyết cổ\x3c\/p\x3e\x3cp\x3eGiai đoạn II, III, IVA:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xạ trị kết hợp hóa trị\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Có thể phẫu thuật nếu còn tế bào ung thư sau điều trị\x3c\/p\x3e\x3cp\x3eGiai đoạn IVB và tái phát:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Xạ trị\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Phẫu thuật\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Hóa trị\x3c\/p\x3e\x3cp\x3eTÁC DỤNG PHỤ\x3c\/p\x3e\x3cp\x3eTác dụng phụ muộn có thể gặp:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Khô miệng mãn tính\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Biến chứng răng miệng\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Mất thính lực\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Mất thị lực\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Khó nuốt\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Khóa hàm\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Rối loạn tuyến giáp và tuyến yên\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Tổn thương thần kinh não\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Thay đổi tâm trạng, nhận thức\x3c\/p\x3e\x3cp\x3eTHEO DÕI SAU ĐIỀU TRỊ\x3c\/p\x3e\x3cp\x3eCần theo dõi định kỳ để:\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Đánh giá đáp ứng điều trị\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Phát hiện tái phát sớm\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Kiểm soát tác dụng phụ\x3c\/p\x3e\x3cp\x3e·\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;\x26nbsp;Khám đầu cổ định kỳ\x3c\/p\x3e\x3cp\x3eNgoài ra, bệnh nhân có thể tham gia các thử nghiệm lâm sàng về phương pháp điều trị mới hoặc cách thức mới để sử dụng các phương pháp điều trị hiện có.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-19T12:09:58.674Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241217182729\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x22Ung thư vú viêm\x22,\x22imageUrl\x22:\x22https:\/\/www.breastsurgeryireland.com\/3d-images\/inflammatory-breast-cancer.jpg\x22,\x22content\x22:\x22\x3ch2\x3eUng thư vú viêm là gì?\x3c\/h2\x3e\x3cp\x3eUng thư vú viêm là một dạng ung thư vú hiếm gặp, trong đó vú có màu đỏ và sưng do tắc nghẽn mạch bạch huyết. Đây là loại ung thư vú hung hãn thường phát triển từ các tế bào lót ống dẫn sữa.\x3c\/p\x3e\x3ch2\x3eAi có nguy cơ mắc bệnh ung thư vú viêm?\x3c\/h2\x3e\x3cp\x3eSo với các loại ung thư vú khác, ung thư vú viêm thường xảy ra ở phụ nữ trẻ hơn. Phụ nữ Mỹ gốc Phi và phụ nữ béo phì có nguy cơ cao hơn. Bệnh này cũng có thể ảnh hưởng đến nam giới.\x3c\/p\x3e\x3ch2\x3eNhững triệu chứng liên quan đến ung thư vú viêm là gì?\x3c\/h2\x3e\x3cp\x3e\x3cstrong\x3eCác triệu chứng của ung thư vú viêm bao gồm:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3eSưng hoặc đỏ ở ít nhất một phần ba vú\x3c\/li\x3e\x3cli\x3eTăng kích thước vú, nặng và đau, núm vú bị tụt vào trong\x3c\/li\x3e\x3cli\x3eKhối u thường không thể cảm nhận được\x3c\/li\x3e\x3cli\x3eXuất hiện lớp vỏ cam trên da vú do tích tụ dịch bạch huyết\x3c\/li\x3e\x3cli\x3eSưng hạch bạch huyết dưới cánh tay hoặc gần xương đòn\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3eUng thư vú viêm tiến triển nhanh trong vài tuần hoặc vài tháng và có thể lan sang các hạch bạch huyết xung quanh và các mô khác. Bệnh có thể được chẩn đoán muộn trong quá trình phát triển.\x3c\/p\x3e\x3ch2\x3eUng thư vú viêm được chẩn đoán như thế nào?\x3c\/h2\x3e\x3cp\x3eBác sĩ sẽ xem xét các triệu chứng và tiền sử bệnh của bạn, tiến hành khám sức khỏe và yêu cầu làm một số xét nghiệm nhất định.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eCác xét nghiệm hình ảnh được thực hiện bao gồm:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3eChụp nhũ ảnh chẩn đoán\x3c\/li\x3e\x3cli\x3eSiêu âm vú và các hạch bạch huyết gần đó\x3c\/li\x3e\x3cli\x3eChụp CT, chụp PET hoặc chụp xương để kiểm tra xem ung thư đã di căn chưa\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3eSinh thiết cũng có thể được yêu cầu.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eUng thư vú viêm có thể được chẩn đoán muộn vì một số lý do:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3eCác triệu chứng này thường gặp ở các tình trạng khác như nhiễm trùng, chấn thương hoặc các loại ung thư vú khác,\x3c\/li\x3e\x3cli\x3eThông thường, không thấy có khối u khi khám.\x3c\/li\x3e\x3cli\x3eVú có mật độ tăng lên nên chụp nhũ ảnh tầm soát có thể không thấy rõ.\x3c\/li\x3e\x3cli\x3eBệnh có thể xảy ra và tiến triển nhanh chóng giữa các lần kiểm tra vú theo lịch trình.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cstrong\x3eUng thư vú viêm được xem xét nếu bạn có:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3eTriệu chứng khởi phát nhanh\x3c\/li\x3e\x3cli\x3eĐỏ ở ít nhất một phần ba vú\x3c\/li\x3e\x3cli\x3eKhông có khối u sờ thấy được\x3c\/li\x3e\x3cli\x3eKết quả sinh thiết cho thấy ung thư xâm lấn\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3ePhân loại ung thư được thực hiện để giúp bác sĩ quyết định phương pháp điều trị và tiên lượng tình trạng của bạn. Các tế bào ung thư được kiểm tra thụ thể hormone và mức độ tăng của gen hoặc protein HER2. Điều này giúp mô tả đặc điểm ung thư và có thể chỉ ra các chiến lược điều trị khả thi. Ung thư dương tính với HER2 hung hãn hơn.\x3c\/p\x3e\x3ch2\x3eUng thư vú viêm được điều trị như thế nào?\x3c\/h2\x3e\x3cp\x3e\x3cstrong\x3eUng thư vú viêm được điều trị bằng phương pháp đa phương thức bao gồm:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eHóa trị toàn thân\x3c\/strong\x3e\x26nbsp;được áp dụng để thu nhỏ khối u. Sáu chu kỳ hóa trị được thực hiện trong khoảng thời gian từ 4-6 tháng.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3ePhẫu thuật\x3c\/strong\x3e\x26nbsp;được thực hiện để loại bỏ mô ung thư. Điều này bao gồm phẫu thuật cắt bỏ vú triệt căn đã được sửa đổi tức là cắt bỏ vú bị ảnh hưởng và các hạch bạch huyết gần đó ở vú và cánh tay. Phẫu thuật được thực hiện sau khi hóa trị nhưng có thể được thực hiện sớm hơn nếu ung thư tiến triển quá nhanh. Các cơ ngực bên dưới vú thường được bảo tồn, nhưng lớp lót của chúng bị cắt bỏ. Trong trường hợp bệnh lan rộng, một số cơ ngực cũng được cắt bỏ.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eXạ trị\x3c\/strong\x3e\x26nbsp;được sử dụng để tiêu diệt bất kỳ tế bào ung thư nào còn sót lại sau khi cắt bỏ vú.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3ePhương pháp đa phương thức này đã cho thấy kết quả tốt trong điều trị ung thư vú viêm.\x3c\/p\x3e\x3ch2\x3eCó những phương pháp nào khác để điều trị ung thư vú viêm?\x3c\/h2\x3e\x3cp\x3e\x3cstrong\x3eBác sĩ cũng có thể đề nghị một trong các phương pháp điều trị sau:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eLiệu pháp nhắm mục tiêu:\x3c\/strong\x3e\x26nbsp;Đối với bệnh ung thư có mức protein HER2 tăng cao, liệu pháp nhắm mục tiêu sẽ ngăn chặn việc sản xuất loại protein này và có thể được khuyến nghị trước hoặc sau phẫu thuật.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eLiệu pháp hormone:\x3c\/strong\x3e\x26nbsp;Phương pháp điều trị này có thể được sử dụng cho các tế bào ung thư có thụ thể hormone. Các hormone như estrogen liên kết với các thụ thể và giúp các loại ung thư này phát triển và nhân lên. Liệu pháp hormone ngăn chặn sự liên kết của hormone với các thụ thể hoặc ngăn chặn việc sản xuất hormone. Tuy nhiên, hầu hết các trường hợp ung thư vú viêm đều có thụ thể hormone âm tính.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eTái tạo vú:\x3c\/strong\x3e\x26nbsp;Tái tạo vú được khuyến nghị để phục hồi hình dạng vú.\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eTiên lượng của bệnh ung thư vú viêm là gì?\x3c\/h2\x3e\x3cp\x3e\x3cstrong\x3eTiên lượng phụ thuộc vào các yếu tố như:\x3c\/strong\x3e\x3c\/p\x3e\x3cul\x3e\x3cli\x3eLoại và vị trí của ung thư\x3c\/li\x3e\x3cli\x3edàn dựng\x3c\/li\x3e\x3cli\x3eTuổi tác và sức khỏe tổng quát\x3c\/li\x3e\x3cli\x3ePhản ứng với điều trị\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3eMặc dù ung thư vú viêm là căn bệnh hung hãn nhưng có thể điều trị hiệu quả nếu được chẩn đoán sớm.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-17T11:27:30.448Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241217144754\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x22HPV và ung thư cổ tử cung: Những điều bạn cần biết\x22,\x22imageUrl\x22:\x22https:\/\/magazine.medlineplus.gov\/images\/uploads\/main_images\/caervicalcancer-hpv.jpg\x22,\x22content\x22:\x22\x3cp\x3eVirus papilloma ở người \(HPV\) là bệnh lây truyền qua đường tình dục phổ biến nhất ở Hoa Kỳ và có hơn 200 chủng loại virus này.\x3c\/p\x3e\x3cp\x3eBốn mươi trong số đó được gọi là HPV nguy cơ cao, có thể dẫn đến ung thư cổ tử cung ở phụ nữ. HPV nguy cơ thấp thường gây ra các triệu chứng không đe dọa đến tính mạng, chẳng hạn như mụn cóc sinh dục.\x3c\/p\x3e\x3cp\x3eĐiều quan trọng là phải biết rằng HPV nguy cơ cao tự nó không phải là ung thư. Tám trong số 10 phụ nữ sẽ mắc HPV nguy cơ cao vào một thời điểm nào đó trong cuộc đời, nhưng rất ít người trong số họ sẽ bị ung thư cổ tử cung.\x3c\/p\x3e\x3cp\x3eMay mắn thay, có một loại vắc-xin có thể bảo vệ mọi người khỏi một số chủng HPV có nguy cơ cao.\x3c\/p\x3e\x3ch3\x3eBạn bị nhiễm HPV như thế nào?\x3c\/h3\x3e\x3cp\x3eBạn có thể bị nhiễm HPV khi quan hệ tình dục qua đường âm đạo, hậu môn hoặc miệng với người bị nhiễm vi-rút. Bất kỳ ai hoạt động tình dục đều có thể bị nhiễm HPV, ngay cả khi bạn chỉ quan hệ tình dục với một người. HPV có thể lây truyền ngay cả khi người bị nhiễm không có triệu chứng.\x3c\/p\x3e\x3ch3\x3eAi có thể bị nhiễm HPV?\x3c\/h3\x3e\x3cp\x3eCả nam và nữ đều có thể bị HPV. Điều quan trọng cần biết là phụ nữ có thể được xét nghiệm HPV, nhưng nam giới thì không. Tuy nhiên, nam giới có thể tiêm vắc-xin HPV, giúp ngăn ngừa họ bị mụn cóc sinh dục và một số loại ung thư, bao gồm ung thư dương vật, hậu môn và cổ họng. Vắc-xin cũng giúp bảo vệ bạn tình của họ.\x3c\/p\x3e\x3cp\x3eTrung tâm Kiểm soát và Phòng ngừa Dịch bệnh không khuyến nghị xét nghiệm thường quy cho nam giới về các loại ung thư này vì chúng ít phổ biến hơn nhiều. Tuy nhiên, nếu bạn nghĩ mình có thể bị HPV hoặc ung thư, hãy liên hệ với nhà cung cấp dịch vụ chăm sóc sức khỏe của bạn.\x3c\/p\x3e\x3ch3\x3eTriệu chứng của HPV và ung thư cổ tử cung là gì?\x3c\/h3\x3e\x3cp\x3eMụn cóc sinh dục có thể là dấu hiệu của HPV ở nam và nữ. Tuy nhiên, nhiều chủng HPV, đặc biệt là những chủng gây ung thư, không có triệu chứng đáng chú ý. Những chủng này chỉ có thể được phát hiện bằng xét nghiệm Pap, xét nghiệm cổ tử cung của phụ nữ, phần dưới tử cung của cô ấy, để tìm bất kỳ thay đổi tế bào nào.\x3c\/p\x3e\x3cp\x3eCác triệu chứng của ung thư cổ tử cung ở phụ nữ có thể xuất hiện nhiều năm sau khi nhiễm HPV. Chúng bao gồm:\x3c\/p\x3e\x3cul\x3e\x3cli\x3eChảy máu và ra máu giữa các kỳ kinh nguyệt\x3c\/li\x3e\x3cli\x3eChảy máu sau khi quan hệ tình dục qua đường âm đạo\x3c\/li\x3e\x3cli\x3eChảy máu sau mãn kinh\x3c\/li\x3e\x3cli\x3eChu kỳ kinh nguyệt nặng hơn bình thường\x3c\/li\x3e\x3cli\x3eChảy máu sau khi khám vùng chậu\x3c\/li\x3e\x3cli\x3eDịch tiết bất thường từ âm đạo\x3c\/li\x3e\x3cli\x3eĐau khi quan hệ tình dục\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eHPV và ung thư cổ tử cung được điều trị như thế nào?\x3c\/h3\x3e\x3cblockquote\x3eCả nam giới và phụ nữ đều có thể bị nhiễm HPV, nhưng nam giới không thể xét nghiệm được.\x3c\/blockquote\x3e\x3cp\x3eKhông có cách chữa trị hoặc điều trị HPV, nhưng có cách điều trị các biến chứng mà nó có thể gây ra, chẳng hạn như mụn cóc sinh dục, tế bào gây ung thư và ung thư cổ tử cung.\x3c\/p\x3e\x3cp\x3ePhương pháp điều trị ung thư cổ tử cung tùy thuộc vào mức độ tiến triển của bệnh, nhưng có thể bao gồm hóa trị, xạ trị và phẫu thuật.\x3c\/p\x3e\x3cp\x3eXét nghiệm Pap và HPV thường xuyên giúp bác sĩ biết bạn có bị HPV hay không và nếu có, hãy theo dõi. Phát hiện sớm thường ngăn ngừa ung thư cổ tử cung. Hãy hỏi bác sĩ chăm sóc sức khỏe của bạn về lịch trình sàng lọc tốt nhất cho bạn.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eAi nên tiêm vắc-xin HPV?\x3c\/h3\x3e\x3cp\x3eVắc-xin HPV là một công cụ quan trọng để ngăn ngừa HPV và các biến chứng của nó, đặc biệt hiệu quả khi tiêm ở độ tuổi trẻ.\x3c\/p\x3e\x3cp\x3eCục Quản lý Thực phẩm và Dược phẩm khuyến cáo rằng hầu hết trẻ em nên tiêm vắc-xin HPV ở độ tuổi 11 hoặc 12. Lịch tiêm vắc-xin phụ thuộc vào độ tuổi của trẻ khi được tiêm vắc-xin lần đầu, nhưng trẻ em thường được tiêm hai liều.\x3c\/p\x3e\x3cp\x3eViệc tiêm vắc-xin thường không được khuyến khích cho những người trên 26 tuổi. Tuy nhiên, một số người lớn từ 27 đến 45 tuổi chưa được tiêm vắc-xin có thể quyết định tiêm vắc-xin HPV sau khi trao đổi với nhà cung cấp dịch vụ chăm sóc sức khỏe của mình.\x26nbsp;\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNguồn:\x3c\/strong\x3e\x26nbsp;\x26nbsp;MedlinePlus; Viện Ung thư Quốc gia; Trung tâm Kiểm soát và Phòng ngừa Dịch bệnh\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNguồn hình ảnh:\x3c\/strong\x3e\x26nbsp;Donny Bliss, Thư viện Y khoa Quốc gia, Văn phòng Truyền thông và Liên lạc Công chúng\x3c\/p\x3e\x3cp\x3eNgày 16 tháng 4 năm 2020\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-17T07:47:55.531Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241217003534\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x22HPV Can Lead to Head and Neck Cancers\x22,\x22imageUrl\x22:\x22https:\/\/blog.lexmed.com\/images\/librariesprovider80\/blog-post-featured-images\/hpv-virus.tmb-xlarge.jpg?sfvrsn=b544950b_1\x22,\x22content\x22:\x22\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eThe human papillomavirus is a sexually transmitted disease known to cause cervical cancer in women. But did you know that HPV can also lead to head and neck cancers? Statistics show that an increasing number of patients are developing throat cancer from HPV – many are men over the age of 50.\x3c\/p\x3e\x3cp\x3eWhile there are hundreds of types of HPV, types 16 and 18 are particularly worrisome. They’re linked to cancers at the tonsils and base of the tongue.\x3c\/p\x3e\x3cp\x3eHPV can also cause wart-like growths in the larynx and airway. Recurrent respiratory papillomas from other HPV subtypes and these lesions can lead to noisy breathing.\x3c\/p\x3e\x3cp\x3eThe best way to protect against HPV and its complications is with vaccines for both males and females. Typically, HPV vaccination takes place at age 11 or 12. The vaccine is recommended through age 26, and it can be offered to patients up to age 45 who have not been vaccinated.\x3c\/p\x3e\x3cp\x3eSymptoms of head and neck cancer related to HPV can include a chronic sore throat, ear pain or difficulty swallowing. Patients may also notice a neck mass that pops up and does not go away. If you notice these symptoms, consult your doctor.\x3c\/p\x3e\x3cp\x3eTreatment of these cancers involves surgery, chemotherapy and radiation.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-16T17:35:35.609Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241216145732\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x22Phòng ngừa ung thư cổ tử cung:\x22,\x22imageUrl\x22:\x22https:\/\/thumbayuniversityhospital.com\/wp-content\/uploads\/2021\/07\/papsmear.jpg\x22,\x22content\x22:\x22\x3cp\x3ePhòng ngừa ung thư cổ tử cung:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCổ tử cung là phần dưới cùng của tử cung; nó mở vào âm đạo\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eUng thư cổ tử cung xảy ra khi các tế bào bình thường ở cổ tử cung biến đổi thành tế bào bất thường và phát triển không kiểm soát.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCó hai loại ung thư cổ tử cung là “ung thư biểu mô tế bào vảy” và “ung thư biểu mô tuyến”.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eXét nghiệm tầm soát ung thư cổ tử cung:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCác xét nghiệm sàng lọc có thể phát hiện ung thư cổ tử cung và tiền ung thư ở giai đoạn đầu khi có thể điều trị được, do đó có thể làm giảm số lượng người mắc ung thư cổ tử cung cũng như số ca tử vong do căn bệnh này.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCó hai loại xét nghiệm sàng lọc ung thư cổ tử cung:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eXét nghiệm Papanicolaou hoặc “Pap” \(đôi khi được gọi là “Pap smear”\)\x3c\/p\x3e\x3cp\x3eXét nghiệm virus u nhú ở người hoặc “HPV”\x3c\/p\x3e\x3cp\x3eHoặc kết hợp cả hai bài kiểm tra\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCác yếu tố rủi ro:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eYếu tố nguy cơ quan trọng nhất của ung thư cổ tử cung là nhiễm virus papilloma ở người \(HPV\).\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCó hơn 100 loại HPV khác nhau; tuy nhiên, hầu hết các loại HPV không gây ung thư.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eÍt nhất 80 phần trăm phụ nữ tiếp xúc với vi-rút HPV trong suốt cuộc đời. Hầu hết thời gian, hệ thống miễn dịch của cơ thể sẽ loại bỏ vi-rút trước khi nó gây hại.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCác loại HPV được chia thành nguy cơ cao và thấp gây ung thư cổ tử cung.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCác loại HPV nguy cơ thấp – Ví dụ, HPV loại 6 và 11 có thể gây ra mụn cóc sinh dục và là loại nguy cơ thấp vì chúng hiếm khi gây ra ung thư cổ tử cung.\x3c\/p\x3e\x3cp\x3eCác loại HPV nguy cơ cao – Các loại HPV nguy cơ cao có thể gây ung thư cổ tử cung ở một số người.\x3c\/p\x3e\x3cp\x3eMặc dù hầu hết những người bị nhiễm các loại HPV nguy cơ cao không phát triển ung thư cổ tử cung, nhưng những người liên tục xét nghiệm dương tính với HPV nguy cơ cao có nguy cơ mắc ung thư cổ tử cung cao hơn.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eHPV loại 16 và 18 là hai loại có nguy cơ cao.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNhiễm trùng HPV xảy ra như thế nào?\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eHPV lây lan qua tiếp xúc da kề da trực tiếp, bao gồm quan hệ tình dục qua đường âm đạo, quan hệ tình dục bằng miệng, quan hệ tình dục qua đường hậu môn hoặc bất kỳ tiếp xúc nào khác liên quan đến vùng sinh dục \(ví dụ: tiếp xúc từ tay đến bộ phận sinh dục\).\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eVì vậy, HPV lây truyền qua đường tình dục\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eBao cao su chỉ có tác dụng bảo vệ một phần vì chúng không bao phủ toàn bộ vùng da ở bộ phận sinh dục.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eKhông thể bị nhiễm HPV khi chạm vào một vật nào đó, chẳng hạn như bệ ngồi bồn cầu.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eQuá trình nhiễm HPV:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eHầu hết các trường hợp nhiễm HPV là tạm thời và sẽ khỏi trong vòng hai năm. Những người có hệ thống miễn dịch không thể loại bỏ được vi-rút \(10-20%\) có nguy cơ cao mắc tiền ung thư hoặc ung thư. Quá trình này thường mất nhiều năm.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNguy cơ ung thư cổ tử cung tăng ở những người hút thuốc và những người mắc bệnh lý \(hoặc đang dùng thuốc\) làm suy yếu hệ miễn dịch.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eTriệu chứng:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eHầu hết những người bị nhiễm HPV không có dấu hiệu hoặc triệu chứng.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eLàm thế nào để giảm nguy cơ ung thư cổ tử cung?\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eVắc-xin giúp ngăn ngừa nhiễm một số loại HPV có nguy cơ cao được khuyến nghị cho tất cả trẻ em từ 11 đến 12 tuổi, nhưng có thể tiêm sớm nhất là từ 9 tuổi. Vắc-xin \\\x22bù đắp\\\x22 được khuyến nghị cho tất cả những người dưới 26 tuổi chưa tiêm vắc-xin này, nhưng có thể tiêm đến 45 tuổi.\x3c\/p\x3e\x3cp\x3eTầm soát ung thư cổ tử cung \(kể cả những người đã tiêm vắc-xin\)\x3c\/p\x3e\x3cp\x3eBỏ thuốc lá\x3c\/p\x3e\x3cp\x3eTầm soát ung thư cổ tử cung\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e1-Xét nghiệm Pap\x26nbsp;— Xét nghiệm Pap \(đôi khi được gọi là “Pap smear”\) là phương pháp kiểm tra các tế bào từ cổ tử cung. Một thuật ngữ khác của xét nghiệm Pap là “tế bào học cổ tử cung”.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eĐối với xét nghiệm Pap, bác sĩ sẽ tiến hành kiểm tra vùng chậu bằng một thiết bị gọi là mỏ vịt để mở âm đạo. Sau đó, họ sẽ sử dụng một bàn chải nhỏ hoặc thìa để lấy tế bào từ cổ tử cung. Việc này có thể gây khó chịu nhưng thường không gây đau. Các tế bào được thêm vào một hộp đựng có chất lỏng bảo quản hoặc được bôi lên một phiến kính để kiểm tra.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e2-Xét nghiệm HPV\x26nbsp;— Giống như xét nghiệm Pap, xét nghiệm vi-rút u nhú ở người \(HPV\) được thực hiện trong quá trình khám vùng chậu, sử dụng một chiếc chổi nhỏ để lấy mẫu từ cổ tử cung. Xét nghiệm HPV không xét nghiệm tất cả các loại HPV khác nhau. Chúng chỉ xét nghiệm các chủng HPV có nguy cơ cao gây ung thư cổ tử cung; kết quả dương tính cho thấy một hoặc nhiều chủng trong số này đã được tìm thấy. Đôi khi, phòng xét nghiệm sẽ báo cáo cụ thể nếu bạn mắc một trong hai loại HPV có nguy cơ cao nhất, được gọi là HPV 16 và HPV 18. Điều này được gọi là \\\x22xét nghiệm kiểu gen\\\x22.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e3-Xét nghiệm kết hợp\x26nbsp;— Bao gồm việc thực hiện xét nghiệm Pap và HPV cùng một lúc; còn được gọi là “xét nghiệm đồng thời”.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eXét nghiệm sàng lọc có thể được thực hiện bất cứ lúc nào trong chu kỳ kinh nguyệt của bạn. Tuy nhiên, không phải trong thời kỳ kinh nguyệt.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eAi nên được sàng lọc?\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eMục tiêu là bắt đầu sàng lọc tại thời điểm mà lợi ích của việc sàng lọc có khả năng lớn hơn rủi ro.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNhững người đã tiêm vắc-xin cũng nên được sàng lọc, vì vắc-xin có thể ngăn ngừa hầu hết các bệnh nhiễm HPV phổ biến nhưng không phải tất cả các bệnh nhiễm HPV.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eTrước 21 tuổi:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eỞ những người khỏe mạnh, việc sàng lọc không được khuyến khích\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eTuổi từ 21 đến 29\x26nbsp;—\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eCó thể bắt đầu sàng lọc ở độ tuổi 25 cứ sau 3 năm bằng xét nghiệm Pap\x3c\/p\x3e\x3cp\x3eTuổi từ 30 đến 65\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eXét nghiệm HPV chỉ \(còn gọi là xét nghiệm HPV chính\) năm năm một lần nếu tất cả kết quả đều bình thường\x3c\/p\x3e\x3cp\x3e“Kiểm tra đồng thời” \(cả xét nghiệm Pap và HPV\) cứ năm năm một lần\x3c\/p\x3e\x3cp\x3eXét nghiệm Pap ba năm một lần nếu tất cả kết quả đều bình thường\x3c\/p\x3e\x3cp\x3eSau 65 tuổi\x26nbsp;— Hầu hết phụ nữ không có yếu tố nguy cơ có thể ngừng tầm soát ung thư cổ tử cung sau 65 tuổi\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNhững người đã thực hiện tất cả các xét nghiệm sàng lọc bình thường một cách thường xuyên trong quá khứ.\x3c\/p\x3e\x3cp\x3eNhững người có ít nhất ba xét nghiệm Pap liên tiếp cho kết quả bình thường hoặc hai xét nghiệm kết hợp bình thường \(xét nghiệm Pap và HPV kết hợp\) trong 10 năm qua, với xét nghiệm gần đây nhất được thực hiện trong vòng 5 năm qua.\x3c\/p\x3e\x3cp\x3eMột số phụ nữ có yếu tố nguy cơ cần tiếp tục tầm soát ung thư cổ tử cung sau 65 tuổi nếu:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eHọ có kết quả xét nghiệm Pap bất thường, xét nghiệm HPV bất thường hoặc điều trị ung thư hoặc tế bào tiền ung thư ở cổ tử cung, âm đạo, âm hộ hoặc hậu môn.\x3c\/p\x3e\x3cp\x3eHọ bị nhiễm HIV hoặc mắc một tình trạng bệnh lý khác làm suy giảm hệ thống miễn dịch.\x3c\/p\x3e\x3cp\x3eHọ đã tiếp xúc với diethylstilbestrol \(DES\) trong tử cung – DES là \(một loại thuốc được dùng cho nhiều phụ nữ trước năm 1981 để ngăn ngừa biến chứng khi mang thai\).\x3c\/p\x3e\x3cp\x3eSau khi cắt bỏ tử cung\x26nbsp;\(phẫu thuật cắt bỏ tử cung và đôi khi là cổ tử cung\)\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNếu cổ tử cung đã được cắt bỏ thì không cần phải sàng lọc thêm nữa.\x3c\/p\x3e\x3cp\x3eNếu không loại bỏ cevix \(cần tuân theo hướng dẫn thông thường\)\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-16T07:57:33.801Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241215214055\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x22Ung thư cổ tử cung: Nguyên nhân, Dấu hiệu \x26 Triệu chứng và Chẩn đoán\x22,\x22imageUrl\x22:\x22https:\/\/www.saintjohnscancer.org\/gynecology\/wp-content\/uploads\/sites\/8\/2024\/08\/HPV-Human-Papillomavirus-Saint-Johns-Cancer-Institute.png\x22,\x22content\x22:\x22\x3ch2\x3eNguyên nhân gây ung thư cổ tử cung\x3c\/h2\x3e\x3cp\x3eCó thể thực hiện sàng lọc ung thư tiền cổ tử cung hoặc ung thư cổ tử cung bằng xét nghiệm PAP lâm sàng.\x3c\/p\x3e\x3cp\x3eCổ tử cung là phần thấp nhất của tử cung, nối âm đạo và tử cung. Ung thư cổ tử cung chủ yếu được tìm thấy ở phụ nữ hoạt động tình dục, thường là do HPV hoặc Human Papillomavirus. Tiền ung thư cổ tử cung hoặc ung thư có thể được phát hiện bằng cách sàng lọc PAP và điều trị bằng phẫu thuật, hóa trị hoặc xạ trị.\x3c\/p\x3e\x3cp\x3eUng thư cổ tử cung chủ yếu là kết quả của tình trạng nhiễm trùng dai dẳng với các loại vi-rút u nhú ở người \(HPV\) có nguy cơ cao. Loại vi-rút này lây truyền qua đường tình dục và có thể gây ra những thay đổi trong các tế bào cổ tử cung, dẫn đến ung thư theo thời gian. Các yếu tố nguy cơ khác bao gồm hút thuốc, hệ thống miễn dịch suy yếu, sử dụng thuốc tránh thai đường uống trong thời gian dài và mang thai đủ tháng nhiều lần.\x3c\/p\x3e\x3cp\x3eViệc sàng lọc thường xuyên thông qua xét nghiệm Pap và HPV có thể phát hiện những thay đổi tiền ung thư ở tế bào cổ tử cung, cho phép can thiệp sớm và ngăn ngừa sự phát triển của ung thư. Điều cần thiết là phải tuân theo các hướng dẫn sàng lọc được khuyến nghị để xác định sớm bất kỳ vấn đề tiềm ẩn nào. Nếu bạn gặp các triệu chứng hoặc có nguy cơ, hãy tham khảo ý kiến ​​bác sĩ chăm sóc sức khỏe của bạn để có các biện pháp sàng lọc và phòng ngừa phù hợp.\x3c\/p\x3e\x3ch2\x3eDấu hiệu và triệu chứng của ung thư cổ tử cung\x3c\/h2\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/www.saintjohnscancer.org\/gynecology\/wp-content\/uploads\/sites\/8\/2024\/08\/Patient-consultation-Cervical-Cancer-Saint-Johns-Health-Center.jpg\\\x22 alt=\\\x22Tư vấn bệnh nhân - Ung thư cổ tử cung - Trung tâm y tế Saint John\\\x22 height=\\\x22auto\\\x22 width=\\\x22100%\\\x22\x3eMặc dù ung thư cổ tử cung có thể không biểu hiện triệu chứng, một hoặc nhiều tình trạng kết hợp có thể là lý do để bạn cần tìm kiếm sự chăm sóc ngay lập tức.\x3c\/p\x3e\x3cp\x3eGiai đoạn đầu của ung thư cổ tử cung thường không biểu hiện dấu hiệu hoặc triệu chứng, vì vậy, điều quan trọng là phải khám phụ khoa thường xuyên và sàng lọc bằng xét nghiệm PAP và xét nghiệm HPV.\x3c\/p\x3e\x3cul\x3e\x3cli\x3eChảy máu sau khi giao hợp\x3c\/li\x3e\x3cli\x3eĐau vùng chậu\x3c\/li\x3e\x3cli\x3eĐau khi quan hệ tình dục\x3c\/li\x3e\x3cli\x3eKhí hư bất thường, chảy máu hoặc có mùi ở âm đạo\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eChẩn đoán ung thư cổ tử cung\x3c\/h2\x3e\x3cp\x3eChẩn đoán sớm lý tưởng có nghĩa là tìm thấy tiền ung thư cổ tử cung trên xét nghiệm phết tế bào cổ tử cung \(PAP\). Soi cổ tử cung cũng có thể được thực hiện trong đó bác sĩ sẽ nhìn vào cổ tử cung bằng kính hiển vi đặc biệt có thể phát hiện bất kỳ bất thường nào về thị giác. Sinh thiết cũng có thể được thực hiện ở vùng có vẻ bất thường để xác định xem có ung thư hay không.\x3c\/p\x3e\x3ch3\x3eCác giai đoạn ung thư cổ tử cung\x3c\/h3\x3e\x3cp\x3eGiai đoạn ung thư cổ tử cung được xác định tùy thuộc vào vị trí ung thư và liệu ung thư đã di căn sang các bộ phận khác của cơ thể hay chưa.\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/www.saintjohnscancer.org\/gynecology\/wp-content\/uploads\/sites\/8\/2024\/08\/Cervical-Cancer-Stages-Saint-Johns-Cancer-Institute.jpg\\\x22 alt=\\\x22Các giai đoạn ung thư cổ tử cung - Viện ung thư Saint John\\\x22 height=\\\x22619\\\x22 width=\\\x221195\\\x22\x3eNếu không được điều trị, ung thư cổ tử cung có thể tiến triển và lan sang các bộ phận khác của cơ thể.\x3c\/p\x3e\x3cp\x3e\x26nbsp;\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(10, 48, 57\);\\\x22\x3eGiai đoạn I\x3c\/strong\x3e\x26nbsp;: Ung thư đã lan từ niêm mạc cổ tử cung vào mô sâu hơn nhưng vẫn chỉ được tìm thấy trong tử cung. Nó chưa lan đến hạch bạch huyết hoặc các bộ phận khác của cơ thể.\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(10, 48, 57\);\\\x22\x3eGiai đoạn II\x3c\/strong\x3e\x26nbsp;: Ung thư đã lan ra ngoài cổ tử cung đến các khu vực lân cận, chẳng hạn như âm đạo hoặc mô gần cổ tử cung, nhưng vẫn nằm bên trong vùng chậu. Ung thư chưa lan đến các hạch bạch huyết hoặc các bộ phận khác của cơ thể.\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(10, 48, 57\);\\\x22\x3eGiai đoạn III\x3c\/strong\x3e\x26nbsp;: Khối u đã lan đến thành chậu, và\/hoặc liên quan đến phần ba dưới của âm đạo, và\/hoặc gây sưng thận, được gọi là thận ứ nước, hoặc ngăn thận hoạt động. Không có hạch bạch huyết nào bị ảnh hưởng và không có sự lan rộng xa.\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(10, 48, 57\);\\\x22\x3eGiai đoạn IVA\x3c\/strong\x3e\x26nbsp;: Ung thư đã di căn đến bàng quang hoặc trực tràng và có thể hoặc không di căn đến các hạch bạch huyết, nhưng chưa di căn đến các bộ phận khác của cơ thể.\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(10, 48, 57\);\\\x22\x3eGiai đoạn IVB\x3c\/strong\x3e\x26nbsp;: Ung thư đã di căn đến các bộ phận khác của cơ thể.\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(10, 48, 57\);\\\x22\x3eTái phát\x3c\/strong\x3e\x26nbsp;: Ung thư tái phát là ung thư tái phát sau khi điều trị. Nếu ung thư tái phát, sẽ có một đợt xét nghiệm khác để tìm hiểu về mức độ tái phát. Các xét nghiệm và quét này thường tương tự như những xét nghiệm và quét được thực hiện tại thời điểm chẩn đoán ban đầu.\x3c\/p\x3e\x3ch2\x3eCác yếu tố nguy cơ của ung thư cổ tử cung\x3c\/h2\x3e\x3cul\x3e\x3cli\x3eHPV: Human Papillomavirus là nguyên nhân phổ biến nhất gây ra ung thư cổ tử cung. Tiêm vắc-xin phòng ngừa HPV đã làm giảm đáng kể tỷ lệ mắc ung thư cổ tử cung.\x3c\/li\x3e\x3cli\x3eQuan hệ tình dục ở độ tuổi dưới 16: Phụ nữ bắt đầu hoạt động tình dục ở độ tuổi trẻ hơn thường có nhiều khả năng có nhiều bạn tình hơn trong suốt cuộc đời.\x3c\/li\x3e\x3cli\x3eQuan hệ tình dục với nhiều người: Làm tăng tỷ lệ lây truyền HPV.\x3c\/li\x3e\x3cli\x3eHút thuốc: Các hóa chất có trong thuốc lá làm thay đổi các tế bào cổ tử cung, từ đó có thể dẫn đến ung thư.\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eĐiều trị ung thư cổ tử cung\x3c\/h2\x3e\x3cp\x3eĐiều trị thường bao gồm phẫu thuật, hóa trị, liệu pháp nhắm mục tiêu sinh học hoặc xạ trị, hoặc kết hợp các phương pháp này tùy thuộc vào giai đoạn. Can thiệp phẫu thuật tại Viện Ung thư Saint John sử dụng công nghệ hỗ trợ bằng robot xâm lấn tối thiểu tiên tiến. Phẫu thuật bảo tồn khả năng sinh sản cũng có sẵn.\x3c\/p\x3e\x3ch3\x3eTheo dõi\x3c\/h3\x3e\x3cp\x3eTheo dõi bao gồm các lần khám lại và xét nghiệm PAP để phát hiện tái phát. Đôi khi cũng nên chụp ảnh. Chúng tôi cung cấp lời khuyên giúp bạn giảm nguy cơ tái phát bằng cách lựa chọn dinh dưỡng và lối sống.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-15T14:40:56.676Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241214175049\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x22Chủ Động Tầm Soát Ung Thư Vú - Đừng Để Quá Muộn\x22,\x22imageUrl\x22:\x22https:\/\/github.com\/fmcclinic\/fmcweb\/blob\/main\/news\/image\/news.jpg?raw=true\x22,\x22content\x22:\x22\x3cp\x3e\\\x22Chị Lan \(35 tuổi, TP.HCM\) tưởng chừng đã quá muộn khi phát hiện khối u ở giai đoạn 2. Nhưng nhờ tầm soát định kỳ trong chương trình khám sức khỏe công ty, chị đã kịp thời điều trị và hiện đã khỏe mạnh trở lại. \x27Giá như tôi biết và đi khám sớm hơn...\x27 - đây là tâm sự của rất nhiều chị em.\\\x22\x3c\/p\x3e\x3ch2\x3eCâu Chuyện Của Người Chiến Thắng\x3c\/h2\x3e\x3cp\x3e\\\x22Tôi vẫn nhớ như in cảm giác hôm đó. Trong buổi khám sức khỏe định kỳ của công ty, bác sĩ phát hiện một khối u nhỏ ở vú phải. Ban đầu, tôi hoảng loạn và sợ hãi vô cùng,\\\x22 chị Lan chia sẻ. Sau khi được chẩn đoán ung thư vú giai đoạn 2, chị đã trải qua 6 tháng điều trị tích cực bao gồm phẫu thuật và hóa trị. \\\x22May mắn là nhờ phát hiện ở giai đoạn còn sớm, tôi đã có cơ hội điều trị hiệu quả. Giờ đây, tôi luôn nhắc nhở bạn bè và người thân về tầm quan trọng của việc tầm soát định kỳ.\\\x22\x3c\/p\x3e\x3ch2\x3eThực Trạng Đáng Báo Động\x3c\/h2\x3e\x3cp\x3eTheo thống kê mới nhất từ Globocan 2020, Việt Nam có khoảng 21.555 ca mắc mới ung thư vú mỗi năm, với 70% số ca được phát hiện ở giai đoạn muộn. Con số này đang gia tăng đáng kể trong những năm gần đây, đặc biệt ở nhóm phụ nữ trong độ tuổi 35-55.\x3c\/p\x3e\x3ch2\x3eCác Phương Pháp Tầm Soát Hiệu Quả\x3c\/h2\x3e\x3ch3\x3e1. Tự Khám Vú\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eThực hiện định kỳ mỗi tháng\x3c\/li\x3e\x3cli\x3eThời điểm thích hợp: 7-10 ngày sau khi bắt đầu kỳ kinh\x3c\/li\x3e\x3cli\x3eCó thể phát hiện những thay đổi bất thường sớm\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e2. Khám Lâm Sàng\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eThực hiện bởi bác sĩ chuyên khoa\x3c\/li\x3e\x3cli\x3eTần suất: 6 tháng - 1 năm\/lần\x3c\/li\x3e\x3cli\x3eĐánh giá chuyên sâu về các dấu hiệu bất thường\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e3. Chụp X-quang Tuyến Vú \(Mammogram\)\x3c\/h3\x3e\x3cul\x3e\x3cli\x3ePhương pháp tầm soát chuẩn xác nhất\x3c\/li\x3e\x3cli\x3eCó thể phát hiện tổn thương từ rất sớm\x3c\/li\x3e\x3cli\x3eĐược khuyến nghị định kỳ cho phụ nữ từ 40 tuổi trở lên\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eĐối Tượng Cần Tầm Soát\x3c\/h2\x3e\x3cul\x3e\x3cli\x3ePhụ nữ từ 40 tuổi trở lên: Khám định kỳ hàng năm\x3c\/li\x3e\x3cli\x3ePhụ nữ từ 20-39 tuổi: Khám lâm sàng 3 năm\/lần\x3c\/li\x3e\x3cli\x3eĐối tượng có nguy cơ cao \(tiền sử gia đình, gen BRCA1\/2\): Bắt đầu tầm soát sớm hơn theo tư vấn của bác sĩ\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eQuy Trình Tầm Soát Tại Phòng Khám\x3c\/h2\x3e\x3col\x3e\x3cli\x3eĐăng ký và khai báo thông tin\x3c\/li\x3e\x3cli\x3eTư vấn với bác sĩ chuyên khoa\x3c\/li\x3e\x3cli\x3eKhám lâm sàng\x3c\/li\x3e\x3cli\x3eChỉ định cận lâm sàng phù hợp \(siêu âm, chụp nhũ ảnh\)\x3c\/li\x3e\x3cli\x3eĐánh giá kết quả và tư vấn\x3c\/li\x3e\x3cli\x3eLập kế hoạch theo dõi\x3c\/li\x3e\x3c\/ol\x3e\x3ch2\x3e\x3cbr\x3e\x3c\/h2\x3e\x3ch2\x3eLời Khuyên Từ Chuyên Gia\x3c\/h2\x3e\x3cp\x3eBS CK2 Nguyễn Hoàng Lam, Phó Trưởng khoa Ung bướu Bệnh viện Từ Vũ chia sẻ: \\\x22Tầm soát ung thư vú không chỉ là việc đi khám bệnh, mà là một hành động chủ động bảo vệ sức khỏe. Chúng tôi khuyến khích chị em duy trì thói quen tự khám vú hàng tháng và đi khám định kỳ theo lịch. Phát hiện sớm là chìa khóa để điều trị hiệu quả.\\\x22\x3c\/p\x3e\x3ch2\x3eHành Động Ngay Hôm Nay\x3c\/h2\x3e\x3cp\x3eĐừng để những lo lắng về ung thư vú trở thành nỗi ám ảnh. Hãy chủ động đặt lịch tầm soát ngay hôm nay tại phòng khám của chúng tôi. Một cuộc hẹn nhỏ có thể đem lại sự an tâm lớn cho bạn và gia đình.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-14T10:50:52.627Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241214135749\x22,\x22department\x22:\x22ENT\x22,\x22title\x22:\x22Cách lựa chọn máy trợ thính phù hợp\x22,\x22imageUrl\x22:\x22https:\/\/www.aceaudiology.com.au\/wp-content\/uploads\/2021\/09\/Hearing-Aids-Buying-Guide.jpg\x22,\x22content\x22:\x22\x3cp\x3eViệc lựa chọn một chiếc máy trợ thính phù hợp là rất quan trọng để cải thiện chất lượng cuộc sống cho người gặp vấn đề về thính lực. Dưới đây là một số yếu tố cần cân nhắc khi lựa chọn:\x3c\/p\x3e\x3ch3\x3e1. \x3cstrong\x3eKhám và tư vấn chuyên sâu:\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eĐo thính lực:\x3c\/strong\x3e Bác sĩ sẽ tiến hành đo thính lực để xác định mức độ giảm thính lực, tần số âm thanh bị ảnh hưởng và loại hình mất thính lực.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eTư vấn:\x3c\/strong\x3e Dựa trên kết quả đo, bác sĩ sẽ tư vấn về loại máy trợ thính phù hợp, các tính năng cần thiết và cách sử dụng.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e2. \x3cstrong\x3eCác yếu tố cần cân nhắc:\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eMức độ giảm thính lực:\x3c\/strong\x3e Mỗi loại máy trợ thính phù hợp với một mức độ giảm thính lực khác nhau.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eMôi trường sống:\x3c\/strong\x3e Nếu thường xuyên tiếp xúc với tiếng ồn, cần chọn máy có khả năng lọc tiếng ồn tốt.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eHoạt động hàng ngày:\x3c\/strong\x3e Nếu thường xuyên tham gia các hoạt động xã hội, cần chọn máy có tính năng kết nối với các thiết bị khác như điện thoại, tivi.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eNgân sách:\x3c\/strong\x3e Giá cả của máy trợ thính rất đa dạng, tùy thuộc vào thương hiệu, tính năng và công nghệ.\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e3. \x3cstrong\x3eCác loại máy trợ thính:\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eMáy trợ thính trong tai:\x3c\/strong\x3e Nhỏ gọn, kín đáo, phù hợp với người giảm thính lực nhẹ đến trung bình.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eMáy trợ thính đặt sau tai:\x3c\/strong\x3e Kích thước lớn hơn, có nhiều tính năng hơn, phù hợp với nhiều mức độ giảm thính lực.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eMáy trợ thính xương:\x3c\/strong\x3e Dành cho người mất thính lực do vấn đề về tai giữa hoặc tai trong.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eMáy trợ thính có implant:\x3c\/strong\x3e Cấy ghép trực tiếp vào tai, phù hợp với người mất thính lực nặng.\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e4. \x3cstrong\x3eCác tính năng của máy trợ thính:\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eKhả năng lọc tiếng ồn:\x3c\/strong\x3e Giúp nghe rõ hơn trong môi trường ồn ào.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eKết nối Bluetooth:\x3c\/strong\x3e Kết nối với điện thoại, tivi, máy tính.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eĐiều khiển từ xa:\x3c\/strong\x3e Điều chỉnh âm lượng và các tính năng khác bằng điều khiển từ xa.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eChống nước:\x3c\/strong\x3e Phù hợp với người thường xuyên hoạt động ngoài trời.\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e5. \x3cstrong\x3eThử nghiệm và điều chỉnh:\x3c\/strong\x3e\x3c\/h3\x3e\x3cp\x3eSau khi chọn được máy trợ thính, bạn sẽ được điều chỉnh để phù hợp với thính lực của mình. Quá trình này có thể mất vài lần để đạt được hiệu quả tốt nhất.\x3c\/p\x3e\x3ch3\x3e\x3cstrong\x3eLời khuyên:\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eChọn cơ sở uy tín:\x3c\/strong\x3e Nên chọn các trung tâm thính học uy tín để được tư vấn và lắp đặt máy trợ thính.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eKhông tự ý mua máy:\x3c\/strong\x3e Việc tự mua máy trợ thính có thể không phù hợp với tình trạng thính lực của bạn.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eKiên trì sử dụng:\x3c\/strong\x3e Cần thời gian để làm quen với máy trợ thính.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-14T06:57:51.123Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241214134230\x22,\x22department\x22:\x22ENT\x22,\x22title\x22:\x22Giảm thính lực ở người già: Nguyên nhân và cách khắc phục\x22,\x22imageUrl\x22:\x22https:\/\/naturalhealth.my\/wp-content\/uploads\/2023\/05\/Hearing-Problem.jpg\x22,\x22content\x22:\x22\x3cp\x3e\x3cstrong\x3eGiảm thính lực\x3c\/strong\x3e là một vấn đề sức khỏe phổ biến ở người cao tuổi, ảnh hưởng đáng kể đến chất lượng cuộc sống. Hiểu rõ về nguyên nhân và cách khắc phục sẽ giúp người già và gia đình có những biện pháp phù hợp.\x3c\/p\x3e\x3ch3\x3eNguyên nhân gây giảm thính lực ở người già\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eLão hóa tự nhiên:\x3c\/strong\x3e Theo thời gian, các tế bào lông cảm giác trong tai sẽ bị thoái hóa, gây giảm khả năng nghe.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eTiếp xúc với tiếng ồn:\x3c\/strong\x3e Tiếp xúc lâu dài với tiếng ồn lớn có thể làm tổn thương các tế bào lông cảm giác, gây giảm thính lực vĩnh viễn.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eMột số bệnh lý:\x3c\/strong\x3e Bệnh tiểu đường, huyết áp cao, các bệnh về tim mạch, tai giữa, thần kinh... đều có thể gây giảm thính lực.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eSử dụng một số loại thuốc:\x3c\/strong\x3e Một số loại thuốc có thể gây tác dụng phụ là giảm thính lực.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eCác biểu hiện của giảm thính lực\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eNghe kém:\x3c\/strong\x3e Khó nghe rõ khi người khác nói, đặc biệt ở nơi ồn ào.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3ePhải tăng âm lượng TV, radio.\x3c\/strong\x3e\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eKhó nghe âm thanh cao tần:\x3c\/strong\x3e Nghe kém tiếng trẻ con, tiếng chim hót.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eHay hiểu nhầm lời người khác nói.\x3c\/strong\x3e\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eCảm thấy cô lập, khó giao tiếp.\x3c\/strong\x3e\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eCách khắc phục và chăm sóc người già bị giảm thính lực\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eKhám tai mũi họng định kỳ:\x3c\/strong\x3e Để phát hiện sớm các vấn đề về thính lực và có biện pháp can thiệp kịp thời.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eSử dụng máy trợ thính:\x3c\/strong\x3e Máy trợ thính là một công cụ hữu ích giúp người già nghe rõ hơn.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eTạo môi trường giao tiếp thuận lợi:\x3c\/strong\x3e Nói chậm, rõ ràng, tránh nói quá nhỏ hoặc quá lớn tiếng.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eGiảm thiểu tiếng ồn:\x3c\/strong\x3e Tạo không gian yên tĩnh để người già dễ nghe hơn.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eTìm hiểu về các lớp tập phục hồi thính lực:\x3c\/strong\x3e Các lớp học này giúp người già cải thiện khả năng nghe và giao tiếp.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eTư vấn tâm lý:\x3c\/strong\x3e Giúp người già vượt qua cảm giác cô lập, khó khăn trong giao tiếp.\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3ePhòng ngừa giảm thính lực\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eBảo vệ tai khỏi tiếng ồn:\x3c\/strong\x3e Đeo tai nghe bảo hộ khi làm việc ở môi trường ồn ào.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eĐiều trị kịp thời các bệnh lý về tai:\x3c\/strong\x3e Khám và điều trị các bệnh về tai ngay khi có dấu hiệu bất thường.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eKiểm tra sức khỏe định kỳ:\x3c\/strong\x3e Đặc biệt là đối với người cao tuổi có các yếu tố nguy cơ.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eChế độ ăn uống lành mạnh:\x3c\/strong\x3e Bổ sung các vitamin và khoáng chất cần thiết cho sức khỏe tai.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cstrong\x3eLưu ý:\x3c\/strong\x3e Việc giảm thính lực ở người già là một quá trình tự nhiên, tuy nhiên, với những biện pháp phù hợp, người già vẫn có thể duy trì chất lượng cuộc sống tốt.\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-14T06:42:31.950Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241214005025\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x225 Điều Cần Biết Về Tầm Soát Ung Thư Vú - Góc Nhìn Chuyên Gia\x22,\x22imageUrl\x22:\x22https:\/\/raw.githubusercontent.com\/fmcclinic\/Medical_News\/refs\/heads\/main\/news\/image\/breast%20self%20examination.jpg\x22,\x22content\x22:\x22\x3cp\x3eBác sĩ chuyên khoa 2 Nguyễn Hoàng Lam, với 20 năm kinh nghiệm trong lĩnh vực ung bướu sản phụ khoa, chia sẻ những điều quan trọng nhất mà mọi phụ nữ cần biết về tầm soát ung thư vú. \\\x22Có những dấu hiệu tưởng đơn giản nhưng không nên bỏ qua\\\x22 - BS Lam nhấn mạnh.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3e1. Dấu Hiệu Cảnh Báo Sớm\x3c\/h2\x3e\x3cp\x3e\\\x22Nhiều chị em thường bỏ qua những dấu hiệu ban đầu, nghĩ rằng đó chỉ là những thay đổi bình thường của cơ thể,\\\x22 BS Lam chia sẻ. Các dấu hiệu cần đặc biệt lưu ý:\x3c\/p\x3e\x3cul\x3e\x3cli\x3eKhối u cứng, không đau, bờ không đều\x3c\/li\x3e\x3cli\x3eThay đổi kích thước hoặc hình dáng vú\x3c\/li\x3e\x3cli\x3eDa vú có hiện tượng lõm, sần như vỏ cam\x3c\/li\x3e\x3cli\x3eNúm vú tụt, tiết dịch bất thường\x3c\/li\x3e\x3cli\x3eHạch nách sưng to\x3c\/li\x3e\x3c\/ul\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cstrong\x3eQuá trình tự khám vú gồm 5 bước.\x3c\/strong\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cstrong\x3eBước 1\x3c\/strong\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3eNhìn vào ngực của bạn trong gương với vai thẳng và cánh tay hạ xuống, nâng lên và trên hông. Bạn nên chú ý:\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3eNgực có kích thước, hình dạng và màu sắc bình thường\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3eNgực có hình dạng đều mà không bị biến dạng hoặc sưng tấy\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.cioncancerclinics.com\/images\/blog\/five\/Picture1.jpg\\\x22 alt=\\\x22phòng khám ung thư cion\\\x22\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cstrong\x3eBước 2\x3c\/strong\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3eĐứng và ấn ba ngón giữa vào ngực, xoa bóp quanh ngực theo hướng tròn bằng tay phải để cảm nhận ngực trái và sau đó bằng tay trái để cảm nhận ngực phải. Dùng ngón tay chạm nhẹ, chắc chắn, giữ cho các ngón tay phẳng và khép lại với nhau. Dùng chuyển động tròn, có kích thước bằng đồng xu 1 Rupee. Thực hiện theo một mẫu để đảm bảo bạn bao phủ toàn bộ ngực. Bạn có thể bắt đầu từ mép ngoài của ngực, di chuyển theo các vòng tròn nhỏ hơn cho đến khi chạm đến núm vú.\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.cioncancerclinics.com\/images\/blog\/five\/Picture2.jpg\\\x22 alt=\\\x22phòng khám ung thư cion\\\x22\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cstrong\x3eBước 3\x3c\/strong\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3eBóp núm vú để kiểm tra xem có dịch tiết không. Đây có thể là chất lỏng, sữa hoặc vàng hoặc máu. Trong trường hợp có dịch tiết ra máu, hãy đến gặp bác sĩ ngay lập tức.\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.cioncancerclinics.com\/images\/blog\/five\/Picture3.jpg\\\x22 alt=\\\x22phòng khám ung thư cion\\\x22\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cstrong\x3eBước 4\x3c\/strong\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3eTiếp theo, hãy cảm nhận ngực của bạn khi nằm xuống. Đặt một chiếc gối hoặc khăn tắm gấp dưới vai trái của bạn. Điều này giúp mô ngực của bạn trải đều trên thành ngực. Bây giờ lặp lại Bước 2 và 3.\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.cioncancerclinics.com\/images\/blog\/five\/Picture4.jpg\\\x22 alt=\\\x22phòng khám ung thư cion\\\x22\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cstrong\x3eBước 5\x3c\/strong\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3eCuối cùng, hãy sờ ngực khi bạn đang tắm. Bạn sẽ dễ sờ ngực hơn khi da ướt và trơn. Xoa toàn bộ ngực, sử dụng các động tác tay giống như mô tả ở Bước 2.\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.cioncancerclinics.com\/images\/blog\/five\/Picture5.jpg\\\x22 alt=\\\x22phòng khám ung thư cion\\\x22\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-justify\\\x22\x3e\x3cstrong\x3e3 Dấu hiệu phổ biến nhất của ung thư vú khi tự kiểm tra\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3e2. Phân Loại Đối Tượng Nguy Cơ\x3c\/h2\x3e\x3ch3\x3eNhóm Nguy Cơ Cao\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eTiền sử gia đình có người mắc ung thư vú\x3c\/li\x3e\x3cli\x3eMang gen BRCA1\/2\x3c\/li\x3e\x3cli\x3eĐã điều trị xạ trị vùng ngực\x3c\/li\x3e\x3cli\x3eKinh nguyệt sớm trước 12 tuổi\x3c\/li\x3e\x3cli\x3eMãn kinh muộn sau 55 tuổi\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eNhóm Nguy Cơ Trung Bình\x3c\/h3\x3e\x3cul\x3e\x3cli\x3ePhụ nữ trên 40 tuổi\x3c\/li\x3e\x3cli\x3eChưa từng sinh con\x3c\/li\x3e\x3cli\x3eSinh con đầu lòng sau 30 tuổi\x3c\/li\x3e\x3cli\x3eThừa cân, béo phì sau mãn kinh\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3e3. Các Phương Pháp Tầm Soát Hiện Đại\x3c\/h2\x3e\x3ch3\x3eChụp Nhũ Ảnh Kỹ Thuật Số \(Digital Mammography\)\x3c\/h3\x3e\x3cp\x3e\\\x22Đây là tiêu chuẩn vàng trong tầm soát ung thư vú,\\\x22 BS Thảo khẳng định. Phương pháp này:\x3c\/p\x3e\x3cul\x3e\x3cli\x3ePhát hiện tổn thương từ 2-3mm\x3c\/li\x3e\x3cli\x3eGiảm liều tia xạ so với phương pháp truyền thống\x3c\/li\x3e\x3cli\x3eCho phép lưu trữ và so sánh kết quả theo thời gian\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eSiêu Âm Vú 3D\/4D\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eQuan sát chi tiết cấu trúc mô vú\x3c\/li\x3e\x3cli\x3ePhân biệt u nang và u đặc\x3c\/li\x3e\x3cli\x3eĐặc biệt hiệu quả với phụ nữ có mô vú đặc\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eMRI Tuyến Vú\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eChỉ định cho các trường hợp đặc biệt\x3c\/li\x3e\x3cli\x3eĐánh giá chi tiết tổn thương đa ổ\x3c\/li\x3e\x3cli\x3eTheo dõi sau điều trị\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3e4. Lịch Trình Tầm Soát Theo Độ Tuổi\x3c\/h2\x3e\x3ch3\x3e20-39 tuổi\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eTự khám vú hàng tháng\x3c\/li\x3e\x3cli\x3eKhám lâm sàng 3 năm\/lần\x3c\/li\x3e\x3cli\x3eSiêu âm vú khi có chỉ định\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e40-49 tuổi\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eChụp nhũ ảnh 2 năm\/lần\x3c\/li\x3e\x3cli\x3eKhám lâm sàng hàng năm\x3c\/li\x3e\x3cli\x3eSiêu âm vú bổ sung nếu cần\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eTrên 50 tuổi\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eChụp nhũ ảnh hàng năm\x3c\/li\x3e\x3cli\x3eKhám lâm sàng 6 tháng\/lần\x3c\/li\x3e\x3cli\x3eCác xét nghiệm bổ sung theo chỉ định\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3e5. Các Yếu Tố Ảnh Hưởng Đến Kết Quả Tầm Soát\x3c\/h2\x3e\x3cp\x3eBS Thảo nhấn mạnh một số yếu tố quan trọng:\x3c\/p\x3e\x3ch3\x3eThời Điểm Thích Hợp\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e7-10 ngày sau khi bắt đầu kỳ kinh\x3c\/li\x3e\x3cli\x3eTránh thời điểm vú căng tức\x3c\/li\x3e\x3cli\x3eBuổi sáng khi cơ thể được nghỉ ngơi\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eKỹ Thuật Thực Hiện\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eTuân thủ hướng dẫn của kỹ thuật viên\x3c\/li\x3e\x3cli\x3eGiữ tư thế đúng khi chụp nhũ ảnh\x3c\/li\x3e\x3cli\x3eThông báo các bất thường trước đó\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3eYếu Tố Môi Trường\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eChọn cơ sở y tế uy tín\x3c\/li\x3e\x3cli\x3eTrang thiết bị hiện đại\x3c\/li\x3e\x3cli\x3eĐội ngũ chuyên môn có kinh nghiệm\x3c\/li\x3e\x3c\/ul\x3e\x3ch2\x3eLời Khuyên Từ Chuyên Gia\x3c\/h2\x3e\x3cp\x3e\\\x22Tầm soát ung thư vú không chỉ là việc đi khám định kỳ,\\\x22 BS Lam chia sẻ. \\\x22Đó là cả một quá trình chăm sóc sức khỏe liên tục, đòi hỏi sự kiên trì và chủ động từ mỗi người phụ nữ.\\\x22\x3c\/p\x3e\x3ch2\x3e\x3cbr\x3e\x3c\/h2\x3e\x22,\x22date\x22:\x222024-12-13T17:50:25.650Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241213182755\x22,\x22department\x22:\x22ENT\x22,\x22title\x22:\x22Nội soi tai mũi họng: Khám phá thế giới bên trong để có sức khỏe hoàn hảo\x22,\x22imageUrl\x22:\x22https:\/\/www.sinusdoctor.com\/wp-content\/uploads\/2022\/05\/Home-page-Images.jpg\x22,\x22content\x22:\x22\x3cp\x3eBạn thường xuyên gặp phải các vấn đề về tai mũi họng như nghẹt mũi, chảy nước mũi, đau họng, ù tai...? Đừng lo lắng, với công nghệ hiện đại, nội soi tai mũi họng sẽ giúp bạn tìm ra nguyên nhân và có giải pháp điều trị hiệu quả nhất.\x3c\/p\x3e\x3ch3\x3e\x3cstrong\x3eNội soi tai mũi họng là gì?\x3c\/strong\x3e\x3c\/h3\x3e\x3cp\x3eNội soi tai mũi họng là một kỹ thuật y khoa sử dụng ống nội soi có gắn camera siêu nhỏ để quan sát trực tiếp các cấu trúc bên trong tai, mũi, họng. Phương pháp này giúp bác sĩ phát hiện sớm và chính xác các bệnh lý, từ đó đưa ra phác đồ điều trị phù hợp.\x3c\/p\x3e\x3ch3\x3e\x3cstrong\x3eTại sao nên chọn nội soi tai mũi họng?\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eChẩn đoán chính xác:\x3c\/strong\x3e Nội soi giúp bác sĩ nhìn thấy rõ ràng các tổn thương, từ đó đưa ra kết luận chính xác về bệnh.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eÍt xâm lấn:\x3c\/strong\x3e Thủ thuật đơn giản, nhanh chóng, không gây đau đớn.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eAn toàn:\x3c\/strong\x3e Được thực hiện bởi các bác sĩ chuyên khoa giàu kinh nghiệm, sử dụng trang thiết bị hiện đại.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eĐiều trị hiệu quả:\x3c\/strong\x3e Nhờ chẩn đoán chính xác, việc điều trị trở nên dễ dàng và hiệu quả hơn.\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e\x3cstrong\x3eNội soi tai mũi họng phát hiện được những bệnh gì?\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eBệnh về mũi:\x3c\/strong\x3e Viêm mũi dị ứng, viêm xoang, polyp mũi, vẹo vách ngăn...\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eBệnh về họng:\x3c\/strong\x3e Viêm họng, viêm amidan, ung thư họng...\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eBệnh về tai:\x3c\/strong\x3e Viêm tai giữa, ù tai, giảm thính lực...\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e\x3cstrong\x3eQuy trình nội soi tai mũi họng diễn ra như thế nào?\x3c\/strong\x3e\x3c\/h3\x3e\x3col\x3e\x3cli\x3e\x3cstrong\x3eChuẩn bị:\x3c\/strong\x3e Bác sĩ sẽ giải thích về thủ thuật và hướng dẫn bệnh nhân chuẩn bị.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eTiến hành:\x3c\/strong\x3e Bác sĩ nhẹ nhàng đưa ống nội soi vào mũi hoặc tai để quan sát.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eKết quả:\x3c\/strong\x3e Hình ảnh sẽ được hiển thị trên màn hình, bác sĩ sẽ giải thích kết quả và tư vấn phương pháp điều trị.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-13T11:27:55.404Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20241212154352\x22,\x22department\x22:\x22ENT\x22,\x22title\x22:\x22Tầm soát ung thư vòm họng: Bảo vệ sức khỏe bạn\x22,\x22imageUrl\x22:\x22https:\/\/suckhoedoisong.qltns.mediacdn.vn\/Images\/nguyenkhanh\/2017\/12\/21\/noi_soi_tai_mui_hong.jpg\x22,\x22content\x22:\x22\x3cp\x3eUng thư vòm họng là một loại ung thư nguy hiểm, nhưng nếu được phát hiện sớm, khả năng điều trị thành công sẽ cao hơn rất nhiều. Vì vậy, tầm soát ung thư vòm họng định kỳ là vô cùng quan trọng.\x3c\/p\x3e\x3ch3\x3e\x3cstrong\x3eTại sao phải tầm soát ung thư vòm họng?\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3ePhát hiện sớm:\x3c\/strong\x3e Các dấu hiệu ban đầu của ung thư vòm họng thường không rõ ràng hoặc dễ bị nhầm lẫn với các bệnh lý khác. Tầm soát giúp phát hiện bệnh ở giai đoạn sớm, khi khối u còn nhỏ và chưa xâm lấn các mô xung quanh.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eĐiều trị hiệu quả:\x3c\/strong\x3e Khi phát hiện sớm, các phương pháp điều trị sẽ đơn giản hơn, ít xâm lấn hơn và hiệu quả cao hơn.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eNâng cao chất lượng cuộc sống:\x3c\/strong\x3e Phát hiện và điều trị kịp thời giúp người bệnh giảm thiểu các biến chứng nguy hiểm và duy trì chất lượng cuộc sống.\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e\x3cstrong\x3eNhững ai nên tầm soát ung thư vòm họng?\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eNgười lớn tuổi:\x3c\/strong\x3e Nguy cơ mắc bệnh tăng theo tuổi.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eNgười hút thuốc:\x3c\/strong\x3e Hút thuốc là yếu tố nguy cơ hàng đầu gây ung thư vòm họng.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eNgười thường xuyên tiếp xúc với các chất gây ô nhiễm:\x3c\/strong\x3e Các chất này có thể làm tăng nguy cơ mắc bệnh.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eNgười có tiền sử gia đình mắc ung thư vòm họng:\x3c\/strong\x3e Di truyền cũng là một yếu tố nguy cơ.\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e\x3cstrong\x3eCác phương pháp tầm soát ung thư vòm họng\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eKhám lâm sàng:\x3c\/strong\x3e Bác sĩ sẽ khám tai, mũi, họng để phát hiện các bất thường như sưng hạch cổ, khối u, loét...\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eNội soi tai mũi họng:\x3c\/strong\x3e Sử dụng ống nội soi để quan sát trực tiếp các tổn thương trong vòm họng.\x3c\/li\x3e\x3cli\x3e\x3ca href=\\\x22https:\/\/suckhoedoisong.vn\/noi-soi-tai-mui-hong-nguoi-benh-can-luu-y-gi-169139761.htm\\\x22 target=\\\x22_blank\\\x22\x3e\x3cimg src=\\\x22https:\/\/encrypted-tbn3.gstatic.com\/images?q=tbn:ANd9GcRVUx2VGEAPclHMZhAOcT8iK0B3-FwqLB6GXJwxxiK_gmJ_Zmc_b-3uMzjflcUd\\\x22 alt=\\\x22Image of Nội soi tai mũi họng\\\x22\x3e Opens in a new window \x3cimg src=\\\x22https:\/\/encrypted-tbn0.gstatic.com\/favicon-tbn?q=tbn:ANd9GcTT6Qc6XqDmssw7MFfl-eErfyVAKxmoxXgXeCWKlJhQ5E4P4FYjIQLz5eqZnsZ5a0m61D9u2uhiMVhebL8PJUbokdTXMDsddv_K-lI\\\x22\x3esuckhoedoisong.vn\x3c\/a\x3e\x3c\/li\x3e\x3cli\x3eNội soi tai mũi họng\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eSinh thiết:\x3c\/strong\x3e Lấy một mẫu mô nhỏ từ vùng nghi ngờ để xét nghiệm dưới kính hiển vi. Đây là cách chẩn đoán chính xác nhất.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eXét nghiệm máu:\x3c\/strong\x3e Kiểm tra các chỉ số liên quan đến ung thư, như xét nghiệm tìm kháng thể virus Epstein-Barr \(EBV\).\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e\x3cstrong\x3eCác dấu hiệu cảnh báo ung thư vòm họng\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3eĐau họng kéo dài\x3c\/li\x3e\x3cli\x3eKhó nuốt\x3c\/li\x3e\x3cli\x3eGiảm cân không rõ nguyên nhân\x3c\/li\x3e\x3cli\x3eVùng cổ sưng hạch\x3c\/li\x3e\x3cli\x3eĐiếc một bên\x3c\/li\x3e\x3cli\x3eChảy máu mũi\x3c\/li\x3e\x3cli\x3eGiọng nói thay đổi\x3c\/li\x3e\x3c\/ul\x3e\x3ch3\x3e\x3cstrong\x3eCách phòng ngừa ung thư vòm họng\x3c\/strong\x3e\x3c\/h3\x3e\x3cul\x3e\x3cli\x3e\x3cstrong\x3eKhông hút thuốc:\x3c\/strong\x3e Hút thuốc là nguyên nhân chính gây ung thư vòm họng.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eHạn chế tiếp xúc với các chất gây ô nhiễm:\x3c\/strong\x3e Đeo khẩu trang khi làm việc trong môi trường ô nhiễm.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eĂn uống lành mạnh:\x3c\/strong\x3e Tăng cường ăn rau quả, hạn chế đồ ăn chế biến sẵn.\x3c\/li\x3e\x3cli\x3e\x3cstrong\x3eKhám sức khỏe định kỳ:\x3c\/strong\x3e Tầm soát ung thư vòm họng định kỳ để phát hiện sớm bệnh.\x3c\/li\x3e\x3c\/ul\x3e\x3cp\x3e\x3cstrong\x3eLưu ý:\x3c\/strong\x3e Nếu bạn có bất kỳ dấu hiệu bất thường nào, hãy đến gặp bác sĩ chuyên khoa tai mũi họng để được khám và tư vấn kịp thời.\x3c\/p\x3e\x3cp\x3e\x3ca href=\\\x22https:\/\/medlatec.vn\/tin-tuc\/dau-hieu-ung-thu-vom-hong-nhu-the-nao-va-cach-xu-tri\\\x22 target=\\\x22_blank\\\x22\x3e\x3cimg src=\\\x22https:\/\/encrypted-tbn0.gstatic.com\/images?q=tbn:ANd9GcT-vu50KkbPjE5uUzaYtn5qPHIdDxDdEu7GSBdufJruAAJtMfAkJbNneHfRXmUH\\\x22 alt=\\\x22Image of Các dấu hiệu cảnh báo ung thư vòm họng\\\x22\x3e Opens in a new window \x3cimg src=\\\x22https:\/\/encrypted-tbn2.gstatic.com\/favicon-tbn?q=tbn:ANd9GcT3BFDHiV4q1h14AweSjrKdyfjEoRq34DUwyE3gDHgOhVXRoy4XuEfFcfoakWCwEZRkcstSOU2V5YkO_NgVSNI2Bgcc590\\\x22\x3emedlatec.vn\x3c\/a\x3e\x3c\/p\x3e\x3cp\x3eCác dấu hiệu cảnh báo ung thư vòm họng\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eTầm soát ung thư vòm họng là một hành động quan trọng để bảo vệ sức khỏe của bạn và gia đình. Hãy chủ động khám sức khỏe định kỳ để phát hiện và điều trị bệnh kịp thời.\x3c\/strong\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222024-12-12T08:43:52.228Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0}]';
        try {
            const parsed = JSON.parse(rawArticlesJson);
            if (Array.isArray(parsed)) {
                allArticles = parsed.map(article => ({ ...article, date: new Date(article.date) }));
            }
        } catch (e) { console.error("Lỗi parse bài viết:", e); }

        const rawDepartmentsJson = '[{\x22name\x22:\x22Obstetrics_and_Gynecology\x22,\x22nameVi\x22:\x22Sản Phụ Khoa\x22},{\x22name\x22:\x22ENT\x22,\x22nameVi\x22:\x22Tai Mũi Họng\x22},{\x22name\x22:\x22Internal_Medicine\x22,\x22nameVi\x22:\x22Nội Khoa\x22},{\x22name\x22:\x22Musculoskeletal_System\x22,\x22nameVi\x22:\x22Khoa Cơ Xương Khớp\x22},{\x22name\x22:\x22Pediatrics\x22,\x22nameVi\x22:\x22Nhi Khoa\x22}]';
        try {
            const parsedDepts = JSON.parse(rawDepartmentsJson);
            if (Array.isArray(parsedDepts)) { departmentsData = parsedDepts; }
        } catch (e) { console.error("Lỗi parse chuyên khoa:", e); }
        
        window.onload = function() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const deptFromUrl = urlParams.get('department');
                if (deptFromUrl) { document.getElementById('departmentFilter').value = deptFromUrl; }
            } catch (e) {}
            applyFilters();
        };

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const department = document.getElementById('departmentFilter').value;
            const sortBy = document.getElementById('sortBy').value;

            currentFilteredList = allArticles.filter(article => {
                const matchesSearch = article.title.toLowerCase().includes(searchTerm);
                const matchesDepartment = department ? article.department === department : true;
                return matchesSearch && matchesDepartment;
            });

            currentFilteredList.sort((a, b) => {
                if (sortBy === 'newest') return b.date.getTime() - a.date.getTime();
                return a.date.getTime() - b.date.getTime();
            });

            currentPage = 1;
            renderPage();
        }

        function changePage(page) {
            const totalPages = Math.ceil(currentFilteredList.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
        }

        function renderPage() {
            displayArticles(currentFilteredList);
            displayPagination(currentFilteredList.length);
        }

      function displayArticles(articles) {
        const container = document.getElementById('articlesContainer');
        const start = (currentPage - 1) * itemsPerPage;
        const paginatedArticles = articles.slice(start, start + itemsPerPage);

        if (paginatedArticles.length === 0) {
            container.innerHTML = `<div class="no-results" style="grid-column: 1/-1; text-align:center;"><h3>Không tìm thấy kết quả</h3></div>`;
            document.getElementById('pagination').style.display = 'none';
            return;
        }

        container.innerHTML = paginatedArticles.map(article => `
            <div class="article-card">
                <img src="${article.imageUrl}" alt="${article.title}" class="article-image">
                <div class="article-content">
                    <span class="article-category">${getDepartmentName(article.department)}</span>
                    
                    <h3><a href="articles/${article.id}/${article.id}.html" class="article-title">${article.title}</a></h3>
                    
                    <div class="article-meta">${formatDate(article.date)}</div>
                </div>
            </div>
        `).join('');
        
        window.scrollTo(0, 0);
      }

        function displayPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            pagination.style.justifyContent = 'center';
            pagination.style.gap = '10px';
            
            let paginationHtml = '';
            paginationHtml += `<button class="search-button" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} style="padding: 5px 15px;">←</button>`;
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="search-button" onclick="changePage(${i})" style="padding: 5px 15px; background: ${currentPage === i ? '#0056b3' : '#0070c0'};">${i}</button>`;
            }
            paginationHtml += `<button class="search-button" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} style="padding: 5px 15px;">→</button>`;

            pagination.innerHTML = paginationHtml;
        }

        function getDepartmentName(departmentKey) {
            const dept = departmentsData.find(d => d.name === departmentKey);
            return dept ? dept.nameVi : departmentKey;
        }

        function formatDate(date) { return date.toLocaleDateString('vi-VN'); }

        function updateParentHeight() {
           const height = document.documentElement.scrollHeight;
           window.parent.postMessage({ height: height }, '*');
        }
        document.addEventListener('DOMContentLoaded', updateParentHeight);
        window.addEventListener('load', updateParentHeight);
        new ResizeObserver(updateParentHeight).observe(document.body);
</script>
