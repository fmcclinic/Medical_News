 style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Trẻ vẫn\x26nbsp;\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3ekhóc được, nói được \(hoặc ú ớ\), ho mạnh được\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e. Da dẻ vẫn hồng hào hoặc chỉ hơi đỏ mặt.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eHành động:\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTUYỆT ĐỐI KHÔNG CAN THIỆP.\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Hãy khuyến khích trẻ ho thật mạnh. Việc vỗ lưng lúc này có thể làm dị vật rơi sâu hơn. Chỉ theo dõi sát sao và đưa đến viện nếu dị vật không ra sau khi ho.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTình huống 2: Tắc nghẽn hoàn toàn \(Nguy kịch – Cần sơ cứu ngay!\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDấu hiệu:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTrẻ\x26nbsp;\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3ekhông thể ho, không thể khóc, không thể nói\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDấu hiệu \\\x22bàn tay chẹn họng\\\x22 \(Universal choking sign\): Trẻ hoảng loạn đưa tay nắm chặt lấy cổ.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eMặt và môi tím tái nhanh chóng do thiếu oxy.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eCó thể nghe thấy tiếng rít \\\x22éc éc\\\x22 nhỏ khi cố hít vào.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eLịm dần và bất tỉnh.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eHành động:\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Gọi người hỗ trợ gọi cấp cứu 115 ngay lập tức, đồng thời tiến hành thủ thuật sơ cứu NGAY TẠI CHỖ.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e\x3cspan style=\\\x22color: rgb\(0, 112, 192\);\\\x22\x3e3. HÀNH ĐỘNG CỨU MẠNG: KỸ THUẬT VỖ LƯNG ẤN NGỰC \x26amp; HEIMLICH\x3c\/span\x3e\x3c\/h3\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eNguyên lý chung: Tạo một áp lực đột ngột, mạnh mẽ từ bên dưới cơ hoành \(bụng\/ngực\) để đẩy không khí còn sót lại trong phổi tống ra ngoài, tạo thành một lực \\\x22bắn\\\x22 dị vật ra \(giống như bật nút chai sâm-panh\).\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cem style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eLưu ý: Kỹ thuật khác nhau tùy theo độ tuổi.\x3c\/em\x3e\x3c\/p\x3e\x3ch3\x3e\x3cspan style=\\\x22color: rgb\(0, 112, 192\);\\\x22\x3eA. Với trẻ nhũ nhi \(Dưới 1 tuổi\) - Kỹ thuật Vỗ lưng \x26amp; Ấn ngực\x3c\/span\x3e\x3c\/h3\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTuyệt đối không dùng Heimlich \(ép bụng\) cho trẻ dưới 1 tuổi vì dễ gây tổn thương tạng trong bụng.\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eBước 1: Vỗ lưng \(5 lần\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.wikihow.com\/images\/thumb\/f\/ff\/Perform-the-Heimlich-Maneuver-Step-14.jpg\/v4-460px-Perform-the-Heimlich-Maneuver-Step-14.jpg\\\x22 alt=\\\x22Vỗ lưng trẻ sơ sinh\\\x22\x3e\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eNgười sơ cứu ngồi hoặc quỳ. Đặt trẻ nằm sấp trên cánh tay của bạn, đầu chúc xuống thấp hơn ngực. Dùng đùi của bạn để đỡ cánh tay đó.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDùng gót bàn tay còn lại vỗ mạnh, dứt khoát 5 cái vào vùng giữa hai bả vai của trẻ.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eBước 2: Ấn ngực \(5 lần\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.wikihow.com\/images\/thumb\/9\/92\/Perform-the-Heimlich-Maneuver-Step-16.jpg\/v4-460px-Perform-the-Heimlich-Maneuver-Step-16.jpg\\\x22 alt=\\\x22Ấn ngực trẻ sơ sinh\\\x22\x3e\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eNếu dị vật chưa ra, lật ngược trẻ nằm ngửa lại trên cánh tay kia \(vẫn giữ đầu thấp\).\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDùng 2 ngón tay \(ngón trỏ và giữa\) ấn mạnh 5 lần vào vị trí giữa ngực \(ngay dưới đường nối hai núm vú – vị trí ép tim\).\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cem style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eLặp lại chu kỳ \(5 vỗ lưng - 5 ấn ngực\) cho đến khi dị vật bật ra hoặc trẻ bất tỉnh \(nếu bất tỉnh thì chuyển sang CPR - Hồi sức tim phổi\).\x3c\/em\x3e\x3c\/p\x3e\x3ch3\x3e\x3cspan style=\\\x22color: rgb\(0, 112, 192\);\\\x22\x3eB. Với trẻ lớn \(Trên 1 tuổi\) và Người lớn - Kỹ thuật Heimlich \(Ép bụng\)\x3c\/span\x3e\x3c\/h3\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTư thế đứng \(Khi trẻ còn tỉnh\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.wikihow.com\/images\/thumb\/c\/c8\/Perform-the-Heimlich-Maneuver-Step-3-Version-2.jpg\/v4-460px-Perform-the-Heimlich-Maneuver-Step-3-Version-2.jpg\\\x22 alt=\\\x22Tư thế đứng Heimlich\\\x22\x3e\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eNgười sơ cứu đứng ra sau lưng trẻ. Quỳ một chân xuống nếu trẻ nhỏ để ngang tầm.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eVòng hai tay ra phía trước bụng trẻ.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eThao tác ép bụng:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.wikihow.com\/images\/thumb\/e\/e6\/Perform-the-Heimlich-Maneuver-Step-5-Version-2.jpg\/v4-460px-Perform-the-Heimlich-Maneuver-Step-5-Version-2.jpg\\\x22 alt=\\\x22Thao tác ép bụng Heimlich\\\x22\x3eMột tay nắm chặt lại thành nắm đấm, đặt ngay vùng thượng vị \(vùng bụng trên rốn, ngay dưới xương ức\).\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTay kia nắm lấy nắm đấm đó.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDùng lực mạnh, dứt khoát giật nắm đấm theo hướng\x26nbsp;\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3evào trong và lên trên\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;\(tạo hình chữ J ngược\). Thực hiện liên tục 5 lần.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTrường hợp nạn nhân nằm \(hoặc quá nặng không đỡ dậy được\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.wikihow.com\/images\/thumb\/b\/b2\/Perform-the-Heimlich-Maneuver-Step-10.jpg\/v4-460px-Perform-the-Heimlich-Maneuver-Step-10.jpg\\\x22 alt=\\\x22Heimlich tư thế nằm\\\x22\x3eĐặt nạn nhân nằm ngửa trên sàn cứng.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eNgười sơ cứu quỳ tách hai chân nạn nhân, đè lên đùi nạn nhân.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eĐặt gót bàn tay lên vùng trên rốn và dưới xương ức. Đặt bàn tay kia chồng lên.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eẤn mạnh và nhanh theo hướng lên phía đầu nạn nhân.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eLưu ý quan trọng:\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Nếu trẻ\/nạn nhân bất tỉnh, hãy ngừng Heimlich và thực hiện CPR \(ép tim thổi ngạt\) ngay lập tức.\x3c\/span\x3e\x3c\/p\x3e\x3ch3\x3e\x3cspan style=\\\x22color: rgb\(0, 112, 192\);\\\x22\x3eC. Tự sơ cứu bản thân \(Khi ở một mình\)\x3c\/span\x3e\x3c\/h3\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eNếu bạn bị hóc dị vật và không có ai xung quanh, hãy bình tĩnh thực hiện:\x3c\/span\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.wikihow.com\/images\/thumb\/3\/36\/Perform-the-Heimlich-Maneuver-Step-19.jpg\/v4-460px-Perform-the-Heimlich-Maneuver-Step-19.jpg\\\x22 alt=\\\x22Tự sơ cứu Heimlich\\\x22\x3e\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eNắm chặt một bàn tay thành nắm đấm, đặt lên bụng \(trên rốn, dưới xương ức\).\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDùng tay kia nắm lấy nắm đấm.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eHoặc tựa bụng vào một vật cứng ngang tầm \(như thành ghế, bàn, lan can\) và ấn mạnh bụng vào đó theo hướng lên trên.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e\x3cspan style=\\\x22color: rgb\(0, 112, 192\);\\\x22\x3e4. NHỮNG ĐIỀU TUYỆT ĐỐI KHÔNG LÀM\x3c\/span\x3e\x3c\/h3\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eKHÔNG dùng tay móc họng mù quáng \(Blind finger sweep\):\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Nếu bạn không nhìn thấy rõ dị vật, tuyệt đối không đưa ngón tay vào họng trẻ để \\\x22mò\\\x22. Hành động này có thể đẩy dị vật vào sâu hơn hoặc làm trầy xước họng gây phù nề tắc nghẽn thêm. Chỉ móc khi nhìn thấy rõ dị vật ở ngay cửa miệng.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eKHÔNG dốc ngược trẻ lên rồi lắc:\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Hành động này không hiệu quả và có thể gây chấn thương cổ hoặc làm rơi trẻ.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eLời kết:\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Kỹ năng sơ cứu hóc dị vật không khó, nhưng cần sự bình tĩnh và thực hành. Bố mẹ nên tham gia các khóa huấn luyện và hãy xem các video hướng dẫn uy tín \(từ các tổ chức y tế\) và tập luyện trên gấu bông hoặc ma-nơ-canh để tạo phản xạ.\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCommittee on Injury, Violence, and Poison Prevention – 2010 \(Reaffirmed 2020\)\x3c\/strong\x3e Prevention of Choking Among Children \/ Phòng ngừa hóc dị vật ở trẻ em \x3cem\x3eNguồn: PubMed \/ Pediatrics \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/20176675\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/20176675\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Red Cross – 2021\x3c\/strong\x3e First Aid\/CPR\/AED Participant’s Manual \/ Sổ tay hướng dẫn tham gia Sơ cấp cứu\/CPR\/AED \(Chương về Hóc dị vật\) \x3cem\x3eNguồn: American Red Cross\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.redcross.org\/take-a-class\/participant-materials\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.redcross.org\/take-a-class\/participant-materials\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2023\x3c\/strong\x3e Choking: First aid \/ Hóc dị vật: Sơ cứu \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/first-aid\/first-aid-choking\/basics\/art-20056637\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/first-aid\/first-aid-choking\/basics\/art-20056637\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChapin MM, et al. – 2013\x3c\/strong\x3e Nonfatal Choking on Food Among Children 14 Years or Younger in the United States, 2001–2009 \/ Hóc thức ăn không gây tử vong ở trẻ em từ 14 tuổi trở xuống tại Hoa Kỳ, 2001–2009 \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/23897916\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/23897916\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCenters for Disease Control and Prevention \(CDC\) – 2023\x3c\/strong\x3e Choking Hazards \/ Các mối nguy hiểm gây hóc dị vật \x3cem\x3eNguồn: CDC\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.cdc.gov\/nutrition\/infantandtoddlernutrition\/foods-and-drinks\/choking-hazards.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.cdc.gov\/nutrition\/infantandtoddlernutrition\/foods-and-drinks\/choking-hazards.html\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Health Service \(NHS\) – 2022\x3c\/strong\x3e Stop a child from choking \/ Xử trí khi trẻ bị hóc dị vật \x3cem\x3eNguồn: NHS UK\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nhs.uk\/conditions\/baby\/first-aid-and-safety\/first-aid\/how-to-stop-a-child-from-choking\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nhs.uk\/conditions\/baby\/first-aid-and-safety\/first-aid\/how-to-stop-a-child-from-choking\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSalih AM, et al. – 2016\x3c\/strong\x3e Airway foreign bodies: A critical review for a common pediatric emergency \/ Dị vật đường thở: Đánh giá quan trọng về một trường hợp cấp cứu nhi khoa phổ biến \x3cem\x3eNguồn: PubMed \/ World Journal of Emergency Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC4786499\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC4786499\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eStanford Medicine Children\x27s Health – 2023\x3c\/strong\x3e Choking Prevention for Children \/ Phòng ngừa hóc dị vật cho trẻ em \x3cem\x3eNguồn: Stanford Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.stanfordchildrens.org\/en\/topic\/default%3Fid%3Dchoking-prevention-for-children-90-P02844\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.stanfordchildrens.org\/en\/topic\/default?id=choking-prevention-for-children-90-P02844\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePerkins GD, et al. – 2021\x3c\/strong\x3e European Resuscitation Council Guidelines 2021: Basic Life Support \/ Hướng dẫn của Hội đồng Hồi sức Châu Âu 2021: Hỗ trợ sự sống cơ bản \x3cem\x3eNguồn: PubMed \/ Resuscitation\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/33773825\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/33773825\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2023\x3c\/strong\x3e Choking Prevention and First Aid for Infants and Children \/ Phòng ngừa và sơ cứu hóc dị vật cho trẻ sơ sinh và trẻ nhỏ \x3cem\x3eNguồn: HealthyChildren.org\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/health-issues\/injuries-emergencies\/Pages\/Choking-Prevention.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/health-issues\/injuries-emergencies\/Pages\/Choking-Prevention.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDuckett SA, et al. – 2023\x3c\/strong\x3e Choking \/ Hóc dị vật \(Tổng quan lâm sàng và xử trí\) \x3cem\x3eNguồn: StatPearls [Internet] \/ NCBI\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/books\/NBK499941\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/books\/NBK499941\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCleveland Clinic – 2022\x3c\/strong\x3e Heimlich Maneuver \/ Thủ thuật Heimlich \x3cem\x3eNguồn: Cleveland Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/my.clevelandclinic.org\/health\/treatments\/21675-heimlich-maneuver\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/my.clevelandclinic.org\/health\/treatments\/21675-heimlich-maneuver\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJohns Hopkins Medicine – 2023\x3c\/strong\x3e Choking and Foreign Body Aspiration \/ Hóc và hít phải dị vật \x3cem\x3eNguồn: Johns Hopkins Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/choking-and-foreign-body-aspiration\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/choking-and-foreign-body-aspiration\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:16:05.025Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251205115720\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22SỐT CAO CO GIẬT: 5 PHÚT \\\x22SINH TỬ\\\x22 VÀ NHỮNG SAI LẦM SƠ CỨU KHIẾN TÌNH TRẠNG TỒI TỆ HƠN\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1JxZ0HiQA9NaMdcdOzxfFzFxWivfaImre\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Bác sĩ ơi, con em đang sốt thì tự nhiên mắt trợn ngược lên, người cứng đờ rồi giật giật, môi tím ngắt. Em sợ quá vội lấy cái thìa ngáng vào miệng rồi vắt chanh cho cháu tỉnh. Em làm thế có đúng không ạ?\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eCâu trả lời là: \x3cstrong\x3eKHÔNG! Những việc làm đó RẤT NGUY HIỂM.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eSốt cao co giật nhìn thì rất đáng sợ, nhưng tin tốt là: Hầu hết các trường hợp \(co giật đơn thuần\) đều lành tính và \x3cstrong\x3eKHÔNG GÂY ẢNH HƯỞNG ĐẾN NÃO BỘ\x3c\/strong\x3e nếu được xử trí đúng. Nguy hiểm thực sự thường đến từ những hành động sơ cứu sai lầm của người lớn.\x3c\/p\x3e\x3cp\x3eVậy khi con lên cơn co giật, bố mẹ cần làm gì và NHẤT ĐỊNH KHÔNG ĐƯỢC làm gì?\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. BÌNH TĨNH NHẬN DIỆN: ĐIỀU GÌ ĐANG XẢY RA VỚI CON?\x3c\/h3\x3e\x3cp\x3eSốt cao co giật thường xảy ra ở trẻ từ 6 tháng đến 5 tuổi, do não bộ của trẻ chưa trưởng thành nên rất nhạy cảm với sự thay đổi nhiệt độ đột ngột.\x3c\/p\x3e\x3cp\x3eMột cơn co giật điển hình \(đơn thuần\) thường có đặc điểm:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eXảy ra khi sốt cao đột ngột \(thường \x26gt; 39°C\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ mất ý thức, mắt nhìn ngược hoặc đứng tròng, sùi bọt mép, gồng cứng hoặc giật đều cả tay và chân.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eThời gian giật thường ngắn, dưới 5 phút \(đa số chỉ 1-2 phút\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSau cơn giật, trẻ thường lờ đờ, mệt mỏi và buồn ngủ.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1fNvdJ6hVyPYjOpprajdOhI04Mnx0V2eX\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3ch3\x3e2. QUY TRÌNH XỬ TRÍ CHUẨN: NHỮNG VIỆC CẦN LÀM NGAY \(ACTION PLAN\)\x3c\/h3\x3e\x3cp\x3eMục tiêu của sơ cứu không phải là \\\x22chặn đứng\\\x22 cơn giật \(bạn không thể làm được điều đó\), mà là \x3cstrong\x3eđảm bảo an toàn cho trẻ trong khi cơn giật diễn ra\x3c\/strong\x3e.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eBƯỚC 1: Quan trọng nhất - GIỮ BÌNH TĨNH\x3c\/strong\x3e Hít thở sâu. Hãy nhớ rằng cơn giật này sẽ sớm tự hết và con bạn sẽ ổn thôi. Sự hoảng loạn của bạn chỉ làm mọi thứ rối tung lên.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eBƯỚC 2: Tạo môi trường an toàn\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐặt trẻ nằm xuống một mặt phẳng an toàn \(sàn nhà, giường rộng\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDi dời nhanh các vật sắc nhọn, cứng, nóng xung quanh \(cốc thủy tinh, phích nước, đồ chơi cứng...\) để tránh trẻ va đập vào khi đang giật.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTuyệt đối không bế xốc trẻ lên hoặc cố di chuyển trẻ đi nơi khác khi đang giật mạnh.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eBƯỚC 3: Tư thế nằm nghiêng an toàn \(Recovery Position\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNhẹ nhàng lật nghiêng người trẻ sang một bên \(trái hoặc phải đều được\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMục đích:\x3c\/strong\x3e Giúp đờm dãi, chất nôn \(nếu có\) chảy ra ngoài miệng, tránh bị sặc ngược vào phổi gây tắc đường thở. Đồng thời tư thế này giúp lưỡi không bị tụt ra sau gây chẹn họng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eBƯỚC 4: Nới lỏng đường thở\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNới rộng cổ áo, tháo khăn quàng cổ để trẻ dễ thở hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eBƯỚC 5: Quan sát và Ghi lại \(Nếu có thể\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNhìn đồng hồ để biết chính xác cơn giật kéo dài bao lâu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu có người hỗ trợ, hãy quay video lại cơn giật. Video này cực kỳ giá trị để bác sĩ chẩn đoán sau này.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1RBDGs26s2ObZdi2a162fSqGXYvKwoXe5\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3ch3\x3e3. BÁO ĐỘNG ĐỎ: NHỮNG ĐIỀU TUYỆT ĐỐI KHÔNG ĐƯỢC LÀM \(SAI LẦM CHẾT NGƯỜI\)\x3c\/h3\x3e\x3cp\x3eĐây là những thói quen dân gian cực kỳ nguy hiểm cần phải loại bỏ ngay lập tức:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 1: Nhét vật cứng vào miệng \(Thìa, đũa, ngón tay...\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLý do sai:\x3c\/em\x3e Bố mẹ sợ con cắn vào lưỡi. Nhưng thực tế, trong cơn giật, cơ lưỡi cũng co rút lại nên rất hiếm khi trẻ cắn phải lưỡi gây chảy máu nguy hiểm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHậu quả:\x3c\/em\x3e Nhét thìa, đũa vào có thể làm \x3cstrong\x3egãy răng sữa\x3c\/strong\x3e, răng gãy rơi vào đường thở gây hóc. Nhét ngón tay vào có thể bị trẻ cắn nát. Vật cứng còn làm tổn thương niêm mạc miệng, gây chảy máu, tăng nguy cơ sặc.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 2: Vắt chanh, đổ nước\/thuốc vào miệng\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLý do sai:\x3c\/em\x3e Nghĩ rằng vị chua hoặc thuốc sẽ làm trẻ tỉnh lại\/hạ sốt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHậu quả:\x3c\/em\x3e Khi đang co giật và mất ý thức, phản xạ nuốt của trẻ không hoạt động. Đổ bất cứ chất lỏng nào vào miệng lúc này đều có nguy cơ cao gây \x3cstrong\x3esặc vào phổi \(viêm phổi hít\)\x3c\/strong\x3e, dẫn đến suy hô hấp, nguy hiểm hơn cả chính cơn giật.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 3: Ghì chặt, giữ tay chân trẻ\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLý do sai:\x3c\/em\x3e Muốn kìm hãm cơn giật lại.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHậu quả:\x3c\/em\x3e Bạn không thể ngăn được lực co cơ của trẻ. Việc ghì chặt có thể gây \x3cstrong\x3etrật khớp, gãy xương\x3c\/strong\x3e hoặc tổn thương cơ của trẻ. Hãy để cơn giật diễn ra tự nhiên.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. SAU CƠN GIẬT: CẦN LÀM GÌ?\x3c\/h3\x3e\x3cp\x3eKhi cơn giật kết thúc, trẻ sẽ dần tỉnh lại nhưng còn lơ mơ, mệt mỏi hoặc ngủ thiếp đi. Lúc này bạn cần:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHạ sốt:\x3c\/strong\x3e Nếu trẻ vẫn chưa tỉnh táo hẳn để uống thuốc, hãy dùng viên đạn hạ sốt \(Paracetamol\) nhét hậu môn. Liều lượng vẫn tính theo cân nặng \(10-15mg\/kg\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLau người:\x3c\/strong\x3e Dùng khăn ấm lau trán, nách, bẹn để hỗ trợ tản nhiệt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐưa đi khám:\x3c\/strong\x3e Sau khi trẻ đã ổn định và hạ sốt, hãy đưa trẻ đến cơ sở y tế để bác sĩ kiểm tra và tìm nguyên nhân gây sốt \(viêm họng, viêm tai, nhiễm trùng...\).\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e5. KHI NÀO CẦN GỌI CẤP CỨU 115 NGAY LẬP TỨC?\x3c\/h3\x3e\x3cp\x3eHãy gọi hỗ trợ y tế khẩn cấp nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCơn co giật kéo dài \x3cstrong\x3etrên 5 phút\x3c\/strong\x3e mà chưa có dấu hiệu dừng lại.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ xuất hiện cơn giật thứ hai ngay sau cơn đầu tiên.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ không tỉnh lại, vẫn tím tái hoặc khó thở sau khi hết giật.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐây là lần đầu tiên trẻ bị co giật.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Sốt cao co giật là một trải nghiệm đáng sợ, nhưng kiến thức đúng đắn chính là \\\x22liều thuốc an thần\\\x22 tốt nhất cho bố mẹ. Hãy nhớ: \x3cstrong\x3e\\\x22Nằm nghiêng - Nới lỏng - Không nhét gì vào miệng\\\x22\x3c\/strong\x3e. Bình tĩnh xử trí đúng cách, bạn chính là người hùng bảo vệ con mình!\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\x3cem style=\\\x22color: rgb\(0, 71, 178\);\\\x22\x3eCâu hỏi: Bác sĩ ơi! Bé nhà em co giật khi sốt sau này sẽ bị co giật hoài đúng không?\x3c\/em\x3e\x3c\/h3\x3e\x3cp\x3e\\tChào bạn, đây là một câu hỏi thể hiện nỗi lo lắng sâu sắc và rất chính đáng của bất kỳ người làm cha mẹ nào khi chứng kiến con mình bị co giật. Hình ảnh đó rất ám ảnh và dễ khiến chúng ta suy nghĩ tiêu cực về tương lai của bé.\x3c\/p\x3e\x3cp\x3eCâu trả lời ngắn gọn cho câu hỏi \\\x22Bé co giật khi sốt sau này sẽ bị co giật hoài đúng không?\\\x22 là:\x26nbsp;\x3cstrong\x3eKHÔNG ĐÚNG. Hầu hết các trẻ sẽ KHÔNG bị co giật suốt đời.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eTuy nhiên, để bạn thực sự yên tâm và hiểu rõ vấn đề, chúng ta cần phân tích kỹ hơn hai khía cạnh: \x3c\/p\x3e\x3cp\x3e\(1\) Nguy cơ tái phát trong những năm đầu đời và \x3c\/p\x3e\x3cp\x3e\(2\) Nguy cơ chuyển thành bệnh động kinh sau này.\x3c\/p\x3e\x3cp\x3eDưới đây là giải thích chi tiết từ góc độ y khoa:\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3e1. Hiểu đúng bản chất: Sốt cao co giật là \\\x22LÀNH TÍNH\\\x22\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eCác bác sĩ thường gọi tình trạng này là\x26nbsp;\x3cstrong\x3e\\\x22Co giật do sốt lành tính\\\x22\x3c\/strong\x3e. Tại sao lại gọi là lành tính?\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNguyên nhân:\x3c\/strong\x3e\x26nbsp;Nó xảy ra không phải do não bộ bị tổn thương hay có bệnh lý tiềm ẩn. Nguyên nhân là do não bộ của trẻ nhỏ \(thường từ 6 tháng đến 5 tuổi\) chưa trưởng thành hoàn thiện. Hệ thống điện não còn non nớt nên rất nhạy cảm với sự thay đổi nhiệt độ đột ngột. Khi sốt cao, não bị \\\x22kích thích quá mức\\\x22 và gây ra cơn giật tạm thời.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNó có \\\x22hạn sử dụng\\\x22:\x3c\/strong\x3e\x26nbsp;Đây là điểm quan trọng nhất. Khi trẻ lớn lên \(thường là\x26nbsp;\x3cstrong\x3esau 5-6 tuổi\x3c\/strong\x3e\), não bộ đã trưởng thành, hệ thống thần kinh vững vàng hơn thì dù trẻ có sốt cao, hiện tượng co giật này cũng sẽ\x26nbsp;\x3cstrong\x3eTỰ ĐỘNG BIẾN MẤT\x3c\/strong\x3e.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eTóm lại:\x3c\/strong\x3e\x26nbsp;Đây là một tình trạng phụ thuộc vào độ tuổi, không phải là một bệnh lý kéo dài suốt đời.\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3e2. Nguy cơ TÁI PHÁT trong giai đoạn \\\x22nhạy cảm\\\x22 \(Trước 5 tuổi\)\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eMặc dù nó sẽ hết khi trẻ lớn, nhưng trong khoảng thời gian từ lúc bị lần đầu cho đến khi được 5-6 tuổi, trẻ\x26nbsp;\x3cstrong\x3eCÓ NGUY CƠ BỊ LẠI\x3c\/strong\x3e\x26nbsp;nếu có đợt sốt cao khác.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTỷ lệ tái phát:\x3c\/strong\x3e\x26nbsp;Thống kê cho thấy khoảng\x26nbsp;\x3cstrong\x3e30-35%\x3c\/strong\x3e\x26nbsp;trẻ đã từng bị một lần sẽ bị lại lần thứ hai \(nghĩa là có khoảng 70% trẻ chỉ bị đúng một lần duy nhất trong đời rồi thôi\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNhững trẻ có nguy cơ tái phát cao hơn:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eLần bị co giật đầu tiên khi còn quá nhỏ \(dưới 12 tháng tuổi\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTiền sử gia đình \(bố mẹ hoặc anh chị em ruột\) cũng từng bị sốt cao co giật khi nhỏ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCơn giật xảy ra khi nhiệt độ chưa quá cao \(ví dụ mới 38.5°C - 39°C đã giật\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời khuyên:\x3c\/strong\x3e\x26nbsp;Nếu con bạn thuộc nhóm có nguy cơ tái phát cao, bạn cần cảnh giác hơn trong việc theo dõi nhiệt độ và hạ sốt tích cực ngay khi bé chớm sốt trong những lần ốm sau.\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3e3. Nỗi lo lớn nhất: Liệu có chuyển thành BỆNH ĐỘNG KINH sau này không?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eĐây là điều bố mẹ sợ nhất: \\\x22Bị giật hoài\\\x22 đồng nghĩa với bệnh động kinh.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSự thật là:\x3c\/strong\x3e\x26nbsp;Sốt cao co giật đơn thuần\x26nbsp;\x3cstrong\x3eKHÁC HOÀN TOÀN\x3c\/strong\x3e\x26nbsp;với bệnh động kinh.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐộng kinh:\x3c\/strong\x3e\x26nbsp;Là bệnh lý mạn tính của não bộ, các cơn co giật xảy ra tự phát mà\x26nbsp;\x3cstrong\x3ekhông cần có sốt\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTỷ lệ chuyển biến:\x3c\/strong\x3e\x26nbsp;Ở những trẻ bị sốt cao co giật đơn thuần \(cơn giật ngắn \x26lt;15 phút, giật toàn thân, chỉ bị 1 lần trong 24h\), nguy cơ sau này phát triển thành bệnh động kinh là\x26nbsp;\x3cstrong\x3eRẤT THẤP \(chỉ khoảng 1-2%\)\x3c\/strong\x3e. Tỷ lệ này chỉ cao hơn một chút xíu so với trẻ em bình thường trong cộng đồng \(khoảng 0.5-1%\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNói cách khác: Khoảng 98% trẻ bị sốt cao co giật đơn thuần sẽ phát triển hoàn toàn bình thường và KHÔNG bị bệnh động kinh khi lớn lên.\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhi nào cần lo lắng?\x3c\/strong\x3e\x26nbsp;Bác sĩ sẽ theo dõi sát sao hơn nếu con bạn rơi vào nhóm \\\x22Sốt cao co giật PHỨC TẠP\\\x22: Cơn giật kéo dài trên 15 phút, chỉ giật một bên người, hoặc giật lặp lại nhiều lần trong cùng một đợt sốt, hoặc trẻ vốn đã có các bất thường về thần kinh\/chậm phát triển. Nhóm này có nguy cơ cao hơn \(khoảng 5-10%\) phát triển thành động kinh sau này.\x3c\/li\x3e\x3c\/ol\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eKẾT LUẬN DÀNH CHO BỐ MẸ\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eBạn có thể thở phào nhẹ nhõm được rồi. Việc bé bị co giật khi sốt là một trải nghiệm đáng sợ, nhưng nó\x26nbsp;\x3cstrong\x3ekhông phải là một bản án chung thân\x3c\/strong\x3e.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHầu hết các bé sẽ tự khỏi tình trạng này sau 5-6 tuổi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNó không ảnh hưởng đến trí thông minh hay sự phát triển não bộ của bé \(nếu là cơn giật đơn thuần và được xử trí đúng, không để thiếu oxy quá lâu\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNguy cơ bị động kinh sau này là rất thấp.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\\tThay vì lo lắng quá mức về tương lai xa, điều tốt nhất bạn có thể làm bây giờ là:\x26nbsp;\x3cstrong\x3eNắm vững kỹ năng sơ cứu khi con giật \(Nằm nghiêng - Nới lỏng\) và chuẩn bị sẵn thuốc hạ sốt trong nhà để xử lý kịp thời những cơn sốt sau này.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSubcommittee on Febrile Seizures \(American Academy of Pediatrics\) – 2011 \(Reaffirmed 2016\)\x3c\/strong\x3e Febrile Seizures: Guideline for the Neurodiagnostic Evaluation of the Child With a Simple Febrile Seizure \/ Hướng dẫn chẩn đoán và đánh giá thần kinh ở trẻ bị sốt cao co giật đơn thuần \x3cem\x3eNguồn: Pediatrics \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/publications.aap.org\/pediatrics\/article\/127\/2\/389\/65103\/Febrile-Seizures-Guideline-for-the-Neurodiagnostic\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/publications.aap.org\/pediatrics\/article\/127\/2\/389\/65103\/Febrile-Seizures-Guideline-for-the-Neurodiagnostic\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2023\x3c\/strong\x3e Febrile seizures: Symptoms, causes, and first aid \/ Sốt cao co giật: Triệu chứng, nguyên nhân và sơ cứu \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/diseases-conditions\/febrile-seizure\/symptoms-causes\/syc-20372522\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/febrile-seizure\/symptoms-causes\/syc-20372522\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCenters for Disease Control and Prevention \(CDC\) – 2023\x3c\/strong\x3e Seizure First Aid: What to Do and What NOT to Do \/ Sơ cứu khi co giật: Những việc cần làm và những việc KHÔNG được làm \x3cem\x3eNguồn: CDC\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.cdc.gov\/epilepsy\/about\/first-aid.htm\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.cdc.gov\/epilepsy\/about\/first-aid.htm\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLeung AK, et al. – 2018\x3c\/strong\x3e Febrile seizures: an overview \/ Tổng quan về sốt cao co giật \(Cơ chế, chẩn đoán và điều trị\) \x3cem\x3eNguồn: PubMed \/ Drugs in Context\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC6052913\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC6052913\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute of Neurological Disorders and Stroke \(NINDS\) – 2023\x3c\/strong\x3e Febrile Seizures Fact Sheet \/ Tờ thông tin chi tiết về Sốt cao co giật \x3cem\x3eNguồn: NIH \(National Institutes of Health\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ninds.nih.gov\/health-information\/disorders\/febrile-seizures\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ninds.nih.gov\/health-information\/disorders\/febrile-seizures\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCleveland Clinic – 2022\x3c\/strong\x3e Febrile Seizures: Management and Treatment \/ Quản lý và điều trị sốt cao co giật \x3cem\x3eNguồn: Cleveland Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/my.clevelandclinic.org\/health\/diseases\/17668-febrile-seizures\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/my.clevelandclinic.org\/health\/diseases\/17668-febrile-seizures\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGraves RC, et al. – 2012\x3c\/strong\x3e Febrile seizures: risks, evaluation, and prognosis \/ Sốt cao co giật: Các rủi ro, đánh giá y khoa và tiên lượng \x3cem\x3eNguồn: PubMed \/ American Family Physician\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/22335215\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/22335215\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBoston Children’s Hospital – 2023\x3c\/strong\x3e Febrile Seizures in Children \/ Sốt cao co giật ở trẻ em \x3cem\x3eNguồn: Boston Children’s Hospital\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.childrenshospital.org\/conditions\/febrile-seizures\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.childrenshospital.org\/conditions\/febrile-seizures\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute for Health and Care Excellence \(NICE\) – 2021\x3c\/strong\x3e Fever in under 5s: assessment and initial management \/ Sốt ở trẻ dưới 5 tuổi: Đánh giá và xử trí ban đầu \(Bao gồm hướng dẫn không dùng thuốc chống co giật để dự phòng\) \x3cem\x3eNguồn: NICE Guidelines \(UK\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nice.org.uk\/guidance\/ng143\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nice.org.uk\/guidance\/ng143\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHealthyChildren.org \(AAP\) – 2022\x3c\/strong\x3e Febrile Seizures: What Parents Need to Know \/ Sốt cao co giật: Những điều cha mẹ cần biết \x3cem\x3eNguồn: American Academy of Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/fever\/Pages\/Febrile-Seizures.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/fever\/Pages\/Febrile-Seizures.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eOffringa M, et al. – 2017\x3c\/strong\x3e Prophylactic drug management for febrile seizures in children \/ Quản lý dự phòng bằng thuốc cho trẻ bị sốt cao co giật \(Nghiên cứu Cochrane về hiệu quả và tác hại\) \x3cem\x3eNguồn: PubMed \/ Cochrane Library\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28225210\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28225210\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJohns Hopkins Medicine – 2023\x3c\/strong\x3e Febrile Seizures \/ Sốt cao co giật \(Thông tin bệnh học thần kinh\) \x3cem\x3eNguồn: Johns Hopkins Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/febrile-seizures\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/febrile-seizures\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eXisto P, et al. – 2016\x3c\/strong\x3e Febrile seizures: update on diagnosis and management \/ Cập nhật về chẩn đoán và quản lý sốt cao co giật \x3cem\x3eNguồn: PubMed \/ Revista da Associação Médica Brasileira\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/27982368\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/27982368\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican College of Emergency Physicians \(ACEP\) – 2019\x3c\/strong\x3e Pediatric Febrile Seizures: Clinical Policy \/ Chính sách lâm sàng về Sốt cao co giật ở trẻ em tại khoa cấp cứu \x3cem\x3eNguồn: ACEP\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.acep.org\/patient-care\/clinical-policies\/pediatric-febrile-seizures\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.acep.org\/patient-care\/clinical-policies\/pediatric-febrile-seizures\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:09:54.199Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251123000808\x22,\x22department\x22:\x22Internal_Medicine\x22,\x22title\x22:\x22Nỗi đau sau zona – câu chuyện tôi muốn kể cùng bạn đọc\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1LHbXTIQgQ8VQ5zMbldNg-2KbKT7vbchG\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3eHôm nay, trong lúc tư vấn cho một chị về một vấn đề y khoa khác, cuộc trò chuyện bất ngờ kéo dài hơn dự kiến. Không phải vì bệnh của chị, mà vì một câu chuyện khác mà gia đình chị đang phải trải qua.\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/raw.githubusercontent.com\/fmcclinic\/Medical_News\/refs\/heads\/main\/news\/image\/zona_%E1%BB%8Bnury.jpg\\\x22\x3e\x3c\/p\x3e\x3cp\x3eKhi nhắc đến mẹ mình, giọng chị chùng xuống\x3c\/p\x3e\x3cp\x3e“Bác sĩ ơi… mẹ em bị zona mấy tháng trước. Vết thương đã lành hết rồi mà giờ bà vẫn đau… đau dữ lắm. Nhà em đưa bà đi khắp nơi, tốn rất nhiều tiền xét nghiệm, chụp MRI, CT… nhưng cơn đau vẫn không chịu buông tha.”\x3c\/p\x3e\x3cp\x3eNghe câu ấy, tôi biết ngay rằng mình sắp bước vào câu chuyện quen thuộc — \x3cstrong\x3ecâu chuyện của bệnh nhân bị đau dây thần kinh hậu zona\x3c\/strong\x3e. Những bệnh nhân không còn tổn thương ngoài da, nhưng nỗi đau âm ỉ bên trong lại trở thành thử thách lớn nhất.\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eKhi da đã lành, nhưng thần kinh thì chưa\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eTôi giải thích với chị bằng sự nhẹ nhàng nhất có thể, vì tôi hiểu sự tuyệt vọng trong lòng người nhà:\x3c\/p\x3e\x3cp\x3e“Vết zona bên ngoài chỉ là phần nổi.\x3c\/p\x3e\x3cp\x3eVấn đề nằm ở sâu hơn — \x3cstrong\x3edây thần kinh\x3c\/strong\x3e.”\x3c\/p\x3e\x3cp\x3eVirus zona \(varicella-zoster\) khi tái hoạt động gây tổn thương các sợi thần kinh cảm giác. Dù vùng da đã khô và bong vảy, \x3cstrong\x3enhững dây thần kinh bị phá hủy cần nhiều tháng để tái tạo\x3c\/strong\x3e.\x3c\/p\x3e\x3cp\x3eNhưng điều đáng tiếc là:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChúng \x3cstrong\x3etái tạo không hoàn hảo\x3c\/strong\x3e, méo mó, đứt quãng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTín hiệu đau được truyền đi \x3cstrong\x3emột cách hỗn loạn\x3c\/strong\x3e, dù không còn tổn thương thực thể.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBộ não “đọc nhầm” các tín hiệu đó thành cảm giác đau dữ dội.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eTôi nói với chị:\x3c\/p\x3e\x3cp\x3e“Đó là lý do vì sao mẹ chị chỉ cần gió thổi qua cũng đau.\x3c\/p\x3e\x3cp\x3eChỉ cần chạm nhẹ vào áo cũng buốt.\x3c\/p\x3e\x3cp\x3eTrời lạnh càng đau hơn.\x3c\/p\x3e\x3cp\x3eVà nỗi đau này… có thể kéo dài nhiều tháng.”\x3c\/p\x3e\x3cp\x3eChị thở dài, như thể vừa hiểu được điều mà bấy lâu nay không ai giải thích rõ ràng.\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNỗi khổ của người mẹ và sự bất lực của người con\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eChị kể rằng mẹ chị vốn là người mạnh mẽ, làm lụng cả đời. Nhưng giờ đây:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eban đêm bà không ngủ nổi\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eban ngày luôn ôm ngực vì đau\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eđi đứng khó khăn\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3elúc nào cũng sợ cơn đau ập đến\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e“Nhìn mẹ như vậy… đau lòng lắm bác sĩ. Mà tụi em đã đưa mẹ đi hết bệnh viện này đến bệnh viện kia, từ chuyên khoa thần kinh đến đau mạn tính. Tốn nhiều tiền lắm… nhưng bà vẫn đau.”\x3c\/p\x3e\x3cp\x3eTôi nghe và thấy hình bóng của rất nhiều bệnh nhân khác trong câu chuyện của chị.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eĐau hậu zona không giết người, nhưng khiến họ suy sụp. Và làm cả gia đình kiệt quệ theo.\x3c\/strong\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eĐiều trị – khó nhưng không phải không có hy vọng\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eTôi trấn an chị:\x3c\/p\x3e\x3cp\x3e“Có thể giảm đau. Không phải vô vọng. Chỉ là phải đúng hướng — vì đây là đau thần kinh, không còn là vấn đề da liễu.”\x3c\/p\x3e\x3cp\x3eCác phương pháp điều trị bao gồm:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3e1. Thuốc điều chỉnh dẫn truyền thần kinh\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eGiảm tín hiệu đau từ dây thần kinh bị tổn thương:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ePregabalin\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eGabapentin\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e2. Thuốc giảm đau thần kinh – chống trầm cảm liều thấp\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eGiúp giảm đau và cải thiện giấc ngủ:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eAmitriptyline\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDuloxetine\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e3. Các biện pháp tại chỗ\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDán Lidocain 5%\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCapsaicin patch\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e4. Các phương pháp hỗ trợ\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ePhong bế thần kinh\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVật lý trị liệu\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eLiệu pháp laser hoặc xung điện TENS\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eTôi giải thích thật lòng:\x3c\/p\x3e\x3cp\x3e“Không có thuốc nào hết đau ngay. Điều trị kéo dài vài tuần đến vài tháng. Nhưng nhiều bệnh nhân của tôi đã cải thiện rõ rệt khi đi đúng hướng và kiên trì.”\x3c\/p\x3e\x3cp\x3eTôi thấy ánh mắt chị sáng lên một chút. Chỉ một chút hy vọng thôi cũng đã giúp người nhà bớt gánh nặng tinh thần.\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eTại sao đã từng bị zona vẫn cần tiêm vaccine?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eLúc ra về, chị quay lại hỏi tôi:\x3c\/p\x3e\x3cp\x3e“Giờ mẹ em bị rồi… có cần tiêm phòng không bác sĩ?”\x3c\/p\x3e\x3cp\x3eTôi nói ngay:\x3c\/p\x3e\x3cp\x3e“\x3cstrong\x3eCàng nên tiêm.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eVì khuẩn varicella-zoster không biến mất sau đợt zona. Nó vẫn nằm trong các hạch thần kinh — chỉ ngủ yên mà thôi.”\x3c\/p\x3e\x3cp\x3eỞ người trên 50 tuổi, nó có thể tái hoạt:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ekhi miễn dịch suy giảm\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ekhi stress kéo dài\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ekhi mắc bệnh khác\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ehoặc không vì lý do gì cả\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eVaccine giúp hệ miễn dịch nhận diện virus tốt hơn\x3c\/strong\x3e, từ đó giảm nguy cơ tái phát và đặc biệt là giảm nguy cơ đau hậu zona — điều đang khiến mẹ chị khổ sở.\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLời nhắn cuối dành cho bạn đọc\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eTôi viết những dòng này vì: \x3c\/p\x3e\x3cp class=\\\x22ql-indent-1\\\x22\x3eMỗi bác sĩ đều có những bệnh nhân khiến mình day dứt nhất\x3c\/p\x3e\x3cp class=\\\x22ql-indent-1\\\x22\x3evà với tôi, đó thường là những người chịu đựng nỗi đau hậu zona dai dẳng\x3c\/p\x3e\x3cp\x3eNếu bạn hoặc người thân đã trên 50 tuổi, hãy cân nhắc tiêm ngừa zona.\x3c\/p\x3e\x3cp\x3eĐừng đợi đến khi mắc rồi mới nghĩ đến phòng ngừa.\x3c\/p\x3e\x3cp\x3eBởi \x3cstrong\x3ezona không đáng sợ bằng nỗi đau kéo dài sau đó\x3c\/strong\x3e — thứ đã làm biết bao người già suy sụp, và làm bao gia đình mệt mỏi chạy chữa.\x3c\/p\x3e\x3cp\x3eVà hy vọng rằng, người mẹ của chị hôm nay rồi sẽ sớm tìm được những ngày bớt đau, bớt mệt, và ngủ được một giấc trọn vẹn.\x3c\/p\x3e\x22,\x22date\x22:\x222025-11-30T08:35:12.919Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251130133933\x22,\x22department\x22:\x22Internal_Medicine\x22,\x22title\x22:\x22Có đáng sợ không khi kết quả MRI ghi \\\x22Bệnh lý mạch máu nhỏ - Tổn thương chất trắng\\\x22?\x22,\x22imageUrl\x22:\x22https:\/\/cdn-ileeeid.nitrocdn.com\/zxLbIaOUtnvkVTvadtQXbMxAFtAgimwY\/assets\/images\/optimized\/rev-b10936d\/craftbodyscan.com\/wp-content\/uploads\/2025\/01\/Understanding_Chronic_Small_Vessel_Ischemic_Disease_Blog_Image_3.webp\x22,\x22content\x22:\x22\x3cp\x3e\\tMột bệnh nhân gần đây đến phòng khám vì chóng mặt kéo dài, cảm giác loạng choạng và khó tập trung. Kết quả MRI cho thấy có nhiều ổ tổn thương chất trắng của não – dấu hiệu của bệnh lý mạch máu nhỏ chất trắng. Đây là tình trạng rất thường gặp, đặc biệt ở người lớn tuổi hoặc người có bệnh nền như tăng huyết áp, mỡ máu cao hay tiểu đường. Điều quan trọng là tổn thương đã hình thành thì không thể xoá bỏ, nhưng bệnh có thể đứng yên nhiều năm nếu kiểm soát đúng cách.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1lWxHbdghntiM8SeO8ffM0ea2xux8Ty9V\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNhư hình minh họa trên chất xám là  phần thân tế bào não, phần nhánh là chất trắng\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eChất trắng là gì và khác gì với chất xám?\x3c\/h2\x3e\x3cp\x3eChất xám nằm ở lớp ngoài của não, nơi xử lý thông tin. Chất trắng nằm sâu hơn bên trong, chứa các sợi thần kinh dẫn truyền tín hiệu giữa các vùng não. Có thể hình dung chất trắng giống như hệ thống dây điện âm tường trong một ngôi nhà. Khi hệ thống dây dẫn này bị hư hại, tín hiệu bị nhiễu hoặc chậm lại, dẫn đến nhiều rối loạn trong hoạt động của cơ thể.\x3c\/p\x3e\x3cp\x3eKhi các “dây dẫn điện” này bị tổn thương, bệnh nhân có thể gặp chóng mặt, giảm thăng bằng, hay quên, chậm chạp, khó tập trung hoặc dễ mệt mỏi. Đặc biệt vì mạch máu nhỏ nằm khắp não, mọi vùng não đều có thể bị ảnh hưởng, do đó triệu chứng cũng khá đa dạng.\x3c\/p\x3e\x3ch2\x3eVì sao chất trắng bị tổn thương?\x3c\/h2\x3e\x3cp\x3eNguyên nhân chính là hệ thống mạch máu nhỏ nuôi chất trắng bị thoái hóa hoặc hẹp lại. Có hai nhóm yếu tố quan trọng:\x3c\/p\x3e\x3ch3\x3e1. Yếu tố không thể tránh khỏi: Tuổi tác\x3c\/h3\x3e\x3cp\x3eKhi tuổi càng cao, mạch máu tự nhiên bị lão hóa, thành mạch kém đàn hồi, lưu thông máu giảm đi. Đây là quá trình bình thường và xảy ra ở tất cả mọi người. Vì vậy, một mức độ tổn thương chất trắng nhẹ là điều rất thường gặp ở người lớn tuổi.\x3c\/p\x3e\x3ch3\x3e2. Yếu tố có thể kiểm soát\x3c\/h3\x3e\x3cp\x3eĐiểm mấu chốt nằm ở nhóm yếu tố này. Dù tuổi tác không thể thay đổi, nhưng các yếu tố khác lại quyết định tổn thương tiến triển nhanh hay đứng yên nhiều năm. Bao gồm:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTăng huyết áp kéo dài\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTiểu đường\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eRối loạn mỡ máu, LDL cao\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHút thuốc lá\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBéo phì, ít vận động\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eStress và thiếu ngủ kéo dài\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChế độ ăn nhiều muối, nhiều chất béo bão hòa\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eKhi kiểm soát tốt các yếu tố trên, mạch máu nhỏ được bảo vệ, giúp bệnh không tiến triển thêm trong thời gian dài.\x3c\/p\x3e\x3ch2\x3eTriệu chứng không chỉ là chóng mặt\x3c\/h2\x3e\x3cp\x3eKhông phải bệnh nhân nào cũng có triệu chứng, nhưng khi tổn thương nhiều hơn có thể gặp:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eMất thăng bằng\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐau đầu kéo dài\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eGiảm trí nhớ hoặc giảm khả năng tập trung\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSuy giảm tốc độ xử lý thông tin\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDễ lẫn ở người cao tuổi\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTăng nguy cơ đột quỵ nếu các yếu tố nguy cơ không được kiểm soát\x3c\/li\x3e\x3c\/ol\x3e\x3ch2\x3eTổn thương chất trắng không thể xoá bỏ – nhưng có thể ngăn tiến triển\x3c\/h2\x3e\x3cp\x3eCác tổn thương đã thấy trên MRI là tổn thương mạn tính, không có thuốc hay phương pháp nào có thể làm biến mất. Tuy nhiên, điều rất quan trọng là bệnh hoàn toàn có thể đứng yên nhiều năm nếu kiểm soát tốt huyết áp, đường huyết, mỡ máu và lối sống.\x3c\/p\x3e\x3cp\x3eKhông cần các phương pháp điều trị tốn kém hay các liệu pháp thải độc, truyền dịch hay thực phẩm chức năng đắt tiền. Điều hiệu quả nhất nằm ở việc kiểm soát các yếu tố nguy cơ.\x3c\/p\x3e\x3ch2\x3eCác mục tiêu điều trị rõ ràng và thực tế\x3c\/h2\x3e\x3ch3\x3eKiểm soát huyết áp\x3c\/h3\x3e\x3cp\x3eMục tiêu dưới 130\/80 mmHg. Uống thuốc đều, đo huyết áp tại nhà mỗi tuần.\x3c\/p\x3e\x3ch3\x3eKiểm soát đường huyết \(nếu có tiểu đường\)\x3c\/h3\x3e\x3cp\x3eĐường huyết đói dưới 130 mg\/dL và HbA1c dưới 7%.\x3c\/p\x3e\x3ch3\x3eKiểm soát LDL cholesterol\x3c\/h3\x3e\x3cp\x3eMục tiêu dưới 70 mg\/dL \(hoặc thấp hơn nếu có nguy cơ cao\). Statin là nhóm thuốc giúp ổn định mảng xơ vữa và bảo vệ mạch máu nhỏ.\x3c\/p\x3e\x3ch3\x3eNgừng hút thuốc\x3c\/h3\x3e\x3cp\x3eHút thuốc làm tổn thương mạch máu nhanh hơn bất kỳ yếu tố nào khác.\x3c\/p\x3e\x3ch3\x3eGiảm stress và ngủ đủ\x3c\/h3\x3e\x3cp\x3eStress kéo dài làm tăng huyết áp và ảnh hưởng tuần hoàn não. Ngủ đủ mỗi đêm giúp não hồi phục tốt hơn.\x3c\/p\x3e\x3ch3\x3eChế độ ăn tốt cho mạch máu\x3c\/h3\x3e\x3cp\x3eTăng rau, trái cây, cá; giảm muối, giảm thực phẩm chiên rán và thịt đỏ.\x3c\/p\x3e\x3ch3\x3eTập thể dục\x3c\/h3\x3e\x3cp\x3eĐi bộ nhanh 30 phút mỗi ngày hoặc 150 phút mỗi tuần giúp cải thiện tuần hoàn và chức năng mạch máu.\x3c\/p\x3e\x3ch2\x3eCó cần chụp MRI định kỳ không?\x3c\/h2\x3e\x3cp\x3eĐa số bệnh nhân \x3cstrong\x3ekhông cần\x3c\/strong\x3e chụp MRI lặp lại theo lịch cố định. MRI chỉ được thực hiện khi:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTriệu chứng thay đổi rõ rệt\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBác sĩ nghi ngờ có đột quỵ, viêm, hoặc bệnh lý mới\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCó yêu cầu lâm sàng đặc biệt\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eChụp MRI quá thường xuyên không giúp điều trị tốt hơn và tạo thêm lo lắng không cần thiết.\x3c\/p\x3e\x3ch2\x3eThực phẩm “tăng tuần hoàn não”: chưa có bằng chứng rõ ràng\x3c\/h2\x3e\x3cp\x3eHiện nay có nhiều sản phẩm quảng cáo giúp “tăng tuần hoàn não” hoặc “làm sạch mạch máu”. Tuy nhiên:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhông có bằng chứng khoa học mạnh mẽ rằng các sản phẩm này giúp đảo ngược hoặc làm chậm bệnh lý mạch máu nhỏ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCác biện pháp hiệu quả nhất vẫn là kiểm soát huyết áp, đường huyết, mỡ máu, thay đổi lối sống và dùng statin khi cần.\x3c\/li\x3e\x3c\/ol\x3e\x3ch2\x3e\x3cbr\x3e\x3c\/h2\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eBệnh lý mạch máu nhỏ không phải là đột quỵ\x3c\/h2\x3e\x3ch2\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=14oCliSlqFsl0I93WUmgEmjGID296gl4m\x26amp;sz=w4096\\\x22\x3e\x3c\/h2\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\\tNhiều bệnh nhân khi nghe “tổn thương chất trắng” hoặc “bệnh lý mạch máu nhỏ” thường lo lắng rằng mình bị đột quỵ hoặc sắp bị đột quỵ. Đây là hiểu nhầm rất thường gặp.\x3c\/p\x3e\x3cp\x3eThực tế, \x3cstrong\x3ebệnh lý mạch máu nhỏ không phải là đột quỵ\x3c\/strong\x3e.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐột quỵ xảy ra khi một mạch máu trong não đột ngột tắc nghẽn hoặc vỡ, gây mất máu nuôi một vùng não trong thời gian ngắn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrong khi đó, \x3cstrong\x3ebệnh lý mạch máu nhỏ\x3c\/strong\x3e là tình trạng \x3cstrong\x3ethiếu nuôi dưỡng nhẹ nhưng kéo dài nhiều năm\x3c\/strong\x3e, làm chất trắng bị tổn thương từ từ. Không có sự tắc nghẽn đột ngột, không có chảy máu, không gây mất chức năng cấp tính.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eĐiểm khác biệt quan trọng:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐột quỵ gây triệu chứng rầm rộ ngay lập tức như méo miệng, yếu liệt, nói khó.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBệnh lý mạch máu nhỏ tiến triển âm thầm, triệu chứng nhẹ và từ từ, nhiều khi chỉ là chóng mặt thoáng qua, giảm thăng bằng hay giảm trí nhớ nhẹ.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eTuy \x3cstrong\x3ekhông phải đột quỵ\x3c\/strong\x3e, nhưng bệnh lý mạch máu nhỏ \x3cstrong\x3elà yếu tố làm tăng nguy cơ đột quỵ trong tương lai\x3c\/strong\x3e nếu không kiểm soát tốt huyết áp, đường huyết, mỡ máu và hút thuốc.\x3c\/p\x3e\x3cp\x3eVì vậy, mục tiêu điều trị vẫn là \x3cstrong\x3engăn bệnh tiến triển và giảm nguy cơ đột quỵ trong những năm tiếp theo\x3c\/strong\x3e, chứ không phải xử lý một tình trạng cấp cứu như đột quỵ.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eKết luận\x3c\/h2\x3e\x3cp\x3eBệnh lý mạch máu nhỏ chất trắng não là dấu hiệu cho thấy hệ mạch máu đang bị ảnh hưởng, đặc biệt khi bước vào tuổi trung niên và cao tuổi. Mặc dù tổn thương đã có không thể xoá bỏ, nhưng bệnh hoàn toàn có thể đứng yên nhiều năm nếu kiểm soát tốt các yếu tố nguy cơ và duy trì lối sống lành mạnh.\x3c\/p\x3e\x22,\x22date\x22:\x222025-11-30T08:27:25.621Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251125195606\x22,\x22department\x22:\x22Musculoskeletal_System\x22,\x22title\x22:\x22Cơn Gout Cấp – Hiểu Rõ “Kẻ Thù” Giấu Mặt Trong Khớp Xương\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1zYJJN-0x8Of3e5SawUIQ-IsSKcfrO67L\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\\tCó lẽ cụm từ \\\x22bệnh Gout\\\x22 \(Gút\) không còn xa lạ với nhiều người. Tuy nhiên, chỉ khi thực sự trải qua một cơn đau Gout cấp tính, người bệnh mới thấu hiểu cảm giác khắc nghiệt mà nó mang lại. Nhiều bệnh nhân mô tả rằng: \\\x22Chỉ cần một cơn gió thổi qua hay tấm chăn mỏng chạm nhẹ vào cũng thấy đau buốt tận xương.\\\x22\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/sa1s3optim.patientpop.com\/1536x\/filters:format\(webp\)\/assets\/images\/provider\/photos\/2756337.jpeg\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\\tHôm nay, chúng ta hãy cùng tìm hiểu nhẹ nhàng và thấu đáo về nguyên nhân thực sự gây ra cơn đau này, để biết cách ứng phó khoa học nhất.\x3c\/p\x3e\x3cp\x3e\\t\x3cstrong\x3e1. Làm sao để nhận biết một cơn Gout cấp?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\\tGout cấp thường xuất hiện rất đột ngột, đa phần là vào ban đêm hoặc gần sáng. Bạn có thể đang ngủ ngon và bị đánh thức bởi cơn đau dữ dội tại một khớp xương.\x3c\/p\x3e\x3cp\x3e\\tCác dấu hiệu điển hình bao gồm:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐau:\x3c\/strong\x3e Cơn đau tăng nhanh, dữ dội, cảm giác như bị nghiền nát hoặc bỏng rát.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSưng, Nóng, Đỏ:\x3c\/strong\x3e Vùng khớp bị ảnh hưởng sẽ sưng to, căng bóng, da đỏ ửng và sờ vào thấy rất nóng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVị trí:\x3c\/strong\x3e Thường gặp nhất là ngón chân cái. Tuy nhiên, nó cũng hay xuất hiện ở cổ chân, đầu gối, hoặc các khớp ngón tay.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=12X_dGgIFX1C5mzt9xnkn8PN17s4Pu8MH\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\\t\x3cstrong\x3e2. Vì sao cơn đau lại dữ dội và gây sưng đỏ như vậy?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\\tĐây là điều quan trọng nhất mà bạn cần hiểu. Nhiều người nghĩ Gout chỉ đơn giản là Acid Uric cao, nhưng thực tế phức tạp hơn một chút.\x3c\/p\x3e\x3cp\x3e\\tKhi nồng độ Acid Uric trong máu tăng quá cao và bão hòa, chúng sẽ không còn hòa tan được nữa mà bắt đầu kết tủa. Hãy tưởng tượng Acid Uric lúc này biến thành hàng ngàn \x3cstrong\x3etinh thể muối Urate hình kim sắc nhọn\x3c\/strong\x3e.\x3c\/p\x3e\x3cp\x3e\\tNhững tinh thể sắc lẹm này âm thầm lắng đọng, găm sâu vào bao khớp và sụn khớp mềm mại của bạn. Sự hiện diện của các \\\x22vật thể lạ\\\x22 sắc nhọn này khiến cơ thể lầm tưởng khớp đang bị tấn công. Ngay lập tức, hệ miễn dịch sẽ huy động bạch cầu ồ ạt chạy đến bao vây các tinh thể để \\\x22tiêu diệt\\\x22.\x3c\/p\x3e\x3cp\x3e\\tQuá trình \\\x22chiến đấu\\\x22 này tạo ra một \x3cstrong\x3ephản ứng viêm bùng nổ ngay tại khớp\x3c\/strong\x3e.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChính \x3cstrong\x3ephản ứng viêm\x3c\/strong\x3e này làm mạch máu giãn ra gây \x3cstrong\x3eđỏ và nóng\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDịch rỉ viêm thoát ra gây \x3cstrong\x3esưng nề\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCác chất trung gian hóa học của quá trình viêm kích thích dây thần kinh gây \x3cstrong\x3eđau buốt\x3c\/strong\x3e.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\\tTóm lại, cơn đau của bạn chính là \x3cstrong\x3ehậu quả của cuộc chiến viêm nhiễm dữ dội\x3c\/strong\x3e do các tinh thể muối sắc nhọn gây ra trong khớp.\x3c\/p\x3e\x3cp\x3e\\t\x3cstrong\x3e3. Bạn nên làm gì khi cơn đau ập đến?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\\tHiểu được nguyên nhân là do viêm và tinh thể, mục tiêu quan trọng nhất lúc này là: \x3cstrong\x3eDập tắt phản ứng viêm.\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNghỉ ngơi tuyệt đối:\x3c\/strong\x3e Hãy để khớp được yên. Việc đi lại lúc này làm các tinh thể cọ xát thêm vào mô mềm, khiến viêm càng nặng hơn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChườm lạnh:\x3c\/strong\x3e Bạn có thể chườm đá bọc trong khăn mềm lên vùng khớp sưng khoảng 15-20 phút để làm dịu phản ứng nhiệt tại chỗ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSử dụng thuốc đúng chỉ định:\x3c\/strong\x3e Vì gốc rễ cơn đau là viêm, bác sĩ sẽ kê các loại thuốc chuyên biệt để \x3cstrong\x3ekháng viêm\x3c\/strong\x3e và giảm đau. Thuốc sẽ giúp \\\x22làm nguội\\\x22 hệ miễn dịch, ngưng cuộc chiến tại khớp lại.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\\t\x3cstrong\x3e4. Gout có chữa khỏi hẳn được không?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\\tSau khi cắt được cơn đau cấp \(thường sau 3-5 ngày\), bạn sẽ thấy khớp trở lại bình thường. Tuy nhiên, \x3cstrong\x3ecác tinh thể muối vẫn có thể đang âm thầm lắng đọng\x3c\/strong\x3e nếu nồng độ Acid Uric trong máu không được kiểm soát.\x3c\/p\x3e\x3cp\x3e\\tViệc điều trị lâu dài sẽ tập trung vào việc hạ thấp Acid Uric máu đến mức an toàn, giúp làm tan dần các tinh thể cũ và ngăn chặn hình thành tinh thể mới.\x3c\/p\x3e\x3cp\x3e\\tNếu bạn đang nghi ngờ mình có dấu hiệu của Gout, hoặc đang chịu đựng cơn đau, hãy đến thăm khám để được đánh giá mức độ viêm và nhận phác đồ phù hợp. Việc hiểu đúng bệnh sẽ giúp bạn bớt lo lắng và bảo vệ khớp xương dẻo dai lâu dài.\x3c\/p\x3e\x3cp\x3e\\tChúc bạn và gia đình luôn khỏe mạnh.\x3c\/p\x3e\x3cp\x3e\\t\x3cstrong\x3eBác sĩ Phòng khám Friend Medical Clinic\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\\t\x3c\/p\x3e\x22,\x22date\x22:\x222025-11-29T16:01:07.736Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251031110706\x22,\x22department\x22:\x22Musculoskeletal_System\x22,\x22title\x22:\x22THOÁI HÓA KHỚP GỐI: 3 YẾU TỐ GÂY BỆNH CƠ BẢN BẠN CÓ THỂ KIỂM SOÁT ĐƯỢC\x22,\x22imageUrl\x22:\x22https:\/\/raw.githubusercontent.com\/fmcclinic\/Medical_News\/refs\/heads\/main\/news\/image\/%C4%91au-kh%E1%BB%9Bp-g%E1%BB%91i.gif\x22,\x22content\x22:\x22\x3cp\x3eThoái hóa khớp gối \(OA\) là một bệnh mạn tính thoái hóa rất phổ biến trên toàn thế giới. Đây là loại viêm khớp thường gặp nhất, gây ra đau, sưng, cứng khớp và làm giảm khả năng vận động của bạn. Khớp gối là khớp thường bị ảnh hưởng nhất.\x3c\/p\x3e\x3cp\x3eNhiều người lầm tưởng thoái hóa khớp là điều không thể tránh khỏi khi về già, nhưng các chuyên gia y tế khẳng định rằng thoái hóa khớp không phải là hệ quả tất yếu của quá trình lão hóa. Trên thực tế, có ba yếu tố nguy cơ chính gây ra và làm trầm trọng thêm thoái hóa khớp gối mà bạn hoàn toàn có thể thay đổi và phòng ngừa.\x3c\/p\x3e\x3cp\x3eDưới đây là 3 yếu tố cơ học quan trọng có thể gây ra và thúc đẩy sự tiến triển của thoái hóa khớp gối, cùng với những lời khuyên hữu ích để bạn bảo vệ đôi chân của mình.\x3c\/p\x3e\x3cp\x3e-------------------------------------------------------------------------------- \x3c\/p\x3e\x3cp\x3e1. Thừa Cân hoặc Béo Phì \(Quá Tải Trọng Lượng Cơ Thể\)\x3c\/p\x3e\x3cp\x3eThừa cân và béo phì \(đặc biệt nếu Chỉ số Khối cơ thể - BMI ≥ 30\) là một trong những yếu tố nguy cơ hàng đầu dẫn đến thoái hóa khớp gối.\x3c\/p\x3e\x3cp\x3eCơ chế gây bệnh\x3c\/p\x3e\x3cp\x3eTrọng lượng dư thừa tạo ra gánh nặng cơ học lên khớp gối—khớp chịu lực chính của cơ thể.\x3c\/p\x3e\x3cp\x3eBéo phì không chỉ là vấn đề cơ học đơn thuần; nó còn liên quan đến các vấn đề chuyển hóa và viêm nhiễm hệ thống. Mô mỡ sản xuất các chất gọi là adipokine \(ví dụ: leptin\) có thể ảnh hưởng đến quá trình trao đổi chất của tế bào sụn và gây ra phản ứng viêm mãn tính trong cơ thể, làm tăng nguy cơ phát triển thoái hóa khớp.\x3c\/p\x3e\x3cp\x3eGiải pháp phòng ngừa và kiểm soát\x3c\/p\x3e\x3cp\x3eGiảm
