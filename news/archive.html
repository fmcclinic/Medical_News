rrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/24345831\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute of Diabetes and Digestive and Kidney Diseases \(NIDDK\) – 2023\x3c\/strong\x3e Constipation in Children: Symptoms \x26amp; Causes \/ Táo bón ở trẻ em: Triệu chứng và Nguyên nhân \x3cem\x3eNguồn: NIDDK \(Viện Y tế Quốc gia Hoa Kỳ\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.niddk.nih.gov\/health-information\/digestive-diseases\/constipation-children\/symptoms-causes\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.niddk.nih.gov\/health-information\/digestive-diseases\/constipation-children\/symptoms-causes\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGordon M, et al. – 2016\x3c\/strong\x3e Osmotic and stimulant laxatives for the management of childhood constipation \(Cochrane Review\) \/ Thuốc nhuận tràng thẩm thấu và kích thích trong quản lý táo bón ở trẻ em \x3cem\x3eNguồn: PubMed \/ Cochrane Database of Systematic Reviews\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/27531591\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/27531591\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2022\x3c\/strong\x3e Constipation in Children \/ Táo bón ở trẻ em \x3cem\x3eNguồn: HealthyChildren.org \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/abdominal\/Pages\/Constipation.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/abdominal\/Pages\/Constipation.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute for Health and Care Excellence \(NICE\) – 2017 \(Updated 2023\)\x3c\/strong\x3e Constipation in children and young people: diagnosis and management \/ Táo bón ở trẻ em và thanh thiếu niên: Chẩn đoán và quản lý \x3cem\x3eNguồn: NICE Guidelines \(UK\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nice.org.uk\/guidance\/cg99\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nice.org.uk\/guidance\/cg99\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKoppen IJN, et al. – 2018\x3c\/strong\x3e Management of Functional Constipation in Children: Therapy in Practice \/ Quản lý táo bón chức năng ở trẻ em: Điều trị trong thực hành \x3cem\x3eNguồn: PubMed \/ Paediatric Drugs\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/29671116\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/29671116\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBekkali NL, et al. – 2018\x3c\/strong\x3e The role of a footstool on defecation: A systematic review \/ Vai trò của ghế kê chân trong việc đi tiêu: Một tổng quan hệ thống \x3cem\x3eNguồn: PubMed \/ Journal of Clinical Gastroenterology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/29280788\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/29280788\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJohns Hopkins Medicine – 2023\x3c\/strong\x3e Constipation in Children \/ Táo bón ở trẻ em \x3cem\x3eNguồn: Johns Hopkins Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/constipation-in-children\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/constipation-in-children\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:46:47.673Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251203130325\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22GIẢI MÃ \\\x22BỘ BA VÀNG\\\x22 TĂNG CHIỀU CAO. BỔ SUNG THẾ NÀO ĐỂ CON CAO LỚN MÀ KHÔNG BỊ \\\x22SỎI THẬN\\\x22?\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1J0ZHptjQfYUoO9pVpc0FIoqeQwFmgpxb\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cem\x3e\\\x22Bác sĩ ơi, em muốn mua Canxi cho con uống để cháu cao lên, thấy quảng cáo loại này thêm cả D3, K2 nữa, có nên dùng không ạ?\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eMong muốn con cao lớn là chính đáng, nhưng việc tự ý bổ sung các \\\x22combo tăng chiều cao\\\x22 tràn lan trên mạng hiện nay tiềm ẩn rất nhiều rủi ro, từ táo bón đến sỏi thận. Để giúp con cao lớn an toàn, bố mẹ cần hiểu rõ vai trò thực sự của từng \\\x22nhân vật\\\x22 trong bộ ba này.\x3c\/p\x3e\x3ch3\x3e1. GIẢI MÃ VAI TRÒ: AI LÀ NGƯỜI QUAN TRỌNG NHẤT?\x3c\/h3\x3e\x3ch3\x3eHãy tưởng tượng việc xây dựng hệ xương của trẻ giống như việc xây một ngôi nhà gạch:\x3c\/h3\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCANXI là \\\x22Viên gạch\\\x22:\x3c\/strong\x3e Đây là nguyên liệu chính để tạo nên độ cứng cáp của xương. Thiếu Canxi, xương sẽ mềm, xốp \(còi xương\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eThực tế:\x3c\/em\x3e Hầu hết trẻ em \(đặc biệt là trẻ dưới 1 tuổi đang bú mẹ hoặc uống sữa công thức\) \x3cstrong\x3eĐÃ ĐƯỢC CUNG CẤP ĐỦ CANXI\x3c\/strong\x3e qua chế độ ăn. Nhu cầu bổ sung thêm Canxi dạng thuốc thường chỉ đặt ra ở trẻ lớn, giai đoạn tiền dậy thì có nhu cầu tăng vọt, hoặc trẻ có chế độ ăn quá nghèo nàn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVITAMIN D3 là \\\x22Chiếc xe tải vận chuyển\\\x22:\x3c\/strong\x3e Canxi từ thức ăn đi vào ruột, nhưng nó không thể tự mình chui vào máu được. Nó cần Vitamin D3 như một chiếc xe tải đến \\\x22chở\\\x22 Canxi từ ruột vào trong dòng máu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNếu thiếu D3:\x3c\/em\x3e Dù con có ăn bao nhiêu tôm cua, uống bao nhiêu sữa thì Canxi vẫn bị đào thải ra ngoài qua phân.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVITAMIN K2 \(MK7\) là \\\x22Bác thợ xây định hướng\\\x22:\x3c\/strong\x3e Khi Canxi đã vào được máu \(nhờ D3\), nếu cứ để nó lang thang tự do thì rất nguy hiểm. Nó có thể lắng đọng tại mạch máu gây vôi hóa, hoặc tại thận gây sỏi thận. Vitamin K2 đóng vai trò là người \\\x22điều phối\\\x22, kích hoạt các protein đặc biệt để gắn Canxi vào đúng chỗ cần đến là XƯƠNG và RĂNG, đồng thời kéo Canxi ra khỏi những chỗ không cần thiết \(như mạch máu, mô mềm\).\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eKẾT LUẬN QUAN TRỌNG:\x3c\/strong\x3e\x3c\/blockquote\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVới đa số trẻ nhỏ, \x3cstrong\x3eVitamin D3 là yếu tố CẦN PHẢI BỔ SUNG SỚM NHẤT VÀ LIÊN TỤC NHẤT\x3c\/strong\x3e \(ngay từ sau sinh\), vì sữa mẹ và thức ăn rất nghèo D3, và tắm nắng hiện nay không còn được khuyến khích cho trẻ nhỏ do nguy cơ ung thư da.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVitamin K2 là người bạn đồng hành lý tưởng\x3c\/strong\x3e để tối ưu hóa hiệu quả của D3 và đảm bảo an toàn, tránh lắng đọng Canxi sai chỗ.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCanxi thường không cần bổ sung đại trà dạng thuốc\x3c\/strong\x3e, trừ khi có chỉ định của bác sĩ sau khi đánh giá khẩu phần ăn.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e2. NHỮNG SAI LẦM \\\x22KINH ĐIỂN\\\x22 KHI BỔ SUNG\x3c\/h3\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 1: \\\x22Tắm nắng là đủ D3 rồi, cần gì uống!\\\x22\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐể tổng hợp đủ D3, trẻ cần tiếp xúc trực tiếp với ánh nắng gắt \(khoảng 9h-15h\) trên diện tích da lớn trong thời gian đủ lâu. Điều này thực tế rất khó thực hiện và gây hại cho làn da non nớt của trẻ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eKhuyến cáo:\x3c\/em\x3e Trẻ sơ sinh bú mẹ hoàn toàn hay bú sữa công thức đều cần bổ sung D3 đường uống dự phòng \(400 IU\/ngày\) ngay từ những ngày đầu sau sinh.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 2: Tự ý mua Canxi ống\/viên về cho con uống \\\x22cho chắc\\\x22\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBổ sung thừa Canxi rất nguy hiểm. Nó gây táo bón, nóng trong, biếng ăn, ức chế hấp thu Sắt và Kẽm, và lâu dài là nguy cơ sỏi thận, vôi hóa mạch máu.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 3: Uống D3 vào buổi tối, lúc đói\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVitamin D3 và K2 là các vitamin tan trong dầu. Chúng cần chất béo để hấp thu tốt nhất.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eCách dùng đúng:\x3c\/em\x3e Nên uống vào \x3cstrong\x3ebuổi sáng\x3c\/strong\x3e, trong hoặc ngay sau bữa ăn có chứa chất béo \(ví dụ sau khi bú mẹ, uống sữa, hoặc ăn cháo có dầu\/mỡ\).\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. HƯỚNG DẪN BỔ SUNG CHUẨN Y KHOA TẠI NHÀ\x3c\/h3\x3e\x3ch4\x3eVỚI VITAMIN D3 \(Bắt buộc\):\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐối tượng:\x3c\/strong\x3e Tất cả trẻ em từ sơ sinh đến ít nhất 18 tháng tuổi \(khuyến cáo mới là có thể dùng liên tục đến khi trưởng thành nếu ít tiếp xúc ánh nắng\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLiều dự phòng an toàn:\x3c\/strong\x3e \x3cstrong\x3e400 IU\/ngày\x3c\/strong\x3e \(Thường tương đương 1-2 giọt hoặc 1 lần xịt tùy chế phẩm\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLưu ý:\x3c\/em\x3e Liều điều trị còi xương sẽ cao hơn nhiều và cần chỉ định của bác sĩ.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eVỚI VITAMIN K2 \(Khuyến khích kết hợp D3\):\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHiện nay có nhiều chế phẩm kết hợp sẵn D3 \x2b K2 rất tiện lợi. Bố mẹ có thể lựa chọn loại này để tối ưu hóa việc hấp thu Canxi vào xương.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eLiều lượng thường được nhà sản xuất tính toán cân đối với liều D3 400 IU.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eVỚI CANXI \(Cẩn trọng\):\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eƯu tiên số 1 là Canxi từ thực phẩm:\x3c\/strong\x3e Sữa, sữa chua, phô mai, tôm, cua, cá nhỏ ăn cả xương, rau lá xanh đậm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChỉ dùng thuốc Canxi khi:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ được bác sĩ chẩn đoán là Còi xương cấp hoặc thiếu canxi nặng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ có chế độ ăn quá nghèo nàn \(dị ứng đạm sữa bò nặng, không ăn được các chế phẩm từ sữa...\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ trong giai đoạn tiền dậy thì\/dậy thì tăng trưởng quá nhanh mà chế độ ăn không đáp ứng kịp.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNguyên tắc vàng:\x3c\/em\x3e Nếu phải bổ sung Canxi dạng thuốc, \x3cstrong\x3ebắt buộc phải uống kèm D3 \(và nên có K2\)\x3c\/strong\x3e để đảm bảo an toàn.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. KHI NÀO CẦN ĐI KHÁM DINH DƯỠNG?\x3c\/h3\x3e\x3cp\x3eBố mẹ nên đưa con đến khám chuyên khoa để được đánh giá và tư vấn cụ thể nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCon có chiều cao thấp hơn chuẩn nhiều \(dưới đường -2SD\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCon có các dấu hiệu nghi ngờ còi xương: Ra mồ hôi trộm nhiều \(ướt đẫm gối\), rụng tóc vành khăn sau gáy, thóp rộng chậm liền, chậm mọc răng, chậm vận động \(lẫy, bò, đi\), ngủ trằn trọc hay giật mình.\x3c\/li\x3e\x3c\/ol\x3e\x3cvideo src=\\\x22https:\/\/fmcclinic.github.io\/Medical_News\/news\/articles\/NEWS_20251203130325\/be%20ba%20ca%20d3%20k2.mp4\\\x22 controls=\\\x22\\\x22 autoplay=\\\x22\\\x22 loop=\\\x22\\\x22 muted=\\\x22\\\x22 playsinline=\\\x22\\\x22 preload=\\\x22auto\\\x22 style=\\\x22border-radius: 12px; box-shadow: rgba\(0, 0, 0, 0.1\) 0px 4px 10px; margin: 20px auto; display: block; width: 100%; max-width: 360px; aspect-ratio: 9 \/ 16;\\\x22\x3e\x3c\/video\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Chiều cao của con phụ thuộc vào: Gen \(23%\) \x2b Dinh dưỡng \(32%\) \x2b Vận động \x26amp; Giấc ngủ. Đừng thần thánh hóa các loại thuốc bổ. Hãy bổ sung \x3cstrong\x3eD3 \(kèm K2\)\x3c\/strong\x3e đều đặn như một thói quen, và tập trung vào một chế độ ăn đa dạng, giàu Canxi tự nhiên để con có nền tảng xương chắc khỏe nhất!\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWagner CL, Greer FR \(American Academy of Pediatrics\) – 2008 \(Reaffirmed 2014\)\x3c\/strong\x3e Prevention of rickets and vitamin D deficiency in infants, children, and adolescents \/ Phòng ngừa còi xương và thiếu hụt vitamin D ở trẻ sơ sinh, trẻ em và thanh thiếu niên \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/18977996\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/18977996\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3evan Ballegooijen AJ, et al. – 2017\x3c\/strong\x3e The Synergistic Interplay between Vitamins D and K for Bone and Cardiovascular Health \/ Tác động hiệp đồng giữa Vitamin D và K đối với sức khỏe xương và tim mạch \x3cem\x3eNguồn: PubMed \/ International Journal of Endocrinology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC5613455\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC5613455\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institutes of Health \(NIH\) – 2024\x3c\/strong\x3e Calcium: Fact Sheet for Health Professionals \/ Canxi: Tờ thông tin dành cho chuyên gia y tế \(Bao gồm rủi ro bổ sung thừa\) \x3cem\x3eNguồn: NIH Office of Dietary Supplements\x3c\/em\x3e \x3ca href=\\\x22https:\/\/ods.od.nih.gov\/factsheets\/Calcium-HealthProfessional\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/ods.od.nih.gov\/factsheets\/Calcium-HealthProfessional\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMaresz K. – 2015\x3c\/strong\x3e Proper Calcium Use: Vitamin K2 as a Promoter of Bone and Cardiovascular Health \/ Sử dụng Canxi đúng cách: Vitamin K2 giúp tăng cường sức khỏe xương và tim mạch \x3cem\x3eNguồn: PubMed \/ Integrative Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC4566462\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC4566462\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCenters for Disease Control and Prevention \(CDC\) – 2022\x3c\/strong\x3e Vitamin D Needs for Children \/ Nhu cầu Vitamin D ở trẻ em \x3cem\x3eNguồn: CDC\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.cdc.gov\/nutrition\/infantandtoddlernutrition\/vitamins-minerals\/vitamin-d.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.cdc.gov\/nutrition\/infantandtoddlernutrition\/vitamins-minerals\/vitamin-d.html\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2023\x3c\/strong\x3e Vitamin D toxicity: What if you get too much? \/ Ngộ độc Vitamin D: Điều gì xảy ra nếu bạn dùng quá nhiều? \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/healthy-lifestyle\/nutrition-and-healthy-eating\/expert-answers\/vitamin-d-toxicity\/faq-20058108\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/healthy-lifestyle\/nutrition-and-healthy-eating\/expert-answers\/vitamin-d-toxicity\/faq-20058108\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDawson-Hughes B, et al. – 2015\x3c\/strong\x3e Dietary fat increases vitamin D-3 absorption \/ Chất béo trong chế độ ăn làm tăng khả năng hấp thu Vitamin D-3 \x3cem\x3eNguồn: PubMed \/ Journal of the Academy of Nutrition and Dietetics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25441954\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25441954\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGolden NH, et al. – 2014\x3c\/strong\x3e Optimizing Bone Health in Children and Adolescents \/ Tối ưu hóa sức khỏe xương ở trẻ em và thanh thiếu niên \x3cem\x3eNguồn: PubMed \/ Pediatrics \(AAP Clinical Report\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25266429\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25266429\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTheuwissen E, et al. – 2012\x3c\/strong\x3e The role of vitamin K in soft-tissue calcification \/ Vai trò của vitamin K trong việc vôi hóa mô mềm \x3cem\x3eNguồn: PubMed \/ Advances in Nutrition\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/22516724\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/22516724\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:39:52.442Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251204231353\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22VÀNG DA SƠ SINH: KHI NÀO LÀ \\\x22BÌNH THƯỜNG\\\x22, KHI NÀO LÀ \\\x22BÁO ĐỘNG ĐỎ\\\x22 CẦN NHẬP VIỆN NGAY?\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1s7cC-5fOW_fOvJZRQhsUx3Wu0XouX8gx\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Bác sĩ ơi, sao da con em mấy hôm nay cứ vàng như nghệ thế này? Bà cháu bảo cứ cho ra phơi nắng buổi sáng là hết, có đúng không ạ?\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eKhoảng 70% trẻ sơ sinh có hiện tượng vàng da trong những ngày đầu đời. Hầu hết là vô hại, nhưng ranh giới giữa \\\x22vô hại\\\x22 và \\\x22nguy hiểm chết người\\\x22 ở trẻ sơ sinh là rất mong manh. Nếu chủ quan, chất gây vàng da có thể thấm vào não, gây tổn thương não vĩnh viễn \(bại não\).\x3c\/p\x3e\x3cp\x3eBài viết này sẽ giúp bố mẹ trang bị kiến thức chuẩn để bảo vệ con trong tháng đầu đời quan trọng này.\x3c\/p\x3e\x3cvideo src=\\\x22https:\/\/friendmedicalclinic.com\/news\/articles\/NEWS_20251204231353\/NEWBORN%20JAUNDICE.mp4\\\x22 controls=\\\x22\\\x22 autoplay=\\\x22\\\x22 loop=\\\x22\\\x22 muted=\\\x22\\\x22 playsinline=\\\x22\\\x22 preload=\\\x22auto\\\x22 style=\\\x22border-radius: 12px; box-shadow: rgba\(0, 0, 0, 0.1\) 0px 4px 10px; margin: 20px auto; display: block; width: 100%; max-width: 450px; aspect-ratio: 1 \/ 1;\\\x22\x3e\x3c\/video\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. TẠI SAO TRẺ SƠ SINH LẠI BỊ VÀNG DA? \(CƠ CHẾ ĐƠN GIẢN\)\x3c\/h3\x3e\x3cp\x3eChất gây ra màu vàng trên da và mắt trẻ gọi là \x3cstrong\x3eBilirubin\x3c\/strong\x3e.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNguồn gốc:\x3c\/strong\x3e Khi trẻ chào đời, các hồng cầu thai nhi \(vốn có số lượng rất nhiều để thích nghi với môi trường thiếu oxy trong bụng mẹ\) sẽ vỡ ra hàng loạt. Quá trình vỡ này giải phóng ra Bilirubin.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNhà máy xử lý:\x3c\/strong\x3e Thông thường, Gan sẽ làm nhiệm vụ \\\x22bắt giữ\\\x22 và đào thải Bilirubin này ra ngoài qua phân và nước tiểu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVấn đề ở trẻ sơ sinh:\x3c\/strong\x3e Gan của trẻ mới sinh chưa trưởng thành, hoạt động còn yếu nên không kịp xử lý lượng Bilirubin khổng lồ đang được tạo ra. Bilirubin bị ứ đọng trong máu, thấm ra ngoài da, gây nên hiện tượng vàng da.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e2. PHÂN BIỆT VÀNG DA SINH LÝ \(BÌNH THƯỜNG\) VÀ BỆNH LÝ \(NGUY HIỂM\)\x3c\/h3\x3e\x3cp\x3eĐây là kỹ năng quan trọng nhất bố mẹ cần nắm. Chúng ta phân biệt dựa trên \x3cstrong\x3eThời điểm\x3c\/strong\x3e, \x3cstrong\x3eMức độ\x3c\/strong\x3e và \x3cstrong\x3eTốc độ\x3c\/strong\x3e.\x3c\/p\x3e\x3ch4\x3eA. Vàng da SINH LÝ \(An toàn, tự hết\)\x3c\/h4\x3e\x3cp\x3ePhần lớn các bé gặp loại này.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThời điểm xuất hiện:\x3c\/strong\x3e Thường SAU 24 giờ tuổi \(thường là ngày thứ 2, thứ 3 sau sinh\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVị trí:\x3c\/strong\x3e Chỉ vàng nhẹ ở vùng mặt, cổ, ngực và bụng phía trên rốn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eToàn trạng:\x3c\/strong\x3e Em bé vẫn ăn ngủ tốt, phân vàng, nước tiểu trong.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDiễn biến:\x3c\/strong\x3e Tự lặn dần sau 7-10 ngày \(với trẻ đủ tháng\) hoặc 14 ngày \(với trẻ non tháng\) mà không cần điều trị gì đặc biệt ngoài việc cho bú mẹ tích cực.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eB. Vàng da BỆNH LÝ \(Báo động đỏ - Cần nhập viện gấp\)\x3c\/h4\x3e\x3cp\x3eChỉ chiếm tỷ lệ nhỏ nhưng cực kỳ nguy hiểm.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThời điểm xuất hiện:\x3c\/strong\x3e Vàng da xuất hiện SỚM \(NGAY TRONG 24 GIỜ ĐẦU SAU SINH\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMức độ \x26amp; Tốc độ:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVàng da lan rất nhanh xuống đùi, cẳng chân.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐặc biệt nguy hiểm khi vàng đến \x3cstrong\x3elòng bàn tay, lòng bàn chân\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eMức độ vàng đậm, vàng rực như nghệ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eToàn trạng:\x3c\/strong\x3e Trẻ lừ đừ, bỏ bú, hoặc quấy khóc thét, xoắn vặn người, có thể sốt hoặc hạ thân nhiệt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChất thải:\x3c\/strong\x3e Phân bạc màu \(trắng như cứt cò\) hoặc nước tiểu rất sậm màu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDiễn biến:\x3c\/strong\x3e Kéo dài trên 2 tuần không đỡ.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eNguy cơ:\x3c\/strong\x3e Nếu Bilirubin tăng quá cao, nó sẽ vượt qua hàng rào bảo vệ não, thấm vào các nhân xám trong não gây \x3cstrong\x3eVàng da nhân não\x3c\/strong\x3e. Di chứng là bại não, điếc, chậm phát triển trí tuệ vĩnh viễn, không thể hồi phục.\x3c\/blockquote\x3e\x3ch3\x3e3. GIẢI MÃ \\\x22HUYỀN THOẠI\\\x22 TẮM NẮNG CHỮA VÀNG DA\x3c\/h3\x3e\x3cp\x3eRất nhiều gia đình vẫn giữ thói quen bế trẻ ra phơi nắng buổi sáng để trị vàng da. Y học hiện đại khuyến cáo thế nào?\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSự thật 1: Ánh nắng buổi sáng không đủ mạnh.\x3c\/strong\x3e Để phân hủy Bilirubin, cần ánh sáng xanh dương có bước sóng đặc biệt với cường độ cao. Ánh nắng dịu buổi sáng \(trước 8h\) không đủ cường độ này.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSự thật 2: Nguy cơ nhiều hơn lợi ích.\x3c\/strong\x3e Phơi nắng lúc nắng gắt thì hại da và mắt bé. Phơi nắng buổi sớm thì dễ khiến trẻ bị lạnh, viêm hô hấp.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKẾT LUẬN:\x3c\/strong\x3e Tổ chức Y tế Thế giới \(WHO\) và các Hiệp hội Nhi khoa hiện nay \x3cstrong\x3eKHÔNG KHUYẾN CÁO\x3c\/strong\x3e dùng việc tắm nắng để ĐIỀU TRỊ vàng da bệnh lý.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3ePhương pháp điều trị chuẩn y khoa là gì?\x3c\/strong\x3e Đó là \x3cstrong\x3eCHIẾU ĐÈN \(Phototherapy\)\x3c\/strong\x3e tại bệnh viện. Trẻ được cởi trần, che mắt và bộ phận sinh dục, nằm dưới hệ thống đèn chuyên dụng phát ra ánh sáng xanh. Ánh sáng này sẽ biến đổi Bilirubin độc hại thành dạng không độc và đào thải ra ngoài dễ dàng.\x3c\/p\x3e\x3ch3\x3e4. HƯỚNG DẪN BỐ MẸ CÁCH TỰ KIỂM TRA CON TẠI NHÀ\x3c\/h3\x3e\x3cp\x3eVì vàng da rất khó phát hiện dưới ánh đèn neon hoặc trong phòng tối, bố mẹ cần:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuan sát dưới ánh sáng tự nhiên:\x3c\/strong\x3e Bế bé ra nơi có ánh sáng mặt trời đầy đủ \(gần cửa sổ\) vào ban ngày để quan sát.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThử nghiệm \\\x22làm trắng da\\\x22:\x3c\/strong\x3e Dùng ngón tay ấn nhẹ lên vùng da trán, mũi, ngực, đùi của trẻ rồi thả ra nhanh.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu da chỗ ấn có màu trắng rồi hồng lại ngay -\x26gt; Không vàng da.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu da chỗ ấn có màu vàng nghệ -\x26gt; Trẻ đang bị vàng da ở vùng đó.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=16HfhRogmwKUyXfSHKpduBkOSNvZyRxH0\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuy tắc Krammer \(để ước lượng\):\x3c\/strong\x3e Vàng da thường tiến triển từ đầu xuống chân. Vàng càng xuống thấp thì càng nặng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVùng 1 \(Mặt, cổ\): Nhẹ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVùng 2 \(Ngực, lưng\): Trung bình.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVùng 3 \(Bụng dưới rốn đến đùi\): Cần theo dõi sát.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVùng 4 \(Cẳng tay, cẳng chân\): Nặng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVùng 5 \(Lòng bàn tay, bàn chân\): Rất nặng -\x26gt; Đi viện ngay!\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e5. LỜI KHUYÊN TỪ BÁC SĨ\x3c\/h3\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCho trẻ bú mẹ tích cực:\x3c\/strong\x3e Bú nhiều giúp trẻ đi tiêu, đi tiểu nhiều hơn, hỗ trợ đào thải Bilirubin ra ngoài nhanh hơn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐừng chủ quan:\x3c\/strong\x3e Nếu thấy con vàng da lan quá rốn hoặc vàng da xuất hiện ngay ngày đầu tiên, hãy đưa con đi khám ngay lập tức. Xét nghiệm máu là cách duy nhất để biết chính xác mức độ Bilirubin.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTuân thủ lịch tái khám:\x3c\/strong\x3e Với trẻ sơ sinh cho về nhà sớm, việc tái khám đúng hẹn \(thường sau 2-3 ngày\) là cực kỳ quan trọng để bác sĩ đánh giá lại tình trạng vàng da.\x3c\/li\x3e\x3c\/ol\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKemper AR, et al. – 2022\x3c\/strong\x3e Clinical Practice Guideline Revision: Management of Hyperbilirubinemia in the Newborn Infant 35 or More Weeks of Gestation \/ Bản sửa đổi Hướng dẫn thực hành lâm sàng: Quản lý tăng Bilirubin máu ở trẻ sơ sinh từ 35 tuần thai trở lên \x3cem\x3eNguồn: Pediatrics \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/publications.aap.org\/pediatrics\/article\/150\/3\/e2022058859\/188702\/Clinical-Practice-Guideline-Revision-Management-of\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/publications.aap.org\/pediatrics\/article\/150\/3\/e2022058859\/188702\/Clinical-Practice-Guideline-Revision-Management-of\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute for Health and Care Excellence \(NICE\) – 2016\x3c\/strong\x3e Jaundice in newborn babies under 28 days \/ Vàng da ở trẻ sơ sinh dưới 28 ngày tuổi \x3cem\x3eNguồn: NICE Guidelines \(UK\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nice.org.uk\/guidance\/cg98\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nice.org.uk\/guidance\/cg98\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2022\x3c\/strong\x3e Infant jaundice: Symptoms \x26amp; causes \/ Vàng da ở trẻ sơ sinh: Triệu chứng và nguyên nhân \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.mayoclinic.org\/diseases-conditions\/infant-jaundice\/symptoms-causes\/syc-20373868\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/infant-jaundice\/symptoms-causes\/syc-20373868\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eFlaherman V, et al. – 2017\x3c\/strong\x3e ABM Clinical Protocol #22: Guidelines for Management of Jaundice in the Breastfeeding Infant \/ Giao thức lâm sàng ABM số 22: Hướng dẫn quản lý vàng da ở trẻ bú mẹ \x3cem\x3eNguồn: PubMed \/ Academy of Breastfeeding Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28961035\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28961035\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCenters for Disease Control and Prevention \(CDC\) – 2020\x3c\/strong\x3e Jaundice \x26amp; Kernicterus: Facts \/ Vàng da và Vàng da nhân não: Các thông tin thực tế \x3cem\x3eNguồn: CDC\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.cdc.gov\/ncbddd\/jaundice\/facts.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.cdc.gov\/ncbddd\/jaundice\/facts.html\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMaisels MJ, et al. – 2008\x3c\/strong\x3e Phototherapy for Neonatal Jaundice \/ Liệu pháp chiếu đèn điều trị vàng da sơ sinh \x3cem\x3eNguồn: New England Journal of Medicine \(NEJM\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nejm.org\/doi\/full\/10.1056\/NEJMct0708376\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nejm.org\/doi\/full\/10.1056\/NEJMct0708376\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eUllah S, et al. – 2016\x3c\/strong\x3e Hyperbilirubinemia in Neonates: Types, Causes, Clinical Examinations, Preventive Measures and Treatments \/ Tăng Bilirubin máu ở trẻ sơ sinh: Phân loại, nguyên nhân, thăm khám lâm sàng, biện pháp phòng ngừa và điều trị \x3cem\x3eNguồn: PubMed \/ Iran J Public Health\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC4935699\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC4935699\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2022\x3c\/strong\x3e Jaundice in Newborns: Parent FAQs \/ Vàng da ở trẻ sơ sinh: Các câu hỏi thường gặp của cha mẹ \x3cem\x3eNguồn: HealthyChildren.org\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/ages-stages\/baby\/Pages\/Jaundice.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/ages-stages\/baby\/Pages\/Jaundice.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBhutani VK, et al. – 2013\x3c\/strong\x3e Neonatal hyperbilirubinemia and Rhesus disease of the newborn \/ Tăng Bilirubin máu sơ sinh và bất đồng nhóm máu Rhesus \x3cem\x3eNguồn: PubMed \/ BMJ\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/23793653\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/23793653\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCleveland Clinic – 2022\x3c\/strong\x3e Jaundice in Newborns: Risks, Diagnosis \x26amp; Treatment \/ Vàng da ở trẻ sơ sinh: Nguy cơ, Chẩn đoán và Điều trị \x3cem\x3eNguồn: Cleveland Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/my.clevelandclinic.org\/health\/diseases\/22263-jaundice-in-newborns\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/my.clevelandclinic.org\/health\/diseases\/22263-jaundice-in-newborns\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2013\x3c\/strong\x3e WHO Recommendations on Postnatal Care of the Mother and Newborn \/ Khuyến nghị của WHO về chăm sóc hậu sản cho mẹ và bé \(Bao gồm phần đánh giá vàng da\) \x3cem\x3eNguồn: WHO\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/publications\/i\/item\/9789241506649\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/publications\/i\/item\/9789241506649\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKramer LI. – 1969\x3c\/strong\x3e Advancement of dermal icterus in the jaundiced newborn \/ Sự tiến triển của vàng da trên da ở trẻ sơ sinh \(Cơ sở của quy tắc Kramer\) \x3cem\x3eNguồn: PubMed \/ Am J Dis Child\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/pubmed.ncbi.nlm.nih.gov\/5817296\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/5817296\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNHS UK – 2023\x3c\/strong\x3e Newborn jaundice: Treatment \/ Vàng da sơ sinh: Các phương pháp điều trị \x3cem\x3eNguồn: National Health Service \(UK\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nhs.uk\/conditions\/jaundice-newborn\/treatment\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nhs.uk\/conditions\/jaundice-newborn\/treatment\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePreer GL, et al. – 2011\x3c\/strong\x3e Understanding and managing breast milk jaundice \/ Hiểu và quản lý vàng da do sữa mẹ \x3cem\x3eNguồn: PubMed \/ Arch Dis Child Fetal Neonatal Ed\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/20688866\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/20688866\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:28:28.962Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251205071740\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22\\\x22SÁT THỦ\\\x22 THẦM LẶNG MANG TÊN MÀN HÌNH ĐIỆN TỬ: KHI CHIẾC IPAD ĐANG \\\x22ĐÁNH CẮP\\\x22 GIỌNG NÓI VÀ SỰ TẬP TRUNG CỦA CON\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1PEQqBmGiu-yQV1Jm8k9618hwPvgsLQJ3\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Bác sĩ ơi, con em 2 tuổi rồi mà chỉ nói được vài từ \x27bà, măm\x27. Cháu rất ngoan, cứ đưa điện thoại cho là ngồi im thin thít xem YouTube cả tiếng đồng hồ, không quấy khóc gì cả. Liệu cháu có bị tự kỷ không?\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eĐây là một kịch bản \\\x22kinh điển\\\x22 tại các phòng khám nhi khoa phát triển hành vi hiện nay. Nhiều bố mẹ bận rộn đã vô tình dùng chiếc điện thoại như một \\\x22cô bảo mẫu điện tử\\\x22 để dỗ con ăn, dỗ con nín khóc.\x3c\/p\x3e\x3cp\x3eNhưng các nghiên cứu khoa học đã chứng minh: Sự tiện lợi trước mắt này đang đánh đổi bằng chính sự phát triển ngôn ngữ và trí tuệ của trẻ. Hãy cùng bác sĩ tìm hiểu tại sao.\x3c\/p\x3e\x3ch3\x3e1. CƠ CHẾ NÃO BỘ: TẠI SAO XEM TV NHIỀU LẠI KHIẾN TRẺ CHẬM NÓI?\x3c\/h3\x3e\x3cp\x3eNhiều người nghĩ: \\\x22Xem TV các nhân vật nói nhiều thì con phải học nói nhanh hơn chứ?\\\x22. \x3cstrong\x3eSỰ THẬT LÀ NGƯỢC LẠI.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eNgôn ngữ không được học qua việc \x3cstrong\x3e\\\x22nghe thụ động\\\x22\x3c\/strong\x3e, mà nó được hình thành qua \x3cstrong\x3e\\\x22tương tác hai chiều\\\x22\x3c\/strong\x3e giữa người với người.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eĐiều gì xảy ra trong não trẻ khi xem màn hình?\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGiao tiếp một chiều \(One-way communication\):\x3c\/strong\x3e Chiếc TV chỉ phát ra âm thanh và hình ảnh, nó không dừng lại chờ trẻ phản hồi, không nhìn vào mắt trẻ, và không điều chỉnh giọng điệu theo cảm xúc của trẻ. Não bộ trẻ chỉ tiếp nhận thông tin một cách thụ động mà không cần phải \\\x22động não\\\x22 để xử lý và đáp lại.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuá tải giác quan \(Sensory overload\):\x3c\/strong\x3e Những hình ảnh chuyển động quá nhanh, màu sắc sặc sỡ và âm thanh dồn dập trên các video YouTube Kids \(kể cả các kênh giáo dục\) khiến não bộ non nớt của trẻ bị kích thích quá mức. Trẻ bị cuốn vào luồng hình ảnh đó \(\\\x22thôi miên số\\\x22\) và mất khả năng chú ý đến thế giới thực xung quanh.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMất cơ hội \\\x22tắm\\\x22 ngôn ngữ thật:\x3c\/strong\x3e Mỗi giờ trẻ ngồi trước màn hình là một giờ trẻ MẤT ĐI cơ hội được giao tiếp mắt-chạm-mắt, được nghe giọng nói thật của bố mẹ, được chơi các trò chơi tương tác thực tế \(ú òa, xếp hình\). Chính những tương tác thực tế này mới là \\\x22thức ăn\\\x22 nuôi dưỡng vùng ngôn ngữ của não.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eKết luận:\x3c\/strong\x3e Màn hình điện tử không dạy trẻ cách giao tiếp. Nó chỉ dạy trẻ cách im lặng và nhìn chằm chằm.\x3c\/blockquote\x3e\x3ch3\x3e2. BÁO ĐỘNG ĐỎ: CÁC MỐC CHẬM NÓI CẦN ĐI KHÁM NGAY\x3c\/h3\x3e\x3cp\x3eRanh giới giữa \\\x22chậm nói đơn thuần\\\x22 \(do môi trường ít giao tiếp\) và các rối loạn phát triển khác \(như Tự kỷ, khiếm thính\) đôi khi rất khó phân biệt. Bố mẹ cần đưa con đi đánh giá phát triển ngay nếu thấy các dấu hiệu sau:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eGiai đoạn 12 tháng tuổi:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ không có phản ứng khi được gọi tên.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhông biết dùng ngón tay trỏ để chỉ vào đồ vật mình muốn \(Ví dụ: chỉ vào bình sữa khi đói\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhông có điệu bộ giao tiếp \(không biết vẫy tay bye-bye, không biết lắc đầu\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhông bập bẹ các âm đơn giản \(ma-ma, ba-ba\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eGiai đoạn 18 tháng tuổi:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChưa nói được từ đơn nào có nghĩa \(ngoài gọi bà, mẹ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhông hiểu các mệnh lệnh đơn giản \(Ví dụ: \\\x22Lại đây\\\x22, \\\x22Đưa cho mẹ\\\x22\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eGiai đoạn 24 tháng tuổi \(2 tuổi\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVốn từ vựng dưới 50 từ đơn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChưa nói được câu ngắn 2 từ \(Ví dụ: \\\x22Mẹ bế\\\x22, \\\x22Đi chơi\\\x22, \\\x22Uống nước\\\x22\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChỉ nhại lại lời người khác hoặc lời trên TV mà không hiểu nghĩa.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. HẬU QUẢ KÉO DÀI: KHÔNG CHỈ LÀ CHẬM NÓI\x3c\/h3\x3e\x3cp\x3eViệc tiếp xúc quá nhiều với màn hình ở độ tuổi quá nhỏ \(dưới 3 tuổi\) còn liên quan đến hàng loạt vấn đề hành vi khác:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGiảm khả năng tập trung chú ý:\x3c\/strong\x3e Trẻ quen với các kích thích nhanh, mạnh trên màn hình nên sẽ thấy thế giới thực \(đọc sách, chơi đồ chơi\) rất nhàm chán. Trẻ khó ngồi yên một chỗ, hay lăng xăng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRối loạn cảm xúc \x26amp; Hành vi hung hăng:\x3c\/strong\x3e Khi bị tước đoạt điện thoại, trẻ thường phản ứng rất dữ dội \(la hét, đập đồ, ăn vạ\) do não bộ đang trong trạng thái \\\x22cai nghiện\\\x22 dopamine \(chất gây hưng phấn tiết ra khi xem màn hình\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRối loạn giấc ngủ:\x3c\/strong\x3e Ánh sáng xanh từ màn hình ức chế Melatonin \(hormone gây buồn ngủ\), khiến trẻ khó đi vào giấc ngủ, ngủ không sâu.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. CHIẾN LƯỢC \\\x22CAI NGHIỆN\\\x22 MÀN HÌNH \x26amp; KÍCH THÍCH NGÔN NGỮ\x3c\/h3\x3e\x3cp\x3eCác tổ chức Y tế thế giới \(WHO\) và Viện Hàn lâm Nhi khoa Hoa Kỳ \(AAP\) khuyến cáo:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrẻ dưới 18 tháng tuổi:\x3c\/strong\x3e KHÔNG tiếp xúc với màn hình điện tử \(trừ việc gọi video call ngắn với người thân\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrẻ 18 tháng - 2 tuổi:\x3c\/strong\x3e Hạn chế tối đa. Nếu xem, phải là chương trình giáo dục chất lượng cao và BỐ MẸ PHẢI XEM CÙNG để tương tác, giải thích cho trẻ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrẻ 2 - 5 tuổi:\x3c\/strong\x3e Tối đa 1 giờ\/ngày \(chương trình chất lượng cao\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eBác sĩ khuyên bố mẹ làm gì để con nói nhiều hơn?\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuy tắc \\\x22Khu vực không màn hình\\\x22:\x3c\/strong\x3e Tuyệt đối không TV\/điện thoại trong giờ ăn và trong phòng ngủ.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrở thành \\\x22Bình luận viên thể thao\\\x22:\x3c\/strong\x3e Hãy nói chuyện với con liên tục về mọi thứ đang diễn ra. \x3cem\x3eVí dụ: Khi tắm, hãy nói \\\x22Mẹ đang kỳ cọ cái tay này, cái tay nhỏ xíu, xà phòng thơm quá...\\\x22.\x3c\/em\x3e Đừng ngại mình nói nhiều, vì con đang \\\x22hấp thu\\\x22 đấy.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐọc sách tương tác:\x3c\/strong\x3e Không chỉ đọc chữ, hãy chỉ vào tranh và hỏi: \\\x22Con mèo đâu rồi?\\\x22, \\\x22Con mèo kêu thế nào nhỉ?\\\x22. Chờ đợi con phản hồi \(dù chỉ là chỉ tay hoặc ê a\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHãy kiên nhẫn chờ đợi:\x3c\/strong\x3e Khi hỏi con, hãy dừng lại khoảng 5-10 giây, nhìn vào mắt con để chờ đợi câu trả lời. Đừng vội vàng trả lời thay con.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Chiếc điện thoại là công cụ hữu ích cho người lớn, nhưng có thể là \\\x22liều thuốc độc\\\x22 cho sự phát triển của trẻ nhỏ. Món quà quý giá nhất bố mẹ có thể tặng con không phải là chiếc iPad đời mới nhất, mà là \x3cstrong\x3eTHỜI GIAN\x3c\/strong\x3e và \x3cstrong\x3eSỰ TƯƠNG TÁC THỰC TẾ\x3c\/strong\x3e của chính mình.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCouncil on Communications and Media \(AAP\) – 2016\x3c\/strong\x3e Media and Young Minds \/ Truyền thông và trí tuệ trẻ thơ \(Chính sách về thời gian sử dụng màn hình\) \x3cem\x3eNguồn: American Academy of Pediatrics \(Pediatrics\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/publications.aap.org\/pediatrics\/article\/138\/5\/e20162591\/60503\/Media-and-Young-Minds\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/publications.aap.org\/pediatrics\/article\/138\/5\/e20162591\/60503\/Media-and-Young-Minds\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMa J, et al. – 2019\x3c\/strong\x3e Mobile Media Device Use is Associated with Expressive Language Delay in 18-Month-Old Children \/ Sử dụng thiết bị truyền thông di động liên quan đến chậm ngôn ngữ diễn đạt ở trẻ 18 tháng tuổi \x3cem\x3eNguồn: PubMed \/ Pediatric Academic Societies Meeting\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28466666\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28466666\/\x3c\/a\x3e \(Trích dẫn liên quan đến nghiên cứu được trình bày tại PAS\) \/ \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.healthychildren.org\/English\/news\/Pages\/Handheld-Screen-Time-Linked-to-Speech-Delays-in-Young-Children.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/news\/Pages\/Handheld-Screen-Time-Linked-to-Speech-Delays-in-Young-Children.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMadigan S, et al. – 2019\x3c\/strong\x3e Association Between Screen Time and Children’s Performance on a Developmental Screening Test \/ Mối liên quan giữa thời gian sử dụng màn hình và kết quả sàng lọc phát triển ở trẻ em \x3cem\x3eNguồn: PubMed \/ JAMA Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/30688970\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/30688970\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCenters for Disease Control and Prevention \(CDC\) – 2023\x3c\/strong\x3e CDC’s Developmental Milestones \/ Các mốc phát triển của trẻ theo CDC \(Nhận biết sớm dấu hiệu chậm phát triển\) \x3cem\x3eNguồn: CDC\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.cdc.gov\/ncbddd\/actearly\/milestones\/index.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.cdc.gov\/ncbddd\/actearly\/milestones\/index.html\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHermawati D, et al. – 2018\x3c\/strong\x3e Prolonged Screen Time as a Cause of Speech Delay in Children: A Clinical Observation \/ Thời gian sử dụng màn hình kéo dài là nguyên nhân gây chậm nói ở trẻ: Một quan sát lâm sàng \x3cem\x3eNguồn: PubMed \/ ICOP\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/30417688\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/30417688\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2022\x3c\/strong\x3e Screen time and children: How to guide your child \/ Thời gian sử dụng màn hình và trẻ em: Cách hướng dẫn con bạn \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/healthy-lifestyle\/childrens-health\/in-depth\/screen-time\/art-20047952\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/healthy-lifestyle\/childrens-health\/in-depth\/screen-time\/art-20047952\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTamana SK, et al. – 2019\x3c\/strong\x3e Screen-time is associated with inattention problems in preschoolers: Results from the CHILD Cohort Study \/ Thời gian sử dụng màn hình liên quan đến các vấn đề thiếu tập trung ở trẻ mẫu giáo \x3cem\x3eNguồn: PubMed \/ PLOS ONE\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/30995220\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/30995220\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLeBourgeois MK, et al. – 2017\x3c\/strong\x3e Digital Media and Sleep in Childhood and Adolescence \/ Phương tiện kỹ thuật số và giấc ngủ ở trẻ em và thanh thiếu niên \(Tác động của ánh sáng xanh\) \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/29093035\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/29093035\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRadesky JS, et al. – 2015\x3c\/strong\x3e Mobile and Interactive Media Use by Young Children: The Good, the Bad, and the Unknown \/ Sử dụng phương tiện di động và tương tác ở trẻ nhỏ: Mặt tốt, mặt xấu và những điều chưa biết \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25548323\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25548323\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCleveland Clinic – 2022\x3c\/strong\x3e Screen Time for Kids: How Much Is Too Much? \/ Thời gian màn hình cho trẻ: Bao nhiêu là quá nhiều? \x3cem\x3eNguồn: Cleveland Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/health.clevelandclinic.org\/screen-time-for-kids\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/health.clevelandclinic.org\/screen-time-for-kids\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eZero to Three – 2018\x3c\/strong\x3e Screen Sense: What the Research Says About the Impact of Media on Children Aged 0-3 \/ Ý thức về màn hình: Nghiên cứu nói gì về tác động của truyền thông đối với trẻ 0-3 tuổi \x3cem\x3eNguồn: Zero to Three\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.zerotothree.org\/resource\/screen-sense\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.zerotothree.org\/resource\/screen-sense\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDuch H, et al. – 2013\x3c\/strong\x3e Association of screen time use and language development in Hispanic toddlers \/ Mối liên quan giữa thời gian sử dụng màn hình và phát triển ngôn ngữ ở trẻ mới biết đi \x3cem\x3eNguồn: PubMed \/ Clinical Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/23942698\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/23942698\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eUNICEF – 2021\x3c\/strong\x3e Babies need humans, not screens \/ Trẻ sơ sinh cần con người, không cần màn hình \x3cem\x3eNguồn: UNICEF\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.unicef.org\/parenting\/child-development\/babies-screen-time\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.unicef.org\/parenting\/child-development\/babies-screen-time\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:24:04.244Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251201103245\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22TAY CHÂN MIỆNG: BỆNH LÀNH TÍNH HAY \\\x22SÁT THỦ\\\x22 GIẤU MẶT? NHẬN BIẾT SỚM ĐỂ TRÁNH BIẾN CHỨNG\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=106OQxtBjmyx5GCh5Sx7OM7ULwQkEZR0p\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eBệnh Tay Chân Miệng \(TCM\) là bệnh truyền nhiễm rất phổ biến ở trẻ nhỏ, đặc biệt là lứa tuổi mầm non. Đa số các trường hợp bệnh diễn biến nhẹ và tự khỏi, khiến nhiều phụ huynh có tâm lý chủ quan.\x3c\/p\x3e\x3cp\x3eTuy nhiên, điều nguy hiểm của TCM là bệnh có thể chuyển biến nặng rất nhanh, tấn công vào não bộ và tim mạch chỉ trong vài giờ, dẫn đến tử vong nếu không được phát hiện kịp thời. Bài viết này sẽ giúp bố mẹ trang bị kiến thức đầy đủ để bảo vệ con.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. TỔNG QUAN VỀ BỆNH \(KIẾN THỨC NỀN TẢNG\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eTrước khi đi vào các dấu hiệu, bố mẹ cần hiểu rõ kẻ thù mình đang đối mặt:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eTác nhân gây bệnh:\x3c\/strong\x3e Bệnh do một nhóm virus đường ruột \(Enterovirus\) gây ra. Hai \\\x22thủ phạm\\\x22 chính thường gặp là:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCoxsackievirus A16:\x3c\/strong\x3e Thường gây bệnh thể nhẹ, ít biến chứng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eEnterovirus 71 \(EV71\):\x3c\/strong\x3e Đây là chủng virus đặc biệt NGUY HIỂM. EV71 có độc lực thần kinh rất mạnh, là nguyên nhân chính gây ra các ca tử vong và biến chứng viêm não, viêm cơ tim nặng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1iOMDpdWD0bd9jXXKqdJyfUMM6pQm4J2q\x26amp;sz=w4096\\\x22\x3e\x3cem\x3eLưu ý: Nhìn bề ngoài không thể phân biệt được trẻ nhiễm chủng virus nào, do đó mọi trường hợp mắc bệnh đều cần theo dõi sát sao.\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eĐường lây truyền \(Rất dễ lây\):\x3c\/strong\x3e Virus lây lan cực nhanh qua đường tiêu hóa và hô hấp, đặc biệt trong môi trường tập thể như nhà trẻ:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTiếp xúc trực tiếp:\x3c\/strong\x3e Chạm vào dịch tiết từ các bọng nước, nước bọt, hoặc phân của trẻ bệnh.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTiếp xúc gián tiếp \(Phổ biến nhất\):\x3c\/strong\x3e Qua bàn tay người chăm sóc, đồ chơi, mặt bàn ghế, sàn nhà bị nhiễm virus.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eVaccine phòng bệnh:\x3c\/strong\x3e Hiện nay tại Việt Nam CHƯA CÓ vaccine phòng bệnh Tay chân miệng lưu hành phổ biến. Biện pháp phòng ngừa duy nhất là giữ gìn vệ sinh cá nhân và môi trường.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e2. DẤU HIỆU NHẬN BIẾT SỚM \(GIAI ĐOẠN ĐIỂN HÌNH\)\x3c\/h3\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1IQ8FECnJrVFWlNQRy7In-d81MUN620od\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3eỞ thể nhẹ, bệnh thường kéo dài 7-10 ngày và tự khỏi. Các dấu hiệu ban đầu thường dễ nhận biết:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSốt nhẹ hoặc vừa:\x3c\/strong\x3e Trẻ thường sốt từ 37.5°C đến 38.5°C. Một số trẻ có thể sốt cao hơn.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLoét miệng \(Dấu hiệu khiến trẻ khó chịu nhất\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eXuất hiện các chấm đỏ nhỏ, sau đó biến thành bọng nước ở niêm mạc má, lợi và lưỡi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCác bọng nước này vỡ ra nhanh chóng tạo thành vết loét rất đau.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eBiểu hiện của trẻ:\x3c\/em\x3e Chảy nước miếng liên tục \(do đau không dám nuốt\), biếng ăn, quấy khóc khi cho ăn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3ePhát ban ngoài da:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eXuất hiện các tổn thương dạng dát đỏ, sần, hoặc bọng nước.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eVị trí đặc trưng:\x3c\/em\x3e Lòng bàn tay, lòng bàn chân, đầu gối, mông.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eĐặc điểm quan trọng:\x3c\/em\x3e Các nốt ban này thường KHÔNG NGỨA \(khác với thủy đậu\) và khi lành thường không để lại sẹo.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e3. KHI NÀO CẦN NHẬP VIỆN NGAY LẬP TỨC? \(DẤU HIỆU CẢNH BÁO NẶNG\)\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1fIx9q9I7dZtVWNVUKCsMu2nS4a2qu_Js\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3eĐây là phần quan trọng nhất. Nếu virus tấn công vào hệ thần kinh, trẻ sẽ có các biểu hiện rất đặc trưng. Bố mẹ cần đưa trẻ đi cấp cứu ngay nếu thấy MỘT trong các dấu hiệu sau \(thường xuất hiện từ ngày thứ 2 đến ngày thứ 5 của bệnh\):\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eDấu hiệu 1: Sốt cao không hạ\x3c\/strong\x3e Trẻ sốt cao trên 39°C kéo dài hơn 48 giờ, uống thuốc hạ sốt \(Paracetamol\/Ibuprofen\) nhưng không đáp ứng hoặc nhiệt độ hạ rất ít rồi tăng lại nhanh chóng. Sốt cao liên tục là dấu hiệu cảnh báo tình trạng viêm nhiễm nặng trong cơ thể.\x3c\/p\x3e\x3cvideo src=\\\x22https:\/\/friendmedicalclinic.com\/news\/articles\/NEWS_20251201103245\/begiatminh.mp4\\\x22 controls=\\\x22\\\x22 autoplay=\\\x22\\\x22 loop=\\\x22\\\x22 muted=\\\x22\\\x22 playsinline=\\\x22\\\x22 preload=\\\x22auto\\\x22 style=\\\x22border-radius: 12px; box-shadow: rgba\(0, 0, 0, 0.1\) 0px 4px 10px; margin: 20px auto; display: block; width: 100%; max-width: 450px; aspect-ratio: 1 \/ 1;\\\x22\x3e\x3c\/video\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eDấu hiệu 2: GIẬT MÌNH CHỚI VỚI \(Dấu hiệu đặc trưng nhất của biến chứng thần kinh\)\x3c\/strong\x3e Đây là dấu hiệu \\\x22vàng\\\x22 để nhận biết bệnh chuyển độ nặng.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eMô tả:\x3c\/em\x3e Trẻ đang thiu thiu ngủ hoặc nằm yên thì đột nhiên nảy người lên, hai tay và chân giơ lên cao như đang với lấy vật gì đó, mắt mở to hoảng hốt, sau đó trở lại bình thường. Cơn giật mình diễn ra rất nhanh \(vài giây\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eCảnh báo:\x3c\/em\x3e Nếu trẻ giật mình trên 2 lần trong vòng 30 phút, đây là dấu hiệu nguy kịch.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eDấu hiệu 3: Các bất thường về thần kinh khác\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eRun tay chân, run người.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐi đứng loạng choạng, dễ ngã.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eYếu tay chân \(liệt mềm cấp tính\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ lừ đừ, li bì, ngủ gà hoặc ngược lại là kích thích, quấy khóc liên tục không dỗ được.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNôn ói nhiều \(không liên quan đến bữa ăn\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eDấu hiệu 4: Biểu hiện suy hô hấp, tuần hoàn \(Giai đoạn rất nặng\)\x3c\/strong\x3e Thở mệt, thở nhanh, da nổi vân tím, vã mồ hôi lạnh toàn thân, tay chân lạnh ngắt. Đây là lúc tính mạng trẻ bị đe dọa nghiêm trọng.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e4. CHĂM SÓC TẠI NHÀ VÀ PHÒNG NGỪA\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eVới các trường hợp nhẹ được bác sĩ chỉ định theo dõi tại nhà:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eDinh dưỡng:\x3c\/strong\x3e Cho trẻ ăn thức ăn lỏng, mềm, NGUỘI hoặc MÁT \(cháo nguội, sữa chua, sinh tố\). Tránh thức ăn nóng, chua, cay gây đau vết loét miệng. Không ép trẻ ăn quá mức.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eVệ sinh:\x3c\/strong\x3e Tắm rửa sạch sẽ cho trẻ hằng ngày. Vệ sinh miệng nhẹ nhàng bằng nước muối sinh lý.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eCách ly:\x3c\/strong\x3e Cho trẻ nghỉ học và cách ly tại nhà ít nhất 10 ngày kể từ khi khởi phát bệnh để tránh lây lan cho cộng đồng.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3ePhòng ngừa cho người chăm sóc:\x3c\/strong\x3e Người lớn chăm sóc trẻ phải rửa tay thường xuyên bằng xà phòng, đặc biệt là sau khi thay tã hoặc vệ sinh cho trẻ, và trước khi chế biến thức ăn.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLời khuyên từ bác sĩ:\x3c\/strong\x3e Tay chân miệng diễn biến rất khó lường. Ngay cả khi trẻ chỉ có biểu hiện nhẹ, bố mẹ cũng không được lơ là. Hãy theo dõi sát giấc ngủ của con để phát hiện kịp thời dấu hiệu \\\x22giật mình\\\x22 và tuân thủ lịch tái khám của bác sĩ.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCenters for Disease Control and Prevention \(CDC\) – 2023\x3c\/strong\x3e Hand, Foot, and Mouth Disease \(HFMD\): Symptoms and Causes \/ Bệnh Tay Chân Miệng: Triệu chứng và nguyên nhân \x3cem\x3eNguồn: CDC\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.cdc.gov\/hand-foot-mouth\/about\/index.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.cdc.gov\/hand-foot-mouth\/about\/index.html\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2011\x3c\/strong\x3e A Guide to Clinical Management and Public Health Response for Hand, Foot and Mouth Disease \(HFMD\) \/ Hướng dẫn quản lý lâm sàng và ứng phó y tế cộng đồng đối với bệnh Tay Chân Miệng \x3cem\x3eNguồn: WHO Western Pacific Region\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/iris.who.int\/handle\/10665\/207490\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/iris.who.int\/handle\/10665\/207490\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2023\x3c\/strong\x3e Hand-foot-and-mouth disease: Diagnosis and treatment \/ Bệnh tay chân miệng: Chẩn Nguồn: Cleveland Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/my.clevelandclinic.org\/health\/diseases\/11129-hand-foot-and-mouth-disease\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/my.clevelandclinic.org\/health\/diseases\/11129-hand-foot-and-mouth-disease\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eOoi MH, et al. – 2010\x3c\/strong\x3e Clinical features, diagnosis, and management of enterovirus 71 \/ Đặc điểm lâm sàng, chẩn đoán và quản lý Enterovirus 71 \(Bao gồm các dấu hiệu thần kinh\) \x3cem\x3eNguồn: PubMed \/ The Lancet Neurology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/20965438\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/20965438\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Health Service \(NHS\) – 2021\x3c\/strong\x3e Hand, foot and mouth disease: Check if it\x27s hand, foot and mouth disease \/ Bệnh tay chân miệng: Kiểm tra các dấu hiệu \x3cem\x3eNguồn: NHS \(UK\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nhs.uk\/conditions\/hand-foot-and-mouth-disease\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nhs.uk\/conditions\/hand-foot-and-mouth-disease\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAswathyraj S, et al. – 2016\x3c\/strong\x3e Hand, foot and mouth disease: Emerging epidemics and the need for new vaccines \/ Bệnh tay chân miệng: Các dịch bệnh mới nổi và nhu cầu về vắc-xin mới \x3cem\x3eNguồn: PubMed \/ Infection, Genetics and Evolution\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/27592239\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/27592239\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJohns Hopkins Medicine – 2023\x3c\/strong\x3e Hand, Foot, and Mouth Disease in Children \/ Bệnh Tay Chân Miệng ở trẻ em \x3cem\x3eNguồn: Johns Hopkins Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/hand-foot-and-mouth-disease-in-children\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/hand-foot-and-mouth-disease-in-children\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:20:03.784Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251205085123\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22HÓC DỊ VẬT ĐƯỜNG THỞ: 4 PHÚT \\\x22VÀNG NGỌC\\\x22 QUYẾT ĐỊNH SỰ SỐNG. KỸ NĂNG MÀ MỌI BỐ MẸ PHẢI THUỘC LÒNG\x22,\x22imageUrl\x22:\x22https:\/\/www.wikihow.com\/images\/thumb\/7\/77\/Perform-the-Heimlich-Maneuver-Step-13.jpg\/aid122029-v4-728px-Perform-the-Heimlich-Maneuver-Step-13.jpg.webp\x22,\x22content\x22:\x22\x3cp\x3e\x3cem style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eĐây là hướng dẫn sơ cứu cho nhân viên y tế và nhân viên hỗ trợ, yêu cầu người thực hiện phải được huấn luyện chuyên môn thành thục trên mô hình, vì thủ thuật có thể gây các tổn thương lên cơ thể bệnh nhân.\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\\t\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTai nạn hóc dị vật thường xảy ra đột ngột trong tích tắc: Một miếng thạch, một hạt nhãn, hay một mảnh đồ chơi nhỏ... lọt vào đường thở.\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eLúc này, bố mẹ không có thời gian để chờ xe cấp cứu hay chạy đến bệnh viện.\x26nbsp;\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eSự sống của con nằm trọn trong tay người đang ở bên cạnh con lúc đó.\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Bởi vì não bộ chỉ chịu đựng được tình trạng thiếu oxy trong khoảng 4-6 phút trước khi bị tổn thương vĩnh viễn.\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eBài viết này là \\\x22cẩm nang cứu mạng\\\x22 giúp bố mẹ bình tĩnh nhận diện và thực hiện đúng thao tác sơ cứu.\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\x3cspan style=\\\x22color: rgb\(0, 112, 192\);\\\x22\x3e1. PHÒNG BỆNH HƠN CHỮA BỆNH: NHẬN DIỆN \\\x22KẺ THÙ\\\x22\x3c\/span\x3e\x3c\/h3\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eHóc dị vật đường thở thường xảy ra nhất ở trẻ từ 6 tháng đến 3 tuổi – độ tuổi thích khám phá mọi thứ bằng miệng.\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDanh sách đen các dị vật nguy hiểm:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eThực phẩm:\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Các loại hạt \(lạc, óc chó, hạnh nhân\), thạch rau câu \(cực kỳ nguy hiểm vì trơn và dễ bít kín đường thở\), kẹo cứng, quả tròn nhỏ \(nho, nhãn, chôm chôm - cần cắt nhỏ hoặc bỏ hạt\), xúc xích \(cần cắt dọc\), bỏng ngô.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eĐồ vật:\x3c\/strong\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x26nbsp;Đồng xu, pin cúc áo \(nguy hiểm kép vì gây bỏng thực quản\), mảnh lego nhỏ, cúc áo, nắp bút.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eThói quen xấu cần bỏ ngay:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eÉp trẻ ăn khi đang khóc, đang ho.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eCho trẻ vừa ăn vừa chạy nhảy, nô đùa.\x3c\/span\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eThói quen \\\x22ném\\\x22 thức ăn vào miệng \(lạc, bỏng ngô\) khi đang cười đùa.\x3c\/span\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e\x3cspan style=\\\x22color: rgb\(0, 112, 192\);\\\x22\x3e2. DẤU HIỆU NHẬN BIẾT: KHI NÀO LÀ HÓC THẬT SỰ?\x3c\/span\x3e\x3c\/h3\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3e\x3cimg src=\\\x22https:\/\/www.wikihow.com\/images\/thumb\/b\/b6\/Perform-the-Heimlich-Maneuver-Step-1-Version-2.jpg\/v4-460px-Perform-the-Heimlich-Maneuver-Step-1-Version-2.jpg\\\x22 alt=\\\x22Dấu hiệu nhận biết hóc dị vật\\\x22\x3e\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cspan style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3ePhản xạ ho là cách tự nhiên tốt nhất để tống dị vật ra ngoài. Tuy nhiên, cần phân biệt hai tình huống:\x3c\/span\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eTình huống 1: Tắc nghẽn một phần \(Vẫn còn khe hở để thở\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong style=\\\x22color: rgb\(51, 51, 51\);\\\x22\x3eDấu hiệu:\x3c\/strong\x3e\x3cspan
