/\/www.healthychildren.org\/English\/ages-stages\/toddler\/nutrition\/Pages\/Feeding-and-Nutrition-Your-One-Year-Old.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/ages-stages\/toddler\/nutrition\/Pages\/Feeding-and-Nutrition-Your-One-Year-Old.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGalloway AT, et al. – 2006\x3c\/strong\x3e \\\x22Finish your soup\\\x22: Counterproductive effects of pressuring children to eat \/ \\\x22Húp hết súp đi\\\x22: Tác dụng ngược của việc ép trẻ ăn \x3cem\x3eNguồn: PubMed \/ Appetite Journal\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/16386818\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/16386818\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2005\x3c\/strong\x3e Guiding principles for feeding non-breastfed children 6-24 months of age \/ Các nguyên tắc hướng dẫn nuôi dưỡng trẻ 6-24 tháng tuổi không bú mẹ \(Bao gồm Nguyên tắc ăn bổ sung đáp ứng\) \x3cem\x3eNguồn: WHO\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/publications\/i\/item\/9241593431\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/publications\/i\/item\/9241593431\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMarsh S, et al. – 2013\x3c\/strong\x3e The association between screen time and dietary intake in children and adolescents \/ Mối liên quan giữa thời gian sử dụng thiết bị điện tử và lượng thức ăn tiêu thụ ở trẻ em \x3cem\x3eNguồn: PubMed\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/24156644\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/24156644\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBoston Children’s Hospital – 2023\x3c\/strong\x3e Avoidant Restrictive Food Intake Disorder \(ARFID\) \/ Rối loạn nạp thức ăn hạn chế\/né tránh \(ARFID\) \x3cem\x3eNguồn: Boston Children’s Hospital\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.childrenshospital.org\/conditions\/arfid\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.childrenshospital.org\/conditions\/arfid\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBrown KH, et al. – 2002\x3c\/strong\x3e Effect of zinc supplementation on children\x27s growth and dietary intake \/ Tác dụng của việc bổ sung kẽm đối với sự tăng trưởng và khẩu phần ăn của trẻ \x3cem\x3eNguồn: PubMed \/ American Journal of Clinical Nutrition\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/12036819\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/12036819\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBirch LL, et al. – 2003\x3c\/strong\x3e Learning to eat: behavioral and psychological aspects \/ Học ăn: Các khía cạnh hành vi và tâm lý \x3cem\x3eNguồn: PubMed \/ Proceedings of the Nutrition Society\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/14692596\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/14692596\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T12:44:05.061Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251207105353\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22SƠ CỨU BỎNG Ở TRẺ EM: 15 PHÚT \\\x22VÀNG\\\x22 QUYẾT ĐỊNH MỨC ĐỘ TỔN THƯƠNG. NHỮNG VIỆC CẦN LÀM NGAY VÀ ĐIỀU CẤM KỴ\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1awgj0rVyU9QRHnXXdHXfA4r0whgUTKgs\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3eTai nạn bỏng \(nước sôi, lửa, pô xe máy, điện, hóa chất\) là một trong những tai nạn sinh hoạt phổ biến và đau đớn nhất ở trẻ nhỏ. Khi tai nạn xảy ra, sự hoảng loạn của người lớn thường dẫn đến những hành động sơ cứu sai lầm \(như bôi kem đánh răng, mỡ trăn...\) khiến vết bỏng sâu thêm và dễ nhiễm trùng.\x3c\/p\x3e\x3cp\x3eHãy ghi nhớ nguyên tắc vàng này: \x3cstrong\x3eLÀM MÁT NHANH - GIỮ SẠCH - ĐẾN VIỆN SỚM.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1WgGFkp9ZOjQUJsZvWxmIgYriQD_bc7Ub\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3ch3\x3e1. QUY TRÌNH SƠ CỨU CHUẨN Y KHOA \(5 BƯỚC SỐNG CÒN\)\x3c\/h3\x3e\x3cp\x3eMục tiêu tối thượng của sơ cứu bỏng là \x3cstrong\x3ehạ nhiệt độ ngay lập tức\x3c\/strong\x3e để ngăn chặn nhiệt tiếp tục làm tổn thương các lớp da sâu hơn.\x3c\/p\x3e\x3ch4\x3eBƯỚC 1: Loại bỏ tác nhân gây bỏng \(Tích tắc đầu tiên\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBỏng nước sôi\/lửa:\x3c\/strong\x3e Đưa trẻ ra khỏi nguồn nhiệt ngay lập tức.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBỏng điện:\x3c\/strong\x3e Ngắt nguồn điện \(cầu dao\) hoặc dùng vật cách điện \(gậy gỗ khô\) để tách trẻ ra khỏi nguồn điện. Tuyệt đối không chạm trực tiếp vào người trẻ khi chưa ngắt điện.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBỏng hóa chất:\x3c\/strong\x3e Cởi bỏ ngay quần áo dính hóa chất.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eBƯỚC 2: Làm mát vết bỏng bằng NƯỚC SẠCH \(Quan trọng nhất!\)\x3c\/h4\x3e\x3cp\x3eĐây là bước quyết định 80% hiệu quả sơ cứu.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHành động:\x3c\/strong\x3e Ngâm ngay vùng da bị bỏng vào nước mát sạch hoặc để dưới vòi nước chảy nhẹ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLoại nước:\x3c\/strong\x3e Tốt nhất là nước máy sạch, nước đun sôi để nguội. Nhiệt độ nước khoảng 16-20°C \(mát như nước trong bể chứa\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThời gian:\x3c\/strong\x3e Ngâm liên tục từ \x3cstrong\x3e15 - 30 phút\x3c\/strong\x3e, hoặc cho đến khi trẻ thấy đỡ đau rát. Đừng ngâm quá lâu \(trên 45 phút\) để tránh trẻ bị hạ thân nhiệt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLưu ý với quần áo:\x3c\/strong\x3e Nếu quần áo vùng bị bỏng KHÔNG dính chặt vào da, hãy cởi bỏ nhẹ nhàng khi đang ngâm nước. Nếu quần áo đã dính chặt vào vết thương, \x3cstrong\x3eTUYỆT ĐỐI KHÔNG ĐƯỢC TỰ Ý LỘT BỎ\x3c\/strong\x3e vì sẽ làm lột cả mảng da của trẻ. Hãy dùng kéo cắt phần vải xung quanh và để nguyên phần dính lại.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eBƯỚC 3: Tháo bỏ vật trang sức\x3c\/h4\x3e\x3cp\x3eTháo ngay đồng hồ, vòng tay, nhẫn, dây chuyền ở vùng bị bỏng hoặc các vùng lân cận trước khi vùng đó bị sưng nề. Nếu để muộn, khi tay chân sưng lên sẽ rất khó tháo, gây chèn ép mạch máu.\x3c\/p\x3e\x3ch4\x3eBƯỚC 4: Che phủ vết bỏng\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSau khi ngâm nước, dùng gạc y tế sạch hoặc khăn vải sạch, mịn, không có lông tơ để che nhẹ lên vết bỏng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMục đích:\x3c\/strong\x3e Ngăn ngừa bụi bẩn, vi khuẩn xâm nhập và giảm đau do gió thổi vào.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eBƯỚC 5: Đưa trẻ đến cơ sở y tế\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCho trẻ uống thêm nước hoặc Oresol để bù dịch.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNhanh chóng đưa trẻ đến bệnh viện gần nhất để bác sĩ đánh giá mức độ và xử lý tiếp theo.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e2. NHỮNG ĐIỀU CẤM KỴ TUYỆT ĐỐI \(SAI LẦM THƯỜNG GẶP\)\x3c\/h3\x3e\x3cp\x3eNhững hành động này không những vô tác dụng mà còn làm tình trạng tồi tệ hơn:\x3c\/p\x3e\x3cp\x3e❌ \x3cstrong\x3eKHÔNG ngâm vào nước ĐÁ LẠNH hoặc chườm đá cục trực tiếp\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLý do:\x3c\/em\x3e Sự thay đổi nhiệt độ quá đột ngột từ nóng sang quá lạnh sẽ gây \\\x22bỏng lạnh\\\x22 kép, làm mạch máu co thắt mạnh, khiến tổn thương hoại tử sâu hơn và lan rộng hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e❌ \x3cstrong\x3eKHÔNG bôi bất cứ thứ gì \\\x22lạ\\\x22 lên vết bỏng khi chưa có chỉ định y khoa\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eDanh sách cấm:\x3c\/em\x3e Kem đánh răng, mỡ trăn, nước mắm, lòng trắng trứng, nhựa chuối, thuốc lá, các loại thuốc mỡ không rõ nguồn gốc...\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHậu quả:\x3c\/em\x3e Các chất này không có tác dụng làm mát, ngược lại còn giữ nhiệt lại, làm tăng nguy cơ nhiễm trùng nghiêm trọng và gây khó khăn cho bác sĩ khi cần làm sạch vết thương sau đó.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e❌ \x3cstrong\x3eKHÔNG tự ý chọc vỡ các nốt phỏng nước \(bọng nước\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLý do:\x3c\/em\x3e Lớp da của nốt phỏng là một \\\x22tấm băng gạc sinh học\\\x22 tự nhiên hoàn hảo nhất để bảo vệ vùng da non bên dưới khỏi vi khuẩn. Chọc vỡ nó là mở cửa cho vi khuẩn xâm nhập, gây nhiễm trùng và làm vết thương lâu lành, dễ để lại sẹo.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. KHI NÀO CẦN ĐI CẤP CỨU NGAY LẬP TỨC?\x3c\/h3\x3e\x3cp\x3eTất cả các trường hợp bỏng ở trẻ em đều nên được bác sĩ thăm khám. Tuy nhiên, cần gọi 115 hoặc đưa đi cấp cứu khẩn cấp nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVết bỏng có diện tích rộng \(lớn hơn kích thước một bàn tay của trẻ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBỏng ở các vị trí nguy hiểm: Vùng mặt, mắt, cổ, bàn tay, bàn chân, vùng kín \(sinh dục, hậu môn\) hoặc các vùng khớp vận động.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBỏng sâu: Da vùng bỏng chuyển màu trắng bệch, xám xịt hoặc cháy đen, không còn cảm giác đau \(do dây thần kinh đã bị hủy hoại\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBỏng do điện hoặc hóa chất.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ có dấu hiệu sốc: Lơ mơ, vật vã, thở nhanh nông, tay chân lạnh, mạch nhanh yếu.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Bình tĩnh và làm đúng ngay từ những phút đầu tiên chính là chìa khóa để giảm thiểu nỗi đau và di chứng cho con. Hãy ghi nhớ quy trình: \x3cstrong\x3eNước mát sạch - 15 phút - Không bôi linh tinh\x3c\/strong\x3e. Chúc các bé luôn an toàn!\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2023\x3c\/strong\x3e Burns: Key Facts \/ Bỏng: Những thông tin quan trọng \x3cem\x3eNguồn: World Health Organization\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/news-room\/fact-sheets\/detail\/burns\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/news-room\/fact-sheets\/detail\/burns\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2024\x3c\/strong\x3e Burns: First aid \/ Bỏng: Sơ cứu ban đầu \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/first-aid\/first-aid-burns\/basics\/art-20056649\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/first-aid\/first-aid-burns\/basics\/art-20056649\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2022\x3c\/strong\x3e First Aid for Burns: Parent FAQs \/ Sơ cứu bỏng: Những câu hỏi thường gặp của cha mẹ \x3cem\x3eNguồn: HealthyChildren.org \(AAP 3-burns\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJohns Hopkins Medicine – 2022\x3c\/strong\x3e Burns in Children \/ Bỏng ở trẻ em \x3cem\x3eNguồn: Johns Hopkins Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/burns\/burns-in-children\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/burns\/burns-in-children\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCuttle L, et al. – 2008\x3c\/strong\x3e The optimal duration and delay of first aid treatment for deep partial thickness burn injuries \/ Thời gian tối ưu và sự chậm trễ trong sơ cứu vết bỏng sâu bán phần \(Nghiên cứu về thời gian làm mát\) \x3cem\x3eNguồn: PubMed \/ Burns\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/19821151\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/19821151\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThe Royal Children\x27s Hospital Melbourne – 2023\x3c\/strong\x3e Clinical Practice Guidelines: Burns – Acute Management \/ Hướng dẫn thực hành lâm sàng: Quản lý cấp tính vết bỏng \x3cem\x3eNguồn: The Royal Children\x27s Hospital Melbourne\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.rch.org.au\/clinicalguide\/guideline_index\/Burns\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.rch.org.au\/clinicalguide\/guideline_index\/Burns\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBritish Red Cross – 2023\x3c\/strong\x3e First aid for burns \/ Sơ cứu khi bị bỏng \x3cem\x3eNguồn: British Red Cross\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.redcross.org.uk\/first-aid\/learn-first-aid\/burns\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.redcross.org.uk\/first-aid\/learn-first-aid\/burns\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJeschke MG, et al. – 2020\x3c\/strong\x3e Burn injury \/ Chấn thương bỏng \(Bài tổng quan chuyên sâu\) \x3cem\x3eNguồn: PubMed \/ Nature Reviews Disease Primers\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/32054846\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/32054846\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3ch2\x3e\x3cbr\x3e\x3c\/h2\x3e\x22,\x22date\x22:\x222025-12-07T12:41:16.113Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251026225706\x22,\x22department\x22:\x22Obstetrics_and_Gynecology\x22,\x22title\x22:\x22Khám thai định kỳ – Hành trình đồng hành cùng mẹ và bé đến ngày chào đời\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=10Xib-RR-C_2PP52MN4i8B6DQCAMSd20p\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eKhám thai định kỳ\x3c\/strong\x3e là chuỗi các buổi thăm khám được lên kế hoạch trong suốt thai kỳ nhằm theo dõi sức khỏe của mẹ và sự phát triển của thai nhi. Việc này giúp \x3cstrong\x3ephát hiện sớm các bất thường\x3c\/strong\x3e, đánh giá nguy cơ dị tật bẩm sinh, sàng lọc bệnh lý của mẹ bầu và đưa ra hướng xử trí kịp thời. Ngoài ra, bác sĩ sẽ tư vấn về \x3cstrong\x3edinh dưỡng, vận động, tăng cân thai kỳ\x3c\/strong\x3e, chăm sóc tinh thần và chuẩn bị cho quá trình sinh nở, giúp mẹ có một thai kỳ an toàn và khỏe mạnh.\x3c\/p\x3e\x3cp\x3eTheo khuyến cáo \(WHO\), một thai kỳ bình thường cần \x3cstrong\x3etối thiểu 8 lần khám thai định kỳ\x3c\/strong\x3e, và có thể tăng số lần khám nếu mẹ có bệnh lý nền hoặc thai kỳ nguy cơ cao.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1yWWFMtVvFTSDGcFP4tTkOCNE8NUxIrSK\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eMục đích của khám thai định kỳ\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eKhám thai không chỉ là kiểm tra thông thường mà là quá trình theo dõi toàn diện:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3e1. Theo dõi sự phát triển của thai nhi\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐo chiều dài đầu–mông, cân nặng ước tính, vòng đầu, đánh giá các chỉ số sinh học.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTheo dõi tăng trưởng của thai theo từng giai đoạn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ePhát hiện sớm chậm tăng trưởng, thiểu ối, đa ối, bất thường nhau thai.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e2. Sàng lọc dị tật bẩm sinh và bất thường nhiễm sắc thể\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐo độ mờ da gáy \(11–13 tuần 6 ngày\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSiêu âm hình thái \(18–22 tuần\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eXét nghiệm NIPT, Double test, Triple test tùy chỉ định.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTầm soát bất thường cấu trúc tim thai, não, cột sống, bụng…\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e3. Theo dõi sức khỏe và bệnh lý thai phụ\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐo huyết áp, cân nặng, chỉ số BMI và theo dõi \x3cstrong\x3etăng cân hợp lý\x3c\/strong\x3e cho từng tam cá nguyệt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTầm soát tiền sản giật, đái tháo đường thai kỳ, thiếu máu, viêm nhiễm phụ khoa.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKiểm tra protein niệu, xét nghiệm máu – nước tiểu định kỳ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTư vấn các triệu chứng bình thường và dấu hiệu nguy hiểm cần đi khám ngay.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e4. Tư vấn chăm sóc thai kỳ đúng cách\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHướng dẫn chế độ ăn uống, bổ sung vitamin \(sắt, canxi, DHA…\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTư thế ngủ, vận động an toàn, chăm sóc tâm lý.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChuẩn bị cho sinh: dấu hiệu chuyển dạ, lựa chọn phương pháp sinh, chuẩn bị hồ sơ \x26amp; đồ đi sinh.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e5. Lên kế hoạch theo dõi lâu dài với bác sĩ uy tín\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eMột bác sĩ theo dõi xuyên suốt giúp:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNắm rõ diễn tiến thai kỳ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCá nhân hóa kế hoạch chăm sóc.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHỗ trợ và đồng hành sát sao đến lúc sinh nở.\x3c\/li\x3e\x3c\/ol\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eQuy trình khám thai định kỳ\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eTại phòng khám phụ khoa, quy trình khám thai chuẩn thường bao gồm:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhai thác bệnh sử và triệu chứng hiện tại\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e Tiền sử bệnh lý, số lần mang thai, sinh mổ, sẩy thai hoặc bệnh nền.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhám tổng quát cho mẹ bầu\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐo huyết áp, nhịp tim, cân nặng, BMI.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐo chiều cao tử cung, vòng bụng từ tam cá nguyệt 2.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSiêu âm thai\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSiêu âm đầu dò hoặc bụng tùy giai đoạn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐánh giá tuổi thai, tim thai, bánh nhau, nước ối, tăng trưởng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eXét nghiệm định kỳ\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCông thức máu, nhóm máu, viêm gan B, HIV, giang mai.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eXét nghiệm nước tiểu, đường huyết.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSàng lọc theo mốc \(Double test, Triple test, NIPT, dung nạp glucose…\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x span\x3eKiểm tra hemoglobin, acid uric, chức năng thận – gan nếu cần.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e6. Tuần 30 – 32\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐánh giá tăng trưởng thai.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eXác định ngôi thai.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e7. Tuần 35 – 36\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTầm soát \x3cstrong\x3eStreptococcus nhóm B \(GBS\)\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTheo dõi tim thai, kiểm tra cổ tử cung.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3e8. Tuần 37 trở đi\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhám hằng tuần.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTheo dõi sát chuyển dạ, tim thai, nước ối.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eLập kế hoạch sinh phù hợp.\x3c\/li\x3e\x3c\/ol\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLưu ý quan trọng khi đi khám thai\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNhịn ăn 8–10 giờ trước test dung nạp đường \(OGTT\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eMang theo kết quả khám trước để bác sĩ theo dõi liên tục.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhông tự ý dùng thuốc – kể cả vitamin.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTheo dõi \x3cstrong\x3etăng cân thai kỳ hợp lý\x3c\/strong\x3e \(toàn thai kỳ 9–12,5 kg với BMI bình thường\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBáo ngay cho bác sĩ nếu có:\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eRa huyết âm đạo.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐau bụng từng cơn, đau lưng nhiều.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eThai máy yếu hoặc mất thai máy.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3ePhù nhiều, đau đầu, mờ mắt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSốt hoặc nôn ói kéo dài.\x3c\/li\x3e\x3c\/ol\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eTư vấn \x26amp; đồng hành cùng bác sĩ uy tín đến lúc sinh nở\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eTại phòng khám, mẹ bầu sẽ được:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTheo dõi \x3cstrong\x3eliên tục bởi một bác sĩ hoặc một ê-kíp cố định\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐược tư vấn cá nhân hóa theo từng tình trạng sức khỏe và tuổi thai.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHỗ trợ kết nối với bệnh viện sinh phù hợp trong những tuần cuối.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHướng dẫn chuẩn bị đồ đi sinh, hồ sơ sinh, các tình huống cần nhập viện.\x3c\/li\x3e\x3c\/ol\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2016\x3c\/strong\x3e WHO recommendations on antenatal care for a positive pregnancy experience \/ Khuyến nghị của WHO về chăm sóc trước sinh để có một thai kỳ tích cực \x3cem\x3eNguồn: WHO\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/publications\/i\/item\/9789241549912\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/publications\/i\/item\/9789241549912\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican College of Obstetrici -pregnancy\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.acog.org\/womens-health\/faqs\/nutrition-during-pregnancy\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute of Diabetes and Digestive and Kidney Diseases \(NIDDK\) – 2020\x3c\/strong\x3e Tests \x26amp; Diagnosis for Gestational Diabetes \/ Xét nghiệm và chẩn đoán đái tháo đường thai kỳ \x3cem\x3eNguồn: NIH \/ NIDDK\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.niddk.nih.gov\/health-information\/diabetes\/overview\/what-is-diabetes\/gestational\/tests-diagnosis\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.niddk.nih.gov\/health-information\/diabetes\/overview\/what-is-diabetes\/gestational\/tests-diagnosis\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJohns Hopkins Medicine – 2023\x3c\/strong\x3e High-Risk Pregnancy: What You Need to Know \/ Thai kỳ nguy cơ cao: Những điều bạn cần biết \x3cem\x3eNguồn: Johns Hopkins Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/staying-healthy-during-pregnancy\/high-risk-pregnancy-what-you-need-to-know\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.hopkinsmedicine.org\/health\/conditions-and-diseases\/staying-healthy-during-pregnancy\/high-risk-pregnancy-what-you-need-to-know\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRose NC, et al. – 2020\x3c\/strong\x3e Screening for Fetal Chromosomal Abnormalities: ACOG Practice Bulletin, Number 226 \/ Sàng lọc các bất thường nhiễm sắc thể thai nhi: Bản tin thực hành ACOG số 226 \(Liên quan NIPT\/Double test\) \x3cem\x3eNguồn: PubMed \/ Obstetrics \x26amp; Gynecology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/32925617\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/32925617\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRadiological Society of North America \(RSNA\) – 2023\x3c\/strong\x3e Obstetric Ultrasound \/ Siêu âm sản khoa \x3cem\x3eNguồn: RadiologyInfo.org \(ACR \x26amp; RSNA\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.radiologyinfo.org\/en\/info\/obstetricus\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.radiologyinfo.org\/en\/info\/obstetricus\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T12:29:40.285Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251201085933\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22SỐT XUẤT HUYẾT: \\\x22CÁI BẪY\\\x22 NGÀY THỨ 4 VÀ NHỮNG DẤU HIỆU CẢNH BÁO SỐC\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1Vk49J_vvpZLmiIBL68au6yTc05vQLbzk\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eSốt xuất huyết \(SXH\) không đáng sợ nếu biết cách theo dõi. Nhưng nó sẽ trở thành \\\x22sát thủ\\\x22 nếu cha mẹ chủ quan. Đặc điểm nguy hiểm nhất của SXH là bệnh thường trở nặng đúng vào lúc... con vừa hết sốt.\x3c\/p\x3e\x3cp\x3eHãy cùng bác sĩ \\\x22giải phẫu\\\x22 diễn biến căn bệnh này để biết khi nào con bạn an toàn, khi nào cần nhập viện khẩn cấp.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eGIAI ĐOẠN 1: KHỞI PHÁT \(Ngày 1 - Ngày 3\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cem\x3eGiai đoạn này triệu chứng rầm rộ nhưng thường ít nguy hiểm đến tính mạng.\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3e🌡️ Dấu hiệu nhận biết:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSốt cao đột ngột:\x3c\/strong\x3e Sốt \\\x22đùng đùng\\\x22 39-40 độ C, uống thuốc hạ sốt nhưng rất khó hạ hoặc hạ xong lại sốt lại ngay.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐau nhức dữ dội:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐau hai hốc mắt \(đặc trưng\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐau nhức cơ khớp \(cảm giác như muốn vỡ cơ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐau đầu vùng trán.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/www.uptodate.com\/services\/app\/contents\/graphic\/view\/ID\/97567\/Tourniquettest.jpg\\\x22\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDấu hiệu trên da:\x3c\/strong\x3e Da xung huyết \(đỏ ửng\), có thể xuất hiện vài chấm xuất huyết nhỏ dưới da hoặc chảy máu cam nhẹ.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThủ phạm:\x3c\/strong\x3e Bệnh lây truyền qua vết đốt của muỗi vằn \x3cem\x3eAedes aegypti\x3c\/em\x3e.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1jrWTk4zwALnFLq4zpeFMdP8rn5Wh6QeY\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cem\x3e\(Hình ảnh nhận diện \\\x22kẻ thù\\\x22: Muỗi vằn Aedes aegypti với các khoang trắng đen rõ rệt trên thân và chân, thường đốt vào ban ngày\).\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3e👉 Lời khuyên bác sĩ:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCho trẻ uống thuốc hạ sốt \x3cstrong\x3eParacetamol\x3c\/strong\x3e \(đơn chất\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTUYỆT ĐỐI KHÔNG\x3c\/strong\x3e dùng Aspirin hay Ibuprofen \(vì gây nguy cơ chảy máu dạ dày nghiêm trọng trong SXH\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBù nước tích cực \(Oresol, nước dừa, nước cam\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eGIAI ĐOẠN 2: NGUY HIỂM \(Ngày 3 - Ngày 7\) - 🚨 CẦN CẢNH GIÁC CAO ĐỘ\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cem\x3eĐây là \\\x22CÁI BẪY\\\x22 chết người. Phụ huynh thấy con hết sốt, tươi tỉnh hơn thì nghĩ là con đã khỏi. NHƯNG KHÔNG!\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eTại sao giai đoạn này nguy hiểm?\x3c\/strong\x3e Lúc này, virus tấn công làm tăng tính thấm thành mạch. Huyết tương \(phần nước của máu\) bị thoát ra khỏi lòng mạch máu, tràn vào bụng, phổi.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHậu quả 1: Máu bị cô đặc -\x26gt; Dễ gây sốc.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHậu quả 2: Tiểu cầu giảm mạnh -\x26gt; Dễ gây xuất huyết ồ ạt không cầm được.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e🚨 KHI NÀO CẦN NHẬP VIỆN NGAY LẬP TỨC? \(DẤU HIỆU CẢNH BÁO\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eBố mẹ cần đưa con đi cấp cứu ngay nếu thấy \x3cstrong\x3eDÙ CHỈ 1\x3c\/strong\x3e trong các dấu hiệu sau \(thường xuất hiện từ ngày thứ 3 đến ngày thứ 6\):\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e1. Đau bụng vùng gan\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBé kêu đau bụng nhiều, đặc biệt là đau ở vùng hạ sườn phải \(vùng gan\) hoặc đau âm ỉ liên tục toàn bụng. Đừng nhầm lẫn với đau bụng đi ngoài.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e2. Nôn ói liên tục\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBé nôn nhiều \(trên 3 lần trong 1 giờ hoặc trên 4 lần trong 6 giờ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNôn ngay cả khi không ăn uống gì.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e3. Xuất huyết bất thường \(Chảy máu\)\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChảy máu cam nặng, nhét bông không cầm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChảy máu chân răng ồ ạt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNôn ra máu \(dịch nôn màu nâu hoặc đỏ tươi\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐi cầu phân đen \(như bã cà phê\) hoặc có máu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eỞ bé gái tuổi dậy thì: Ra kinh nguyệt bất thường \(nhiều và kéo dài\) dù chưa đến ngày.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e4. Dấu hiệu Tiền sốc \(Sắp trụy tim mạch\)\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTinh thần:\x3c\/strong\x3e Trẻ đang tỉnh táo bỗng trở nên lừ đừ, vật vã, hoảng hốt hoặc li bì khó đánh thức.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTay chân:\x3c\/strong\x3e Sờ thấy tay chân lạnh ẩm, nổi vân tím trên da \(dù trời không lạnh\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTiểu tiện:\x3c\/strong\x3e Bé đi tiểu ít hoặc không đi tiểu trong vòng 6 tiếng \(dấu hiệu thận bị thiếu nước nghiêm trọng\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eGIAI ĐOẠN 3: HỒI PHỤC \(Sau ngày 7\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cem\x3eSau khi vượt qua giai đoạn nguy hiểm, cơ thể bắt đầu tái hấp thu dịch.\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eDấu hiệu:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBé bắt đầu đi tiểu nhiều.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCó cảm giác thèm ăn trở lại.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrên da xuất hiện các mảng phát ban phục hồi \(vùng da đỏ xen kẽ vùng da hở trắng\), thường rất ngứa.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNhịp tim chậm lại và ổn định.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eBÁC SĨ DẶN DÒ: CHĂM SÓC TẠI NHÀ\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNếu bác sĩ cho bé theo dõi tại nhà \(độ 1, chưa có dấu hiệu cảnh báo\), mẹ cần nhớ:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDinh dưỡng:\x3c\/strong\x3e Ăn lỏng, mềm \(cháo, súp\). Tránh thức ăn có màu đỏ\/nâu \(tiết canh, sô cô la, nước xá xị\) để không bị nhầm lẫn với xuất huyết tiêu hóa nếu bé bị nôn.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBù nước là chìa khóa:\x3c\/strong\x3e Uống Oresol đúng cách \(pha đúng tỷ lệ\). Nước dừa, nước cháo muối là những lựa chọn tuyệt vời.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHạn chế vận động:\x3c\/strong\x3e Bắt bé nghỉ ngơi tuyệt đối, hạn chế chạy nhảy để tránh va đập gây chảy máu nội tạng \(do tiểu cầu đang thấp\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTái khám mỗi ngày:\x3c\/strong\x3e Sốt xuất huyết diễn biến theo giờ. Hãy tuân thủ lịch hẹn xét nghiệm máu \(công thức máu\) mỗi ngày để theo dõi chỉ số tiểu cầu và cô đặc máu \(Hct\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e👉 \x3cstrong\x3eSốt xuất huyết không có thuốc đặc trị, chỉ có theo dõi đúng cách mới cứu được mạng sống của trẻ. Hãy chia sẻ bài viết này để các bậc phụ huynh khác cùng cảnh giác!\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eTẠI SAO BÁC SĨ BẮT \\\x22XÉT NGHIỆM MÁU\\\x22 THƯỜNG XUYÊN KHI CON BỊ SỐT XUẤT HUYẾT?\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNhiều bố mẹ thắc mắc: \x3cem\x3e\\\x22Biết con bị Sốt xuất huyết rồi, sao ngày nào cũng phải đè ra lấy máu? Xót con quá!\\\x22\x3c\/em\x3e Thực tế, Sốt xuất huyết diễn biến \x3cstrong\x3etheo giờ\x3c\/strong\x3e. Xét nghiệm hôm nay tốt không có nghĩa là ngày mai an toàn.\x3c\/p\x3e\x3cp\x3eDưới đây là \\\x22bản đồ\\\x22 các chỉ số bác sĩ đang theo dõi để bảo vệ con bạn:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eNHÓM XÉT NGHIỆM CHẨN ĐOÁN \(Để biết: \\\x22Có phải SXH không?\\\x22\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eThường chỉ làm 1 lần vào những ngày đầu tiên.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTest nhanh NS1 Ag \(Kháng nguyên\):\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eThời điểm:\x3c\/em\x3e Ngày 1 đến Ngày 3 của sốt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eÝ nghĩa:\x3c\/em\x3e Tìm \\\x22xác\\\x22 virus trong máu. Giúp xác định sớm bé có nhiễm virus Dengue hay không.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTest kháng thể \(IgM\/IgG\):\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eThời điểm:\x3c\/em\x3e Từ ngày thứ 4 - 5 trở đi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eÝ nghĩa:\x3c\/em\x3e Tìm \\\x22lính bảo vệ\\\x22 do cơ thể sinh ra để chống lại virus. Nếu làm quá sớm \(khi cơ thể chưa kịp sinh kháng thể\) thì kết quả sẽ âm tính giả.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eNHÓM XÉT NGHIỆM THEO DÕI \(Để biết: \\\x22Bệnh có trở nặng không?\\\x22\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eĐây là nhóm \x3cstrong\x3eQUAN TRỌNG NHẤT\x3c\/strong\x3e, cần làm hằng ngày \(thậm chí 4-6 tiếng\/lần nếu bệnh nặng\) từ ngày thứ 3 đến ngày thứ 7.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3eA. Tổng phân tích tế bào máu \(CBC\)\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eBác sĩ sẽ nhìn vào 2 chỉ số \\\x22sinh tử\\\x22:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTIỂU CẦU \(PLT\) - Xu hướng GIẢM là báo động\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTiểu cầu làm nhiệm vụ đông máu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBình thường: 150.000 - 400.000.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNguy hiểm:\x3c\/strong\x3e Khi tiểu cầu giảm nhanh \x3cstrong\x3edưới 100.000\x3c\/strong\x3e \(cần nhập viện\) hoặc \x3cstrong\x3edưới 50.000\x3c\/strong\x3e \(nguy cơ xuất huyết nội tạng cao\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDUNG TÍCH HỒNG CẦU \(HCT\) - Xu hướng TĂNG là nguy hiểm\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐây là chỉ số đánh giá độ \\\x22đặc\\\x22 của máu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhi thành mạch bị tổn thương, nước trong máu thoát ra ngoài -\x26gt; Máu bị cô đặc lại.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBáo động:\x3c\/strong\x3e Nếu Hct tăng cao so với chỉ số ban đầu \(ví dụ từ 35% lên 40-45%\) -\x26gt; Dấu hiệu của \x3cstrong\x3eSỐC\x3c\/strong\x3e \(trụy tim mạch\) do thoát huyết tương. Đây là lúc bác sĩ cần truyền dịch cấp cứu ngay lập tức.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3eB. Xét nghiệm sinh hóa khác\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMen gan \(AST\/ALT\):\x3c\/strong\x3e Virus Dengue thường tấn công gan, làm men gan tăng cao, gây đau vùng hạ sườn phải.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐiện giải đồ \(Na, K, Cl\):\x3c\/strong\x3e Kiểm tra xem bé có bị rối loạn điện giải do sốt cao, nôn ói hay không.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eHÌNH ẢNH HỌC \(Siêu âm \x26amp; X-quang\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eBác sĩ không chỉ nhìn chỉ số, mà còn \\\x22nhìn thấu\\\x22 bên trong:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSiêu âm ổ bụng \(Rất quan trọng\):\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDày thành túi mật:\x3c\/strong\x3e Đây là dấu hiệu sớm và điển hình của việc thoát huyết tương. Thành túi mật càng dày, nguy cơ sốc càng cao.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDịch ổ bụng \(Cổ trướng\):\x3c\/strong\x3e Kiểm tra xem nước từ máu có tràn vào bụng hay không.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGan to:\x3c\/strong\x3e Kiểm tra kích thước gan \(nguyên nhân gây đau bụng\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eX-quang phổi:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKiểm tra \x3cstrong\x3etràn dịch màng phổi\x3c\/strong\x3e \(nước tràn vào phổi gây khó thở\) - một biến chứng thường gặp trong giai đoạn nguy hiểm.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e📝 LỜI KHUYÊN DÀNH CHO BỐ MẸ\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐừng tự đọc kết quả:\x3c\/strong\x3e Các chỉ số máu thay đổi liên quan mật thiết với nhau \(Tiểu cầu giảm \x2b Hct tăng\). Chỉ nhìn một chỉ số đơn lẻ không nói lên được tình trạng bệnh.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTuân thủ lịch hẹn:\x3c\/strong\x3e Khi bác sĩ hẹn tái khám ngày hôm sau để xét nghiệm lại, \x3cstrong\x3eTUYỆT ĐỐI KHÔNG ĐƯỢC BỎ\x3c\/strong\x3e, dù thấy con đã bớt sốt.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLưu giữ hồ sơ:\x3c\/strong\x3e Giữ lại tất cả các tờ xét nghiệm từ ngày đầu tiên để bác sĩ so sánh tốc độ tăng\/giảm của các chỉ số.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eHãy đến phòng khám chuyên khoa Nhi để các bác sĩ khám và tư vấn \x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2009 \(Updated 2023\)\x3c\/strong\x3e Dengue: Guidelines for diagnosis, treatment, prevention and control \/ Sốt xuất huyết: Hướng dẫn chẩn đoán, điều trị, phòng ngừa và kiểm soát \(Tài liệu chuẩn về phân độ và dấu hiệu cảnh báo\) \x3cem\x3eNguồn: WHO\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/publications\/i\/item\/9789241547871\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/publications\/i\/item\/9789241547871\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSimmons CP, et al. – 2012\x3c\/strong\x3e Dengue \(Clinical Review\) \/ Tổng quan lâm sàng về bệnh Sốt xuất huyết \x3cem\x3eNguồn: PubMed \/ New England Journal of Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/22494122\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/22494122\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSrikiatkhachorn A, et al. – 2017\x3c\/strong\x3e Mechanisms of Plasma Leakage in Dengue Case Management \/ Cơ chế thoát huyết tương trong quản lý ca bệnh Sốt xuất huyết \x3cem\x3eNguồn: PubMed \/ Clinical Infectious Diseases\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25893796\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25893796\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2022\x3c\/strong\x3e Dengue fever: Symptoms \x26amp; causes \/ Sốt xuất huyết: Triệu chứng và nguyên nhân \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/diseases-conditions\/dengue-fever\/symptoms-causes\/syc-20353078\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/dengue-fever\/symptoms-causes\/syc-20353078\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLam PK, et al. – 2017\x3c\/strong\x3e Clinical and laboratory predictors of severe dengue during the febrile phase \/ Các yếu tố dự báo lâm sàng và xét nghiệm của sốt xuất huyết nặng trong giai đoạn sốt \x3cem\x3eNguồn: PubMed \/ Clinical Infectious Diseases\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28369654\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28369654\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePan American Health Organization \(PAHO\) – 2020\x3c\/strong\x3e Clinical Guidelines for the Diagnosis and Treatment of Dengue \/ Hướng dẫn lâm sàng chẩn đoán và điều trị sốt xuất huyết \(Nhấn mạnh giai đoạn hồi sức và dấu hiệu sốc\) \x3cem\x3eNguồn: PAHO \/ WHO\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.paho.org\/en\/documents\/guidelines-clinical-diagnosis-and-treatment-dengue-chikungunya-and-zika\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.paho.org\/en\/documents\/guidelines-clinical-diagnosis-and-treatment-dengue-chikungunya-and-zika\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCleveland Clinic – 2021\x3c\/strong\x3e Dengue Fever: Management and Treatment \/ Sốt xuất huyết: Quản lý và Điều trị \x3cem\x3eNguồn: Cleveland Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/my.clevelandclinic.org\/health\/diseases\/17753-dengue-fever\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/my.clevelandclinic.org\/health\/diseases\/17753-dengue-fever\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eFernando S, et al. – 2016\x3c\/strong\x3e Patterns of liver injury and clinical outcomes in dengue infection \/ Các mô hình tổn thương gan và kết quả lâm sàng trong nhiễm trùng sốt xuất huyết \x3cem\x3eNguồn: PubMed \/ Transactions of the Royal Society of Tropical Medicine and Hygiene\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/27352219\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/27352219\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMuller DA, et al. – 2017\x3c\/strong\x3e Clinical and laboratory diagnosis of dengue fever \/ Chẩn đoán lâm sàng và xét nghiệm bệnh sốt xuất huyết \x3cem\x3eNguồn: PubMed \/ The Journal of Infectious Diseases\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28266657\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28266657\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T12:24:56.340Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251202192043\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22CẢM CÚM THÔNG THƯỜNG HAY VIÊM PHỔI NGUY HIỂM? BÁC SĨ GIẢI MÃ LÝ DO TRẺ HO MÃI KHÔNG KHỎI\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1tCc4zEnS2qVoa6fbN4B41C7i5HWkOAc7\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3eHo, sốt, sổ mũi là \\\x22chuyện cơm bữa\\\x22 ở trẻ nhỏ, đặc biệt trong những thời điểm giao mùa. Hầu hết các trường hợp chỉ là viêm đường hô hấp trên nhẹ nhàng.\x3c\/p\x3e\x3cp\x3eTuy nhiên, nỗi lo lớn nhất của các bậc cha mẹ là: \\\x22Liệu con chỉ bị cảm cúm thông thường hay đã biến chứng sang viêm phổi?\\\x22. Và một câu hỏi gây đau đầu không kém: \\\x22Tại sao con đã uống hết thuốc, hết sốt mà vẫn ho sù sụ cả tháng trời?\\\x22.\x3c\/p\x3e\x3cp\x3eBài viết này sẽ giúp bố mẹ có cái nhìn rõ ràng để phân biệt mức độ bệnh và hiểu đúng về tiếng ho của con.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. HIỂU ĐÚNG VỀ \\\x22VỊ TRÍ ĐỊA LÝ\\\x22 CỦA HỆ HÔ HẤP\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eĐể phân biệt mức độ nguy hiểm, chúng ta cần biết bệnh đang xảy ra ở đâu. Trong y khoa, hệ hô hấp được chia làm hai phần, lấy nắp thanh quản làm ranh giới:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eViêm đường hô hấp trên \(Bệnh nhẹ, phổ biến\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVị trí:\x3c\/strong\x3e Bao gồm mũi, xoang, họng, amidan, thanh quản.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBản chất:\x3c\/strong\x3e Đây là \\\x22cửa ngõ\\\x22 đón nhận không khí nên rất dễ bị virus, vi khuẩn tấn công. Các bệnh thường gặp là cảm lạnh, cúm mùa, viêm họng, viêm amidan.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMức độ:\x3c\/strong\x3e Thường lành tính, ít gây suy hô hấp và có thể tự khỏi sau 5-7 ngày nếu chăm sóc tốt.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eViêm đường hô hấp dưới \(Bệnh nặng, cần cảnh giác\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVị trí:\x3c\/strong\x3e Bao gồm khí quản, phế quản và các phế nang \(lá phổi\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBản chất:\x3c\/strong\x3e Đây là khu vực \\\x22nhà máy\\\x22 trao đổi oxy. Khi khu vực này bị viêm nhiễm, khả năng cung cấp oxy cho cơ thể bị ảnh hưởng nghiêm trọng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMức độ:\x3c\/strong\x3e Nguy hiểm. Viêm phổi, viêm tiểu phế quản là những nguyên nhân hàng đầu gây nhập viện và tử vong ở trẻ nhỏ nếu không điều trị kịp thời.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e2. PHÂN BIỆT CẢM CÚM THÔNG THƯỜNG VÀ VIÊM PHỔI\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eRanh giới giữa hai tình trạng này đôi khi rất mong manh, đặc biệt là trong 1-2 ngày đầu. Tuy nhiên, bố mẹ có thể dựa vào các đặc điểm sau để nhận định tình hình:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNhóm 1: Dấu hiệu của Viêm đường hô hấp trên \(Cảm cúm thông thường\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTriệu chứng \\\x22phần đầu\\\x22:\x3c\/strong\x3e Nổi bật là hắt hơi, sổ mũi, nghẹt mũi, đau rát họng, khàn tiếng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHo:\x3c\/strong\x3e Thường là ho khan ban đầu, sau chuyển sang ho có đờm \(do dịch mũi chảy xuống họng\). Tiếng ho thường nông.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSốt:\x3c\/strong\x3e Có thể sốt nhẹ hoặc sốt cao \(trong bệnh cúm\), nhưng thường đáp ứng với thuốc hạ sốt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eToàn trạng:\x3c\/strong\x3e Trẻ có thể quấy khóc khi sốt, nhưng khi hạ sốt thì chơi đùa, tỉnh táo, ăn uống tạm được.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNhịp thở:\x3c\/strong\x3e Trẻ thở bình thường, không gắng sức.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNhóm 2: Dấu hiệu nghi ngờ Viêm phổi \(Viêm đường hô hấp dưới\)\x3c\/strong\x3e Nếu cảm cúm thông thường chủ yếu gây khó chịu ở vùng mũi họng, thì viêm phổi gây ra các triệu chứng toàn thân và hô hấp nặng nề hơn:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSốt cao liên tục:\x3c\/strong\x3e Sốt cao khó hạ, kéo dài trên 3 ngày.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHo sâu và nặng tiếng:\x3c\/strong\x3e Tiếng ho nghe sâu từ trong lồng ngực, ho liên tục làm trẻ kiệt sức, có thể ho ra đờm đặc màu xanh\/vàng \(dấu hiệu bội nhiễm vi khuẩn\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVẻ mặt nhiễm trùng:\x3c\/strong\x3e Trẻ trông mệt mỏi, lừ đừ, môi khô, lưỡi bẩn, mắt trũng, không muốn chơi đùa ngay cả khi đã hạ sốt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThay đổi nhịp thở \(Quan trọng nhất\):\x3c\/strong\x3e Xem chi tiết ở phần Dấu hiệu báo động.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e3. CÂU HỎI TRIỆU ĐÔ: \\\x22TẠI SAO CON ĐÃ HẾT SỐT NHƯNG VẪN HO MÃI KHÔNG KHỎI?\\\x22\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eRất nhiều phụ huynh đưa con đi khám lại vì lý do: \x3cem\x3e\\\x22Bác sĩ ơi, cháu hết sốt 2 tuần rồi mà sao vẫn ho sù sụ, đặc biệt là lúc đi ngủ và sáng sớm. Có phải bệnh chưa khỏi không?\\\x22\x3c\/em\x3e.\x3c\/p\x3e\x3cp\x3eCâu trả lời là: \x3cstrong\x3eTrong đa số trường hợp, ho kéo dài sau nhiễm virus là BÌNH THƯỜNG.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eTại sao lại như vậy?\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế \\\x22dọn dẹp chiến trường\\\x22:\x3c\/strong\x3e Sau cuộc chiến với virus, đường thở chứa nhiều \\\x22xác\\\x22 tế bào và đờm nhớt. Ho là phản xạ tự nhiên và cần thiết của cơ thể để tống khứ những thứ này ra ngoài, làm sạch phổi.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐường thở quá nhạy cảm \(Tính tăng phản ứng\):\x3c\/strong\x3e Lớp niêm mạc đường hô hấp sau khi bị viêm rất mỏng manh và nhạy cảm. Chỉ cần một kích thích nhỏ như không khí lạnh, bụi, hay thay đổi tư thế khi nằm xuống cũng đủ kích hoạt cơn ho. Tình trạng này có thể kéo dài 2-4 tuần, thậm chí lâu hơn ở trẻ có cơ địa dị ứng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHội chứng chảy dịch mũi sau:\x3c\/strong\x3e Dù đã hết nghẹt mũi, nhưng một lượng dịch nhỏ vẫn âm thầm chảy từ xoang mũi xuống thành sau họng, gây ngứa họng và kích thích ho, đặc biệt là khi trẻ nằm ngủ.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời khuyên của bác sĩ:\x3c\/strong\x3e Nếu trẻ vẫn ăn chơi bình thường, không sốt lại, không khó thở, thì bố mẹ hãy kiên nhẫn. Đừng tự ý mua kháng sinh hay thuốc ức chế ho quá mạnh \(trừ khi có chỉ định\) vì sẽ làm mất đi phản xạ bảo vệ của trẻ. Giữ ấm, vệ sinh mũi họng là biện pháp tốt nhất lúc này.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e4. DẤU HIỆU BÁO ĐỘNG: KHI NÀO CẦN ĐƯA TRẺ ĐI CẤP CỨU?\x3c\/h3\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1DeGCzzOyAxjx_7kdwN4zG7x4DnhyRxTA\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3eBố mẹ không cần là bác sĩ để chẩn đoán viêm phổi, nhưng cần biết các dấu hiệu cho thấy trẻ đang \x3cstrong\x3eSUY HÔ HẤP\x3c\/strong\x3e \(thiếu oxy\) để đưa đi viện ngay lập tức:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThở nhanh bất thường:\x3c\/strong\x3e Hãy đếm nhịp thở của trẻ trong 1 phút khi trẻ nằm yên, không sốt, không khóc.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ \x26lt; 2 tháng: \x26gt; 60 lần\/phút.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ 2 tháng - 12 tháng: \x26gt; 50 lần\/phút.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ 1 tuổi - 5 tuổi: \x26gt; 40 lần\/phút.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRút lõm lồng ngực:\x3c\/strong\x3e Khi trẻ hít vào, phần dưới lồng ngực \(chỗ giáp với bụng\) bị lõm sâu vào thay vì phồng lên. Đây là dấu hiệu trẻ đang phải gắng hết sức để thở.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCánh mũi phập phồng:\x3c\/strong\x3e Hai bên cánh mũi phồng lên xẹp xuống theo nhịp thở.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThở rên \(ở trẻ sơ sinh\):\x3c\/strong\x3e Tiếng \\\x22ẹ, ẹ\\\x22 phát ra ở thì thở ra.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTím tái:\x3c\/strong\x3e Môi, đầu ngón tay, ngón chân chuyển màu tím \(dấu hiệu rất nặng\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLi bì, khó đánh thức hoặc bỏ bú hoàn toàn.\x3c\/strong\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eHãy nhớ, viêm phổi ở trẻ nhỏ diễn biến rất nhanh. Sự quan sát tinh tế của bố mẹ chính là \\\x22liều thuốc\\\x22 đầu tiên bảo vệ con.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2022\x3c\/strong\x3e Pneumonia in children \/ Bệnh viêm phổi ở trẻ em \x3cem\x3eNguồn: WHO\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/news-room\/fact-sheets\/detail\/pneumonia\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/news-room\/fact-sheets\/detail\/pneumonia\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eShields MD, et al. – 2008\x3c\/strong\x3e BTS guidelines: Recommendations for the assessment and management of cough in children \/ Hướng dẫn BTS: Khuyến nghị về đánh giá và quản lý ho ở trẻ em \x3cem\x3eNguồn: PubMed \/ Thorax\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/18390912\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/18390912\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2020\x3c\/strong\x3e Coughs and Colds: Medicines or Home Remedies? \/ Ho và cảm lạnh: Dùng thuốc hay các biện pháp tại nhà? \x3cem\x3eNguồn: HealthyChildren.org \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/chest-lungs\/Pages\/Coughs-and-Colds-Medicines-or-Home-Remedies.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/chest-lungs\/Pages\/Coughs-and-Colds-Medicines-or-Home-Remedies.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChang AB, et al. – 2019\x3c\/strong\x3e Management of Children With Chronic Wet Cough and Protracted Bacterial Bronchitis \/ Quản lý trẻ bị ho đờm mãn tính và viêm phế quản do vi khuẩn kéo dài \x3cem\x3eNguồn: PubMed \/ CHEST Journal\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28498767\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28498767\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2021\x3c\/strong\x3e Pneumonia: Symptoms and causes \/ Viêm phổi: Triệu chứng và nguyên nhân \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/diseases-conditions\/pneumonia\/symptoms-causes\/syc-20354204\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/pneumonia\/symptoms-causes\/syc-20354204\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) – 2014\x3c\/strong\x3e Integrated Management of Childhood Illness \(IMCI\) chart booklet \/ Sổ tay hướng dẫn quản lý lồng ghép bệnh trẻ em \(IMCI\) - \(Nguồn gốc tiêu chuẩn đếm nhịp thở\) \x3cem\x3eNguồn: WHO\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/publications\/i\/item\/9789241506823\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/publications\/i\/item\/9789241506823\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRambaud-Althaus C, et al. – 2015\x3c\/strong\x3e Clinical features for diagnosis of pneumonia in children younger than 5 years: a systematic review and meta-analysis \/ Đặc điểm lâm sàng để chẩn đoán viêm phổi ở trẻ dưới 5 tuổi: Tổng quan hệ thống và phân tích tổng hợp \x3cem\x3eNguồn: PubMed \/ The Lancet Infectious Diseases\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25769269\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25769269\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGoldsobel AB, et al. – 2010\x3c\/strong\x3e Cough in the pediatric population \/ Ho ở đối tượng nhi khoa \x3cem\x3eNguồn: PubMed \/ The Journal of Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/19962133\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/19962133\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eEccles R. – 2005\x3c\/strong\x3e Understanding the symptoms of the common cold and influenza \/ Hiểu về các triệu chứng của cảm lạnh thông thường và cúm \x3cem\x3eNguồn: PubMed \/ The Lancet Infectious Diseases\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/16253889\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/16253889\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T12:20:43.511Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251202194302\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22TIÊU CHẢY CẤP DO ROTA VIRUS: TRẺ  NGUY KỊCH KHÔNG CHỈ VÌ  NHIỄM VIRUS, MÀ VÌ THIẾU NƯỚC. HƯỚNG DẪN BÙ NƯỚC CHUẨN Y KHOA TẠI NHÀ, VÀ CÁC DẤU HIỆU PHẢI ĐƯA TRẺ ĐẾN BỆNH VIỆN NGAY.\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1pq75c6zrEgdCm0mPp2z8lJ_1AeWyDMi7\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\\t\x3c\/p\x3e\x3cp\x3eTiêu chảy cấp là một trong những nguyên nhân hàng đầu khiến trẻ em phải nhập viện, thậm chí gây tử vong ở các nước đang phát triển. \\\x22Thủ phạm\\\x22 quen mặt nhất, chiếm đến 50-70% các ca tiêu chảy nặng ở trẻ dưới 5 tuổi, chính là \x3cstrong\x3eRota virus\x3c\/strong\x3e.\x3c\/p\x3e\x3cp\x3eĐiều quan trọng nhất bố mẹ cần khắc cốt ghi tâm: Bản thân virus Rota thường không gây tổn thương vĩnh viễn đường ruột, nhưng hậu quả của việc đi ngoài liên tục – là tình trạng \x3cstrong\x3eMẤT NƯỚC VÀ ĐIỆN GIẢI CẤP TÍNH\x3c\/strong\x3e – chính là nguyên nhân giết chết trẻ.\x3c\/p\x3e\x3cp\x3eBài viết này sẽ hướng dẫn bố mẹ cách nhận biết và quan trọng nhất là kỹ năng \\\x22vàng\\\x22 để cứu sống trẻ: Bù nước đúng cách tại nhà.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. TỔNG QUAN: ROTA VIRUS LÀ GÌ VÀ TẠI SAO NÓ ĐÁNG SỢ?\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eHiểu về Tiêu chảy cấp:\x3c\/strong\x3e Trẻ được xác định là tiêu chảy cấp khi đi ngoài phân lỏng hoặc toé nước từ \x3cstrong\x3e3 lần trở lên trong 24 giờ\x3c\/strong\x3e, và đợt bệnh kéo dài không quá 14 ngày.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eKẻ thù số 1 - Rota virus:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐặc điểm:\x3c\/strong\x3e Đây là loại virus có khả năng lây lan cực mạnh và tồn tại bền vững trong môi trường. Hầu hết trẻ em trên thế giới đều ít nhất một lần nhiễm Rota virus trước 5 tuổi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐường lây truyền:\x3c\/strong\x3e Lây qua đường \\\x22phân - miệng\\\x22. Trẻ chạm tay vào đồ chơi, sàn nhà có dính virus rồi đưa lên miệng. Người lớn vệ sinh cho trẻ bệnh không rửa tay kỹ cũng làm lây lan virus.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế gây bệnh:\x3c\/strong\x3e Virus tấn công và phá hủy lớp tế bào niêm mạc ruột non, làm mất khả năng hấp thu nước và chất dinh dưỡng. Đồng thời, ruột bị kích thích tăng tiết dịch, dẫn đến tình trạng đi ngoài phân toàn nước ồ ạt.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eVaccine phòng bệnh:\x3c\/strong\x3e Hiện nay đã có vaccine uống ngừa Rota virus rất hiệu quả, thường được chỉ định cho trẻ từ 6 tuần tuổi. Đây là biện pháp phòng ngừa chủ động tốt nhất để giảm tỷ lệ mắc bệnh nặng.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e2. NHẬN DIỆN \\\x22KỊCH BẢN\\\x22 ĐIỂN HÌNH CỦA NHIỄM ROTA VIRUS\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eKhác với tiêu chảy do vi khuẩn hoặc ngộ độc thực phẩm, nhiễm Rota virus thường có diễn biến khá đặc trưng qua hai giai đoạn:\x3c\/p\x3e\x3cp
