\x3e\x3cstrong\x3eGiai đoạn 1: Khởi phát với Nôn ói và Sốt \(1-2 ngày đầu\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ thường bắt đầu bằng việc nôn rất nhiều. Nôn thốc nôn tháo mọi thứ vừa ăn hoặc uống xong.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKèm theo sốt nhẹ hoặc sốt vừa.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eỞ giai đoạn này, trẻ có thể chưa đi ngoài phân lỏng, khiến bố mẹ dễ nhầm lẫn với các bệnh lý khác.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eGiai đoạn 2: Tiêu chảy ồ ạt \(Từ ngày thứ 2-3 trở đi\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhi nôn và sốt bắt đầu giảm thì tiêu chảy xuất hiện dữ dội.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eĐặc điểm phân:\x3c\/em\x3e Đi ngoài rất nhiều lần trong ngày \(có thể lên đến 10-20 lần\), phân lỏng hoàn toàn, màu vàng hoặc xanh, có thể có bọt, mùi rất tanh, nhưng thường KHÔNG CÓ MÁU.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTình trạng mất nước diễn ra rất nhanh trong giai đoạn này.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e3. KỸ NĂNG SỐNG CÒN: BÙ NƯỚC ĐÚNG CÁCH TẠI NHÀ\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNguyên tắc điều trị quan trọng nhất của tiêu chảy cấp là: \x3cstrong\x3eBù lại lượng nước và muối đã mất\x3c\/strong\x3e. Dung dịch chuẩn nhất được Tổ chức Y tế Thế giới \(WHO\) khuyến cáo là \x3cstrong\x3eOresol\x3c\/strong\x3e.\x3c\/p\x3e\x3cp\x3eTuy nhiên, pha Oresol sai cách còn nguy hiểm hơn là không uống. Dưới đây là những sai lầm chết người và cách làm đúng:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 1: Pha Oresol quá đặc hoặc quá loãng\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eSai lầm:\x3c\/em\x3e Nhiều bố mẹ nghĩ chia nhỏ gói Oresol để pha cho tiện, hoặc pha đặc một chút cho \\\x22chất lượng\\\x22.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHậu quả:\x3c\/em\x3e Pha quá đặc sẽ khiến áp lực thẩm thấu trong ruột tăng vọt, hút nước từ trong máu ra lòng ruột, làm tình trạng tiêu chảy và mất nước trầm trọng hơn, thậm chí gây ngộ độc muối, co giật, tổn thương não. Pha quá loãng thì không đủ bù điện giải.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eCÁCH LÀM ĐÚNG:\x3c\/em\x3e \x3cstrong\x3ePha nguyên một gói với đúng lượng nước quy định trên bao bì.\x3c\/strong\x3e \(Ví dụ: Gói quy định pha với 200ml thì phải đong chính xác 200ml nước đun sôi để nguội, gói pha 1 lít thì đong đúng 1 lít\). Tuyệt đối không \\\x22áng chừng\\\x22.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 2: Cách uống không đúng khi trẻ đang nôn\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eSai lầm:\x3c\/em\x3e Cho trẻ uống một lượng lớn Oresol ngay sau khi trẻ vừa nôn. Điều này sẽ kích thích dạ dày và làm trẻ nôn tiếp.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eCÁCH LÀM ĐÚNG:\x3c\/em\x3e Nếu trẻ nôn, hãy đợi khoảng 10 phút cho dạ dày ổn định. Sau đó, bắt đầu cho uống lại \x3cstrong\x3etừng thìa nhỏ một\x3c\/strong\x3e \(mỗi 1-2 phút một thìa\). Kiên nhẫn đút chậm rãi. Nếu sau vài giờ trẻ không nôn nữa thì mới cho uống ngụm lớn hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSAI LẦM 3: Dùng sai loại nước để bù\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eCác loại nước TUYỆT ĐỐI TRÁNH:\x3c\/em\x3e Nước ngọt có ga, nước trái cây công nghiệp, nước tăng lực, nước đường tự pha. Những loại này chứa quá nhiều đường, sẽ làm tăng áp lực thẩm thấu, khiến trẻ tiêu chảy nặng hơn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eCác loại nước thay thế tạm thời \(nếu trẻ từ chối Oresol\):\x3c\/em\x3e Nước cháo muối loãng, nước dừa tươi \(thêm một chút xíu muối\), nước lọc sạch. Tuy nhiên, Oresol vẫn là lựa chọn tối ưu nhất.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e4. DINH DƯỠNG KHI BỊ TIÊU CHẢY: ĐỪNG BẮT TRẺ NHỊN ĂN\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eQuan niệm cũ cho rằng trẻ bị tiêu chảy thì phải kiêng ăn, chỉ cho ăn cháo trắng muối là hoàn toàn sai lầm. Bắt trẻ nhịn ăn sẽ dẫn đến suy dinh dưỡng và chậm hồi phục niêm mạc ruột.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNguyên tắc ăn uống:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTiếp tục cho trẻ bú mẹ bình thường, thậm chí tăng số lần bú nếu trẻ muốn. Sữa mẹ là thức ăn và nguồn bù nước tuyệt vời.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVới trẻ đã ăn dặm: Cho ăn thức ăn mềm, lỏng, dễ tiêu hóa \(cháo thịt nạc, súp cà rốt, khoai tây nghiền\). Nấu chín kỹ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChia nhỏ bữa ăn thành nhiều lần trong ngày \(6-8 bữa\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTránh:\x3c\/strong\x3e Thức ăn nhiều dầu mỡ, quá ngọt, các loại rau sợi thô khó tiêu, nước béo của nước hầm xương.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e5. DẤU HIỆU BÁO ĐỘNG: KHI NÀO CẦN NHẬP VIỆN NGAY LẬP TỨC?\x3c\/h3\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1fy5_qc2m1hlqlL9auT2JO6meq3dO01EH\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3eBố mẹ cần đưa trẻ đến cơ sở y tế ngay nếu việc bù nước tại nhà thất bại hoặc trẻ có các dấu hiệu mất nước nặng sau:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTinh thần:\x3c\/strong\x3e Trẻ lừ đừ, li bì khó đánh thức, hoặc ngược lại là vật vã, kích thích, quấy khóc liên tục.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDấu hiệu khát:\x3c\/strong\x3e Trẻ khát nước dữ dội, uống háo hức \(với trẻ lớn\) hoặc không thể uống được, bú kém \(với trẻ nhỏ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMắt:\x3c\/strong\x3e Mắt trũng sâu, khô. Khi khóc không có nước mắt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMiệng và lưỡi:\x3c\/strong\x3e Môi khô nứt nẻ, lưỡi khô.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNước tiểu:\x3c\/strong\x3e Trẻ không đi tiểu trong vòng 6 tiếng. Nước tiểu rất ít và sẫm màu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDa:\x3c\/strong\x3e Nếp véo da mất chậm \(khi véo da bụng và thả ra, nếp da không phẳng lại ngay lập tức\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCác dấu hiệu nguy hiểm khác:\x3c\/strong\x3e Sốt cao không hạ, nôn liên tục mọi thứ ăn uống vào, hoặc đi ngoài phân có máu.\x3c\/li\x3e\x3c\/ol\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2024\x3c\/strong\x3e Rotavirus: Symptoms and causes \/ Rotavirus: Triệu chứng và nguyên nhân \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/diseases-conditions\/rotavirus\/symptoms-causes\/syc-20351300\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/rotavirus\/symptoms-causes\/syc-20351300\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2022\x3c\/strong\x3e Diarrhea in Children: What Parents Need to Know \/ Tiêu chảy ở trẻ em: Những điều cha mẹ cần biết \x3cem\x3eNguồn: HealthyChildren.org \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/abdominal\/Pages\/Diarrhea.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/abdominal\/Pages\/Diarrhea.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVega RM, et al. – 2023\x3c\/strong\x3e Dehydration In Children \/ Mất nước ở trẻ em \(Sinh lý bệnh và đánh giá lâm sàng\) \x3cem\x3eNguồn: PubMed \/ StatPearls\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/books\/NBK436022\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/books\/NBK436022\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLazzerini M, et al. – 2016\x3c\/strong\x3e Oral zinc for treating diarrhoea in children \/ Kẽm đường uống để điều trị tiêu chảy ở trẻ em \x3cem\x3eNguồn: PubMed \/ Cochrane Database of Systematic Reviews\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28026873\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28026873\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCleveland Clinic – 2022\x3c\/strong\x3e Dehydration: Signs, Symptoms, Causes \x26amp; Prevention \/ Mất nước: Dấu hiệu, triệu chứng, nguyên nhân và phòng ngừa \x3cem\x3eNguồn: Cleveland Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/my.clevelandclinic.org\/health\/treatments\/9013-dehydration\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/my.clevelandclinic.org\/health\/treatments\/9013-dehydration\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eFlorez ID, et al. – 2018\x3c\/strong\x3e Comparative effectiveness and safety of interventions for acute diarrhea and gastroenteritis in children \/ So sánh hiệu quả và độ an toàn của các biện pháp can thiệp đối với tiêu chảy cấp và viêm dạ dày ruột ở trẻ em \x3cem\x3eNguồn: PubMed \/ JAMA Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/30383112\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/30383112\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eIhekweazu C, et al. – 2017\x3c\/strong\x3e Management of Acute Diarrhea in Children \/ Quản lý tiêu chảy cấp ở trẻ em \x3cem\x3eNguồn: PubMed \/ American Family Physician\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.aafp.org\/pubs\/afp\/issues\/2017\/0401\/p453.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.aafp.org\/pubs\/afp\/issues\/2017\/0401\/p453.html\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T12:16:12.307Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251202220640\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22VIÊM TAI GIỮA TÁI ĐI TÁI LẠI Ở TRẺ: BÁC SĨ GIẢI MÃ NGUYÊN NHÂN VÀ HƯỚNG DẪN \\\x22CHẶN ĐỨNG\\\x22 TỪ GỐC\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1MDR_QaypzL1UULe1-e5J39DJaOYo8H5e\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\\tViêm tai giữa là một trong những bệnh lý nhiễm trùng phổ biến nhất ở trẻ nhỏ, đặc biệt là trẻ dưới 3 tuổi. Điều khiến các bậc phụ huynh \\\x22mất ăn mất ngủ\\\x22 không chỉ là những cơn đau tai khiến trẻ quấy khóc suốt đêm, mà là sự dai dẳng, tái đi tái lại nhiều lần trong năm của căn bệnh này.\x3c\/p\x3e\x3cp\x3eTại sao con cứ khỏi được vài tuần lại bị lại? Có phải do cơ địa? Và làm thế nào để phá vỡ vòng luẩn quẩn này? Chìa khóa nằm ở việc hiểu rõ cấu trúc tai-mũi-họng của trẻ và thực hành vệ sinh đúng cách.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. GIẢI PHẪU HỌC: TẠI SAO MŨI HỌNG BẨN LẠI GÂY ĐAU TAI?\x3c\/h3\x3e\x3cp\x3e\\tNhiều cha mẹ thắc mắc: \\\x22Con tôi bị sổ mũi, ho thôi mà, sao tự nhiên lại lan lên tai?\\\x22. Câu trả lời nằm ở một \\\x22đường hầm\\\x22 bí mật trong cơ thể: \x3cstrong\x3eVòi nhĩ \(Eustachian tube\).\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1ONcBKzuXt5CS7oCrkiADd5Hl2yktpTz1\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVòi nhĩ là gì?\x3c\/strong\x3e Đó là một ống nhỏ nối liền từ phía sau họng-mũi lên đến hòm tai giữa \(khu vực nằm sau màng nhĩ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChức năng:\x3c\/strong\x3e Vòi nhĩ đóng vai trò như một ống thoát nước và ống thông gió. Nó giúp cân bằng áp suất trong tai và dẫn lưu dịch tiết từ tai giữa xuống họng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eCơ chế gây bệnh:\x3c\/strong\x3e Khi trẻ bị viêm đường hô hấp trên \(cảm lạnh, cúm, viêm mũi họng\), vùng mũi họng chứa đầy vi khuẩn và dịch nhầy.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhu vực cửa vòi nhĩ ở họng bị sưng nề, bít tắc lại.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDịch trong tai giữa không thoát xuống được, bị ứ đọng lại.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVi khuẩn từ mũi họng \\\x22lội ngược dòng\\\x22 theo vòi nhĩ xâm nhập vào tai giữa.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDịch ứ đọng \x2b Vi khuẩn = Ổ viêm nhiễm, tạo mủ, gây áp lực lên màng nhĩ dẫn đến đau tai dữ dội.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eKết luận quan trọng:\x3c\/strong\x3e Hơn 90% các ca viêm tai giữa ở trẻ em có nguồn gốc từ viêm mũi họng. Do đó, \x3cstrong\x3e\\\x22Muốn tai sạch thì mũi phải thông\\\x22.\x3c\/strong\x3e\x3c\/blockquote\x3e\x3ch3\x3e2. VÌ SAO TRẺ EM DỄ BỊ TÁI PHÁT HƠN NGƯỜI LỚN?\x3c\/h3\x3e\x3cp\x3eKhông phải ngẫu nhiên mà trẻ nhỏ là đối tượng chính của căn bệnh này. Có 4 lý do chính khiến trẻ dễ mắc và dễ tái phát:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLý do 1: Cấu trúc Vòi nhĩ \\\x22bất lợi\\\x22 \(Quan trọng nhất\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eỞ người lớn:\x3c\/strong\x3e Vòi nhĩ dài, hẹp và nằm dốc nghiêng một góc khoảng 45 độ. Cấu trúc này giúp dịch chảy xuôi xuống dễ dàng và vi khuẩn khó leo ngược lên.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eỞ trẻ nhỏ \(đặc biệt dưới 3 tuổi\):\x3c\/strong\x3e Vòi nhĩ NHỎ HƠN, NGẮN HƠN và nằm NGANG HƠN \(gần như song song với mặt đất\). Điều này khiến vi khuẩn từ họng rất dễ dàng xâm nhập vào tai giữa, đặc biệt khi trẻ nằm bú bình.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLý do 2: Hệ thống V.A \(Adenoids\) quá phát\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eV.A là tổ chức lympho nằm ngay ở vòm mũi họng, gần cửa vòi nhĩ. Nhiệm vụ của nó là bắt giữ vi khuẩn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eỞ trẻ nhỏ, V.A hoạt động mạnh nên thường xuyên bị viêm và sưng to \(viêm V.A quá phát\). Khối V.A sưng to này sẽ chèn ép, bịt kín cửa vòi nhĩ, gây ứ dịch tai giữa kéo dài. Đây là nguyên nhân hàng đầu gây viêm tai giữa thanh dịch tái phát.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLý do 3: Hệ miễn dịch chưa hoàn thiện\x3c\/strong\x3e Trẻ nhỏ có sức đề kháng yếu, dễ bị các loại virus, vi khuẩn tấn công đường hô hấp liên tục, đặc biệt khi bắt đầu đi nhà trẻ. Mỗi lần cảm cúm là một lần nguy cơ viêm tai giữa rình rập.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLý do 4: Yếu tố môi trường và thói quen\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ bú bình ở tư thế nằm ngửa khiến sữa dễ trào lên mũi và vòi nhĩ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHít phải khói thuốc lá thụ động làm tê liệt hệ thống lông chuyển làm sạch đường hô hấp.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. HƯỚNG DẪN VỆ SINH MŨI HỌNG CHUẨN ĐỂ PHÒNG NGỪA TÁI PHÁT\x3c\/h3\x3e\x3cp\x3eNhư đã phân tích, giữ cho mũi họng sạch sẽ là biện pháp phòng ngừa viêm tai giữa hiệu quả nhất. Tuy nhiên, vệ sinh sai cách \(ví dụ: xịt rửa quá mạnh\) lại có thể vô tình đẩy vi khuẩn lên tai nhanh hơn.\x3c\/p\x3e\x3cp\x3eDưới đây là quy trình vệ sinh mũi họng đúng cách:\x3c\/p\x3e\x3ch4\x3eGIAI ĐOẠN 1: PHÒNG NGỪA HẰNG NGÀY \(Khi trẻ khỏe mạnh\)\x3c\/h4\x3e\x3cp\x3eMục tiêu là giữ ẩm niêm mạc và làm sạch bụi bẩn nhẹ nhàng.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDụng cụ:\x3c\/strong\x3e Nước muối sinh lý đẳng trương \(0.9%\) dạng nhỏ giọt hoặc dạng xịt phun sương nhẹ \(ưu tiên loại biển sâu giàu khoáng chất\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCách làm:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNhỏ\/xịt 1-2 giọt vào mỗi bên mũi sau khi trẻ đi học về hoặc sau khi tiếp xúc môi trường bụi bặm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDùng khăn giấy mềm lau sạch dịch chảy ra ở cửa mũi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLưu ý:\x3c\/em\x3e Không cần hút mũi hay rửa mũi sâu trong giai đoạn này vì có thể làm mất lớp nhầy bảo vệ tự nhiên của niêm mạc.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eGIAI ĐOẠN 2: XỬ LÝ TÍCH CỰC \(Khi trẻ chớm bị sổ mũi, nghẹt mũi\)\x3c\/h4\x3e\x3cp\x3eĐây là giai đoạn \\\x22vàng\\\x22 để ngăn chặn dịch nhầy lan lên tai.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eBước 1: Làm loãng dịch nhầy\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu dịch mũi đặc, quánh, trẻ nghẹt cứng: Cần dùng nước muối sinh lý \(có thể dùng loại ưu trương nhẹ nếu nghẹt nhiều theo chỉ định bác sĩ\) nhỏ nhiều giọt \(3-5 giọt\) vào mỗi bên để làm mềm gỉ mũi và loãng dịch. Đợi khoảng 2-3 phút.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eBước 2: Loại bỏ dịch nhầy \(Hút hoặc Rửa\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVới trẻ nhỏ chưa biết xì mũi:\x3c\/strong\x3e Dùng dụng cụ hút mũi \(dạng dây hoặc máy hút áp lực vừa phải\) để hút sạch dịch. Lưu ý không đưa đầu hút quá sâu gây tổn thương niêm mạc.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVới trẻ lớn đã biết xì mũi:\x3c\/strong\x3e Hướng dẫn trẻ xì mũi đúng cách: Bịt một bên mũi, xì nhẹ bên còn lại, sau đó đổi bên. \x3cem\x3eTuyệt đối không bịt cả hai bên mũi rồi xì mạnh\x3c\/em\x3e, vì áp lực này sẽ đẩy thẳng dịch mủ lên tai giữa.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eBước 3: Rửa mũi \(Nasal Irrigation - Chỉ thực hiện khi có nhiều dịch mủ\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐây là kỹ thuật dùng một lượng nước muối lớn để \\\x22quét\\\x22 sạch hốc mũi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTư thế an toàn:\x3c\/strong\x3e Cho trẻ ngồi hoặc đứng hơi cúi người về phía trước \(tuyệt đối không nằm ngửa\). Nghiêng đầu trẻ sang một bên.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThao tác:\x3c\/strong\x3e Bơm nước muối từ từ, nhẹ nhàng vào lỗ mũi phía trên để nước chảy qua lỗ mũi phía dưới. Lặp lại với bên kia.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eCảnh báo:\x3c\/em\x3e Không dùng áp lực quá mạnh \(ví dụ: dùng xi lanh bơm thật nhanh\) vì nguy cơ đẩy nước lên tai hoặc gây sặc vào phổi.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eVệ sinh họng:\x3c\/strong\x3e Với trẻ lớn, hướng dẫn trẻ súc miệng bằng nước muối sinh lý 2 lần\/ngày \(sáng, tối\) để làm sạch vùng họng miệng, giảm bớt vi khuẩn ở khu vực cửa vòi nhĩ.\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1354Wn72CHUtVoXSdyn6tjvqbGoBcYrxb\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3ch3\x3e4. KHI NÀO CẦN ĐƯA TRẺ ĐI KHÁM LẠI NGAY?\x3c\/h3\x3e\x3cp\x3ePhụ huynh cần tỉnh táo theo dõi và đưa trẻ đến gặp bác sĩ Tai Mũi Họng ngay nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ đang bị viêm mũi họng dường như đã đỡ, đột nhiên sốt cao trở lại.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ kêu đau tai, hoặc trẻ nhỏ chưa biết nói thì hay đưa tay dụi tai, bứt rứt, quấy khóc dữ dội về đêm.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCó dịch mủ \(vàng, xanh\) hoặc dịch lẫn máu chảy ra từ ống tai \(dấu hiệu màng nhĩ đã bị vỡ\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ có vẻ nghe kém, gọi không phản ứng nhanh nhạy như bình thường.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=19HGriMttShy8otGaf0ykIp5fvOTmtlRm\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Viêm tai giữa tái phát là một \\\x22cuộc chiến trường kỳ\\\x22 đòi hỏi sự kiên nhẫn của cha mẹ. Hiểu đúng cấu trúc cơ thể con và thực hành vệ sinh mũi họng đúng cách chính là vũ khí tốt nhất để bảo vệ thính lực và sức khỏe lâu dài cho trẻ.\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute on Deafness and Other Communication Disorders \(NIDCD\) – 2022\x3c\/strong\x3e Ear Infections in Children \/ Viêm tai ở trẻ em \x3cem\x3eNguồn: NIDCD \(NIH\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nidcd.nih.gov\/health\/ear-infections-children\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nidcd.nih.gov\/health\/ear-infections-children\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLieberthal AS, et al. – 2013 \(Reaffirmed 2022\)\x3c\/strong\x3e The Diagnosis and Management of Acute Otitis Media \/ Hướng dẫn thực hành lâm sàng: Chẩn đoán và quản lý viêm tai giữa cấp tính \x3cem\x3eNguồn: Pediatrics \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/publications.aap.org\/pediatrics\/article\/131\/3\/e964\/30912\/The-Diagnosis-and-Management-of-Acute-Otitis-Media\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/publications.aap.org\/pediatrics\/article\/131\/3\/e964\/30912\/The-Diagnosis-and-Management-of-Acute-Otitis-Media\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2023\x3c\/strong\x3e Ear infection \(middle ear\) \/ Viêm tai \(tai giữa\): Triệu chứng và nguyên nhân \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/diseases-conditions\/ear-infections\/symptoms-causes\/syc-20351616\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/ear-infections\/symptoms-causes\/syc-20351616\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSchilder AG, et al. – 2016\x3c\/strong\x3e Otitis media with effusion \/ Viêm tai giữa tiết dịch \(thanh dịch\) \x3cem\x3eNguồn: PubMed \/ Nature Reviews Disease Primers\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/27604644\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/27604644\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHealthyChildren.org – 2023\x3c\/strong\x3e Ear Infections in Babies \x26amp; Toddlers \/ Viêm tai ở trẻ sơ sinh và trẻ mới biết đi \x3cem\x3eNguồn: American Academy of Pediatrics \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/ear-nose-throat\/Pages\/Ear-Infection-Information.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/ear-nose-throat\/Pages\/Ear-Infection-Information.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJones LL, et al. – 2012\x3c\/strong\x3e Parental smoking and the risk of middle ear disease in children \/ Hút thuốc ở cha mẹ và nguy cơ mắc bệnh tai giữa ở trẻ em \x3cem\x3eNguồn: PubMed \/ Archives of Pediatrics \x26amp; Adolescent Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/22213749\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/22213749\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eUhari M, et al. – 1996\x3c\/strong\x3e A systematic review of the preventive methods for acute otitis media \/ Đánh giá hệ thống về các phương pháp phòng ngừa viêm tai giữa cấp tính \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/9195325\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/9195325\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePrincipi N, et al. – 2002\x3c\/strong\x3e Nasal irrigation: an imprecisely defined medical procedure \/ Rửa mũi: Một thủ thuật y tế chưa được định nghĩa chính xác \(Đánh giá hiệu quả và an toàn\) \x3cem\x3eNguồn: PubMed \/ International Journal of Immunopathology and Pharmacology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28454576\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28454576\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBowatte G, et al. – 2015\x3c\/strong\x3e Breastfeeding and childhood acute otitis media: a systematic review \/ Nuôi con bằng sữa mẹ và viêm tai giữa cấp ở trẻ em \x3cem\x3eNguồn: PubMed \/ Acta Paediatrica\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/26287373\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/26287373\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T12:04:53.118Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251202230110\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22VIÊM DA CƠ ĐỊA \(CHÀM SỮA\) Ở TRẺ: TẠI SAO TÁI PHÁT LIÊN TỤC VÀ \\\x22CHÌA KHÓA VÀNG\\\x22 ĐỂ KIỂM SOÁT BỆNH\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1QiBs00wD5YI38MQPs9vEXg6ZThUXflC_\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\\tViêm da cơ địa \(thường gọi là chàm sữa ở trẻ nhũ nhi\) là tình trạng viêm da mạn tính, ngứa ngáy, rất phổ biến ở trẻ em. Bệnh không nguy hiểm đến tính mạng nhưng ảnh hưởng nghiêm trọng đến chất lượng cuộc sống: Trẻ ngứa ngáy, quấy khóc, ngủ không ngon giấc, và bố mẹ thì stress vì chăm sóc vất vả.\x3c\/p\x3e\x3cp\x3eĐiều khiến phụ huynh nản lòng nhất là bệnh cứ tái đi tái lại. Vừa thấy da con láng mịn được vài hôm, thời tiết thay đổi một chút là hai má lại đỏ hỏn, sần sùi. Tại sao lại như vậy? Và làm thế nào để sống chung hòa bình với nó?\x3c\/p\x3e\x3ch3\x3e1. HIỂU ĐÚNG BẢN CHẤT: TẠI SAO DA CON LẠI \\\x22KHÓ TÍNH\\\x22 NHƯ VẬY?\x3c\/h3\x3e\x3cp\x3eĐể điều trị thành công, bố mẹ cần hiểu: Viêm da cơ địa không phải là bệnh \\\x22chữa một lần là khỏi hẳn\\\x22. Nó là một tình trạng thuộc về cơ địa, liên quan đến yếu tố di truyền và hàng rào bảo vệ da bị khiếm khuyết.\x3c\/p\x3e\x3cp\x3eHãy tưởng tượng làn da khỏe mạnh giống như một bức tường gạch kiên cố:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eViên gạch:\x3c\/strong\x3e Là các tế bào da.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLớp vữa:\x3c\/strong\x3e Là các chất béo tự nhiên \(lipid, ceramide\) giúp kết dính các tế bào, giữ ẩm và ngăn chặn vi khuẩn xâm nhập.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3eỞ trẻ bị viêm da cơ địa, \\\x22bức tường\\\x22 này bị lỗi:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThiếu \\\x22vữa\\\x22:\x3c\/strong\x3e Da thiếu hụt các chất béo tự nhiên giữ ẩm.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHậu quả:\x3c\/strong\x3e Bức tường có nhiều lỗ hổng. Nước bên trong da dễ dàng thoát ra ngoài \(gây khô da\), và các tác nhân kích ứng bên ngoài \(vi khuẩn, bụi bẩn, xà phòng\) dễ dàng xâm nhập vào trong \(gây viêm, ngứa, đỏ\).\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eKết luận quan trọng:\x3c\/strong\x3e Chừng nào hàng rào bảo vệ da còn yếu, chừng đó bệnh còn tái phát. Mục tiêu điều trị không phải là \\\x22tiệt căn\\\x22, mà là \x3cstrong\x3ephục hồi hàng rào bảo vệ da\x3c\/strong\x3e và \x3cstrong\x3ekiểm soát cơn ngứa\x3c\/strong\x3e.\x3c\/blockquote\x3e\x3ch3\x3e2. NHẬN DIỆN \\\x22KẺ KÍCH HOẠT\\\x22 \(TRIGGERS\) KHIẾN BỆNH BÙNG PHÁT\x3c\/h3\x3e\x3cp\x3eTrên nền tảng một làn da yếu ớt, các yếu tố sau đây sẽ đóng vai trò là \\\x22ngòi nổ\\\x22 khiến bệnh bùng lên dữ dội:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThời tiết cực đoan:\x3c\/strong\x3e Trời quá hanh khô \(mùa đông miền Bắc\) làm da mất nước nhanh, hoặc trời quá nóng ẩm \(mùa hè\) gây đổ mồ hôi kích ứng da.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChất tẩy rửa mạnh:\x3c\/strong\x3e Xà phòng tắm có độ kiềm cao, nước xả vải có mùi thơm nồng, chất tạo bọt... đều bào mòn lớp lipid bảo vệ da.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuần áo:\x3c\/strong\x3e Vải len, vải sợi tổng hợp thô ráp cọ xát vào da gây ngứa.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDị ứng nguyên:\x3c\/strong\x3e Mạt bụi nhà, phấn hoa, lông thú cưng. Một số ít trẻ \(khoảng 10-20% ca nặng\) có thể liên quan đến dị ứng thức ăn \(sữa bò, trứng...\), nhưng bố mẹ không nên kiêng khem quá mức khi chưa có bằng chứng rõ ràng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNhiễm trùng:\x3c\/strong\x3e Vi khuẩn tụ cầu vàng \(Staphylococcus aureus\) thường trú ngụ trên da chàm, tiết độc tố làm nặng thêm tình trạng viêm.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1rQ8XRFUyvgs0IfhxqKR4smog0v4iaGTV\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e3. \\\x22CHÌA KHÓA VÀNG\\\x22 TRONG ĐIỀU TRỊ: DƯỠNG ẨM ĐÚNG CÁCH\x3c\/h3\x3e\x3cp\x3eNếu hàng rào da bị hỏng, nhiệm vụ của chúng ta là \\\x22trát vữa\\\x22 lại cho nó hằng ngày. \x3cstrong\x3eKem dưỡng ẩm \(Moisturizer\) chính là thuốc điều trị nền tảng quan trọng nhất, không phải là thuốc bôi chứa corticoid.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eNhiều phụ huynh thất bại vì bôi dưỡng ẩm sai cách:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNguyên tắc 1: Chọn đúng loại\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eƯu tiên các sản phẩm dạng thuốc mỡ \(Ointment\) hoặc dạng kem đặc \(Cream\) vì chúng chứa nhiều dầu, giữ ẩm tốt hơn dạng sữa \(Lotion\) hay gel.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChọn sản phẩm không mùi \(Fragrance-free\), không chất bảo quản gây hại, chuyên biệt cho da chàm \(thường có chứa Ceramide\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNguyên tắc 2: Bôi đúng thời điểm \(Quy tắc \\\x22Tắm và Khóa ẩm\\\x22\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eThời điểm vàng để bôi kem là trong vòng \x3cstrong\x3e3 PHÚT\x3c\/strong\x3e ngay sau khi tắm xong, khi da vẫn còn hơi ẩm. Lúc này kem sẽ \\\x22khóa\\\x22 chặt lượng nước vừa ngấm vào da.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu bôi khi da đã khô cong thì hiệu quả giảm đi rất nhiều.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNguyên tắc 3: Bôi đủ lượng và đủ tần suất\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐừng tiết kiệm kem dưỡng ẩm. Hãy bôi một lớp dày hào phóng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBôi ít nhất 2-3 lần\/ngày, hoặc bất cứ khi nào thấy da con khô. Bôi kiên trì ngay cả khi da con đã láng mịn để phòng ngừa tái phát.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. VAI TRÒ CỦA THUỐC BÔI CHỨA CORTICOID \(GIẢI OAN CHO CORTICOID\)\x3c\/h3\x3e\x3cp\x3eRất nhiều phụ huynh mắc hội chứng \\\x22sợ Corticoid\\\x22 \(Corticophobia\), kiên quyết không dùng cho con vì sợ tác dụng phụ \(teo da, hại thận...\). Ngược lại, có người lại lạm dụng, tự ý mua thuốc về bôi kéo dài. Cả hai đều sai.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVai trò:\x3c\/strong\x3e Thuốc bôi Corticoid là \\\x22lính cứu hỏa\\\x22 để dập tắt đám cháy viêm cấp tính \(khi da đỏ rực, chảy dịch, ngứa điên cuồng\). Lúc này chỉ dưỡng ẩm là không đủ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCách dùng đúng:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChỉ dùng khi có chỉ định của bác sĩ cho đợt cấp.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDùng loại có độ mạnh phù hợp với vùng da \(vùng mặt, bẹn dùng loại nhẹ; tay chân dùng loại mạnh hơn\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBôi lớp mỏng chỉ ở vùng da bị viêm đỏ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhi tình trạng viêm đỏ đã lui, phải giảm liều và ngừng thuốc theo hướng dẫn, chuyển sang duy trì bằng dưỡng ẩm.\x3c\/strong\x3e Tuyệt đối không dùng để dưỡng da hằng ngày.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e5. KHI NÀO CẦN ĐƯA TRẺ ĐI KHÁM?\x3c\/h3\x3e\x3cp\x3eBố mẹ cần đưa trẻ đến gặp bác sĩ Da liễu hoặc Nhi khoa nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTình trạng chàm nặng lên, lan rộng toàn thân dù đã chăm sóc tích cực.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ ngứa dữ dội, ảnh hưởng đến giấc ngủ và sinh hoạt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCó dấu hiệu nhiễm trùng da \(Bội nhiễm\):\x3c\/strong\x3e Vùng da chàm xuất hiện mụn mủ, chảy dịch vàng đóng vảy tiết màu mật ong, sưng nóng đau, hoặc trẻ có sốt. Đây là tình trạng cấp cứu cần dùng kháng sinh.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Chăm sóc trẻ bị viêm da cơ địa là một cuộc chạy đua đường dài đòi hỏi sự kiên nhẫn. Hãy nhớ: \x3cstrong\x3eDưỡng ẩm là bạn đồng hành mỗi ngày, Corticoid là vũ khí khi cấp bách.\x3c\/strong\x3e Hiểu và tuân thủ đúng nguyên tắc này, bố mẹ hoàn toàn có thể giúp con kiểm soát bệnh và có một tuổi thơ êm đềm hơn.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eEichenfield LF, et al. – 2014\x3c\/strong\x3e Guidelines of care for the management of atopic dermatitis: section 2. Management and treatment of atopic dermatitis with topical therapies \/ Hướng dẫn chăm sóc và quản lý viêm da cơ địa: Phần 2. Quản lý và điều trị bằng liệu pháp tại chỗ \x3cem\x3eNguồn: PubMed \/ Journal of the American Academy of Dermatology \(JAAD\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/24813302\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/24813302\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2022\x3c\/strong\x3e Eczema in Children: Care \x26amp; Treatment \/ Chàm \(Eczema\) ở trẻ em: Chăm sóc và Điều trị \x3cem\x3eNguồn: HealthyChildren.org \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/skin\/Pages\/Eczema.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/health-issues\/conditions\/skin\/Pages\/Eczema.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Eczema Association – 2023\x3c\/strong\x3e Bathing, Moisturizing \x26amp; Wet Wraps \/ Tắm, Dưỡng ẩm và Liệu pháp băng ướt \(Quy tắc \\\x22Ngâm và Khóa ẩm\\\x22\) \x3cem\x3eNguồn: National Eczema Association\x3c\/em\x3e \x3ca href=\\\x22https:\/\/nationaleczema.org\/eczema\/treatment\/bathing\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/nationaleczema.org\/eczema\/treatment\/bathing\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3evan Zuuren EJ, et al. – 2017\x3c\/strong\x3e Emollients and moisturisers for eczema \/ Chất làm mềm và dưỡng ẩm trong điều trị chàm \(Tổng quan hệ thống Cochrane\) \x3cem\x3eNguồn: PubMed \/ Cochrane Database of Systematic Reviews\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28166390\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28166390\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2023\x3c\/strong\x3e Atopic dermatitis \(eczema\): Symptoms \x26amp; Causes \/ Viêm da cơ địa \(Chàm\): Triệu chứng và Nguyên nhân \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/diseases-conditions\/atopic-dermatitis-eczema\/symptoms-causes\/syc-20353273\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/atopic-dermatitis-eczema\/symptoms-causes\/syc-20353273\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCharman CR, et al. – 2000\x3c\/strong\x3e The use of topical corticosteroids in children with atopic dermatitis \/ Việc sử dụng corticosteroid tại chỗ ở trẻ em bị viêm da cơ địa \(Vấn đề \\\x22Sợ Corticoid\\\x22\) \x3cem\x3eNguồn: PubMed \/ British Journal of Dermatology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/10848723\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/10848723\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eOng PY, et al. – 2002\x3c\/strong\x3e Endogenous antimicrobial peptides and skin infections in atopic dermatitis \/ Peptide kháng khuẩn nội sinh và nhiễm trùng da trong bệnh viêm da cơ địa \(Liên quan đến tụ cầu vàng\) \x3cem\x3eNguồn: PubMed \/ New England Journal of Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/12374875\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/12374875\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Dermatology \(AAD\) – 2023\x3c\/strong\x3e Eczema triggers: What can cause a flare-up? \/ Các yếu tố kích hoạt chàm: Điều gì có thể gây bùng phát bệnh? \x3cem\x3eNguồn: American Academy of Dermatology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.aad.org\/public\/diseases\/eczema\/childhood\/triggers\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.aad.org\/public\/diseases\/eczema\/childhood\/triggers\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBoston Children’s Hospital – 2023\x3c\/strong\x3e Atopic Dermatitis \(Eczema\) in Children \/ Viêm da cơ địa ở trẻ em \x3cem\x3eNguồn: Boston Children’s Hospital\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.childrenshospital.org\/conditions\/atopic-dermatitis\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.childrenshospital.org\/conditions\/atopic-dermatitis\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePurnamawati S, et al. – 2017\x3c\/strong\x3e The Role of Moisturizers in Addressing Various Kinds of Dermatitis: A Review \/ Vai trò của kem dưỡng ẩm trong việc giải quyết các loại viêm da khác nhau: Một bài đánh giá \x3cem\x3eNguồn: PubMed \/ Clinical Medicine \x26amp; Research\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC5849435\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC5849435\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLio PA, et al. – 2014\x3c\/strong\x3e Understanding Atopic Dermatitis: The Role of Skin Barrier Function \/ Hiểu về viêm da cơ địa: Vai trò của chức năng hàng rào bảo vệ da \x3cem\x3eNguồn: National Eczema Association \/ Youtube \(Educational Material\)\x3c\/em\x3e \(Lưu ý: Link dẫn về trang kiến thức tổng hợp của NEA do video gốc có thể thay đổi link\) \x3ca href=\\\x22https:\/\/nationaleczema.org\/eczema\/causes-and-triggers-of-eczema\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/nationaleczema.org\/eczema\/causes-and-triggers-of-eczema\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:59:22.274Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251203073552\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22SỐT Ở TRẺ EM: KẺ THÙ HAY ĐỒNG MINH? CẨM NANG SỬ TRÍ CHUẨN VÀ GIẢI MÃ HIỆN TƯỢNG \\\x22SỐT MÀ RÉT RUN\\\x22\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1DUzqjw8oALAysjC6ZBxY2f0kva3ot-dN\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Bác sĩ ơi, con em cặp nhiệt độ 39 độ, người nóng hầm hập nhưng chân tay lạnh ngắt, mồm cứ kêu rét đòi đắp chăn. Em phải làm sao?\\\x22\x3c\/em\x3e \x3cem\x3e\\\x22Sốt cao thế này có sợ \x27cháy\x27 não, co giật không bác sĩ?\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eĐây là những câu hỏi khiến các bác sĩ Nhi khoa trăn trở hàng ngày. Tâm lý chung của bố mẹ là hoảng sợ và muốn \\\x22dập tắt\\\x22 cơn sốt ngay lập tức. Nhưng thực tế, y học hiện đại khẳng định: Sốt là một phản ứng CÓ LỢI.\x3c\/p\x3e\x3cp\x3eBài viết này sẽ giúp bố mẹ hiểu sâu về cơ chế của sốt để bớt lo âu, đồng thời nắm vững kỹ năng xử lý an toàn tại nhà.\x3c\/p\x3e\x3ch3\x3e1. GIẢI PHẪU MỘT CƠN SỐT: TẠI SAO CƠ THỂ LẠI TỰ \\\x22LÀM NÓNG\\\x22 MÌNH?\x3c\/h3\x3e\x3ch3\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1SsfHRkpmh-FJU7MVCnu6CIte3Dag8Kvj\x26amp;sz=w4096\\\x22\x3e\x3c\/h3\x3e\x3cp\x3e\x3cstrong\x3eSốt không phải là bệnh, sốt là một triệu chứng.\x3c\/strong\x3e Nhiều cha mẹ coi sốt là \\\x22kẻ thù\\\x22 cần phải dập tắt ngay lập tức. Nhưng dưới con mắt y khoa, sốt thực chất là một \x3cstrong\x3ephản ứng bảo vệ có lợi\x3c\/strong\x3e, một \\\x22đồng minh\\\x22 quan trọng của hệ miễn dịch trong cuộc chiến chống lại nhiễm trùng.\x3c\/p\x3e\x3cp\x3eKhi có tác nhân lạ \(virus, vi khuẩn\) xâm nhập, các tế bào miễn dịch \\\x22lính gác\\\x22 sẽ phát hiện và gửi tín hiệu báo động \(các chất gây sốt nội sinh\) lên não bộ. Vùng dưới đồi ở não \(được ví như \\\x22bộ điều nhiệt\\\x22 của cơ thể\) sẽ nhận lệnh và chủ động cài đặt lại nhiệt độ cơ thể ở mức cao hơn bình thường.\x3c\/p\x3e\x3cp\x3eTại sao cơ thể lại tốn năng lượng để làm việc này? Đó là một chiến lược phòng thủ tinh vi gồm 2 mũi giáp công:\x3c\/p\x3e\x3ch4\x3eMũi 1: Tạo môi trường \\\x22khắc nghiệt\\\x22 để kìm hãm kẻ thù \(Ức chế trực tiếp\)\x3c\/h4\x3e\x3cp\x3eHầu hết các loại virus và vi khuẩn gây bệnh ở người đều \\\x22ưa thích\\\x22 và phát triển tối ưu nhất ở nhiệt độ cơ thể bình thường \(khoảng 37°C\).\x3c\/p\x3e\x3cp\x3eKhi nhiệt độ cơ thể tăng lên \(ví dụ 39°C - 40°C\), môi trường bên trong trở nên quá nóng và bất lợi đối với chúng. Nhiệt độ cao này giống như một \\\x22lò nướng\\\x22 tự nhiên:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLàm chậm sự sinh sôi:\x3c\/strong\x3e Vi khuẩn gặp khó khăn trong việc phân chia, và virus bị ức chế khả năng nhân lên \(sao chép\) trong tế bào.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGiảm độc lực:\x3c\/strong\x3e Nhiệt độ cao làm giảm khả năng gây hại của một số độc tố vi khuẩn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế \\\x22giấu sắt\\\x22:\x3c\/strong\x3e Khi sốt, cơ thể cũng tăng cường thu gom sắt vào gan. Sắt là \\\x22thức ăn\\\x22 cần thiết để vi khuẩn phát triển. Việc giấu sắt đi cộng với nhiệt độ cao khiến vi khuẩn bị \\\x22bỏ đói\\\x22 và suy yếu nhanh chóng.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eMũi 2: \\\x22Tăng lực\\\x22 cho hệ miễn dịch \(Kích thích gián tiếp\)\x3c\/h4\x3e\x3cp\x3eTrong khi mầm bệnh bị suy yếu vì nóng, thì ngược lại, nhiệt độ cao lại là môi trường lý tưởng để kích hoạt \\\x22đội quân\\\x22 miễn dịch của chính cơ thể hoạt động hiệu quả hơn gấp nhiều lần:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTăng tốc độ di chuyển:\x3c\/strong\x3e Các tế bào bạch cầu \(lính bảo vệ\) di chuyển nhanh hơn từ máu đến ổ viêm nhiễm để tiêu diệt kẻ thù.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTăng sản xuất vũ khí:\x3c\/strong\x3e Cơ thể tăng cường sản xuất các kháng thể đặc hiệu và interferon \(một chất chống virus tự nhiên cực mạnh\) mạnh mẽ hơn khi ở nhiệt độ cao.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTăng khả năng \\\x22ăn\\\x22 vi khuẩn:\x3c\/strong\x3e Khả năng thực bào \(bắt và tiêu hóa vi khuẩn\/tế bào nhiễm virus\) của các tế bào miễn dịch cũng được tối ưu hóa.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eKẾT LUẬN QUAN TRỌNG:\x3c\/strong\x3e Cơn sốt chính là bằng chứng cho thấy hệ miễn dịch của con đang hoạt động rất tốt và đang dốc toàn lực để chiến đấu.\x3c\/blockquote\x3e\x3cblockquote\x3eNếu chúng ta vội vàng dùng thuốc hạ sốt khi nhiệt độ chưa quá cao \(ví dụ dưới 38.5°C\) và trẻ vẫn chơi ngoan, tỉnh táo, vô tình chúng ta đã \x3cstrong\x3e\\\x22tắt\\\x22 đi cơ chế bảo vệ tự nhiên\x3c\/strong\x3e này, làm \\\x22nguội\\\x22 chiến trường, tạo điều kiện cho virus\/vi khuẩn hồi phục và có thể khiến bệnh kéo dài lâu hơn.\x3c\/blockquote\x3e\x3ch3\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1yuYkNe53ZjPcGaVshx7mKfcssYJPP5lD\x26amp;sz=w4096\\\x22\x3e\x3c\/h3\x3e\x3ch3\x3e2. GIAI ĐOẠN \\\x22TIỀN SỐT\\\x22: TẠI SAO SỐT CAO MÀ CON LẠI KÊU RÉT RUN?\x3c\/h3\x3e\x3cp\x3eĐây là hiện tượng gây hiểu lầm tai hại nhất, khiến nhiều bố mẹ xử lý sai \(ủ ấm quá mức\).\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eCơ chế:\x3c\/strong\x3e Khi não bộ ra lệnh \\\x22Phải tăng nhiệt độ lên 39.5°C mới diệt được virus\\\x22, nó sẽ cài đặt lại mức chuẩn nhiệt độ. Lúc này, nhiệt độ thực tế của bé mới chỉ là 37.5°C -\x26gt; Cơ thể cảm thấy mình đang bị \\\x22lạnh\\\x22 \(thấp hơn chuẩn mới 2 độ\). Để đạt được nhiệt độ mục tiêu, cơ thể kích hoạt 2 cơ chế:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCo mạch ngoại vi \(Giữ nhiệt\):\x3c\/strong\x3e Máu rút từ tay chân vào nuôi tim, não, phổi. \x3cstrong\x3eHậu quả:\x3c\/strong\x3e Bố mẹ sờ thấy \x3cstrong\x3etay chân con lạnh ngắt, nổi vân tím\x3c\/strong\x3e dù trán và người bắt đầu nóng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRun cơ \(Sinh nhiệt\):\x3c\/strong\x3e Các cơ bắp co thắt liên tục để tạo ra nhiệt. \x3cstrong\x3eHậu quả:\x3c\/strong\x3e Trẻ \x3cstrong\x3erun cầm cập\x3c\/strong\x3e, hai hàm răng va vào nhau và kêu rét.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eLỜI KHUYÊN VÀNG KHI CON ĐANG RÉT RUN:\x3c\/strong\x3e\x3c\/blockquote\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHiểu rằng:\x3c\/strong\x3e Nhiệt độ đang tăng lên rất nhanh.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKHÔNG ĐƯỢC lau người\/chườm mát lúc này:\x3c\/strong\x3e Việc lau nước lên da khiến cơ thể hiểu lầm là đang bị mất nhiệt, phản ứng rét run càng dữ dội hơn, làm trẻ kiệt sức.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKHÔNG ĐƯỢC ủ quá kín:\x3c\/strong\x3e Chỉ đắp một chăn mỏng để con đỡ cảm giác lạnh tâm lý. Ủ chăn bông dày sẽ khiến nhiệt độ vọt lên quá cao gây sốt cao co giật.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHành động:\x3c\/strong\x3e Chờ đợi. Khi nhiệt độ đã lên đến đỉnh \(đạt mức cài đặt\), con sẽ hết run, mạch máu giãn ra, da dẻ hồng hào và toát mồ hôi. \x3cstrong\x3eLúc này mới được lau người và nới lỏng quần áo.\x3c\/strong\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. KHI NÀO CẦN DÙNG THUỐC HẠ SỐT?\x3c\/h3\x3e\x3cp\x3eChúng ta tuân thủ nguyên tắc: \x3cstrong\x3e\\\x22Điều trị đứa trẻ, không điều trị nhiệt kế\\\x22.\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNhiệt độ \x26lt; 38.5°C:\x3c\/strong\x3e Chườm ấm, uống nhiều nước, mặc thoáng. Không cần dùng thuốc trừ khi trẻ có tiền sử co giật do sốt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNhiệt độ ≥ 38.5°C:\x3c\/strong\x3e Cân nhắc dùng thuốc nếu trẻ quấy khóc, mệt mỏi, đau nhức.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eCÁCH DÙNG 2 LOẠI THUỐC HẠ SỐT CHÍNH \(TÍNH THEO CÂN NẶNG\):\x3c\/strong\x3e\x3c\/p\x3e\x3ch4\x3eA. PARACETAMOL \(Hapacol, Efferalgan, Tylenol...\) - Lựa chọn đầu tay an toàn\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLiều dùng:\x3c\/strong\x3e \x3cstrong\x3e10 - 15mg \/ kg cân nặng \/ lần.\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eVí dụ:\x3c\/em\x3e Bé 10kg dùng gói 150mg.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhoảng cách:\x3c\/strong\x3e 4 - 6 tiếng\/lần.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLưu ý:\x3c\/strong\x3e An toàn cho mọi lứa tuổi, an toàn cho Sốt xuất huyết.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eB. IBUPROFEN \(Brufen, Sotstop...\) - Mạnh hơn nhưng nhiều rủi ro\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLiều dùng:\x3c\/strong\x3e \x3cstrong\x3e5 - 10mg \/ kg cân nặng \/ lần.\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eVí dụ:\x3c\/em\x3e Bé 10kg dùng 50mg - 100mg.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhoảng cách:\x3c\/strong\x3e 6 - 8 tiếng\/lần.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCẢNH BÁO ĐỎ:\x3c\/strong\x3e \x3cstrong\x3eTuyệt đối KHÔNG dùng khi nghi ngờ Sốt xuất huyết\x3c\/strong\x3e \(vì gây xuất huyết nặng\). Chỉ dùng cho trẻ trên 6 tháng tuổi và uống sau ăn no \(vì hại dạ dày\).\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. NHỮNG SAI LẦM \\\x22KINH ĐIỂN\\\x22 CẦN LOẠI BỎ NGAY\x3c\/h3\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3e❌ Vắt chanh vào miệng khi co giật:\x3c\/strong\x3e Rất nguy hiểm! Dịch chanh có thể gây sặc vào phổi, dẫn đến viêm phổi hít hoặc ngạt thở. Axit chanh không có tác dụng hạ sốt.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3e❌ Chườm đá lạnh hoặc bôi rượu\/cồn:\x3c\/strong\x3e Đá lạnh làm co mạch máu đột ngột, nhiệt không thoát ra được làm thân nhiệt càng tăng cao. Cồn có thể ngấm qua da gây ngộ độc. Chỉ nên lau bằng nước ấm \(thấp hơn nhiệt độ cơ thể 2 độ\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3e❌ Kiêng tắm tuyệt đối:\x3c\/strong\x3e Trẻ sốt vẫn có thể tắm nhanh bằng nước ấm trong phòng kín gió để vệ sinh và hạ nhiệt.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e5. DẤU HIỆU BÁO ĐỘNG: KHI NÀO CẦN ĐI VIỆN NGAY?\x3c\/h3\x3e\x3ch3\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1UOAd95mvMHTjPwM2DBz5Jxa7hU0ScFjK\x26amp;sz=w4096\\\x22\x3e\x3c\/h3\x3e\x3cp\x3eĐừng chỉ nhìn nhiệt độ, hãy nhìn \x3cstrong\x3eTOÀN TRẠNG\x3c\/strong\x3e của con. Đi viện ngay nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐộ tuổi:\x3c\/strong\x3e Trẻ sơ sinh \x3cstrong\x3edưới 3 tháng tuổi\x3c\/strong\x3e bị sốt \(bất kể bao nhiêu độ\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThần kinh:\x3c\/strong\x3e Trẻ li bì khó đánh thức, vật vã kích thích liên tục, \x3cstrong\x3ecổ cứng\x3c\/strong\x3e, thóp phồng hoặc có cơn \x3cstrong\x3eco giật\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHô hấp\/Tuần hoàn:\x3c\/strong\x3e Khó thở, tím tái, hoặc \x3cstrong\x3esốc nhiệt\x3c\/strong\x3e \(sốt cao nhưng tay chân lạnh ngắt, nổi vân tím, mạch nhanh\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMất nước:\x3c\/strong\x3e Nôn tất cả mọi thứ, không uống được, \x3cstrong\x3ekhông đi tiểu trong 6 tiếng\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDa:\x3c\/strong\x3e Xuất hiện các chấm xuất huyết \(nghi Sốt xuất huyết\) hoặc ban tím \(nghi não mô cầu\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDiễn biến:\x3c\/strong\x3e Sốt cao liên tục \x26gt; 2 ngày không đỡ hoặc sốt kéo dài \x26gt; 5 ngày.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e👉 \x3cstrong\x3eLời kết:\x3c\/strong\x3e Sốt là phản ứng bảo vệ, không phải kẻ thù. Bố mẹ hãy bình tĩnh, trang bị sẵn nhiệt kế và thuốc hạ sốt đúng loại để đồng hành cùng con vượt qua \\\x22trận chiến\\\x22 miễn dịch này nhé!\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eEvans SS, et al. – 2015\x3c\/strong\x3e Fever and the thermal regulation of immunity: the immune system feels the heat \/ Sốt và sự điều nhiệt của hệ miễn dịch: Hệ miễn dịch \\\x22cảm nhận\\\x22 sức nóng \(Cơ chế sốt có lợi\) \x3cem\x3eNguồn: PubMed \/ Nature Reviews Immunology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/26027719\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/26027719\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2024\x3c\/strong\x3e Fever: Symptoms \x26amp; causes \/ Sốt: Triệu chứng và nguyên nhân \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/diseases-conditions\/fever\/symptoms-causes\/syc-20352759\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/diseases-conditions\/fever\/symptoms-causes\/syc-20352759\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute for Health and Care Excellence \(NICE\) – 2021\x3c\/strong\x3e Fever in under 5s: assessment and initial management \/ Sốt ở trẻ dưới 5 tuổi: Đánh giá và xử trí ban đầu \x3cem\x3eNguồn: NICE Guidelines \(UK\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.nice.org.uk\/guidance\/ng143\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.nice.org.uk\/guidance\/ng143\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2024\x3c\/strong\x3e Acetaminophen Dosing Tables for Fever and Pain in Children \/ Bảng liều lượng Acetaminophen \(Paracetamol\) cho sốt và đau ở trẻ em \x3cem\x3eNguồn: HealthyChildren.org\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/safety-prevention\/at-home\/medication-safety\/Pages\/Acetaminophen-for-Fever-and-Pain.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/safety-prevention\/at-home\/medication-safety\/Pages\/Acetaminophen-for-Fever-and-Pain.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2024\x3c\/strong\x3e Ibuprofen Dosing Table for Fever and Pain \/ Bảng liều lượng Ibuprofen cho sốt và đau \x3cem\x3eNguồn: HealthyChildren.org\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.healthychildren.org\/English\/safety-prevention\/at-home\/medication-safety\/Pages\/Ibuprofen-for-Fever-and-Pain.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/safety-prevention\/at-home\/medication-safety\/Pages\/Ibuprofen-for-Fever-and-Pain.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWong T, et al. – 2013\x3c\/strong\x3e Combined and alternating paracetamol and ibuprofen therapy for febrile children \/ Liệu pháp kết hợp và luân phiên paracetamol và ibuprofen cho trẻ bị sốt \(Cochrane Review\) \x3cem\x3eNguồn: PubMed \/ Cochrane Library\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/24174375\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/24174375\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBoston Children’s Hospital – 2023\x3c\/strong\x3e Fever in Children: Symptoms and Causes \/ Sốt ở trẻ em: Triệu chứng và nguyên nhân \x3cem\x3eNguồn: Boston Children’s Hospital\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.childrenshospital.org\/conditions\/fever\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.childrenshospital.org\/conditions\/fever\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institute of Neurological Disorders and Stroke \(NINDS\) – 2023\x3c\/strong\x3e Febrile Seizures Fact Sheet \/ Tờ thông tin về Sốt co giật \x3cem\x3eNguồn: NIH \(National Institutes of Health\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ninds.nih.gov\/health-information\/disorders\/febrile-seizures\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ninds.nih.gov\/health-information\/disorders\/febrile-seizures\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eEl-Radhi AS – 2012\x3c\/strong\x3e Fever management: Evidence vs current practice \/ Quản lý sốt: Bằng chứng so với thực hành hiện tại \(Phản bác việc chườm lạnh\/dùng cồn\) \x3cem\x3eNguồn: PubMed \/ World Journal of Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/23151853\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/23151853\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T11:51:49.651Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251203085129\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22TÁO BÓN KÉO DÀI: KHÔNG PHẢI CHỈ DO \\\x22LƯỜI ĂN RAU\\\x22. GIẢI MÃ VÒNG XOẮN BỆNH LÝ VÀ SAI LẦM KHI DÙNG THUỐC\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=10BUaha3ZmuBOtwACxJsI_KY9tSq_nEL9\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\\tBố mẹ thường nghĩ táo bón đơn giản là do con \\\x22lười ăn rau\\\x22 hay \\\x22nóng trong\\\x22. Nhưng thực tế, táo bón chức năng \(chiếm 95% trường hợp ở trẻ\) là một vấn đề phức tạp hơn nhiều, liên quan mật thiết đến cách thức hoạt động của Đại tràng – đoạn cuối cùng của hệ tiêu hóa.\x3c\/p\x3e\x3cp\x3eĐể điều trị dứt điểm táo bón, chúng ta không thể chỉ nhìn vào \\\x22đầu vào\\\x22 \(ăn gì\), mà phải hiểu rõ \\\x22bộ máy xử lý\\\x22 bên trong hoạt động như thế nào. Bài viết này sẽ giúp bố mẹ nhìn thấu suốt quá trình sinh lý đó.\x3c\/p\x3e\x3ch3\x3e1. CƠ CHẾ SINH LÝ: ĐẠI TRÀNG VÀ CHỨC NĂNG \\\x22HÚT NƯỚC\\\x22\x3c\/h3\x3e\x3cp\x3eHãy tưởng tượng hệ tiêu hóa của trẻ như một dây chuyền sản xuất. Sau khi ruột non đã hấp thu hết chất dinh dưỡng, phần còn lại là chất thải dạng lỏng sẽ được đẩy xuống Đại tràng \(Ruột già\).\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=14pdjscl6IRCPUMp5_fA6VGIlsfFi_pfe\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNhiệm vụ cốt lõi của Đại tràng:\x3c\/strong\x3e Đại tràng không phải là ống chứa rác thụ động. Nó là một \\\x22cỗ máy hút ẩm\\\x22 tích cực. Nhiệm vụ chính của nó là tái hấp thu nước và muối khoáng từ chất thải lỏng để trả lại cho cơ thể, biến chất thải lỏng thành phân mềm, đóng khuôn và đẩy ra ngoài.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSự cố xảy ra khi nào? \(Cơ chế gây táo bón\)\x3c\/strong\x3e Hệ thống này hoạt động hoàn hảo khi có sự cân bằng về thời gian.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSinh lý bình thường:\x3c\/strong\x3e Phân di chuyển trong đại tràng với tốc độ vừa phải. Lượng nước được hút đi vừa đủ để phân thành khuôn mềm, dễ đi tiêu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSinh lý bệnh Táo bón:\x3c\/strong\x3e Vấn đề mấu chốt nằm ở \x3cstrong\x3eTHỜI GIAN LƯU LẠI\x3c\/strong\x3e của phân trong đại tràng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhi trẻ nín nhịn \(do sợ đau, mải chơi...\), phân bị giữ lại trong đại tràng quá lâu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐại tràng vẫn miệt mài thực hiện chức năng sinh lý của nó: \x3cstrong\x3eHút nước liên tục\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHậu quả:\x3c\/strong\x3e Khối phân bị hút kiệt nước, trở nên khô khốc, cứng như đá và đóng tảng lớn. Khối phân này lại làm giãn trực tràng, giảm nhu động ruột, khiến việc đẩy nó ra ngoài càng khó khăn hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eTóm lại:\x3c\/strong\x3e Bản chất sinh lý của táo bón chức năng là do phân nằm quá lâu trong \\\x22máy hút ẩm\\\x22 đại tràng, dẫn đến mất nước quá mức và trở nên khô cứng.\x3c\/blockquote\x3e\x3ch3\x3e2. VÒNG XOẮN BỆNH LÝ: TỪ NỖI SỢ TÂM LÝ ĐẾN HẬU QUẢ SINH LÝ\x3c\/h3\x3e\x3cp\x3eTại sao phân lại nằm lâu trong đại tràng? Nguyên nhân khởi đầu thường là do Tâm lý và Hành vi.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhởi đầu nan:\x3c\/strong\x3e Một lần trẻ đi tiêu phân hơi cứng gây rách hậu môn \(nứt kẽ\), tạo cảm giác đau đớn dữ dội.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHành vi nín giữ:\x3c\/strong\x3e Để tránh đau, não bộ trẻ ra lệnh \\\x22nín lại\\\x22. Trẻ gồng người, kẹp mông để ngăn phân ra.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHậu quả sinh lý:\x3c\/strong\x3e Hành vi nín giữ làm tăng thời gian phân lưu lại trong đại tràng -\x26gt; Đại tràng hút kiệt nước -\x26gt; Phân càng cứng và to hơn.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTái diễn đau đớn:\x3c\/strong\x3e Lần đi tiêu sau, khối phân \\\x22đá tảng\\\x22 này gây đau đớn gấp bội, củng cố nỗi sợ hãi và hành vi nín nhịn.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. GIẢI PHÁP ĐIỀU TRỊ DỰA TRÊN CƠ CHẾ SINH LÝ\x3c\/h3\x3e\x3cp\x3eHiểu được cơ chế \\\x22hút nước\\\x22 của đại tràng, chúng ta sẽ có chiến lược điều trị khoa học: \x3cstrong\x3eMục tiêu là chống lại quá trình hút nước quá mức và khôi phục lại nhịp sinh học của ruột.\x3c\/strong\x3e\x3c\/p\x3e\x3ch4\x3eGIẢI PHÁP 1: Thuốc nhuận tràng thẩm thấu – \\\x22Miếng bọt biển\\\x22 giữ nước \(Quan trọng nhất giai đoạn đầu\)\x3c\/h4\x3e\x3cp\x3eRất nhiều phụ huynh sợ dùng thuốc nhuận tràng vì nghĩ nó là thuốc \\\x22tẩy\\\x22 gây hại ruột. Đây là hiểu lầm tai hại.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế tác dụng:\x3c\/strong\x3e Các loại thuốc mềm phân thế hệ mới \(như Macrogol, Lactulose...\) hoạt động dựa trên nguyên lý thẩm thấu. Chúng không bị hấp thu vào cơ thể, mà nằm lại trong lòng ruột.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTại sao nó hiệu quả dựa trên sinh lý?\x3c\/strong\x3e Các phân tử thuốc này hoạt động như những \\\x22miếng bọt biển\\\x22 siêu thấm. Chúng hút nước vào lòng ruột và \x3cstrong\x3egiữ chặt lấy nước\x3c\/strong\x3e, không cho đại tràng hút đi mất. Nhờ đó, phân luôn được duy trì ở trạng thái mềm, sệt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMục đích:\x3c\/strong\x3e Giúp trẻ đi tiêu hoàn toàn KHÔNG ĐAU trong một thời gian dài \(3-6 tháng\), từ đó phá vỡ vòng xoắn tâm lý sợ hãi.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eGIẢI PHÁP 2: Huấn luyện hành vi – Khôi phục phản xạ sinh lý\x3c\/h4\x3e\x3cp\x3eChúng ta cần \\\x22nhắc nhớ\\\x22 lại cho hệ tiêu hóa về thời điểm cần làm việc.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTận dụng phản xạ tự nhiên:\x3c\/strong\x3e Cơ thể có \\\x22phản xạ dạ dày - đại tràng\\\x22 \(gastrocolic reflex\) – khi dạ dày đầy thức ăn, nó phát tín hiệu cho đại tràng co bóp mạnh để đẩy phân cũ ra. Thời điểm vàng là 15-30 phút sau bữa ăn chính \(thường là bữa tối\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHành động:\x3c\/strong\x3e Tập cho trẻ ngồi bô vào thời điểm này mỗi ngày để đón đầu cơn co bóp sinh lý đó, ngăn chặn việc trẻ nín nhịn khiến phân bị hút khô nước.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTư thế đúng \(Sinh lý cơ sàn chậu\):\x3c\/strong\x3e Phải kê ghế dưới chân để tạo tư thế ngồi xổm. Tư thế này giúp thả lỏng cơ mu-trực tràng, làm thẳng góc đường ra của hậu môn, giúp phân thoát ra dễ dàng nhất theo trọng lực.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eGIẢI PHÁP 3: Dinh dưỡng – Cung cấp nguyên liệu đúng\x3c\/h4\x3e\x3cp\x3eDinh dưỡng hỗ trợ cho cơ chế sinh lý hoạt động trơn tru:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNước là chìa khóa:\x3c\/strong\x3e Nếu không uống đủ nước, thì ngay cả thuốc nhuận tràng thẩm thấu cũng không có nước để \\\x22giữ\\\x22. Cơ thể thiếu nước sẽ bắt đại tràng phải tăng cường hút nước từ phân để bù lại.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChất xơ hòa tan:\x3c\/strong\x3e Các loại rau củ có độ nhớt \(mồng tơi, đậu bắp, thanh long...\) chứa chất xơ hòa tan. Loại chất xơ này cũng có khả năng hút nước tạo thành dạng gel, giúp phân mềm và di chuyển dễ dàng. \(Lưu ý: Ăn nhiều xơ mà thiếu nước sẽ gây tắc ruột thêm\).\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eTƯ THẾ NGỒI TOILET ĐÚNG CHUẨN \(Hỗ trợ trị táo bón\)\x3c\/h4\x3e\x3cp\x3e\x3cem\x3eHình ảnh này minh họa tầm quan trọng của việc kê ghế chân để tạo góc ngồi xổm, giúp \\\x22mở khóa\\\x22 đường ra của phân.\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1HsDaZ3NbNxbSVhxb2L1Epfr7tASctyl9\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3eKHI NÀO CẦN ĐI KHÁM CHUYÊN KHOA? \(Cảnh báo Táo bón thực thể\)\x3c\/h4\x3e\x3cp\x3e\x3cem\x3eMặc dù 95% là táo bón chức năng, bố mẹ vẫn cần cảnh giác với 5% còn lại là các bệnh lý thực thể \(như phình đại tràng bẩm sinh\) cần can thiệp y khoa. Hình ảnh này tóm tắt các dấu hiệu \\\x22cờ đỏ\\\x22 cần đi khám gấp.\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1WlNCPa-ebBK0O9Hao1-ucPtHpfNjQB6P\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e4. LỜI KẾT: KIÊN TRÌ LÀ CHÌA KHÓA\x3c\/h3\x3e\x3cp\x3eĐiều trị táo bón chức năng là một quá trình \\\x22cài đặt lại\\\x22 cả tâm lý lẫn sinh lý của hệ tiêu hóa. Bố mẹ cần hiểu rằng việc dùng thuốc mềm phân kéo dài là cần thiết để chống lại cơ chế hút nước tự nhiên của đại tràng trong khi chờ đợi tâm lý trẻ ổn định.\x3c\/p\x3e\x3cp\x3eĐừng vội vàng cắt thuốc khi thấy con vừa đi được vài ngày. Hãy kiên nhẫn tuân thủ phác đồ của bác sĩ để giúp con thoát khỏi nỗi ám ảnh mang tên táo bón.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTabbers MM, et al. – 2014\x3c\/strong\x3e Evaluation and treatment of functional constipation in infants and children: evidence-based recommendations from ESPGHAN and NASPGHAN \/ Đánh giá và điều trị táo bón chức năng ở trẻ sơ sinh và trẻ em: Khuyến nghị dựa trên bằng chứng từ ESPGHAN và NASPGHAN \x3cem\x3eNguồn: PubMed \/ Journal of Pediatric Gastroenterology and Nutrition\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/24345831\/\\\x22 rel=\\\x22noopener norefe
