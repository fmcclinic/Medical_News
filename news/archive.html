c nhà sản xuất bổ sung thêm canxi \(cần đọc kỹ nhãn thành phần\).\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e2. TÌNH HUỐNG: BÉ BÚ MẸ MỘT PHẦN \x2b SỮA CÔNG THỨC \(MIXED FEEDING\)\x3c\/h3\x3e\x3cp\x3eĐây là tình huống phức tạp và phổ biến nhất. Trẻ vừa nhận đạm sữa bò gián tiếp qua sữa mẹ, vừa nhận đạm trực tiếp từ sữa công thức.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eGiải pháp: \\\x22Đánh gọng kìm\\\x22\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBước 1 \(Với sữa công thức\):\x3c\/strong\x3e DỪNG NGAY sữa công thức thường. Chuyển sang \x3cstrong\x3eSữa thủy phân hoàn toàn \(eHF\)\x3c\/strong\x3e. Đây là yếu tố quan trọng nhất vì lượng đạm dị ứng trong sữa công thức cao gấp nhiều lần trong sữa mẹ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBước 2 \(Với sữa mẹ\):\x3c\/strong\x3e Mẹ thực hiện chế độ ăn loại trừ \(kiêng sữa bò và bổ sung Canxi\/D3\) như đã hướng dẫn ở tình huống 1.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMục tiêu:\x3c\/strong\x3e Cố gắng duy trì và tăng lượng sữa mẹ lên tối đa nếu có thể, vì sữa mẹ \(khi mẹ đã ăn kiêng\) vẫn ngon và dễ tiêu hóa hơn sữa thủy phân rất nhiều.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. TÌNH HUỐNG: MẸ KHÔNG CÓ SỮA \(BẮT BUỘC DÙNG SỮA NGOÀI 100%\)\x3c\/h3\x3e\x3cp\x3eKhi không có nguồn sữa mẹ để \\\x22cứu cánh\\\x22 cho hệ miễn dịch đường ruột, việc chọn sữa công thức phải cực kỳ nghiêm ngặt.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eGiải pháp:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eƯu tiên số 1:\x3c\/strong\x3e \x3cstrong\x3eSữa thủy phân hoàn toàn \(eHF\)\x3c\/strong\x3e. Đây là thức ăn chính và duy nhất của trẻ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNếu trẻ vẫn không dung nạp eHF \(vẫn nôn, đi máu, không tăng cân\):\x3c\/strong\x3e Chuyển sang \x3cstrong\x3eSữa Acid Amin \(AAF\)\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eLưu ý quan trọng về Sữa Đậu Nành:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVới trẻ \x3cstrong\x3edưới 6 tháng tuổi:\x3c\/strong\x3e KHÔNG khuyến cáo dùng sữa đậu nành \(do nguy cơ dị ứng chéo cao ~10-14% và chứa phytoestrogen không tốt cho sự phát triển sinh dục sớm\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVới trẻ \x3cstrong\x3etrên 6 tháng tuổi:\x3c\/strong\x3e Có thể cân nhắc sữa đậu nành nếu trẻ không chấp nhận mùi vị của sữa thủy phân hoặc kinh tế gia đình không cho phép \(sữa thủy phân rất đắt\), nhưng cần bác sĩ tư vấn kỹ.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. TÌNH HUỐNG: MẸ CÓ SỮA NHƯNG CHỦ ĐỘNG KHÔNG MUỐN CHO BÚ\x3c\/h3\x3e\x3cp\x3eĐây là quyền lựa chọn cá nhân của người mẹ và cần được tôn trọng, không phán xét. Tuy nhiên, mẹ cần hiểu rõ thách thức về kinh tế và chăm sóc.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eGiải pháp \x26amp; Lời khuyên:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChấp nhận chi phí cao:\x3c\/strong\x3e Vì trẻ không được bú mẹ, trẻ hoàn toàn phụ thuộc vào sữa công thức đặc biệt. Sữa thủy phân hoàn toàn\/Acid amin có giá đắt gấp 3-4 lần sữa thường. Mẹ cần chuẩn bị tài chính cho lộ trình dài hạn \(ít nhất đến khi trẻ 1 tuổi\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChấp nhận mùi vị khó uống:\x3c\/strong\x3e Sữa thủy phân có vị đắng và mùi hôi \(do đạm bị cắt nhỏ\). Trẻ không được bú mẹ \(vốn ngọt ngào\) mà phải uống ngay sữa này có thể sẽ phản kháng, biếng bú trong giai đoạn đầu. Mẹ cần kiên nhẫn tập cho con, không được pha thêm đường hay pha sai công thức để át mùi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTuyệt đối không dùng sữa dê\/sữa cừu\/sữa hạt tự nấu\x3c\/strong\x3e để thay thế, vì chúng không đảm bảo dinh dưỡng toàn diện cho trẻ nhũ nhi phát triển và vẫn gây dị ứng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Dù ở tình huống nào, việc chẩn đoán và điều trị dị ứng đạm sữa bò cần sự đồng hành chặt chẽ của bác sĩ. Bố mẹ đừng tự ý đổi sữa liên tục khiến ruột con thêm tổn thương nhé!\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKoletzko S, et al. – 2012\x3c\/strong\x3e Diagnostic approach and management of cow\x27s-milk protein allergy in infants and children: ESPGHAN GI Committee Practical Guidelines \/ Tiếp cận chẩn đoán và quản lý dị ứng đạm sữa bò ở trẻ sơ sinh và trẻ nhỏ: Hướng dẫn thực hành của Ủy ban Tiêu hóa ESPGHAN \x3cem\x3eNguồn: PubMed \/ Journal of Pediatric Gastroenterology and Nutrition\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/22739342\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/22739342\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eAmerican Academy of Pediatrics \(AAP\) – 2020\x3c\/strong\x3e Hypoallergenic Infant Formulas \/ Các loại sữa công thức không gây dị ứng cho trẻ sơ sinh \x3cem\x3eNguồn: HealthyChildren.org \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.healthychildren.org\/English\/ages-stages\/baby\/formula-feeding\/Pages\/Hypoallergenic-Infant-Formulas.aspx\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.healthychildren.org\/English\/ages-stages\/baby\/formula-feeding\/Pages\/Hypoallergenic-Infant-Formulas.aspx\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVenter C, et al. – 2013\x3c\/strong\x3e Diagnosis and management of non-IgE-mediated cow\x27s milk allergy in infancy - a UK primary care practical guide \/ Chẩn đoán và quản lý dị ứng đạm sữa bò không qua trung gian IgE ở trẻ nhũ nhi - Hướng dẫn thực hành chăm sóc ban đầu tại Anh \x3cem\x3eNguồn: PubMed \/ Clinical and Translational Allergy\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC3734614\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC3734614\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBhatia J, et al. – 2008 \(Reaffirmed 2021\)\x3c\/strong\x3e Use of Soy Protein-Based Formulas in Infant Feeding \/ Sử dụng sữa công thức gốc đạm đậu nành trong nuôi dưỡng trẻ sơ sinh \x3cem\x3eNguồn: PubMed \/ Pediatrics \(AAP Policy Statement\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/18515523\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/18515523\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJärvinen KM, et al. – 2009\x3c\/strong\x3e Role of maternal elimination diets for macro- and micronutrient intake in breastfeeding women with cow\x27s milk allergic infants \/ Vai trò của chế độ ăn loại trừ đối với lượng dưỡng chất vĩ mô và vi lượng ở bà mẹ cho con bú có con bị dị ứng sữa bò \x3cem\x3eNguồn: PubMed \/ Acta Paediatrica\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC2736631\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ncbi.nlm.nih.gov\/pmc\/articles\/PMC2736631\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eFiocchi A, et al. – 2010\x3c\/strong\x3e World Allergy Organization \(WAO\) Diagnosis and Rationale for Action against Cow\x27s Milk Allergy \(DRACMA\) Guidelines \/ Hướng dẫn chẩn đoán và cơ sở hành động chống lại dị ứng sữa bò của Tổ chức Dị ứng Thế giới \(DRACMA\) \x3cem\x3eNguồn: PubMed \/ World Allergy Organization Journal\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/23268426\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/23268426\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNational Institutes of Health \(NIH\) – 2023\x3c\/strong\x3e Calcium: Fact Sheet for Health Professionals \/ Canxi: Tờ thông tin dành cho chuyên gia y tế \(Nhu cầu canxi cho phụ nữ cho con bú\) \x3cem\x3eNguồn: NIH Office of Dietary Supplements\x3c\/em\x3e \x3ca href=\\\x22https:\/\/ods.od.nih.gov\/factsheets\/Calcium-HealthProfessional\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/ods.od.nih.gov\/factsheets\/Calcium-HealthProfessional\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVandenplas Y, et al. – 2014\x3c\/strong\x3e Guidelines for the diagnosis and management of cow\x27s milk protein allergy in infants \/ Hướng dẫn chẩn đoán và quản lý dị ứng đạm sữa bò ở trẻ sơ sinh \x3cem\x3eNguồn: PubMed \/ Archives of Disease in Childhood\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/17895338\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/17895338\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eInfante Pina D, et al. – 2003\x3c\/strong\x3e Use of goat\x27s milk in patients with cow\x27s milk allergy \/ Việc sử dụng sữa dê ở bệnh nhân dị ứng sữa bò \(Nghiên cứu về phản ứng chéo\) \x3cem\x3eNguồn: PubMed \/ Anales de Pediatría\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/12841570\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/12841570\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGroetch M, et al. – 2013\x3c\/strong\x3e Nutritional management of the allergic infant \/ Quản lý dinh dưỡng cho trẻ nhũ nhi bị dị ứng \x3cem\x3eNguồn: PubMed \/ Journal of Allergy and Clinical Immunology: In Practice\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/24075253\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/24075253\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNowak-Węgrzyn A, et al. – 2015\x3c\/strong\x3e Non-IgE-mediated gastrointestinal food allergies \/ Dị ứng thực phẩm đường tiêu hóa không qua trung gian IgE \(Liên quan đến viêm ruột do protein thực phẩm\) \x3cem\x3eNguồn: PubMed \/ Annals of Allergy, Asthma \x26amp; Immunology\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25956413\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25956413\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-10T05:39:29.479Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251210072807\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22DỊ ỨNG ĐẠM SỮA BÒ: \\\x22KẺ THÙ GIẤU MẶT\\\x22 KHIẾN CON QUẤY KHÓC, CHẬM TĂNG CÂN, NỔI CHÀM. CÁCH NHẬN BIẾT VÀ CHỌN SỮA ĐÚNG CHUẨN Y KHOA\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1RaPCfboc1DCjCSxB2bxoybMQf2z494Hw\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Bác sĩ ơi, con em đổi đến 5-6 loại sữa rồi mà vẫn không ổn. Cháu cứ uống xong là nôn trớ, đi ngoài phân lỏng liên tục, da thì nổi mẩn đỏ quanh miệng, đêm ngủ không yên. Em stress quá!\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eĐây là tâm sự rất thường gặp tại các phòng khám dinh dưỡng nhi. Nhiều bố mẹ rơi vào ma trận đổi sữa vì con có các triệu chứng mơ hồ, dai dẳng mà không biết rằng nguyên nhân gốc rễ có thể nằm ở chính loại protein có trong sữa bò mà con đang uống.\x3c\/p\x3e\x3cp\x3eDị ứng đạm sữa bò \(CMPA\) là loại dị ứng thực phẩm phổ biến nhất ở trẻ nhũ nhi. Bài viết này sẽ giúp bố mẹ nhận diện \\\x22kẻ thù giấu mặt\\\x22 này và biết hướng xử lý đúng đắn.\x3c\/p\x3e\x3ch3\x3e1. DỊ ỨNG ĐẠM SỮA BÒ LÀ GÌ? TẠI SAO CON TÔI LẠI BỊ?\x3c\/h3\x3e\x3cp\x3eHãy tưởng tượng hệ miễn dịch của trẻ sơ sinh giống như một đội quân bảo vệ còn non nớt, chưa phân biệt rõ \\\x22địch - ta\\\x22.\x3c\/p\x3e\x3cp\x3eỞ trẻ bị dị ứng, hệ miễn dịch nhận định sai lầm rằng các protein trong sữa bò \(đặc biệt là Whey và Casein\) là \\\x22kẻ xâm nhập nguy hiểm\\\x22. Do đó, mỗi khi trẻ uống sữa, \\\x22đội quân\\\x22 này sẽ phát động một cuộc tấn công để tiêu diệt protein đó. Cuộc chiến này gây ra các phản ứng viêm ở nhiều cơ quan khác nhau trong cơ thể trẻ, tạo nên các triệu chứng bệnh.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTin tốt:\x3c\/strong\x3e Đa số trẻ sẽ tự khỏi dị ứng này khi lớn lên \(thường sau 1-3 tuổi\) khi hệ miễn dịch trưởng thành hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e2. \\\x22CỜ ĐỎ\\\x22 CẢNH BÁO: CÁC TRIỆU CHỨNG ĐA DẠNG DỄ GÂY NHẦM LẪN\x3c\/h3\x3e\x3cp\x3eĐiều khiến dị ứng đạm sữa bò khó chẩn đoán là các triệu chứng của nó rất đa dạng, có thể xuất hiện ngay lập tức \(trong vài phút sau khi uống\) hoặc muộn \(sau vài giờ đến vài ngày\).\x3c\/p\x3e\x3cp\x3eBố mẹ cần cảnh giác nếu thấy con có các biểu hiện ở 3 nhóm cơ quan chính sau đây:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNHÓM 1: Biểu hiện ngoài Da \(Phổ biến nhất\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChàm sữa \(Eczema\) dai dẳng:\x3c\/strong\x3e Da khô, đỏ, tróc vảy, ngứa ngáy, thường ở má, trán, khuỷu tay, khoeo chân. Bôi thuốc dưỡng ẩm không đỡ hoặc tái phát liên tục.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMề đay, phát ban:\x3c\/strong\x3e Nổi các mảng đỏ, sưng nề quanh miệng hoặc toàn thân ngay sau khi uống sữa.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNHÓM 2: Biểu hiện Tiêu hóa \(Dễ nhầm với rối loạn tiêu hóa thông thường\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNôn trớ nhiều:\x3c\/strong\x3e Không chỉ là trớ sữa thông thường sau ăn, mà là nôn vọt, nôn nhiều lần trong ngày, trẻ tỏ ra đau đớn, khó chịu khi nôn \(biểu hiện của trào ngược do dị ứng\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBất thường về phân:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐi tiêu phân lỏng, nhiều nước, có nhầy mũi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐặc biệt báo động: Phân có dính sợi máu \(do viêm ruột kích ứng\).\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eMột số ít trường hợp lại biểu hiện bằng táo bón dai dẳng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐau bụng colic:\x3c\/strong\x3e Trẻ khóc thét dữ dội, co rúm người, thường vào một giờ cố định trong ngày \(khóc dạ đề\) và rất khó dỗ dành.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNHÓM 3: Biểu hiện Hô hấp và Toàn thân \(Ít gặp hơn\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhò khè, nghẹt mũi kéo dài mà không có dấu hiệu nhiễm trùng \(không sốt\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChậm tăng cân, sụt cân, vẻ mặt mệt mỏi, xanh xao \(do ruột bị tổn thương mãn tính, kém hấp thu dinh dưỡng\).\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. CHẨN ĐOÁN: KHÔNG PHẢI CỨ XÉT NGHIỆM MÁU LÀ RA\x3c\/h3\x3e\x3cp\x3eNhiều bố mẹ tự đưa con đi xét nghiệm máu hoặc test lẩy da và nhận kết quả âm tính, nên đinh ninh con không bị dị ứng. Đây là một hiểu lầm lớn.\x3c\/p\x3e\x3cp\x3eCó hai loại cơ chế dị ứng:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQua trung gian IgE \(Phản ứng nhanh\):\x3c\/strong\x3e Có thể phát hiện qua xét nghiệm máu hoặc test da.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhông qua trung gian IgE \(Phản ứng chậm\):\x3c\/strong\x3e Các triệu chứng thường xuất hiện muộn \(như viêm ruột, chàm da\). \x3cstrong\x3eLoại này xét nghiệm máu thường ÂM TÍNH.\x3c\/strong\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eTiêu chuẩn vàng để chẩn đoán:\x3c\/strong\x3e Là phương pháp \\\x22Loại trừ và Thử lại\\\x22 \(Elimination and Re-challenge\) dưới sự giám sát của bác sĩ.\x3c\/blockquote\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBước 1:\x3c\/strong\x3e Ngưng hoàn toàn sữa bò \(đổi sang sữa \\bđặc biệt\) trong 2-4 tuần. Nếu các triệu chứng cải thiện rõ rệt -\x26gt; Nghi ngờ cao.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBước 2:\x3c\/strong\x3e Cho trẻ dùng lại sữa bò một cách thận trọng. Nếu triệu chứng tái xuất hiện -\x26gt; Chẩn đoán xác định.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. GIẢI PHÁP DINH DƯỠNG: CHỌN SỮA GÌ KHI CON DỊ ỨNG?\x3c\/h3\x3e\x3cp\x3eKhi đã xác định con bị dị ứng đạm sữa bò, nguyên tắc điều trị tiên quyết là \x3cstrong\x3eLOẠI BỎ HOÀN TOÀN\x3c\/strong\x3e đạm sữa bò nguyên vẹn ra khỏi chế độ ăn.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNếu trẻ bú mẹ hoàn toàn:\x3c\/strong\x3e Mẹ cần thực hiện chế độ ăn loại trừ: Kiêng hoàn toàn sữa bò và các chế phẩm từ sữa \(sữa chua, phô mai, bơ, bánh kẹo có sữa...\) trong ít nhất 2 tuần để theo dõi phản ứng của con.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNếu trẻ uống sữa công thức:\x3c\/strong\x3e Bố mẹ CẦN chuyển sang các loại sữa điều trị đặc biệt. Không được tự ý đổi sang sữa dê, sữa cừu hay các loại sữa hạt thông thường.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSữa dê\/cừu:\x3c\/strong\x3e Cấu trúc đạm của sữa dê\/cừu tương tự sữa bò đến 90%, nên nguy cơ trẻ dị ứng chéo là rất cao.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSữa đậu nành:\x3c\/strong\x3e Không khuyến cáo dùng cho trẻ dưới 6 tháng tuổi bị dị ứng đạm sữa bò vì nguy cơ dị ứng chéo và các vấn đề dinh dưỡng khác.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1-QvLm4PicaxOLrp6XZrnQVxUfn4cVrS1\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eHAI LỰA CHỌN SỮA ĐIỀU TRỊ CHUẨN Y KHOA:\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eHãy hình dung đạm sữa bò như một \\\x22tòa lâu đài lego\\\x22 lớn, hệ miễn dịch nhìn thấy nó sẽ tấn công.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLựa chọn 1 \(Ưu tiên hàng đầu\): Sữa thủy phân hoàn toàn \(Extensively Hydrolyzed Formula - eHF\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế:\x3c\/strong\x3e Tòa lâu đài protein đã được đập nhỏ ra thành các mảnh lego vụn \(chuỗi peptide ngắn\). Hệ miễn dịch của đa số trẻ sẽ không nhận diện được các mảnh vụn này nên không tấn công.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐặc điểm:\x3c\/strong\x3e Có vị hơi đắng và mùi hơi hôi đặc trưng. Phân trẻ uống sữa này thường có màu xanh rêu và mùi nồng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eVí dụ:\x3c\/em\x3e Nutramigen, Alimentum, Pregestimil, NAN Supreme... \(Lưu ý: Phải là loại \\\x22thủy phân hoàn toàn\\\x22, loại \\\x22thủy phân một phần\/gentle\\\x22 thường không có tác dụng điều trị\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLựa chọn 2 \(Dành cho ca nặng\): Sữa Acid Amin \(Amino Acid Formula - AAF\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChỉ định:\x3c\/strong\x3e Khi trẻ vẫn còn triệu chứng dù đã dùng sữa thủy phân hoàn toàn, hoặc trẻ có phản ứng phản vệ nghiêm trọng, suy dinh dưỡng nặng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế:\x3c\/strong\x3e Tòa lâu đài protein được nghiền nát thành từng hạt nhựa nguyên tử riêng lẻ \(acid amin\). Hệ miễn dịch hoàn toàn không thể nhận diện được nữa. Đây là loại sữa ít gây dị ứng nhất.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐặc điểm:\x3c\/strong\x3e Vị khó uống hơn eHF và giá thành rất đắt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eVí dụ:\x3c\/em\x3e Neocate, EleCare, Puramino...\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e5. LỜI KHUYÊN: KIÊN NHẪN LÀ CHÌA KHÓA\x3c\/h3\x3e\x3cp\x3eChăm sóc trẻ bị dị ứng đạm sữa bò là một hành trình dài hơi.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐừng tự làm bác sĩ:\x3c\/strong\x3e Việc chẩn đoán và chọn sữa cần có sự tư vấn của bác sĩ chuyên khoa Nhi hoặc Dinh dưỡng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKiên trì với sữa đặc biệt:\x3c\/strong\x3e Trẻ cần thời gian để làm quen với vị sữa mới. Đừng bỏ cuộc quá sớm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhông tự ý thử lại sữa bò:\x3c\/strong\x3e Việc cho trẻ dùng lại sữa bò để kiểm tra xem đã khỏi chưa cần được thực hiện theo lộ trình của bác sĩ \(thường sau mỗi 6-12 tháng\) để tránh các phản ứng nguy hiểm như sốc phản vệ.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-10T04:35:07.304Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251207101704\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22GIẤC NGỦ CỦA BÉ: TỪ \\\x22CUỘC CHIẾN XUYÊN ĐÊM\\\x22 ĐẾN GIẤC NGỦ THIÊN THẦN. BÍ QUYẾT RÈN NẾP NGỦ KHOA HỌC\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1YosWHQ-Yzx8irl80IW3qUjzdrA5bvJbr\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Làm sao để con ngủ xuyên đêm?\\\x22, \\\x22Tại sao con cứ đặt xuống là khóc?\\\x22, \\\x22Tôi kiệt sức vì phải bế rong ru ngủ cả đêm...\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eNếu bạn đang ở trong tình trạng thiếu ngủ trầm trọng, hãy biết rằng bạn không cô đơn. Giấc ngủ của trẻ sơ sinh và trẻ nhỏ rất khác người lớn. Hiểu được cơ chế khoa học và áp dụng đúng phương pháp rèn luyện sẽ là chìa khóa giải thoát cho cả gia đình.\x3c\/p\x3e\x3ch3\x3e1. HIỂU VỀ \\\x22KẺ THÙ\\\x22: TẠI SAO BÉ LẠI KHÓ NGỦ ĐẾN VẬY?\x3c\/h3\x3e\x3cp\x3eĐể rèn con ngủ, trước hết bố mẹ cần hiểu giấc ngủ của con hoạt động như thế nào. Đừng áp đặt mong đợi của người lớn lên trẻ nhỏ.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSự thật 1: Chu kỳ ngủ của bé rất ngắn\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNgười lớn có chu kỳ ngủ khoảng 90 phút.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ sơ sinh có chu kỳ ngủ rất ngắn, chỉ khoảng \x3cstrong\x3e45-50 phút\x3c\/strong\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHậu quả:\x3c\/em\x3e Hết một chu kỳ, trẻ sẽ có một khoảng thức giấc ngắn. Nếu không biết cách tự ngủ lại \(tự trấn an\), trẻ sẽ khóc gọi bố mẹ hỗ trợ \(bế, ru, cho ti\). Đây là lý do trẻ hay \\\x22ngủ vặt\\\x22, tỉnh dậy nhiều lần trong đêm.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSự thật 2: Bé ngủ \\\x22động\\\x22 nhiều hơn ngủ \\\x22tĩnh\\\x22\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ dành khoảng 50% thời gian cho giấc ngủ REM \(giấc ngủ động, mơ màng\). Ở giai đoạn này, trẻ rất dễ bị đánh thức bởi tiếng động nhỏ, hay vặn mình, ọ ẹ, thậm chí khóc nấc lên rồi lại ngủ tiếp.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eSai lầm của bố mẹ:\x3c\/em\x3e Vội vàng bế con lên ngay khi thấy con ọ ẹ. Hành động này vô tình làm gián đoạn giấc ngủ của con, khiến con tỉnh hẳn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eSự thật 3: Kẻ thù lớn nhất là \\\x22QUÁ MỆT\\\x22 \(Overtired\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhi trẻ quá buồn ngủ mà không được đi ngủ ngay, cơ thể sẽ tiết ra hormone căng thẳng Cortisol. Hormone này giống như \\\x22Adrenaline\\\x22, làm trẻ hưng phấn ngược, trở nên cáu gắt, quấy khóc dữ dội và cực kỳ khó đi vào giấc ngủ.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e2. BƯỚC ĐỆM QUAN TRỌNG NHẤT: THIẾT LẬP \\\x22THỦ TỤC ĐI NGỦ\\\x22 \(BEDTIME ROUTINE\)\x3c\/h3\x3e\x3cp\x3eTrước khi nghĩ đến các phương pháp luyện ngủ cao siêu \(Cry it out, Ferber...\), bạn phải xây dựng được nền tảng này. Đây là tín hiệu báo cho não bộ của trẻ biết: \x3cem\x3e\\\x22À, sắp đến giờ đi ngủ rồi, hãy thư giãn nào\\\x22\x3c\/em\x3e.\x3c\/p\x3e\x3cp\x3eMột thủ tục đi ngủ chuẩn cần: \x3cstrong\x3eNhất quán\x3c\/strong\x3e \(làm y hệt nhau mỗi ngày\) và \x3cstrong\x3eDiễn ra trong khoảng 20-30 phút\x3c\/strong\x3e trước giờ ngủ.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eGợi ý quy trình \\\x224B\\\x22 kinh điển:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBath \(Tắm nước ấm\):\x3c\/strong\x3e Nước ấm giúp thư giãn cơ bắp rất tốt.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBreast\/Bottle \(Ăn no\):\x3c\/strong\x3e Đảm bảo bé không bị đói khi vào giấc đêm. \(Lưu ý: Với trẻ lớn hơn, nên tách bữa ăn này xa giờ ngủ một chút để tránh thói quen vừa ti vừa ngủ\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBook\/Bonding \(Đọc truyện\/Kết nối\):\x3c\/strong\x3e Thay bỉm sạch, mặc đồ ngủ, massage nhẹ nhàng, đọc một cuốn truyện ehon với giọng trầm ấm, hoặc hát ru khe khẽ trong ánh đèn mờ.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBed \(Vào giường\):\x3c\/strong\x3e Đặt bé vào cũi\/giường khi bé đã thư giãn, buồn ngủ nhưng VẪN CÒN THỨC.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. BÍ QUYẾT RÈN NGỦ KHOA HỌC: NGUYÊN TẮC \\\x22BUỒN NGỦ NHƯNG VẪN THỨC\\\x22 \(DROWSY BUT AWAKE\)\x3c\/h3\x3e\x3cp\x3eĐây là \\\x22chén thánh\\\x22 của việc rèn ngủ. Mục tiêu cuối cùng là dạy cho trẻ kỹ năng \x3cstrong\x3eTỰ TRẤN AN \(Self-soothing\)\x3c\/strong\x3e – khả năng tự đưa mình vào giấc ngủ mà không cần sự hỗ trợ bên ngoài \(ti mẹ, bế rung, võng...\).\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eTại sao phải đặt con xuống khi còn thức?\x3c\/strong\x3e Nếu bạn ru con ngủ say trên tay rồi mới đặt xuống giường, thì khi con tỉnh giấc giữa đêm \(khi hết chu kỳ ngủ\), con sẽ hoảng loạn vì thấy khung cảnh thay đổi: \x3cem\x3e\\\x22Tại sao lúc ngủ mình ở trên tay mẹ ấm áp, mà giờ lại nằm một mình ở chỗ lạnh lẽo này?\\\x22\x3c\/em\x3e. Và con sẽ khóc đòi quay lại trạng thái cũ \(được bế\).\x3c\/p\x3e\x3cp\x3eNgược lại, nếu con tự ngủ được trong cũi của mình, thì khi tỉnh giấc giữa đêm, con thấy mọi thứ vẫn quen thuộc và sẽ dễ dàng tự ngủ lại.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eCác phương pháp rèn ngủ phổ biến \(Áp dụng cho trẻ từ 4-6 tháng tuổi trở lên\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePhương pháp \\\x22Khóc có kiểm soát\\\x22 \(Ferber\/Gradual Extinction\):\x3c\/strong\x3e Đặt con vào cũi khi còn thức, chúc ngủ ngon và đi ra. Nếu con khóc, hãy chờ một khoảng thời gian định trước \(ví dụ: 3 phút, rồi tăng lên 5 phút, 10 phút...\) trước khi vào vỗ về một chút \(không bế lên\) rồi lại đi ra.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePhương pháp \\\x22Chiếc ghế\\\x22 \(The Chair Method - Nhẹ nhàng hơn\):\x3c\/strong\x3e Bố\/mẹ ngồi trên ghế cạnh cũi của con cho đến khi con ngủ. Mỗi đêm, bạn dịch chiếc ghế ra xa cũi một chút cho đến khi bạn ra khỏi phòng hẳn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePhương pháp \\\x22Bế lên đặt xuống\\\x22 \(Pick Up\/Put Down - Rất kiên nhẫn\):\x3c\/strong\x3e Nếu con khóc, bế con lên vỗ về cho nín. Ngay khi con vừa nín và thả lỏng \(chưa ngủ\), lập tức đặt con xuống. Lặp đi lặp lại \(có thể hàng chục lần mỗi đêm\) cho đến khi con chịu nằm yên và tự ngủ.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cem\x3eLưu ý: Không có phương pháp nào là tốt nhất, chỉ có phương pháp phù hợp nhất với tính cách của con và triết lý của gia đình bạn.\x3c\/em\x3e\x3c\/p\x3e\x3ch3\x3e4. TỐI ƯU HÓA MÔI TRƯỜNG NGỦ\x3c\/h3\x3e\x3cp\x3eĐừng bắt con ngủ trong một môi trường đầy ánh sáng và tiếng ồn. Hãy tạo ra một \\\x22cái hang\\\x22 lý tưởng cho giấc ngủ:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTối hoàn toàn:\x3c\/strong\x3e Sử dụng rèm cản nắng. Bóng tối kích thích sản sinh Melatonin \(hormone gây buồn ngủ\). Dùng đèn ngủ màu đỏ\/cam mờ nếu cần thay bỉm đêm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNhiệt độ mát mẻ:\x3c\/strong\x3e Trẻ nhỏ ngủ ngon nhất ở nhiệt độ phòng khoảng 24-26°C \(tùy loại điều hòa và cách mặc đồ\). Quá nóng là nguyên nhân hàng đầu gây trằn trọc.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTiếng ồn trắng \(White Noise\):\x3c\/strong\x3e Đây là \\\x22bảo bối\\\x22. Tiếng ồn trắng \(tiếng mưa, tiếng sóng biển, tiếng máy sấy...\) giúp lấn át các tiếng động bất ngờ trong nhà \(tiếng chó sủa, tiếng đóng cửa\) và tái tạo lại âm thanh quen thuộc trong bụng mẹ, giúp trẻ an tâm hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e5. LỜI KHUYÊN CUỐI CÙNG: KIÊN NHẪN VÀ NHẤT QUÁN\x3c\/h3\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eRèn ngủ không phải là chuyện một sớm một chiều. Nó là một quá trình đầy nước mắt \(của cả mẹ và con\) và sự thụt lùi \(sleep regression\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSẽ có những giai đoạn \\\x22khủng hoảng ngủ\\\x22 \(khi trẻ biết lẫy, biết bò, mọc răng...\) khiến mọi công sức của bạn dường như đổ sông đổ bể. Đừng nản lòng. Hãy kiên trì duy trì lịch sinh hoạt và thủ tục đi ngủ. Mọi thứ sẽ sớm vào guồng trở lại.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eHãy nhớ:\x3c\/strong\x3e Bạn đang tặng cho con một món quà vô giá: Kỹ năng ngủ độc lập. Một em bé ngủ ngon sẽ là một em bé vui vẻ, khỏe mạnh và thông minh hơn!\x3c\/blockquote\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMindell JA, et al. – 2015\x3c\/strong\x3e Bedtime routines for young children: a dose-dependent association with sleep outcomes \/ Thói quen giờ đi ngủ cho trẻ nhỏ: Mối liên hệ phụ thuộc vào liều lượng với kết quả giấc ngủ \x3cem\x3eNguồn: PubMed \/ Sleep Journal\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25907488\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25907488\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePrice AMH, et al. – 2012\x3c\/strong\x3e Five-year follow-up of harms and benefits of behavioral infant sleep intervention \/ Theo dõi 5 năm về tác hại và lợi ích của can thiệp hành vi giấc ngủ cho trẻ sơ sinh \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/22966034\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/22966034\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGradisar M, et al. – 2016\x3c\/strong\x3e Behavioral Interventions for Infant Sleep Problems: A Randomized Controlled Trial \/ Các can thiệp hành vi cho vấn đề giấc ngủ ở trẻ sơ sinh: Một thử nghiệm ngẫu nhiên có đối chứng \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/27244847\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/27244847\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBurnham MM, et al. – 2002\x3c\/strong\x3e Nighttime sleep-wake patterns and self-soothing from birth to one year of age \/ Các mô hình ngủ-thức ban đêm và khả năng tự trấn an từ khi sinh đến một tuổi \x3cem\x3eNguồn: PubMed \/ Infant Behavior and Development\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/12457698\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/12457698\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSpencer JA, et al. – 1990\x3c\/strong\x3e White noise and sleep induction \/ Tiếng ồn trắng và cảm ứng giấc ngủ \x3cem\x3eNguồn: PubMed \/ Archives of Disease in Childhood\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/2289256\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/2289256\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eStanford Medicine Children’s Health – 2023\x3c\/strong\x3e Infant Sleep \/ Giấc ngủ của trẻ sơ sinh \x3cem\x3eNguồn: Stanford Medicine\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.stanfordchildrens.org\/en\/topic\/default?id=infant-sleep-90-P02237\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.stanfordchildrens.org\/en\/topic\/default?id=infant-sleep-90-P02237\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBathory E, et al. – 2017\x3c\/strong\x3e Sleep Regulation, Physiology and Development, Sleep Duration and Patterns, and Sleep Hygiene in Infants, Toddlers, and Preschool-Age Children \/ Điều hòa giấc ngủ, sinh lý và phát triển, thời lượng và mô hình giấc ngủ, và vệ sinh giấc ngủ ở trẻ sơ sinh, trẻ mới biết đi và trẻ mẫu giáo \x3cem\x3eNguồn: PubMed \/ Current Problems in Pediatric and Adolescent Health Care\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28131649\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28131649\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePaul IM, et al. – 2017\x3c\/strong\x3e INSIGHT Responsive Parenting Intervention and Infant Sleep \/ Can thiệp làm cha mẹ đáp ứng INSIGHT và giấc ngủ của trẻ sơ sinh \x3cem\x3eNguồn: PubMed \/ Pediatrics\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/28652417\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/28652417\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T17:00:59.603Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251207085919\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22BIẾNG ĂN TÂM LÝ: KHI BỮA CƠM LÀ \\\x22CHIẾN TRƯỜNG\\\x22. NGUYÊN NHÂN VÀ CHIẾN LƯỢC ĐỂ CON ĂN TRONG HẠNH PHÚC MÀ KHÔNG CẦN ÉP BUỘC\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=13NtS7DnTxe-2Sb1TmRBx3AF0dAyvZiLD\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Há miệng ra nào, một miếng nữa thôi con!\\\x22, \\\x22Không ăn là mẹ không yêu đâu!\\\x22, \\\x22Nhìn con nhà người ta ăn kìa...\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eNhững câu nói này có quen thuộc với bạn không? Nếu mỗi bữa ăn của gia đình bạn diễn ra trong cảnh bế rong, làm trò, năn nỉ, thậm chí quát tháo và kết thúc bằng nước mắt của cả mẹ lẫn con, thì rất có thể con bạn đang mắc \x3cstrong\x3eBiếng ăn tâm lý\x3c\/strong\x3e.\x3c\/p\x3e\x3cp\x3eKhác với biếng ăn do bệnh lý \(khi cơ thể mệt mỏi\), biếng ăn tâm lý là khi trẻ hoàn toàn khỏe mạnh nhưng lại có phản kháng mạnh mẽ với việc ăn uống. Bữa ăn không còn là niềm vui mà trở thành một \\\x22cuộc chiến quyền lực\\\x22 và nỗi ám ảnh.\x3c\/p\x3e\x3cp\x3eBài viết này sẽ giúp bố mẹ gỡ bỏ áp lực và tìm lại niềm vui ăn uống cho con.\x3c\/p\x3e\x3ch3\x3e1. GIẢI MÃ: TẠI SAO CON LẠI SỢ ĂN ĐẾN VẬY?\x3c\/h3\x3e\x3cp\x3eBố mẹ cần hiểu: \x3cstrong\x3eĂn uống là một trong những nhu cầu bản năng cơ bản nhất của con người.\x3c\/strong\x3e Không một đứa trẻ khỏe mạnh nào lại tự bỏ đói mình đến mức nguy hiểm.\x3c\/p\x3e\x3cp\x3eVậy tại sao trẻ lại từ chối ăn? Nguyên nhân gốc rễ thường đến từ những trải nghiệm tiêu cực liên quan đến bữa ăn:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eNguyên nhân 1: Bị ÉP BUỘC quá mức \(Phổ biến nhất\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐây là sai lầm kinh điển. Khi bố mẹ quá lo lắng về cân nặng, họ có xu hướng ép con ăn bằng mọi giá: đè ra đổ thức ăn, bóp mũi cho nuốt, dọa nạt...\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHậu quả:\x3c\/strong\x3e Trẻ hình thành phản xạ có điều kiện: \x3cem\x3eNhìn thấy thìa\/bát cháo = Sắp bị ép = Sợ hãi và Phản kháng.\x3c\/em\x3e Bữa ăn trở thành một hình thức tra tấn tinh thần.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNguyên nhân 2: Bữa ăn căng thẳng, thiếu không khí gia đình\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ rất nhạy cảm với cảm xúc của người lớn. Nếu bố mẹ cãi nhau trong bữa cơm, hoặc mẹ cho ăn với khuôn mặt cau có, căng thẳng, trẻ sẽ cảm thấy không an toàn và mất cảm giác ngon miệng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNguyên nhân 3: Ám ảnh quá khứ \(Trauma\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ từng bị sặc, hóc, nôn trớ dữ dội khi ăn, hoặc bị đau họng\/nhiệt miệng khi ăn đồ nóng\/cay. Ký ức đau đớn này khiến trẻ sợ ăn lại món đó hoặc sợ chính hành động ăn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eNguyên nhân 4: Mất quyền kiểm soát và không được tôn trọng\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ từ 2 tuổi trở lên bắt đầu có nhu cầu khẳng định bản thân \(\\\x22khủng hoảng tuổi lên 3\\\x22\). Việc ăn uống là một trong số ít những thứ trẻ có thể tự kiểm soát. Nếu bố mẹ quyết định tất cả \(ăn gì, ăn bao nhiêu, ăn khi nào\) mà không cho trẻ quyền lựa chọn, trẻ sẽ dùng việc \\\x22không ăn\\\x22 như một vũ khí để phản kháng lại sự áp đặt đó.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e2. CÁI BẪY \\\x22VÒNG XOẮN BỆNH LÝ\\\x22 MÀ BỐ MẸ THƯỜNG MẮC PHẢI\x3c\/h3\x3e\x3cp\x3eĐây là lý do tại sao tình trạng biếng ăn cứ kéo dài mãi không dứt:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBố mẹ lo lắng:\x3c\/strong\x3e Thấy con ăn ít, sợ con gầy\/suy dinh dưỡng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHành động Ép buộc:\x3c\/strong\x3e Dùng mọi cách \(dỗ dành, dụ dỗ tivi, dọa nạt, ép thô bạo\) để nhồi thêm vài thìa.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrẻ phản kháng:\x3c\/strong\x3e Trẻ khóc, ngậm chặt miệng, nôn trớ để chống lại. Bữa ăn trở nên căng thẳng tột độ.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrẻ chán ghét thức ăn:\x3c\/strong\x3e Hình thành tâm lý sợ hãi bữa ăn. Lần sau chỉ cần thấy chuẩn bị ăn là đã khóc.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBố mẹ càng lo lắng hơn:\x3c\/strong\x3e Vòng luẩn quẩn lại bắt đầu với mức độ tồi tệ hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1o6VVYJ2OCjViFQOH7rYCxQBq5juorJCh\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cem\x3eBé cùng mẹ chế biến thức ăn\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cblockquote\x3e\x3cstrong\x3eChìa khóa để phá vỡ vòng xoắn này là: BỐ MẸ PHẢI LÀ NGƯỜI THAY ĐỔI TRƯỚC.\x3c\/strong\x3e\x3c\/blockquote\x3e\x3ch3\x3e3. CHIẾN LƯỢC \\\x22GỠ RỐI\\\x22: HÃY TRẢ LẠI QUYỀN ĐƯỢC ĐÓI CHO CON\x3c\/h3\x3e\x3cp\x3eMục tiêu của chúng ta không phải là nhồi nhét cho con ăn hết bát cơm hôm nay, mà là giúp con xây dựng một mối quan hệ lành mạnh và vui vẻ với thức ăn lâu dài.\x3c\/p\x3e\x3ch4\x3eBƯỚC 1: Quy tắc vàng \\\x22Phân chia trách nhiệm\\\x22 \(Thay đổi tư duy\)\x3c\/h4\x3e\x3cp\x3eHãy áp dụng quy tắc nổi tiếng của chuyên gia dinh dưỡng Ellyn Satter:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrách nhiệm của Bố Mẹ:\x3c\/strong\x3e Quyết định CÁI GÌ cho con ăn \(chọn thực phẩm lành mạnh\), KHI NÀO ăn \(giờ giấc cố định\) và Ở ĐÂU \(tại bàn ăn, không phải vừa chạy vừa ăn\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrách nhiệm của Con:\x3c\/strong\x3e Quyết định CÓ ĂN HAY KHÔNG và ĂN BAO NHIÊU.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eHãy tin tưởng con:\x3c\/strong\x3e Nếu con không ăn bữa này, con sẽ không chết đói. Con sẽ ăn bù vào bữa sau nếu thực sự đói. Đừng làm thay trách nhiệm của con.\x3c\/blockquote\x3e\x3ch4\x3eBƯỚC 2: Thiết lập kỷ luật bàn ăn \\\x22KHÔNG NƯỚC MẮT\\\x22\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNguyên tắc 30 phút:\x3c\/strong\x3e Mỗi bữa ăn chỉ kéo dài tối đa 30 phút. Nếu con không ăn, ngậm, hoặc quấy khóc: Hãy bình tĩnh dọn mâm đi. Tuyệt đối không năn nỉ, không tỏ thái độ giận dữ. Hãy nói nhẹ nhàng: \x3cem\x3e\\\x22Con no rồi đúng không? Vậy chúng ta kết thúc bữa ăn nhé.\\\x22\x3c\/em\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTuyệt đối KHÔNG ÉP:\x3c\/strong\x3e Dừng ngay mọi hành động đè ép, bóp mũi. Nếu con từ chối thìa cơm, hãy tôn trọng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhông Ti vi, điện thoại, đồ chơi:\x3c\/strong\x3e Bữa ăn là để ăn và giao tiếp. Những thứ gây xao nhãng chỉ khiến trẻ ăn thụ động \(ăn không biết mùi vị\) và càng kéo dài thời gian ngậm.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eBƯỚC 3: Để con được biết cảm giác \\\x22ĐÓI\\\x22\x3c\/h4\x3e\x3cp\x3eRất nhiều trẻ biếng ăn vì... chưa bao giờ kịp đói!\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCắt giảm bữa phụ vặt vãnh:\x3c\/strong\x3e Nếu trẻ vừa uống một hộp sữa, ăn cái bánh trước bữa chính 1 tiếng thì chắc chắn trẻ sẽ không muốn ăn cơm. Các bữa ăn \(chính và phụ\) cần cách nhau 2.5 - 3 tiếng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGiữa các bữa chỉ uống nước lọc:\x3c\/strong\x3e Không cho uống sữa, nước ngọt hay ăn vặt giữa các cữ.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eBƯỚC 4: Tăng quyền tự chủ và hứng thú \(Kích thích sự tò mò\)\x3c\/h4\x3e\x3ch4\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1XZaV4crAXZYo1PggY84cIPT3TzmeacU7\x26amp;sz=w4096\\\x22\x3e\x3c\/h4\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cem\x3eCho phép được bẩn, để bé tự ăn\x3c\/em\x3e\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCho phép \\\x22làm bẩn\\\x22 \(Self-feeding\):\x3c\/strong\x3e Với trẻ nhỏ, hãy cho trẻ tự bốc, tự cầm thìa xúc dù vương vãi. Trẻ thích cảm giác tự mình khám phá thức ăn hơn là bị người khác đút.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMời gọi, không ép buộc:\x3c\/strong\x3e Đặt thức ăn trước mặt trẻ và ăn mẫu một cách ngon lành. Đừng nhìn chằm chằm vào miệng con chờ đợi. Hãy để trẻ tự tò mò và muốn thử.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCùng con chuẩn bị:\x3c\/strong\x3e Cho trẻ cùng nhặt rau, vo gạo, bày bát đũa. Trẻ sẽ hào hứng hơn với \\\x22thành quả\\\x22 mình làm ra.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrình bày bắt mắt:\x3c\/strong\x3e Một chút sáng tạo trong việc cắt tỉa rau củ hình thù ngộ nghĩnh có thể thay đổi thái độ của trẻ.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Chữa biếng ăn tâm lý là một cuộc hành trình đòi hỏi sự KIÊN NHẪN tột cùng của bố mẹ. Có thể mất vài tuần đến vài tháng để trẻ quên đi nỗi sợ cũ và tìm lại niềm vui ăn uống.\x3c\/p\x3e\x3cp\x3eHãy nhớ: Một vài bữa ăn ít không ảnh hưởng đến sự phát triển lâu dài của con, nhưng một tâm lý sợ hãi thức ăn sẽ ảnh hưởng cả đời. Hãy dũng cảm buông bỏ áp lực để bữa cơm gia đình thực sự là những giờ phút hạnh phúc!\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eBài viết cùng chủ đề:\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22background-color: rgb\(255, 255, 255\); color: rgb\(51, 51, 51\);\\\x22\x3e\x3ca href=\\\x22https:\/\/friendmedicalclinic.com\/news\/articles\/NEWS_20251201002743\/NEWS_20251201002743.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3eGIẢI MÃ MA TRẬN BIẾNG ĂN – TÂM LÝ HAY BỆNH LÝ?\x3c\/a\x3e\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKerzner B, et al. – 2015\x3c\/strong\x3e A practical approach to classifying and managing feeding difficulties \/ Tiếp cận thực tế để phân loại và quản lý các khó khăn trong việc ăn uống \x3cem\x3eNguồn: PubMed \/ Pediatrics \(AAP\)\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/25647684\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/25647684\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGalloway AT, et al. – 2006\x3c\/strong\x3e \\\x22Finish your soup\\\x22: Counterproductive effects of pressuring children to eat \/ \\\x22Húp hết súp đi\\\x22: Tác dụng ngược của việc ép trẻ ăn \x3cem\x3eNguồn: PubMed \/ Appetite\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/16386818\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/16386818\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBirch LL, et al. – 2000\x3c\/strong\x3e Mothers\x27 child-feeding practices influence daughters\x27 eating and weight \/ Thực hành cho ăn của mẹ ảnh hưởng đến việc ăn uống và cân nặng của con gái \x3cem\x3eNguồn: PubMed \/ The American Journal of Clinical Nutrition\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/10799397\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/10799397\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMayo Clinic Staff – 2022\x3c\/strong\x3e Picky eaters: 5 tips to get your child to eat \/ Trẻ kén ăn: 5 mẹo giúp con bạn chịu ăn \x3cem\x3eNguồn: Mayo Clinic\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.mayoclinic.org\/healthy-lifestyle\/childrens-health\/in-depth\/childrens-health\/art-20044948\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.mayoclinic.org\/healthy-lifestyle\/childrens-health\/in-depth\/childrens-health\/art-20044948\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBlack MM, Aboud FE. – 2011\x3c\/strong\x3e Responsive feeding is embedded in a theoretical framework of responsive parenting \/ Nuôi ăn đáp ứng nằm trong khuôn khổ lý thuyết của việc làm cha mẹ đáp ứng \x3cem\x3eNguồn: PubMed \/ The Journal of Nutrition\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/21270366\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/21270366\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eJansen PW, et al. – 2012\x3c\/strong\x3e Bidirectional associations between child fussy eating and parents\x27 pressure to eat at 2 and 4 years \/ Mối liên hệ hai chiều giữa trẻ kén ăn và áp lực ép ăn của cha mẹ ở trẻ 2 và 4 tuổi \x3cem\x3eNguồn: PubMed \/ Physiology \x26amp; Behavior\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/22609865\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/22609865\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eZero to Three – 2017\x3c\/strong\x3e How to Handle Picky Eaters \/ Cách xử lý trẻ kén ăn \(Tâm lý học lứa tuổi 0-3\) \x3cem\x3eNguồn: Zero to Three\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.zerotothree.org\/resource\/how-to-handle-picky-eaters\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.zerotothree.org\/resource\/how-to-handle-picky-eaters\/\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eWorld Health Organization \(WHO\) \x26amp; UNICEF – 2021\x3c\/strong\x3e Indicators for assessing infant and young child feeding practices \/ Các chỉ số đánh giá thực hành nuôi dưỡng trẻ sơ sinh và trẻ nhỏ \x3cem\x3eNguồn: WHO\/UNICEF\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.who.int\/publications\/i\/item\/9789240018389\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.who.int\/publications\/i\/item\/9789240018389\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePowell F, et al. – 2017\x3c\/strong\x3e The importance of mealtimes for family well-being \/ Tầm quan trọng của giờ ăn đối với sự an vui của gia đình \x3cem\x3eNguồn: PubMed \/ Appetite\x3c\/em\x3e \x3ca href=\\\x22https:\/\/pubmed.ncbi.nlm.nih.gov\/27866870\/\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/pubmed.ncbi.nlm.nih.gov\/27866870\/\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-07T13:03:00.740Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251201002743\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22GIẢI MÃ MA TRẬN BIẾNG ĂN – TÂM LÝ HAY BỆNH LÝ?\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=17UOGNhTm7bUWN_iBjnTK5eyIbD4XngTY\x26sz=w4096\x22,\x22content\x22:\x22\x3ch3\x3eGIẢI MÃ \\\x22MA TRẬN\\\x22 BIẾNG ĂN: KHI BỮA CƠM TRỞ THÀNH CHIẾN TRƯỜNG TÂM LÝ\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eMỗi bữa ăn của gia đình bạn diễn ra như thế nào? Là tiếng cười vui vẻ hay là cảnh mẹ cầm bát chạy theo con, còn con thì khóc lóc, ngậm chặt miệng?\x3c\/p\x3e\x3cp\x3eTrước khi vội vàng đổi sữa, mua thuốc bổ hay tự trách mình \\\x22không biết nuôi con\\\x22, bố mẹ hãy bình tĩnh cùng Bác sĩ phân biệt rõ: Bé đang gặp \x3cstrong\x3eBiếng ăn tâm lý\x3c\/strong\x3e hay \x3cstrong\x3eBiếng ăn bệnh lý\x3c\/strong\x3e? Bởi vì chìa khóa giải quyết của hai vấn đề này nằm ở hai cánh cửa hoàn toàn khác nhau.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1_WLcN_wm7s92qD1Jzyg2oPer9P86fU7W\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3ch2\x3ePHẦN 1: BIẾNG ĂN TÂM LÝ \(Phổ biến nhất - Chiếm \x26gt;60% các ca khám\)\x3c\/h2\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eBản chất:\x3c\/strong\x3e Đây là cuộc chiến của \\\x22cái đầu\\\x22. Cơ thể bé hoàn toàn khỏe mạnh, hệ tiêu hóa hoạt động tốt, nhưng não bộ lại phát tín hiệu \\\x22TỪ CHỐI\\\x22 tiếp nhận thức ăn.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\\tDấu hiệu nhận biết\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSự đối lập về hành vi:\x3c\/strong\x3e Bé vẫn chơi đùa, lanh lợi, không hề mệt mỏi. Bé có thể ăn rất ngon ở lớp hoặc nhà bà, nhưng về nhà mẹ cho ăn thì dứt khoát không.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePhản xạ có điều kiện tiêu cực:\x3c\/strong\x3e Chỉ cần nhìn thấy yếm, ghế ăn, hoặc bát thìa là bé khóc thét, quay mặt đi dù chưa nếm thử miếng nào.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\\t\\\x22Giải phẫu\\\x22 4 thủ phạm tâm lý - thần kinh\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eTại sao một đứa trẻ khỏe mạnh lại chịu nhịn đói? Khoa học giải thích như sau:\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e1. Cơ chế sinh học của Stress \(Ép ăn\)\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eNhiều cha mẹ nghĩ ép ăn chỉ làm con khóc. Nhưng thực tế, hành động giữ tay chân, bóp mũi hay quát tháo đã kích hoạt phản ứng \x3cstrong\x3e\\\x22Chiến đấu hoặc Bỏ chạy\\\x22 \(Fight or Flight\)\x3c\/strong\x3e:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNão bộ trẻ tiết ra \x3cstrong\x3eCortisol\x3c\/strong\x3e \(hormone căng thẳng\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCortisol ức chế quá trình tiết men tiêu hóa và làm giảm tưới máu đến dạ dày.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHệ quả:\x3c\/strong\x3e Bé cảm thấy buồn nôn, thắt dạ dày và mất hoàn toàn cảm giác đói. Lúc này, bé nôn là phản xạ tự nhiên của cơ thể đang sợ hãi, không phải bé cố tình.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e2. Khủng hoảng \\\x22Cái tôi\\\x22 \(Quyền kiểm soát\)\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eGiai đoạn 9-18 tháng và tuổi lên 3 là lúc trẻ muốn khẳng định sự độc lập. Trong thế giới mà trẻ bị người lớn kiểm soát mọi thứ \(giờ ngủ, giờ tắm\), thì \x3cstrong\x3eCÁI MIỆNG\x3c\/strong\x3e là nơi duy nhất trẻ có toàn quyền \\\x22tự trị\\\x22.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eViệc ngậm chặt miệng là cách trẻ tuyên bố: \x3cem\x3e\\\x22Cơ thể này là của con, bố mẹ không thể ép buộc con!\\\x22\x3c\/em\x3e.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCàng ép, trẻ càng chống đối mạnh mẽ để bảo vệ quyền lực non nớt này.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e3. Cái bẫy \\\x22Ăn vặt vô hình\\\x22\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eMột cái kẹo, nửa hộp sữa chua, vài quả nho cách bữa chính 1 tiếng – tưởng ít nhưng lại là \\\x22sát thủ\\\x22 giấu mặt.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eLượng đường nhỏ này làm đường huyết tăng lên.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNão bộ nhận tín hiệu \\\x22Đủ năng lượng\\\x22 và ức chế hormone gây đói \(Ghrelin\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKết quả: Đến bữa chính, bé ở trạng thái \\\x22ngang dạ\\\x22, không đói cồn cào nên không muốn ăn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch4\x3e4. Ăn thụ động \(TV\/iPad\) - Cắt đứt trục Não \x26amp; Ruột\x3c\/h4\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eKhi dán mắt vào màn hình, não bộ tập trung xử lý hình ảnh vui nhộn và \\\x22quên\\\x22 nhiệm vụ xử lý thông tin từ miệng \(mùi vị, độ thô\).\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBé ăn như một \x3cstrong\x3ecỗ máy nhai\x3c\/strong\x3e: Nuốt chửng, không nhai kỹ, không cảm nhận được vị ngon.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDạ dày bị quá tải do thức ăn thô chưa được xử lý kỹ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eHệ quả: Bé mất hoàn toàn hứng thú ăn uống nếu không có TV.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\\tBác sĩ gỡ rối \(Liệu pháp hành vi\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNguyên tắc 3 KHÔNG:\x3c\/strong\x3e Không ép - Không TV\/Điện thoại - Không ăn rong.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuy tắc bàn ăn:\x3c\/strong\x3e Bữa ăn chỉ kéo dài tối đa \x3cstrong\x3e30 phút\x3c\/strong\x3e. Hết giờ -\x26gt; Dọn mâm ngay lập tức dù bé chưa ăn. Hãy để bé được trải nghiệm cảm giác đói thực sự để hiểu giá trị của bữa ăn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrao quyền:\x3c\/strong\x3e Cho bé tự xúc \(dù vương vãi\) và cho bé lựa chọn món ăn \(trong danh sách mẹ đưa ra\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3ePHẦN 2: BIẾNG ĂN BỆNH LÝ \(Cần can thiệp y khoa\)\x3c\/h2\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eBản chất:\x3c\/strong\x3e Cơ thể bé đang \\\x22kêu cứu\\\x22. Năng lượng được dồn vào việc chống lại bệnh tật nên hệ tiêu hóa tạm thời \\\x22đình công\\\x22.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\\tDấu hiệu nhận biết\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThay đổi đột ngột:\x3c\/strong\x3e Bé đang ăn ngủ nề nếp bỗng nhiên bỏ ăn, kèm theo mệt mỏi, ít chơi, hay quấy khóc vô cớ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTriệu chứng đi kèm:\x3c\/strong\x3e Sốt, ho, sổ mũi, tiêu chảy, táo bón, hoặc lở miệng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\\t Nguyên nhân thường gặp từ bên trong\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eKhác với tâm lý, biếng ăn bệnh lý xuất phát từ các tổn thương thực thể:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVùng miệng \x26amp; Họng:\x3c\/strong\x3e Mọc răng \(nướu sưng đau\), viêm họng, viêm amidan \(nuốt đau\), nấm lưỡi \(mất vị giác\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHệ tiêu hóa:\x3c\/strong\x3e Đây là nơi chịu ảnh hưởng trực tiếp nhất.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cbr\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cdiv class=\\\x22ql-code-block-container\\\x22 spellcheck=\\\x22false\\\x22\x3e\x3cdiv class=\\\x22ql-code-block\\\x22 data-language=\\\x22plain\\\x22\x3e*Khi hệ tiêu hóa gặp vấn đề như đầy hơi, khó tiêu, đau dạ dày hoặc loạn khuẩn đường ruột \(thường sau khi uống kháng sinh\), trẻ sẽ cảm thấy chướng bụng và sợ nạp thêm thức ăn.*\x3c\/div\x3e\x3c\/div\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThiếu hụt vi chất \(Nạn đói tiềm ẩn\):\x3c\/strong\x3e Thiếu Kẽm \(làm mất gai vị giác, ăn thấy nhạt nhẽo\), thiếu Sắt \(gây mệt mỏi, lờ đờ\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e\\tBác sĩ gỡ rối \(Điều trị y khoa\)\x3c\/h3\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eƯu tiên trị bệnh nền:\x3c\/strong\x3e Đừng cố nhồi nhét khi con đang sốt hay khó thở. Hãy tập trung hạ sốt, giảm đau, long đờm cho con trước.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThay đổi kết cấu:\x3c\/strong\x3e Chuyển sang chế độ ăn lỏng, mềm, dễ tiêu \(cháo loãng, súp nguội, sữa mát\) chia nhỏ thành nhiều bữa trong ngày.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBổ sung hỗ trợ:\x3c\/strong\x3e Tham khảo ý kiến bác sĩ về việc bổ sung men vi sinh hoặc kẽm để phục hồi vị giác sau ốm.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3e\\tBÁO ĐỘNG ĐỎ: KHI NÀO CẦN ĐI KHÁM NGAY?\x3c\/h2\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eMẹ cần đưa bé đến phòng khám Nhi ngay lập tức nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBiếng ăn kéo dài trên \x3cstrong\x3e2 tuần\x3c\/strong\x3e mà không cải thiện với các biện pháp thay đổi hành vi.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBé \x3cstrong\x3esụt cân\x3c\/strong\x3e hoặc đứng cân liên tục trong 3 tháng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBé lờ đờ, chậm phát triển vận động \(lẫy, bò, đi\) so với lứa tuổi.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eBiếng ăn kèm theo sốt cao, nôn trớ liên tục hoặc tiêu chảy kéo dài.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eLỜI KẾT\x3c\/strong\x3e Biếng ăn là một hành trình cần sự kiên nhẫn, không phải một cuộc chiến thắng thua. Hiểu đúng nguyên nhân \(Tâm lý hay Bệnh lý\) giúp mẹ trút bỏ gánh nặng và tìm lại niềm vui ăn uống cho con.\x3c\/p\x3e\x3cp\x3e\\t\x3cem\x3eBé nhà bạn đang thuộc nhóm nào? Nếu mẹ vẫn còn băn khoăn, hãy \x3c\/em\x3e\x3cstrong\x3e\x3cem\x3eInbox ngay\x3c\/em\x3e\x3c\/strong\x3e\x3cem\x3e hoặc để lại bình luận để được đội ngũ Bác sĩ Nhi khoa tư vấn chi tiết nhé!\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eCùng chủ đề:\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong style=\\\x22background-color: rgb\(255, 255, 255\); color: rgb\(0, 112, 192\);\\\x22\x3e\x3ca href=\\\x22https:\/\/friendmedicalclinic.com\/news\/articles\/NEWS_20251207085919\/NEWS_20251207085919.html\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3eBIẾNG ĂN TÂM LÝ: KHI BỮA CƠM LÀ \\\x22CHIẾN TRƯỜNG\\\x22. NGUYÊN NHÂN VÀ CHIẾN LƯỢC ĐỂ CON ĂN TRONG HẠNH PHÚC MÀ KHÔNG CẦN ÉP BUỘC\x3c\/a\x3e\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch2\x3eTài liệu tham khảo\x3c\/h2\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKerzner B, et al. – 2015\x3c\/strong\x3e
