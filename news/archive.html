    * { 
        box-sizing: border-box; 
        margin: 0;

    }
    
    body {

        font-family: 'Segoe UI', Arial, sans-serif;

        color: #333; 
    }

    .container { 
        max-width: 1200px;

    }

     
    .archive-header { 
        background: white; 
        padding: 25px; 
        border-radius: 12px; 
        margin-bottom: 30px; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
    }

    .archive-header h1 {
        font-size: 1.8em;
        color: #2c3e50;
        margin-bottom: 20px;
        text-align: center;
        font-weight: 700;
    }

    .search-section { 
        display: grid; 
        grid-template-columns: 2fr 1fr 1fr auto; 
        gap: 15px; 
    }

    .search-input { 
        padding: 10px 15px; 
        border: 1px solid #ddd; 
        border-radius: 6px; 
        font-size: 14px; 
        width: 100%;
        height: 42px;
        transition: border-color 0.3s;
    }
    
    .search-input:focus {
        outline: none;
        border-color: #0070c0;
    }

    .search-button { 
        padding: 0 25px; 
        height: 42px;
        background: #0070c0; 
        color: white; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: 600; 
        white-space: nowrap;
        transition: background 0.2s;
    }

    .search-button:hover {
        background: #0056b3;
    }

     
    .articles-grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr);  
        gap: 25px; 
        margin-bottom: 40px; 
    }

    .article-card { 
        background: white; 
        border-radius: 12px; 
        overflow: hidden; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        transition: transform 0.3s, box-shadow 0.3s; 
        display: flex;
        flex-direction: column; 
    }

    .article-card:hover { 
        transform: translateY(-5px); 
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

     
    .article-image { 
        width: 100%; 
        aspect-ratio: 1 / 1;  
        height: auto; 
        object-fit: cover; 
        border-bottom: 1px solid #eee;
    }

    .article-content { 
        padding: 20px; 
        flex: 1; 
        display: flex;
        flex-direction: column;
    }

    .article-category { 
        display: inline-block; 
        padding: 4px 10px; 
        background: #e3f2fd; 
        color: #0070c0; 
        border-radius: 4px; 
        font-size: 0.75em; 
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 10px; 
        align-self: flex-start;
    }

    .article-title { 
        font-size: 1.15em; 
        margin-bottom: 10px; 
        color: #333; 
        text-decoration: none; 
        font-weight: 700;
        line-height: 1.4;
        display: block;
    }

    .article-title:hover { 
        color: #0070c0; 
    }

    .article-meta { 
        font-size: 0.9em; 
        color: #666; 
        margin-top: auto; 
        padding-top: 15px;
        border-top: 1px solid #f0f0f0;
    }

    .no-results {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px;
        color: #666;
        font-size: 1.2em;
    }
    
     
    .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 20px;
    }

     

     
    @media (max-width: 1024px) {
        .articles-grid { 
            grid-template-columns: repeat(2, 1fr);  
        }
        
        .search-section {
            grid-template-columns: 1fr 1fr;  
        }
        
        .search-input#searchInput {
            grid-column: span 2; 
        }
    }

     
    @media (max-width: 600px) {
        .container {
            padding: 10px;
        }
        
        body {
            padding-top: 70px;  
        }

         
        .articles-grid { 
            grid-template-columns: 1fr; 
        }

        .search-section {
            display: flex;
            flex-direction: column; 
            gap: 10px;
        }

        .search-button {
            width: 100%; 
        }
        
        .archive-header h1 {
            font-size: 1.5em; 
        }
        
        .article-content {
            padding: 15px;
        }
    }
</style>

<script>
    (function() {
        
        function resolvePaths() {
            const path = window.location.pathname;
            let prefix = '';
            
            
            if (path.includes('/articles/')) {
                prefix = '../../../';
            } else if (path.includes('/news/')) {
                prefix = '../';
            } else {
                prefix = ''; 
            }

            const homeFile = 'index.html'; 

            
            const targets = {
                '#fmcLogo': prefix + homeFile,
                '.fmc-link-specialist': prefix + homeFile + '#specialist-slot',
                '.fmc-link-news': prefix + homeFile + '#news-slot',
                '.fmc-link-contact': prefix + homeFile + '#contact-slot',
                '.fmc-link-appoint': prefix + homeFile + '#contact-slot'
            };

            for (let selector in targets) {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    
                    if (prefix === '' && targets[selector].includes('#')) {
                        const hash = targets[selector].split('#')[1];
                        el.href = '#' + hash;
                    } else {
                        
                        el.href = targets[selector];
                    }
                });
            }

            
            const logoImg = document.getElementById('fmcLogoImg');
            if (logoImg) {
                const baseSrc = 'header/logo.png'; 
                logoImg.src = prefix + baseSrc;    
            }
        }

        
        function updateOpenStatus() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            const isOpen = (day === 0) ? (hour >= 8 && hour < 12) : (hour >= 8 && hour < 20);
            
            const html = isOpen 
                ? '<span style="color:#28a745">🟢 Đang mở cửa</span>' 
                : '<span style="color:#dc3545">🔴 Đang đóng cửa</span>';
            
            const elDesktop = document.getElementById('fmcStatusDesktop');
            const elMobile = document.getElementById('fmcStatusMobile');
            if(elDesktop) elDesktop.innerHTML = html;
            if(elMobile) elMobile.innerHTML = html;
        }

        
        let lastScroll = 0;
        const header = document.getElementById('fmcMainHeader');
        const progressBar = document.getElementById('fmcProgressBar');

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            
            
            const winHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (progressBar && winHeight > 0) progressBar.style.width = (currentScroll / winHeight * 100) + "%";

            
            if (Math.abs(lastScroll - currentScroll) <= 5) return;
            if (currentScroll > lastScroll && currentScroll > 80) {
                header.classList.add('hidden-header');
                const dropdown = document.getElementById('fmcMobileDropdown');
                if(dropdown) dropdown.classList.remove('active');
            } else {
                header.classList.remove('hidden-header');
            }
            lastScroll = currentScroll <= 0 ? 0 : currentScroll;
        }, { passive: true });

        
        window.toggleFmcDropdown = function() {
            document.getElementById('fmcMobileDropdown').classList.toggle('active');
        };

        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => { resolvePaths(); updateOpenStatus(); });
        } else {
            resolvePaths(); updateOpenStatus();
        }
        setInterval(updateOpenStatus, 60000);

    })();
</script>

<script>

        const rawArticlesJson = '[{\x22id\x22:\x22NEWS_20260110130401\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22\\\x22BẢO MẪU KỸ THUẬT SỐ\\\x22: LỢI BẤT CẬP HẠI. SỰ THẬT VỀ TÁC ĐỘNG CỦA MÀN HÌNH ĐẾN NÃO BỘ VÀ THỊ LỰC TRẺ DƯỚI 3 TUỔI\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1dM1c-CiKUq8X3Pm_-PvZR-gLefcjODvZ\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Con khóc quá, bật \x27Baby Shark\x27 cho nó nín đi!\\\x22, \\\x22Muốn nó ngồi yên ăn hết bát cháo thì chỉ có cách đưa điện thoại thôi...\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eCó lẽ không ông bố bà mẹ hiện đại nào chưa từng trải qua những khoảnh khắc như vậy. Khi quá mệt mỏi và bận rộn, chiếc điện thoại thông minh hay tivi dường như là \\\x22cứu cánh\\\x22 duy nhất. Nó giống như một người bảo mẫu vạn năng: Luôn sẵn sàng, không biết mệt, đầy màu sắc và âm thanh hấp dẫn khiến trẻ bị \\\x22thôi miên\\\x22 ngay lập tức.\x3c\/p\x3e\x3cp\x3eNhưng các chuyên gia y tế trên toàn cầu đang gióng lên hồi chuông báo động: \x3cstrong\x3eGiao con cho \\\x22bảo mẫu kỹ thuật số\\\x22 trong giai đoạn 0-3 tuổi là một canh bạc mạo hiểm với sự phát triển của trẻ.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eTại sao lại là giai đoạn dưới 3 tuổi? Và màn hình thực sự làm gì với bộ não non nớt của con?\x3c\/p\x3e\x3ch3\x3e1. 0-3 TUỔI: GIAI ĐOẠN VÀNG ĐỂ \\\x22XÂY DỰNG\\\x22 BỘ NÃO\x3c\/h3\x3e\x3cp\x3eHãy tưởng tượng bộ não của trẻ dưới 3 tuổi giống như xi măng ướt. Mọi trải nghiệm trong giai đoạn này sẽ định hình nên cấu trúc vĩnh viễn của não bộ sau này. Đây là lúc các kết nối thần kinh hình thành với tốc độ chóng mặt \(hơn 1 triệu kết nối mới mỗi giây!\).\x3c\/p\x3e\x3cp\x3eTrẻ học hỏi thông qua tương tác THỰC:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChạm vào đồ vật \(xúc giác\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNgửi mùi thức ăn \(khứu giác\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNhìn vào mắt mẹ, nghe giọng nói của bố \(thị giác, thính giác và cảm xúc\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eVận động, bò trườn, ném đồ chơi \(kỹ năng vận động thô và tinh\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eMàn hình tivi\/điện thoại là thế giới 2D phẳng lì.\x3c\/strong\x3e Nó chỉ kích thích thị giác và thính giác một cách thụ động, trong khi tước đi hoàn toàn các trải nghiệm giác quan và vận động khác.\x3c\/p\x3e\x3ch3\x3e2. TÁC HẠI LÊN NÃO BỘ: KHI BỘ NÃO BỊ \\\x22LẬP TRÌNH SAI\\\x22\x3c\/h3\x3e\x3cp\x3eViệc tiếp xúc với màn hình quá sớm và quá nhiều gây ra những hậu quả nghiêm trọng và lâu dài:\x3c\/p\x3e\x3ch4\x3eA. Chậm nói và Kém giao tiếp \(Hội chứng \\\x22Video Deficit\\\x22\)\x3c\/h4\x3e\x3cp\x3eNhiều bố mẹ nghĩ: \x3cem\x3e\\\x22Cho con xem chương trình dạy tiếng Anh, dạy chữ cái thì nó sẽ thông minh sớm\\\x22\x3c\/em\x3e.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSỰ THẬT:\x3c\/strong\x3e Trẻ dưới 3 tuổi KHÔNG THỂ học ngôn ngữ hiệu quả từ màn hình.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ học nói bằng cách nhìn khẩu hình miệng, biểu cảm gương mặt của người thật và phản hồi lại.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eChiếc tivi nói liên tục nhưng không bao giờ dừng lại để chờ trẻ phản hồi. Nó là giao tiếp một chiều.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHậu quả:\x3c\/em\x3e Trẻ có thể thuộc lòng bảng chữ cái ABC hay các bài hát tiếng Anh \(học vẹt\), nhưng lại không biết cách giao tiếp, không biết dùng từ ngữ để diễn đạt nhu cầu trong đời thực. Càng xem nhiều, vốn từ vựng thực tế của trẻ càng nghèo nàn.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eB. Giảm khả năng tập trung chú ý \(Mầm mống của ADHD?\)\x3c\/h4\x3e\x3cp\x3eCác chương trình cho trẻ em \(hoạt hình, video YouTube\) thường có tiết tấu cực nhanh, hình ảnh thay đổi liên tục sau mỗi 2-3 giây, âm thanh dồn dập để giữ sự chú ý của trẻ.\x3c\/p\x3e\x3cp\x3eBộ não non nớt của trẻ quen với sự kích thích cường độ cao này. Khi quay lại thế giới thực – nơi mọi thứ diễn ra chậm rãi hơn \(như việc ngồi nghe cô giáo kể chuyện, hay tự chơi xếp hình\) – trẻ sẽ thấy... NHÀM CHÁN. Trẻ trở nên thiếu kiên nhẫn, khó tập trung vào một việc gì đó lâu dài nếu không có sự kích thích liên tục.\x3c\/p\x3e\x3ch4\x3eC. Rối loạn cảm xúc và giấc ngủ \(\\\x22Cơn nghiện\\\x22 Dopamine\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eÁnh sáng xanh:\x3c\/strong\x3e Ức chế hormone Melatonin, khiến trẻ khó đi vào giấc ngủ, ngủ không sâu, hay giật mình và quấy khóc đêm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơn giận dữ kỹ thuật số \(Digital Tantrum\):\x3c\/strong\x3e Màn hình kích thích não tiết ra Dopamine \(hormone sung sướng\). Khi bạn tắt tivi\/lấy lại điện thoại, nồng độ Dopamine tụt giảm đột ngột khiến trẻ rơi vào trạng thái khủng hoảng: la hét, ăn vạ dữ dội, đập phá đồ đạc. Đây là dấu hiệu của sự lệ thuộc.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. TÁC HẠI LÊN THỊ LỰC: ĐẠI DỊCH CẬN THỊ HỌC ĐƯỜNG\x3c\/h3\x3e\x3cp\x3eKhông chỉ là vấn đề \\\x22mỏi mắt\\\x22. Việc \\\x22dán mắt\\\x22 vào màn hình điện thoại \(vốn rất nhỏ và ở cự ly gần\) trong thời gian dài là nguyên nhân hàng đầu gây ra đại dịch cận thị sớm.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế:\x3c\/strong\x3e Khi nhìn gần liên tục, cơ mắt phải điều tiết quá mức, dẫn đến mỏi và trục nhãn cầu có xu hướng dài ra, gây cận thị.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThiếu ánh sáng tự nhiên:\x3c\/strong\x3e Quan trọng hơn, khi trẻ xem tivi trong nhà, chúng mất đi thời gian vui chơi ngoài trời.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eTỷ lệ nghịch:\x3c\/strong\x3e Thời gian dùng màn hình càng nhiều -\x26gt; Thời gian chơi ngoài trời càng ít -\x26gt; Nguy cơ cận thị càng cao.\x3c\/blockquote\x3e\x3ch3\x3e4. BỐ MẸ CẦN LÀM GÌ? HƯỚNG DẪN \\\x22CAI NGHIỆN\\\x22 MÀN HÌNH\x3c\/h3\x3e\x3cp\x3eThay đổi thói quen là rất khó, nhưng vì tương lai của con, bố mẹ hãy bắt đầu ngay hôm nay theo khuyến cáo của Tổ chức Y tế Thế giới \(WHO\) và Viện Hàn lâm Nhi khoa Hoa Kỳ \(AAP\):\x3c\/p\x3e\x3ch4\x3eQuy tắc thời gian \(Dành cho trẻ 0-5 tuổi\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDưới 18 tháng tuổi:\x3c\/strong\x3e KHÔNG TIẾP XÚC VỚI MÀN HÌNH \(Zero screen time\). Ngoại trừ việc gọi video call ngắn với người thân.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTừ 18 - 24 tháng tuổi:\x3c\/strong\x3e Hạn chế tối đa. Nếu có, chỉ cho xem vài phút các chương trình giáo dục chất lượng cao và BỐ MẸ PHẢI XEM CÙNG để tương tác, giải thích cho con.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTừ 2 - 5 tuổi:\x3c\/strong\x3e Tối đa \x3cstrong\x3e1 GIỜ\/NGÀY\x3c\/strong\x3e. Vẫn ưu tiên việc xem cùng con.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eChiến lược hành động tại nhà\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTạo các khu vực\/thời gian \\\x22KHÔNG MÀN HÌNH\\\x22:\x3c\/strong\x3e Tuyệt đối không tivi\/điện thoại trong giờ ăn và trong phòng ngủ. Tắt màn hình ít nhất 1 giờ trước khi đi ngủ.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBố mẹ làm gương:\x3c\/strong\x3e Con sẽ không bao giờ bỏ điện thoại nếu thấy bố mẹ suốt ngày cắm mặt vào đó. Hãy đặt điện thoại xuống khi chơi với con.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3e\\\x22Hãy để trẻ chán\\\x22:\x3c\/strong\x3e Đừng vội đưa điện thoại ngay khi con kêu chán hoặc quấy khóc. Sự nhàm chán là động lực tuyệt vời để trẻ tự sáng tạo ra các trò chơi, kích thích trí tưởng tượng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThay thế bằng tương tác thật:\x3c\/strong\x3e Đọc sách ehon, chơi xếp hình, đưa con đi công viên, hay đơn giản là cho con cùng tham gia làm việc nhà. Những hoạt động này \\\x22tốn sức\\\x22 của bố mẹ hơn, nhưng đó là liều \\\x22vitamin bổ não\\\x22 tốt nhất cho con.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Không có ứng dụng hay chương trình tivi nào trên thế giới này có thể thay thế được sự tương tác trực tiếp, ánh mắt yêu thương và giọng nói ấm áp của cha mẹ. Hãy là người bảo mẫu thực sự của con, đừng phó mặc trách nhiệm đó cho một chiếc máy vô tri.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3eTÀI LIỆU THAM KHẢO KHOA HỌC \(REFERENCES\)\x3c\/h3\x3e\x3cp\x3eDưới đây là các nghiên cứu gốc và khuyến cáo từ các tổ chức y tế uy tín trên thế giới làm cơ sở cho những thông tin trong bài viết:\x3c\/p\x3e\x3ch4\x3e1. Về tác động lên Cấu trúc Não bộ và Sự phát triển của trẻ \(Giai đoạn đầu đời\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHiệp hội Nhi khoa Hoa Kỳ \(AAP\) - Khuyến cáo chính thức về trẻ em và truyền thông.\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eTên bài:\x3c\/em\x3e \x3cstrong\x3e\\\x22Media and Young Minds\\\x22\x3c\/strong\x3e \(Truyền thông và Tâm trí trẻ thơ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNguồn:\x3c\/em\x3e Tạp chí \x3cem\x3ePediatrics\x3c\/em\x3e \(2016\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNội dung:\x3c\/em\x3e Tài liệu nền tảng khuyến cáo tránh cho trẻ dưới 18-24 tháng tuổi tiếp xúc với màn hình.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLink:\x3c\/em\x3e \x3ca href=\\\x22https:\/\/publications.aap.org\/pediatrics\/article\/138\/5\/e20162591\/60503\/Media-and-Young-Minds\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/publications.aap.org\/pediatrics\/article\/138\/5\/e20162591\/60503\/Media-and-Young-Minds\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNghiên cứu về ảnh hưởng của thời gian dùng màn hình đến cấu trúc chất trắng trong não trẻ.\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eTên bài:\x3c\/em\x3e \x3cstrong\x3e\\\x22Associations Between Screen-Based Media Use and Brain White Matter Integrity in Preschool-Aged Children\\\x22\x3c\/strong\x3e \(Mối liên hệ giữa việc sử dụng phương tiện màn hình và sự toàn vẹn chất trắng của não ở trẻ mẫu giáo\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNguồn:\x3c\/em\x3e Tạp chí \x3cem\x3eJAMA Pediatrics\x3c\/em\x3e \(2019\) - Nghiên cứu của Tiến sĩ John Hutton và cộng sự.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNội dung:\x3c\/em\x3e Nghiên cứu sử dụng MRI cho thấy trẻ tiếp xúc màn hình nhiều có cấu trúc chất trắng \(liên quan đến ngôn ngữ và kỹ năng đọc viết\) kém phát triển hơn.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLink:\x3c\/em\x3e \x3ca href=\\\x22https:\/\/jamanetwork.com\/journals\/jamapediatrics\/fullarticle\/2754101\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/jamanetwork.com\/journals\/jamapediatrics\/fullarticle\/2754101\x3c\/a\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNghiên cứu quy mô lớn về mối liên hệ giữa thời gian xem màn hình và chậm phát triển.\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eTên bài:\x3c\/em\x3e \x3cstrong\x3e\\\x22Association Between Screen Time and Children’s Performance on a Developmental Screening Test\\\x22\x3c\/strong\x3e \(Mối liên hệ giữa thời gian sử dụng màn hình và kết quả bài kiểm tra sàng lọc phát triển của trẻ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNguồn:\x3c\/em\x3e Tạp chí \x3cem\x3eJAMA Pediatrics\x3c\/em\x3e \(2019\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNội dung:\x3c\/em\x3e Nghiên cứu trên 2400 trẻ em Canada cho thấy thời gian sử dụng màn hình nhiều hơn khi 2 và 3 tuổi liên quan đến việc điểm số phát triển thấp hơn khi 3 và 5 tuổi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLink:\x3c\/em\x3e \x3ca href=\\\x22https:\/\/jamanetwork.com\/journals\/jamapediatrics\/fullarticle\/2722666\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/jamanetwork.com\/journals\/jamapediatrics\/fullarticle\/2722666\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3e2. Về Thị lực, Cận thị và Cơ chế bảo vệ của \\\x22Ánh sáng tự nhiên\\\x22\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNghiên cứu kinh điển khẳng định vai trò của hoạt động ngoài trời trong việc ngăn ngừa cận thị.\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eTên bài:\x3c\/em\x3e \x3cstrong\x3e\\\x22Outdoor Activity Reduces the Prevalence of Myopia in Children\\\x22\x3c\/strong\x3e \(Hoạt động ngoài trời làm giảm tỷ lệ cận thị ở trẻ em\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNguồn:\x3c\/em\x3e Tạp chí \x3cem\x3eOphthalmology\x3c\/em\x3e \(2008\) - Nghiên cứu Cận thị Sydney \(Kathryn Rose và cộng sự\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNội dung:\x3c\/em\x3e Nghiên cứu này chứng minh rằng tổng thời gian ở ngoài trời, chứ không phải là việc giảm thời gian nhìn gần, là yếu tố chính liên quan đến việc giảm nguy cơ cận thị.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLink:\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.aaojournal.org\/article\/S0161-6420\(07\)01364-4\/fulltext\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.aaojournal.org\/article\/S0161-6420\(07\)01364-4\/fulltext\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eTổng quan về nguy cơ \\\x22bùng nổ\\\x22 cận thị do tăng thời gian dùng màn hình trong kỷ nguyên số.\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eTên bài:\x3c\/em\x3e \x3cstrong\x3e\\\x22Digital Screen Time During the COVID-19 Pandemic: Risk for a Myopia Boom?\\\x22\x3c\/strong\x3e \(Thời gian sử dụng màn hình kỹ thuật số trong đại dịch COVID-19: Nguy cơ bùng nổ cận thị?\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNguồn:\x3c\/em\x3e Tạp chí \x3cem\x3eAmerican Journal of Ophthalmology\x3c\/em\x3e \(2021\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNội dung:\x3c\/em\x3e Phân tích mối đe dọa của việc tăng thời gian nhìn gần vào màn hình và giảm thời gian hoạt động ngoài trời đối với sức khỏe mắt của trẻ em toàn cầu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLink:\x3c\/em\x3e \x3ca href=\\\x22https:\/\/www.google.com\/search?q=https:\/\/www.ajo.com\/article\/S0002-9394\(20\)30549-6\/fulltext\\\x22 rel=\\\x22noopener noreferrer\\\x22 target=\\\x22_blank\\\x22\x3ehttps:\/\/www.ajo.com\/article\/S0002-9394\(20\)30549-6\/fulltext\x3c\/a\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222026-01-10T06:25:09.563Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22Yes\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251221101555\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22TÁO BÓN KÉO DÀI: NỖI ÁM ẢNH MANG TÊN \\\x22ĐẠI TRÀNG DÀI\\\x22 VÀ NHỮNG HIỂU LẦM TAI HẠI TRONG ĐIỀU TRỊ\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1MjW3EGrVutC6ehiW5bj7wObX9boCy_0L\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Mỗi lần con đi ị là một cực hình. Nó khóc thét, mồ hôi đầm đìa, trốn vào góc nhà, gồng đỏ mặt tía tai mới ra được cục phân cứng ngắc như phân dê, có khi dính cả máu tươi. Tôi xót con vô cùng. Đi khám bác sĩ bảo đại tràng cháu dài, phải uống thuốc cả tháng. Tôi lo quá, uống thuốc lâu thế có hại người không?\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eNếu đây là câu chuyện của gia đình bạn, thì bài viết này dành cho bạn. Táo bón mạn tính không chỉ là vấn đề ăn uống, nó là một cuộc chiến phức tạp về cả thể chất lẫn tâm lý.\x3c\/p\x3e\x3ch3\x3e1. GIẢI MÃ \\\x22ĐẠI TRÀNG DÀI\\\x22 \(DOLICHOCOLON\): THỦ PHẠM HAY CHỈ LÀ ĐỒNG PHẠM?\x3c\/h3\x3e\x3cp\x3eĐầu tiên, cần làm rõ: \x3cstrong\x3eĐại tràng dài ở trẻ em thường LÀ HẬU QUẢ hơn là nguyên nhân gốc rễ.\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐại tràng dài là gì?\x3c\/strong\x3e Đơn giản là ruột già của bé dài hơn mức trung bình so với lứa tuổi. Điều này khiến phân phải di chuyển một quãng đường xa hơn để ra ngoài.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTại sao nó gây táo bón?\x3c\/strong\x3e Chức năng chính của đại tràng là hấp thu nước từ phân. Đường đi càng dài, thời gian lưu lại càng lâu, nước bị hấp thu càng nhiều. Hậu quả là phân trở nên khô, cứng và khó đào thải.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eTUY NHIÊN, SỰ THẬT LÀ:\x3c\/strong\x3e Rất nhiều người có đại tràng dài bẩm sinh vẫn đi tiêu bình thường suốt đời. Ở trẻ nhỏ bị táo bón mạn tính, \\\x22đại tràng dài và giãn\\\x22 thường là kết quả của việc \x3cstrong\x3eứ đọng phân quá lâu ngày\x3c\/strong\x3e.\x3c\/p\x3e\x3cp\x3eHãy tưởng tượng đại tràng như một quả bóng bay. Nếu ngày nào bạn cũng nhồi nhét chất thải vào mà không xả ra hết, quả bóng đó sẽ bị giãn căng ra và dài thêm. Khi bị giãn, nó mất đi độ đàn hồi và khả năng co bóp để tống phân ra ngoài, khiến tình trạng táo bón càng trầm trọng hơn.\x3c\/p\x3e\x3cblockquote\x3e\x3cstrong\x3eKết luận:\x3c\/strong\x3e Đại tràng dài là một yếu tố thuận lợi gây táo bón, nhưng hiếm khi là nguyên nhân duy nhất. Thủ phạm thực sự thường là \\\x22Táo bón chức năng\\\x22 kết hợp với vòng xoắn tâm lý.\x3c\/blockquote\x3e\x3ch3\x3e2. VÒNG XOẮN BỆNH LÝ: \\\x22SỢ ĐI Ị\\\x22 - KẺ THÙ SỐ 1\x3c\/h3\x3e\x3cp\x3eĐây là mấu chốt của vấn đề mà bố mẹ cần hiểu để thương con hơn là trách mắng.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhởi đầu:\x3c\/strong\x3e Vì một lý do nào đó \(ăn ít xơ, uống ít nước, thay đổi môi trường, đi lớp sợ cô không dám xin đi vệ sinh...\), trẻ bị táo bón vài lần đầu.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTrải nghiệm đau đớn:\x3c\/strong\x3e Phân cứng đi qua hậu môn gây đau rát, thậm chí nứt kẽ hậu môn chảy máu. Trẻ ghi nhớ: \x3cstrong\x3eĐi ị = Đau.\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePhản xạ NÍN NHỊN:\x3c\/strong\x3e Để tránh đau, trẻ bắt đầu nhịn tiêu. Khi buồn ị, thay vì ngồi bồn cầu, trẻ sẽ gồng người, bắt chéo chân, trốn vào góc để... giữ phân lại. Bố mẹ thường nhầm hành động này là \\\x22con đang rặn\\\x22, nhưng thực ra con đang cố \\\x22nín\\\x22.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHậu quả tồi tệ hơn:\x3c\/strong\x3e Phân bị giữ lại trong trực tràng càng lâu thì càng bị hút kiệt nước, trở nên to hơn và cứng hơn.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCàng đau hơn vào lần sau:\x3c\/strong\x3e Lần đi tiêu tiếp theo sẽ là một \\\x22cơn ác mộng\\\x22 thực sự vì khối phân quá lớn. Vòng luẩn quẩn cứ thế lặp lại.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. MINH OAN CHO THUỐC NHUẬN TRÀNG: NHỮNG HIỂU LẦM TAI HẠI KHIẾN ĐIỀU TRỊ THẤT BẠI\x3c\/h3\x3e\x3cp\x3eNhiều bố mẹ nghe bác sĩ kê đơn thuốc nhuận tràng uống 3-6 tháng thì \\\x22giãy nảy\\\x22 lên vì sợ. Đây là lý do chính khiến táo bón tái đi tái lại.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eHiểu lầm 1: \\\x22Uống thuốc lâu sẽ bị lờn thuốc, hại ruột, làm ruột mất chức năng tự nhiên.\\\x22\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSự thật:\x3c\/strong\x3e Các loại thuốc nhuận tràng thẩm thấu hiện đại được dùng cho trẻ em \(phổ biến nhất là Macrogol\/PEG 3350, Lactulose\) CỰC KỲ AN TOÀN.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCơ chế:\x3c\/strong\x3e Chúng hoạt động như những \\\x22miếng bọt biển\\\x22, hút nước vào trong lòng ruột để làm mềm phân. Chúng KHÔNG hấp thu vào máu, KHÔNG kích thích thần kinh ruột, nên KHÔNG gây lờn thuốc hay lệ thuộc.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eHiểu lầm 2: \\\x22Con đi được rồi thì dừng thuốc ngay cho đỡ hại.\\\x22\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSự thật:\x3c\/strong\x3e Đây là sai lầm phổ biến nhất. Khi phân đã mềm và trẻ đi dễ dàng, đó mới chỉ là bước đầu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTại sao phải uống tiếp?\x3c\/strong\x3e Hãy nhớ lại hình ảnh \\\x22quả bóng bay bị giãn\\\x22. Trực tràng của trẻ cần \x3cstrong\x3eÍT NHẤT 3-6 THÁNG\x3c\/strong\x3e đi tiêu phân mềm liên tục để co hồi lại kích thước ban đầu và phục hồi cảm giác buồn tiêu tự nhiên. Dừng thuốc quá sớm khi ruột vẫn còn giãn sẽ khiến phân tích tụ lại ngay lập tức và tái phát.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1BFO03EZhbrPBGm7RvjssJaXiFcNtLBg3\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e4. CHIẾN LƯỢC ĐIỀU TRỊ \\\x22KIỀNG 3 CHÂN\\\x22: ĐƯỜNG DÀI MỚI BIẾT NGỰA HAY\x3c\/h3\x3e\x3cp\x3eĐiều trị táo bón mạn tính \(đặc biệt khi có đại tràng dài\) là một cuộc đua marathon, không phải chạy nước rút. Cần phối hợp đồng thời 3 yếu tố:\x3c\/p\x3e\x3ch4\x3eCHÂN 1: Thuốc mềm phân \(Cây cầu nối\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDùng đúng loại, đủ liều theo chỉ dẫn của bác sĩ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNguyên tắc \\\x22Giảm liều từ từ\\\x22:\x3c\/strong\x3e Không bao giờ được dừng thuốc đột ngột. Khi trẻ đã đi tiêu ổn định trong vài tháng, bác sĩ sẽ hướng dẫn giảm liều dần dần \(ví dụ: giảm 25% liều mỗi 2 tuần\) để cai thuốc an toàn.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eCHÂN 2: Dinh dưỡng \x26amp; Nước \(Nền tảng\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChất xơ:\x3c\/strong\x3e Tăng cường rau xanh, quả chín. Nhưng nhớ: Ăn nhiều xơ mà uống ít nước thì táo bón còn nặng hơn \(xơ hút hết nước làm phân khô khốc\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNước:\x3c\/strong\x3e Đây là yếu tố quan trọng nhất. Cho trẻ uống đủ nước theo nhu cầu lứa tuổi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eLưu ý:\x3c\/em\x3e Một số trẻ uống quá nhiều sữa tươi \(trên 500ml\/ngày\) có thể gây táo bón. Hãy cân đối lượng sữa.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eCHÂN 3: Tập thói quen đi tiêu \(Phá vỡ tâm lý sợ hãi\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eĐây là bước khó nhất nhưng quan trọng nhất.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGiờ vàng:\x3c\/strong\x3e Tập cho trẻ ngồi bồn cầu vào một giờ cố định trong ngày, tốt nhất là \x3cstrong\x3esau bữa ăn tối khoảng 15-30 phút\x3c\/strong\x3e \(lúc này nhu động ruột hoạt động mạnh nhất\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTư thế đúng:\x3c\/strong\x3e Nếu ngồi bồn cầu người lớn, phải kê ghế nhỏ dưới chân sao cho đầu gối cao hơn hông \(tư thế ngồi xổm\) để góc trực tràng mở rộng, giúp phân ra dễ dàng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhông áp lực:\x3c\/strong\x3e Chỉ ngồi khoảng 5-10 phút. Đi được thì khen ngợi, không đi được cũng không sao, đứng dậy vui vẻ. Tuyệt đối không quát mắng, dọa nạt khi con đang ngồi bồn cầu.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Với những trẻ có \\\x22đại tràng dài\\\x22, cuộc chiến táo bón có thể gian nan hơn các bạn khác. Nhưng xin bố mẹ hãy kiên nhẫn. Đừng tự ý cắt thuốc, đừng nghe các \\\x22mẹo dân gian\\\x22 không kiểm chứng. Hãy tuân thủ phác đồ khoa học để giúp con tìm lại niềm vui trong việc... đi ị nhé!\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-21T04:06:39.837Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251218081337\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22VIÊM DA CƠ ĐỊA \(CHÀM SỮA\): KHI \\\x22CƠN NGỨA\\\x22 LÀ NỖI ÁM ẢNH. CHIẾN LƯỢC CHĂM SÓC ĐÚNG CÁCH ĐỂ \\\x22CHUNG SỐNG HÒA BÌNH\\\x22 VÀ NGĂN NGỪA TÁI PHÁT\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1ABU9gtk61mvev21SqIpWozaEpwo02T7m\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Bác sĩ ơi, nhìn má con em xem, cứ đỏ ửng lên, sần sùi như da cóc. Cháu ngứa lắm, đêm nào cũng dụi mặt vào gối rồi quơ tay gãi đến tứa máu. Em bôi đủ loại kem rồi, đỡ được vài hôm lại bị lại. Em phải làm sao đây?\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eNếu bạn đang ở trong hoàn cảnh này, hãy hiểu rằng: \x3cstrong\x3eĐối với trẻ bị chàm sữa, NGỨA còn tồi tệ hơn ĐAU.\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eViêm da cơ địa \(hay dân gian gọi là Chàm sữa khi ở trẻ nhũ nhi\) là một bệnh lý mạn tính, rất phổ biến. Tin buồn là bệnh này thường khó trị dứt điểm hoàn toàn trong \\\x22một nốt nhạc\\\x22. Tin vui là nếu biết chăm sóc đúng cách, bạn hoàn toàn có thể kiểm soát nó, giúp con có làn da mịn màng và giấc ngủ ngon.\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1xbp2QpeKKAMZUbIoAqt2TknrTU3LHloe\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. HIỂU ĐÚNG BẢN CHẤT: TẠI SAO DA CON TÔI LẠI BỊ NHƯ VẬY?\x3c\/h3\x3e\x3cp\x3eĐừng chỉ đổ lỗi cho \\\x22dị ứng thời tiết\\\x22 hay \\\x22ăn phải đồ lạ\\\x22. Nguyên nhân gốc rễ của viêm da cơ địa nằm ở \x3cstrong\x3eCẤU TRÚC DA\x3c\/strong\x3e của trẻ.\x3c\/p\x3e\x3cp\x3eHãy tưởng tượng làn da khỏe mạnh giống như một \x3cstrong\x3ebức tường gạch vững chắc\x3c\/strong\x3e, với các tế bào da là viên gạch và lớp lipid \(chất béo\) là vữa xi măng kết dính. Bức tường này giữ nước ở bên trong và ngăn vi khuẩn, chất gây dị ứng từ bên ngoài xâm nhập.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eỞ trẻ bị viêm da cơ địa:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBức tường bị \\\x22lỗi\\\x22:\x3c\/strong\x3e Do yếu tố di truyền, da trẻ thiếu hụt các yếu tố dưỡng ẩm tự nhiên \(như Filaggrin\) và lớp lipid kết dính rất lỏng lẻo.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHậu quả - \\\x22Da bị rò rỉ\\\x22:\x3c\/strong\x3e Nước trong da thoát ra ngoài dễ dàng khiến da cực kỳ KHÔ. Ngược lại, vi khuẩn, bụi bẩn, hóa chất dễ dàng lọt vào sâu bên trong gây VIÊM và NGỨA.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eVòng luẩn quẩn:\x3c\/strong\x3e Da khô -\x26gt; Ngứa -\x26gt; Trẻ gãi -\x26gt; Hàng rào da càng tổn thương -\x26gt; Vi khuẩn xâm nhập -\x26gt; Viêm nặng hơn -\x26gt; Càng ngứa hơn.\x3c\/blockquote\x3e\x3ch3\x3e2. NGUYÊN TẮC VÀNG TRONG ĐIỀU TRỊ: \\\x22DƯỠNG ẨM LÀ GỐC, THUỐC LÀ NGỌN\\\x22\x3c\/h3\x3e\x3cp\x3eRất nhiều bố mẹ chỉ chăm chăm tìm \\\x22thuốc bôi cho nhanh khỏi\\\x22 mà bỏ quên bước quan trọng nhất: DƯỠNG ẨM. Nếu không phục hồi hàng rào bảo vệ da, thì dù có bôi thuốc \\\x22tiên\\\x22, bệnh cũng sẽ tái phát ngay khi dừng thuốc.\x3c\/p\x3e\x3ch4\x3eA. Chiến lược \\\x22Dưỡng ẩm chủ động\\\x22 \(Ngay cả khi da đang đẹp\)\x3c\/h4\x3e\x3cp\x3eDưỡng ẩm với trẻ viêm da cơ địa cũng quan trọng như việc đánh răng hàng ngày vậy.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChọn đúng loại:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTốt nhất:\x3c\/strong\x3e Dạng Mỡ \(Ointment\) hoặc Kem đặc \(Cream\). Chúng chứa nhiều dầu, ít nước, giúp khóa ẩm tốt nhất.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHạn chế:\x3c\/strong\x3e Dạng Sữa dưỡng \(Lotion\) vì chứa nhiều nước, bôi lên mát nhưng bay hơi nhanh, không đủ đô với da chàm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eTiêu chí:\x3c\/em\x3e Không hương liệu \(Fragrance-free\), ít chất bảo quản, dành riêng cho da nhạy cảm\/chàm \(thường có chữ \\\x22Atopic\\\x22 hoặc \\\x22Eczema\\\x22 trên nhãn\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuy tắc \\\x22Tắm và Khóa ẩm\\\x22 \(Soak and Seal\):\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eThời điểm vàng để bôi kem là \x3cstrong\x3etrong vòng 3 PHÚT sau khi tắm xong\x3c\/strong\x3e. Lúc này da còn hơi ẩm, kem sẽ \\\x22khóa\\\x22 chặt lượng nước đó lại trong da.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu để da khô cong rồi mới bôi thì hiệu quả giảm đi rất nhiều.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTần suất:\x3c\/strong\x3e Bôi ít nhất \x3cstrong\x3e2-3 lần\/ngày\x3c\/strong\x3e. Bôi một lớp dày khắp cơ thể, không chỉ bôi vùng bị đỏ.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eB. Chiến lược \\\x22Chữa cháy\\\x22 khi bùng phát cấp tính \(Dùng thuốc\)\x3c\/h4\x3e\x3cp\x3eKhi da con đang đỏ rực, chảy dịch, ngứa điên cuồng thì chỉ dưỡng ẩm là CHƯA ĐỦ. Lúc này cần đến \\\x22lính cứu hỏa\\\x22 là thuốc chống viêm.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCorticoid bôi tại chỗ \(TCS\):\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐừng sợ Corticoid thái quá \(Corticophobia\):\x3c\/strong\x3e Nhiều bố mẹ nghe đến corticoid là sợ tác dụng phụ \(teo da, hại thận...\) nên kiên quyết không dùng hoặc dùng không đủ liều.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSự thật:\x3c\/strong\x3e Corticoid bôi là chỉ định đầu tay, AN TOÀN và HIỆU QUẢ nếu dùng đúng loại \(phù hợp độ mạnh\), đúng liều và đúng thời gian theo chỉ định của bác sĩ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHậu quả của việc sợ thuốc:\x3c\/strong\x3e Để viêm da kéo dài không trị sẽ dẫn đến biến chứng bội nhiễm vi khuẩn \(chốc lở\), sẹo xấu và ảnh hưởng tâm lý trẻ.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThuốc ức chế Calcineurin \(TCI\):\x3c\/strong\x3e \(Ví dụ: Tacrolimus, Pimecrolimus\). Đây là nhóm thuốc không chứa corticoid, thường dùng cho các vùng da mỏng \(mặt, cổ, bẹn\) hoặc dùng duy trì để tránh tác dụng phụ của corticoid khi phải dùng lâu dài. \x3cem\x3eCần bác sĩ kê đơn.\x3c\/em\x3e\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e3. KIỂM SOÁT MÔI TRƯỜNG: TRÁNH XA CÁC \\\x22KẺ KÍCH ĐỘNG\\\x22\x3c\/h3\x3e\x3cp\x3eDa trẻ bị chàm vô cùng nhạy cảm. Hãy loại bỏ các yếu tố khiến bệnh bùng lên:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChuyện tắm giặt:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNước tắm:\x3c\/strong\x3e KHÔNG dùng nước quá nóng \(làm khô da\). Dùng nước ấm vừa phải \(36-37 độ C\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThời gian:\x3c\/strong\x3e Tắm nhanh trong 5-10 phút. Không ngâm bồn quá lâu.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSữa tắm:\x3c\/strong\x3e Dùng loại dịu nhẹ, không xà phòng \(soap-free\), pH cân bằng \(khoảng 5.5\). Tuyệt đối không dùng các loại lá dân gian \(lá khế, mướp đắng...\) không rõ nguồn gốc để tắm khi da đang trầy xước vì nguy cơ nhiễm trùng rất cao.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eQuần áo:\x3c\/strong\x3e Ưu tiên 100% Cotton mềm mại, thoáng khí. Tránh đồ len, sợi tổng hợp gây bí và cọ xát. Cắt mác áo để không gây ngứa.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMôi trường:\x3c\/strong\x3e Tránh để trẻ quá nóng, ra nhiều mồ hôi \(mồ hôi gây xót và ngứa\). Giữ nhà cửa sạch sẽ, tránh bụi nhà, lông thú cưng.\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. KHI NÀO CẦN ĐI KHÁM BÁC SĨ?\x3c\/h3\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eKhi bạn đã dưỡng ẩm tích cực nhưng tình trạng da không cải thiện.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDấu hiệu bội nhiễm \(Nhiễm trùng da\):\x3c\/strong\x3e Vùng da chàm xuất hiện mụn mủ, chảy dịch vàng\/mật ong, đóng vảy tiết dày, sưng nóng đỏ đau, hoặc trẻ có sốt. Đây là tình trạng cấp cứu da liễu cần dùng kháng sinh.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Chăm sóc trẻ viêm da cơ địa là một cuộc chiến \\\x22trường kỳ kháng chiến\\\x22. Đừng nản lòng khi bệnh tái phát. Hãy kiên trì với thói quen \x3cstrong\x3eDƯỠNG ẨM HÀNG NGÀY\x3c\/strong\x3e. Đó chính là \\\x22liều thuốc\\\x22 tốt nhất và an toàn nhất để bảo vệ làn da mong manh của con.\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-21T03:01:08.371Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251221000715\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22GIẢI MÃ \\\x22TRẬN CHIẾN\\\x22 HÔ HẤP: KHI NÀO THỰC SỰ CẦN KHÁNG SINH VÀ NGHỆ THUẬT CHĂM SÓC CON ỐM TẠI NHÀ\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1g1Nbp0vWbiPka0PEvdnVFD1WVsc3qwcQ\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3e\x3cem\x3e\\\x22Con lại ho rồi à?\\\x22, \\\x22Sao tháng này đi bác sĩ 3 lần rồi?\\\x22, \\\x22Uống kháng sinh đi cho nhanh khỏi để còn đi học...\\\x22\x3c\/em\x3e\x3c\/p\x3e\x3cp\x3eNhững câu thoại này quá quen thuộc trong các gia đình có con nhỏ dưới 5 tuổi. Cứ giao mùa, thay đổi thời tiết là điệp khúc ho - sổ mũi - sốt lại bắt đầu. Sự sốt ruột khiến nhiều bố mẹ vội vàng tìm đến kháng sinh như một \\\x22thần dược\\\x22, để rồi rơi vào vòng luẩn quẩn: Con ốm -\x26gt; Kháng sinh -\x26gt; Đề kháng yếu đi -\x26gt; Lại dễ ốm hơn.\x3c\/p\x3e\x3cp\x3eBài viết này sẽ giúp bố mẹ trang bị kiến thức chuẩn để bình tĩnh \\\x22đối mặt\\\x22 với những đợt ốm vặt của con.\x3c\/p\x3e\x3ch3\x3e1. THAY ĐỔI TƯ DUY: TẠI SAO CON HAY ỐM? \(ĐÓ KHÔNG HẲN LÀ ĐIỀU XẤU!\)\x3c\/h3\x3e\x3cp\x3eTrước khi trách móc bản thân chăm con chưa tốt, bố mẹ cần hiểu một sự thật sinh học:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eHệ miễn dịch của trẻ là một \\\x22tân binh\\\x22.\x3c\/strong\x3e Khi mới sinh ra, hệ miễn dịch của trẻ còn rất non nớt, chưa từng va chạm với các mầm bệnh bên ngoài. Mỗi lần con bị cảm, ho, sổ mũi là một lần \\\x22tân binh\\\x22 này được tham gia một \\\x22buổi tập trận thực tế\\\x22.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCơ thể học cách nhận diện kẻ thù \(virus\/vi khuẩn\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCơ thể học cách sản xuất vũ khí \(kháng thể\) để tiêu diệt chúng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCơ thể ghi nhớ kẻ thù đó để lần sau đối phó nhanh hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eBình thường hóa việc ốm:\x3c\/strong\x3e Một đứa trẻ dưới 5 tuổi \(đặc biệt là khi mới đi nhà trẻ\) có thể bị ốm vặt đường hô hấp từ \x3cstrong\x3e6 - 10 lần\/năm\x3c\/strong\x3e. Đây là quá trình tất yếu để xây dựng một hệ miễn dịch trưởng thành.\x3c\/blockquote\x3e\x3ch3\x3e2. NGUYÊN TẮC VÀNG: VIRUS VS. VI KHUẨN - SỰ KHÁC BIỆT SỐNG CÒN\x3c\/h3\x3e\x3cp\x3eĐây là kiến thức quan trọng nhất để tránh lạm dụng kháng sinh.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eSỰ THẬT GÂY SỐC: 80-90% các bệnh viêm đường hô hấp trên \(cảm lạnh, viêm họng, viêm mũi, viêm thanh quản...\) ở trẻ em là do VIRUS gây ra.\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVIRUS:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eĐặc điểm:\x3c\/em\x3e Thường gây triệu chứng rầm rộ toàn thân \(sốt cao, đau người, chảy nước mũi trong, ho nhiều\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eĐiều trị:\x3c\/em\x3e \x3cstrong\x3eKHÁNG SINH HOÀN TOÀN VÔ TÁC DỤNG.\x3c\/strong\x3e Kháng sinh chỉ diệt vi khuẩn, không diệt được virus.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eDiễn biến:\x3c\/em\x3e Bệnh sẽ tự khỏi sau 5-10 ngày nhờ hệ miễn dịch của cơ thể tự chiến đấu. Thuốc chỉ có tác dụng hỗ trợ giảm triệu chứng \(hạ sốt, giảm ho\) để trẻ dễ chịu hơn trong lúc chờ khỏi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVI KHUẨN:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eĐặc điểm:\x3c\/em\x3e Thường là biến chứng sau một đợt nhiễm virus kéo dài, hoặc khởi phát với các dấu hiệu đặc trưng \(sốt cao li bì, môi khô lưỡi bẩn, hơi thở hôi, nước mũi vàng xanh đặc quánh kéo dài trên 10 ngày, đau tai dữ dội...\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eĐiều trị:\x3c\/em\x3e \x3cstrong\x3eBẮT BUỘC DÙNG KHÁNG SINH\x3c\/strong\x3e đủ liều, đủ ngày theo chỉ định của bác sĩ.\x3c\/li\x3e\x3c\/ol\x3e\x3cblockquote\x3e\x3cstrong\x3eCái bẫy tâm lý:\x3c\/strong\x3e Nhiều bố mẹ thấy con sốt virus 3 ngày không đỡ, ngày thứ 4 tự ý cho uống kháng sinh. Đến ngày thứ 5 con bắt đầu lui bệnh \(do diễn biến tự nhiên của virus\). Bố mẹ lại nhầm tưởng: \x3cem\x3e\\\x22Đấy, nhờ uống kháng sinh mới khỏi!\\\x22.\x3c\/em\x3e Đây là sai lầm tai hại nhất.\x3c\/blockquote\x3e\x3ch3\x3e3. TÁC HẠI KHỦNG KHIẾP CỦA VIỆC LẠM DỤNG KHÁNG SINH\x3c\/h3\x3e\x3cp\x3eUống kháng sinh khi bị nhiễm virus không những không giúp con khỏi bệnh nhanh hơn mà còn gây hại:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTạo ra \\\x22Vi khuẩn siêu kháng thuốc\\\x22 \(Superbugs\):\x3c\/strong\x3e Đây là thảm họa y tế toàn cầu. Việc dùng kháng sinh bừa bãi rèn luyện cho vi khuẩn cách chống lại thuốc. Đến khi con thực sự bị nhiễm khuẩn nặng, sẽ không còn loại thuốc nào chữa được nữa.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTàn phá hệ vi sinh đường ruột:\x3c\/strong\x3e Kháng sinh giống như \\\x22bom nguyên tử\\\x22, nó tiêu diệt vi khuẩn có hại nhưng cũng giết chết luôn cả tỷ tỷ vi khuẩn có lợi trong ruột. Hậu quả là trẻ bị tiêu chảy, rối loạn tiêu hóa, biếng ăn và... SUY GIẢM MIỄN DỊCH \(vì 70% hệ miễn dịch nằm ở ruột\).\x3c\/li\x3e\x3c\/ol\x3e\x3ch3\x3e4. NGHỆ THUẬT CHĂM SÓC TẠI NHÀ: HỖ TRỢ CON VƯỢT QUA ĐỢT BỆNH \(KHÔNG DÙNG KHÁNG SINH\)\x3c\/h3\x3e\x3cp\x3eKhi xác định con bị nhiễm virus \(thông qua thăm khám bác sĩ\), nhiệm vụ của bố mẹ là \\\x22chăm sóc hỗ trợ\\\x22 để con cảm thấy dễ chịu nhất trong khi cơ thể tự chiến đấu.\x3c\/p\x3e\x3ch4\x3eA. Xử lý Sổ mũi, Nghẹt mũi \(Chìa khóa để ngủ ngon và bú tốt\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVũ khí:\x3c\/strong\x3e Nước muối sinh lý \(0.9%\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCách làm:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNhỏ mũi:\x3c\/em\x3e Làm loãng dịch nhầy.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eHút mũi \(nếu cần\):\x3c\/em\x3e Chỉ hút khi dịch quá nhiều khiến trẻ không thở\/bú được. Không lạm dụng hút máy quá mạnh gây tổn thương niêm mạc.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eRửa mũi \(cho trẻ lớn\):\x3c\/em\x3e Kỹ thuật này rất hiệu quả nhưng cần được hướng dẫn đúng cách.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMẹo:\x3c\/strong\x3e Kê cao đầu giường một chút khi ngủ để giúp dịch mũi chảy xuống dễ dàng hơn, giảm nghẹt.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eB. Xử lý Ho \(Ho là phản xạ tốt!\)\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTư duy đúng:\x3c\/strong\x3e Ho là phản xạ bảo vệ của cơ thể để tống đờm nhớt ra khỏi đường thở. Đừng cố \\\x22cắt cơn ho\\\x22 hoàn toàn bằng các thuốc ức chế ho mạnh \(trừ khi ho quá nhiều gây nôn trớ, mất ngủ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eVũ khí tự nhiên:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eNước ấm:\x3c\/em\x3e Cho trẻ uống nhiều nước ấm để làm loãng đờm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cem\x3eGiữ ấm và làm ẩm không khí:\x3c\/em\x3e Sử dụng máy tạo độ ẩm nếu phòng dùng điều hòa bị khô.\x3c\/li\x3e\x3c\/ol\x3e\x3ch4\x3eC. Xử lý Sốt\x3c\/h4\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTư duy đúng:\x3c\/strong\x3e Sốt không phải là bệnh, sốt là phản ứng có lợi giúp cơ thể tiêu diệt virus.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKhi nào dùng thuốc hạ sốt?\x3c\/strong\x3e Không căn cứ vào con số trên nhiệt kế \(ví dụ: cứ 38.5 độ là uống\). Hãy nhìn vào TOÀN TRẠNG của trẻ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu trẻ sốt 39 độ nhưng vẫn chơi ngoan, tỉnh táo: Chỉ cần chườm ấm, mặc thoáng, cho uống nhiều nước.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNếu trẻ sốt 38.5 độ nhưng quấy khóc, mệt mỏi, đau đầu: Hãy cho dùng thuốc hạ sốt \(Paracetamol hoặc Ibuprofen đúng liều cân nặng\) để giúp trẻ dễ chịu hơn.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1HtYBmLu-0lvubuNsgqAXwXIl1nPfT0rg\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3ch3\x3e5. KHI NÀO CẦN ĐI GẶP BÁC SĨ NGAY LẬP TỨC \(RED FLAGS\)?\x3c\/h3\x3e\x3cp\x3eDù chăm sóc tại nhà tốt đến đâu, hãy đưa con đi viện ngay nếu có các dấu hiệu nguy hiểm sau:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eDấu hiệu Khó thở \(Quan trọng nhất\):\x3c\/strong\x3e Thở nhanh, rút lõm lồng ngực, cánh mũi phập phồng, tím tái quanh môi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSốt cao liên tục trên 3 ngày không có xu hướng giảm, hoặc sốt lại sau khi đã cắt sốt vài ngày.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ li bì, khó đánh thức, hoặc kích thích vật vã.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eNôn trớ TẤT CẢ mọi thứ ăn\/uống vào.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCó dấu hiệu mất nước: Môi khô, mắt trũng, tiểu ít, khóc không có nước mắt.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTrẻ dưới 3 tháng tuổi bị sốt \(bất kể nhiệt độ nào\).\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eLời kết:\x3c\/strong\x3e Chăm sóc con ốm là một cuộc chiến về sự KIÊN NHẪN. Thay vì làm \\\x22bác sĩ Google\\\x22 tự kê đơn kháng sinh, hãy làm một \\\x22người chăm sóc thông thái\\\x22: Cung cấp nước, dinh dưỡng, sự thoải mái và theo dõi sát sao các dấu hiệu trở nặng. Hãy để hệ miễn dịch của con được làm việc của nó!\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-21T02:59:38.065Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251210190217\x22,\x22department\x22:\x22ENT\x22,\x22title\x22:\x22Viêm Xoang: Nhận Diện Triệu Chứng và Các Phương Pháp Điều Trị Hiệu Quả\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1W5iDH2yg4a5HAMQr_L6J2wDJpYanvQXp\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3eViêm xoang là một tình trạng sức khỏe rất phổ biến, ảnh hưởng đến hàng triệu người trên toàn thế giới. Mặc dù thường không nguy hiểm đến tính mạng, nhưng viêm xoang có thể gây ra sự khó chịu đáng kể, làm giảm chất lượng cuộc sống và ảnh hưởng đến năng suất làm việc hàng ngày. Việc hiểu rõ về các triệu chứng và biết cách điều trị đúng đắn là chìa khóa để kiểm soát căn bệnh này.\x3c\/p\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eI. Viêm Xoang Là Gì?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eViêm xoang \(Sinusitis\) là tình trạng lớp niêm mạc lót bên trong các xoang cạnh mũi bị viêm và sưng tấy. Các xoang là những khoang rỗng chứa đầy không khí nằm trong xương mặt, bao gồm xoang trán, xoang sàng, xoang bướm và xoang hàm. Chức năng chính của xoang là làm ẩm không khí hít vào, làm nhẹ hộp sọ và sản xuất chất nhầy để bẫy bụi bẩn, vi khuẩn.\x3c\/p\x3e\x3cp\x3eKhi niêm mạc xoang bị viêm, các lỗ thông giữa xoang và mũi bị tắc nghẽn, khiến chất nhầy bị ứ đọng lại. Môi trường ẩm ướt, tù đọng này là điều kiện lý tưởng để vi khuẩn, virus hoặc nấm phát triển, dẫn đến nhiễm trùng và làm các triệu chứng trở nên nghiêm trọng hơn.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3ePhân loại Viêm xoang:\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eViêm xoang được phân loại chủ yếu dựa trên thời gian kéo dài của bệnh:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eViêm xoang cấp tính:\x3c\/strong\x3e Triệu chứng kéo dài dưới 4 tuần. Thường xảy ra sau cảm lạnh hoặc cúm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eViêm xoang bán cấp:\x3c\/strong\x3e Triệu chứng kéo dài từ 4 đến 12 tuần.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eViêm xoang mãn tính:\x3c\/strong\x3e Triệu chứng dai dẳng trên 12 tuần, thường tái phát hoặc khó điều trị dứt điểm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eViêm xoang tái phát:\x3c\/strong\x3e Xảy ra bốn hoặc nhiều lần trong một năm, mỗi đợt kéo dài ít nhất 7 ngày.\x3c\/li\x3e\x3c\/ol\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eII. Nhận Diện Các Triệu Chứng Điển Hình\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eCác triệu chứng của viêm xoang có thể thay đổi tùy thuộc vào mức độ nặng nhẹ và loại xoang bị ảnh hưởng, nhưng thường bao gồm:\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eA. Triệu chứng tại mũi và xoang:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐau hoặc nặng mặt:\x3c\/strong\x3e Đây là một trong những dấu hiệu đặc trưng nhất. Cơn đau thường tập trung ở vùng trán, giữa hai mắt, hai bên má hoặc hàm trên. Cảm giác đau có thể tăng lên khi cúi người về phía trước hoặc khi thay đổi áp suất không khí \(ví dụ: đi máy bay\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eNghẹt mũi\/Tắc mũi:\x3c\/strong\x3e Niêm mạc mũi sưng làm cản trở đường thở, gây khó thở bằng mũi.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChảy nước mũi hoặc dịch mũi đặc \(Post-nasal drip\):\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eViêm xoang cấp do virus:\x3c\/strong\x3e Dịch thường trong.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eViêm xoang do vi khuẩn:\x3c\/strong\x3e Dịch tiết thường có màu vàng, xanh lá cây hoặc có lẫn mủ, đôi khi có mùi hôi.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChảy dịch xuống họng:\x3c\/strong\x3e Dịch nhầy từ xoang chảy xuống phía sau cổ họng \(dịch mũi sau\), gây ngứa họng, ho kéo dài, đặc biệt là vào ban đêm.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eB. Các Triệu chứng kèm theo:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eGiảm hoặc mất khứu giác \(Anosmia\):\x3c\/strong\x3e Do niêm mạc bị sưng làm cản trở mùi đến các thụ thể thần kinh khứu giác.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eĐau họng, ho:\x3c\/strong\x3e Do dịch nhầy chảy xuống họng gây kích ứng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHơi thở hôi \(Halitosis\):\x3c\/strong\x3e Do dịch tiết bị nhiễm khuẩn và ứ đọng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eSốt:\x3c\/strong\x3e Thường gặp trong các trường hợp viêm xoang cấp tính do nhiễm trùng.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMệt mỏi, đau đầu:\x3c\/strong\x3e Cảm giác chung là uể oải, thiếu năng lượng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eIII. Phương Pháp Điều Trị Viêm Xoang Hiệu Quả\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eMục tiêu của điều trị là giảm viêm niêm mạc xoang, dẫn lưu chất nhầy ứ đọng và tiêu diệt tác nhân gây nhiễm trùng \(nếu có\).\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eA. Điều trị tại nhà và không dùng thuốc:\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRửa mũi bằng nước muối sinh lý:\x3c\/strong\x3e Đây là biện pháp cực kỳ quan trọng và hiệu quả. Rửa mũi giúp làm sạch chất nhầy đặc, loại bỏ các tác nhân gây dị ứng, giảm sưng và cải thiện dẫn lưu.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eXông hơi:\x3c\/strong\x3e Hít hơi nước ấm từ bát nước nóng hoặc sử dụng máy tạo ẩm giúp làm loãng dịch nhầy và làm dịu niêm mạc mũi.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eUống đủ nước:\x3c\/strong\x3e Giúp làm loãng dịch nhầy toàn cơ thể, bao gồm cả dịch tiết xoang.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eChườm ấm:\x3c\/strong\x3e Đặt khăn ấm lên vùng mặt \(mũi, trán, mắt\) để giảm đau và áp lực xoang.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eB. Điều trị bằng thuốc \(Theo chỉ định của bác sĩ\):\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThuốc giảm đau và hạ sốt:\x3c\/strong\x3e Paracetamol hoặc Ibuprofen có thể được sử dụng để kiểm soát cơn đau đầu và sốt.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThuốc thông mũi \(Decongestants\):\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDạng uống: Giúp co mạch máu, giảm sưng niêm mạc.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eDạng xịt: Chỉ nên dùng tối đa 3 ngày để tránh hiện tượng \\\x22nghẹt mũi hồi ứng\\\x22 \(tình trạng nghẹt mũi trở nên tồi tệ hơn khi ngừng thuốc\).\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCorticosteroid dạng xịt mũi:\x3c\/strong\x3e Đây là phương pháp điều trị tiêu chuẩn cho viêm xoang mãn tính và dị ứng. Thuốc giúp giảm viêm niêm mạc mạnh mẽ và an toàn khi sử dụng lâu dài theo chỉ dẫn.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThuốc kháng sinh:\x3c\/strong\x3e Chỉ được chỉ định khi viêm xoang được xác định là do \x3cstrong\x3evi khuẩn\x3c\/strong\x3e và các triệu chứng kéo dài trên 7-10 ngày mà không cải thiện. Tuyệt đối không tự ý dùng kháng sinh.\x3c\/li\x3e\x3cli data-list=\\\x22ordered\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThuốc kháng Histamine:\x3c\/strong\x3e Được sử dụng nếu viêm xoang có liên quan đến dị ứng.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eC. Can thiệp ngoại khoa \(Phẫu thuật\):\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3ePhẫu thuật chỉ được xem xét khi viêm xoang mãn tính không đáp ứng với điều trị nội khoa tích cực, hoặc khi có các bất thường về cấu trúc mũi \(như lệch vách ngăn, polyp mũi lớn\) gây tắc nghẽn.\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3ePhẫu thuật Nội soi Chức năng Xoang \(FESS\):\x3c\/strong\x3e Là phương pháp phổ biến nhất, giúp mở rộng các lỗ thông tự nhiên của xoang để cải thiện dẫn lưu.\x3c\/li\x3e\x3c\/ol\x3e\x3cp\x3e\x3cstrong\x3eIV. Khi Nào Cần Gặp Bác Sĩ?\x3c\/strong\x3e\x3c\/p\x3e\x3cp\x3eMặc dù nhiều trường hợp viêm xoang cấp tính có thể tự khỏi hoặc được điều trị hiệu quả tại nhà, bạn nên tìm kiếm sự tư vấn y tế nếu:\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eTriệu chứng kéo dài hơn 10 ngày mà không có dấu hiệu cải thiện.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eSốt cao liên tục.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCơn đau mặt hoặc đau đầu nghiêm trọng.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCó vấn đề về thị lực \(nhìn đôi hoặc mờ\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eViêm xoang tái phát nhiều lần trong năm.\x3c\/li\x3e\x3c\/ol\x3e\x3cp class=\\\x22ql-align-center\\\x22\x3e\x3cbr\x3e\x3c\/p\x3e\x3cp\x3eViêm xoang là một căn bệnh dai dẳng nhưng hoàn toàn có thể được kiểm soát. Bằng cách nhận biết sớm các triệu chứng và tuân thủ kế hoạch điều trị của bác sĩ chuyên khoa Tai Mũi Họng, bạn có thể giảm thiểu sự khó chịu và cải thiện đáng kể chất lượng cuộc sống của mình.\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x22,\x22date\x22:\x222025-12-10T12:36:43.767Z\x22,\x22status\x22:\x22Published\x22,\x22featured\x22:\x22No\x22,\x22viewCount\x22:0},{\x22id\x22:\x22NEWS_20251210114953\x22,\x22department\x22:\x22Pediatrics\x22,\x22title\x22:\x22SỮA MẸ VÀ DỊ ỨNG ĐẠM SỮA BÒ: GIỮ HAY BỎ? CHIẾN LƯỢC CHO TỪNG HOÀN CẢNH CỤ THỂ\x22,\x22imageUrl\x22:\x22https:\/\/drive.google.com\/thumbnail?id=1FMX90BApMeUwudGGavcs2zlMoj6oMGkZ\x26sz=w4096\x22,\x22content\x22:\x22\x3cp\x3eNguyên tắc vàng đầu tiên bố mẹ cần nhớ: \x3cstrong\x3eSữa mẹ là thức ăn tốt nhất cho trẻ, kể cả trẻ bị dị ứng.\x3c\/strong\x3e Sữa mẹ chứa các yếu tố miễn dịch giúp ruột bé mau lành hơn bất kỳ loại sữa công thức nào. Tuy nhiên, cách xử lý sẽ khác nhau tùy vào chế độ bú.\x3c\/p\x3e\x3cp\x3e\x3cimg src=\\\x22https:\/\/drive.google.com\/thumbnail?id=1kwFFo40oY70oCB6pO7Gjk-Peq2SwLmlh\x26amp;sz=w4096\\\x22\x3e\x3c\/p\x3e\x3cp\x3e\x3cbr\x3e\x3c\/p\x3e\x3ch3\x3e1. TÌNH HUỐNG: BÉ BÚ MẸ HOÀN TOÀN \(100%\)\x3c\/h3\x3e\x3cp\x3e\x3cstrong\x3eSự thật:\x3c\/strong\x3e Trẻ bú mẹ hoàn toàn VẪN CÓ THỂ bị dị ứng đạm sữa bò. \x3cstrong\x3eNguyên nhân:\x3c\/strong\x3e Các mảnh protein sữa bò từ thực phẩm mẹ ăn \(sữa tươi, phô mai, sữa chua, bánh ngọt...\) có thể đi qua sữa mẹ và vào ruột bé, gây kích ứng. Tỷ lệ này thấp \(chỉ khoảng 0.5 - 1% trẻ bú mẹ hoàn toàn\) nhưng vẫn xảy ra.\x3c\/p\x3e\x3cp\x3e\x3cstrong\x3eGiải pháp: Chế độ ăn loại trừ cho MẸ \(Maternal Elimination Diet\)\x3c\/strong\x3e\x3c\/p\x3e\x3col\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMẹ KHÔNG CẦN cai sữa:\x3c\/strong\x3e Tiếp tục cho con bú là lựa chọn tốt nhất.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eMẹ cần KIÊNG tuyệt đối:\x3c\/strong\x3e Tất cả các sản phẩm từ sữa bò \(sữa tươi, sữa đặc, sữa chua, phô mai, bơ, váng sữa\) và các thực phẩm có chứa sữa ẩn \(bánh quy, bánh bông lan, sốt cream...\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eKiên nhẫn chờ đợi:\x3c\/strong\x3e\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCần khoảng \x3cstrong\x3e72 giờ - 1 tuần\x3c\/strong\x3e để đạm sữa bò đào thải hết khỏi cơ thể mẹ và sữa mẹ.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3eCần thêm \x3cstrong\x3e1-2 tuần\x3c\/strong\x3e nữa để niêm mạc ruột của bé bắt đầu lành lại và triệu chứng thuyên giảm.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBổ sung cho mẹ \(RẤT QUAN TRỌNG\):\x3c\/strong\x3e Khi kiêng sữa và các chế phẩm từ sữa, mẹ có nguy cơ rất cao bị thiếu hụt Canxi và Vitamin D, ảnh hưởng trực tiếp đến sức khỏe xương của mẹ \(nguy cơ loãng xương sau này\) và chất lượng sữa cho con. Do đó:\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eBắt buộc phải uống thuốc bổ sung:\x3c\/strong\x3e Canxi \(liều khuyến cáo khoảng 1000mg - 1200mg\/ngày\) và Vitamin D3 \(theo chỉ định của bác sĩ\) trong suốt thời gian kiêng sữa.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-1\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eTăng cường thực phẩm giàu Canxi không từ sữa bò:\x3c\/strong\x3e Mẹ cần chủ động đưa các thực phẩm sau vào thực đơn hàng ngày:\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-2\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eHải sản:\x3c\/strong\x3e Tôm, cua đồng, cá nhỏ ăn cả xương \(cá cơm, cá mòi\).\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-2\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eRau xanh đậm:\x3c\/strong\x3e Rau cải xoăn \(kale\), súp lơ xanh \(bông cải xanh\), rau bina \(bó xôi\), rau dền.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-2\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eCác loại đậu và hạt:\x3c\/strong\x3e Đậu phụ \(đậu hũ\), đậu nành \(nếu bé không dị ứng đậu nành\), hạt chia, hạt vừng \(mè\), hạnh nhân.\x3c\/li\x3e\x3cli data-list=\\\x22bullet\\\x22 class=\\\x22ql-indent-2\\\x22\x3e\x3cspan class=\\\x22ql-ui\\\x22 contenteditable=\\\x22false\\\x22\x3e\x3c\/span\x3e\x3cstrong\x3eThực phẩm bổ sung canxi:\x3c\/strong\x3e Một số loại sữa hạt \(sữa hạnh nhân, sữa yến mạch...\) hoặc nước cam đượ
